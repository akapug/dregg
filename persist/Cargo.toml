[package]
name = "dregg-persist"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "The node's one durable store: commit log, checkpoints, blocklace, forever digests"

[dependencies]
redb = "2"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
tracing = { workspace = true }
dregg-types = { path = "../types" }
dregg-commit = { path = "../commit" }
dregg-cell = { path = "../cell" }
dregg-circuit = { path = "../circuit" }
dregg-blocklace = { path = "../blocklace" }
dregg-federation = { path = "../federation" }

[dev-dependencies]
tempfile = "3"

[lib]
name = "dregg_persist"
crate-type = ["rlib"]

[lints]
workspace = true
