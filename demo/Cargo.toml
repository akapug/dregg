[package]
name = "pyana-demo"
version.workspace = true
edition.workspace = true

[dependencies]
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
getrandom = { workspace = true }
hex = "0.4"
postcard = { version = "1", features = ["use-std"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
pyana-captp = { path = "../captp" }
pyana-cell = { path = "../cell" }
pyana-circuit = { path = "../circuit" }
pyana-commit = { path = "../commit" }
pyana-federation = { path = "../federation" }
pyana-turn = { path = "../turn" }
pyana-types = { path = "../types" }
pyana-verifier = { path = "../verifier" }
# Cross-app demo helper — drives the four anchor starbridge-apps through
# `EmbeddedExecutor` to produce real `TurnReceipt`s per step.
pyana-app-framework = { path = "../app-framework" }
pyana-credentials = { path = "../credentials" }
starbridge-identity = { path = "../starbridge-apps/identity" }
starbridge-nameservice = { path = "../starbridge-apps/nameservice" }
starbridge-governed-namespace = { path = "../starbridge-apps/governed-namespace" }
starbridge-subscription = { path = "../starbridge-apps/subscription" }

[[bin]]
name = "pyana-demo"
path = "src/main.rs"

[[bin]]
name = "silver-helper"
path = "two-ai-handoff/silver_helper.rs"

[[bin]]
name = "cross-app-helper"
path = "cross-app-e2e/cross_app_helper.rs"

[lints]
workspace = true
