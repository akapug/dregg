# `dreggnet-web` — the WEB `Frontend` over the frontend-agnostic `dreggnet-offerings` core.
#
# The THIRD surface (Discord #0, Telegram, WEB) over ONE offering core. A
# `WebFrontend` implements `dreggnet_offerings::Frontend` as an affordance-renderer
# that paints a deos `Surface` into an HTML fragment (room prose/state + a form/button
# per cap-gated affordance, each POSTing its `Action`), and an `axum` session surface:
#   GET  /session/{id}          renders the current Surface as HTML
#   POST /session/{id}/act      collects the Action, advances ONE real turn, re-renders
#   GET  /session/{id}/verify   re-verifies the committed chain by replay
#
# HONEST SCOPE: this renders the affordance Surface as HTML DIRECTLY. The fuller
# `deos-js` + `deos-web-cells` integration (the live signal-bound web cell rendering)
# is the follow-up; it, plus a real deployment (a served bind address, sessions in a
# store, `dregg-pay` credit debits on the paid tier), is out of scope here.
#
# A breadstuffs workspace MEMBER (root `members`, NOT `default-members` — a heavy
# narrative-adjacent crate, matching `dreggnet-offerings`). Build/test:
#   cargo test -p dreggnet-web
[package]
name = "dreggnet-web"
version = "0.1.0"
edition = "2024"
description = "The web Frontend over dreggnet-offerings: a WebFrontend affordance-renderer (deos Surface -> HTML fragment) + an axum session surface (GET renders, POST advances one real turn), the third surface over the ONE offering core."

# THE PUBLIC-DEMO SERVER — the ~15-line-core entrypoint that makes `dreggnet-web` a runnable
# server (not just a library): it assembles the merged axum app (`make_app`) and serves it.
# `cargo build -p dreggnet-web --bin dreggnet-web-server`.
[[bin]]
name = "dreggnet-web-server"
path = "src/bin/dreggnet-web-server.rs"

[dependencies]
# THE OFFERING CORE — the frontend-agnostic Offering/Frontend traits + the multi-offering
# `OfferingHost` (the registry the web catalog drives), DungeonOffering (offering #0),
# Surface/Action/Outcome. This crate is a `Frontend` impl OVER it; it does NOT modify it.
dreggnet-offerings = { path = "../dreggnet-offerings" }
# THE LAB FRAMING COPY — `dreggnet_catalog::{lab_intro, flagship_pointer}`: the ONE place the
# catalog's product words live (the Lab shelf + the Descent-flagship pointer), shared with the
# Telegram and Discord front doors. Copy only — the host is still built by this crate's own
# registrars until the Phase-B delegation (docs/BOT-SHARED-BACKEND-DESIGN.md).
dreggnet-catalog = { path = "../dreggnet-catalog" }
# THE INTERACTION-ENVELOPE AUDIT FACILITY (docs/BOT-AUDIT-LOGGING-DESIGN.md) — the shared
# event shape + non-blocking JSONL writer all three frontends emit through; `src/audit.rs`
# is only this deploy's log resolution over it.
dreggnet-audit = { path = "../dreggnet-audit" }
# THREE HETEROGENEOUS OFFERINGS registered in the web catalog beside the dungeon: the
# collective-governance council (propose → vote → enact) and the sealed-bid market
# (list → bid → settle). The web catalog drives all three through the ONE `OfferingHost`
# — the same offerings the Discord bot's generic adapter serves, now on the web surface.
dreggnet-council = { path = "../dreggnet-council" }
dreggnet-market = { path = "../dreggnet-market" }
# THE TWO PORTFOLIO GAMES, registered in the web catalog (fully playable in the browser — and,
# through the SAME deos `Surface`, on Discord / Telegram / WeChat via the do-once path):
#  - dregg-multiway-tug: the hidden-hand tug of influence (`TugOffering`), reached through the
#    seat-claiming `seated::SeatedTug` adapter (a web identity is a derived key, not the game's
#    canonical seat string — the adapter claims a seat; the game crate is unmodified);
#  - dregg-automatafl: the verified simultaneous-move board (`AutomataflOffering`) — a `CoordGrid`
#    board with rook-line legal-move highlighting + the commit/reveal/resolve turns. Claims seats
#    natively; registered directly. Both are CONSUMED, never modified.
dregg-multiway-tug = { path = "../dregg-multiway-tug" }
dregg-automatafl = { path = "../dregg-automatafl" }
# THE DO-ONCE FEATURE SURFACES — the eight Offerings (`register_surfaces`) the public-demo
# server mounts into the catalog beside the five games (trade · inventory · cheevos · guild ·
# craft · companion · tavern · party). Each is a plain `render->ViewNode`, so the web catalog
# lights them up with the one `register_surfaces(&mut host)` call — the do-once path.
dreggnet-surfaces = { path = "../dreggnet-surfaces" }
# THE FIVE NON-GAME OFFERINGS — the full portfolio beside the games + do-once feature surfaces.
# Each `impl Offering for XOffering`, so the web catalog mounts them with one `host.register(...)`
# (the SAME generic `OfferingHost` path the games take): a verifiable document store, an
# identity/name service, a confined compute market, a grain (rate-limited work) offering, and the
# hermes message relay. CONSUMED, never modified — the catalog is now the WHOLE offering set, not a
# subset. See `demo_host`.
dreggnet-doc = { path = "../dreggnet-doc" }
dreggnet-names = { path = "../dreggnet-names" }
dreggnet-compute = { path = "../dreggnet-compute" }
dreggnet-grain = { path = "../dreggnet-grain" }
dreggnet-hermes = { path = "../dreggnet-hermes" }
# THE DETERMINISTIC SPRITE ART — `dreggnet-sprite` turns a `dreggnet_asset::AssetId` (a blake3
# content address) into a byte-identical composed vector SVG (gear / card). The web surface serves
# this art at `GET /sprite/{kind}/{hex}` and paints a deos `ViewNode::Tile{handle}` (an asset-bearing
# node) as the inline SVG sprite instead of a text placeholder — the visual layer the catalog was
# missing. Deterministic: same asset ⇒ same SVG, so the art is itself re-derivable/verifiable.
dreggnet-sprite = { path = "../dreggnet-sprite" }
dreggnet-asset = { path = "../dreggnet-asset" }
# THE DEOS SURFACE — `ViewNode`/`MenuItem`, the view-tree a Surface wraps. The web
# renderer WALKS this tree into HTML. `default-features = false` = the gpui-free
# view-tree model only (no native/gpui/mozjs), matching dreggnet-offerings; the `web`
# feature adds the server-form `SessionFormBackend` this crate renders through.
deos-view = { path = "../deos-view", default-features = false, features = ["web"] }
# The HTTP surface — axum 0.8 (the workspace's version; matches node/api.rs +
# discord-bot/http_server.rs). Default features carry the `Form`/`Query` extractors
# + the `Html`/`Json` responses this surface uses.
axum = { version = "0.8" }
# Form/query deserialization for the POST /act body ({turn, arg}) + the ?user= param.
serde = { version = "1", features = ["derive"] }
# The JSON body of GET /session/{id}/verify (the replay VerifyReport over HTTP).
serde_json = "1"
# Deterministic identity derivation (mirror of the MockFrontend shape: a web user ->
# a stable DreggIdentity via blake3) + a deterministic session seed from a session id.
blake3 = "1"

# THE TELEGRAM MINI APP surface (src/telegram_miniapp.rs) — the /tg scope validates Telegram
# initData server-side and lands turns with verified Signed provenance:
#  - dreggnet-telegram: the ONE uid→identity derivation (`cipherclerk::{seed_for,
#    TelegramCipherclerk, master_secret_from_env}`) — CALLED, never mirrored, so the Mini App
#    player is byte-for-byte the in-chat player (the lib dep graph stays acyclic; telegram's
#    dev-dep on this crate is the cargo-legal reverse edge);
#  - hmac + sha2: the pinned initData validation chain (secret = HMAC-SHA256("WebAppData",
#    token); expected = HMAC-SHA256(secret, data-check-string));
#  - subtle: constant-time hash comparison (never a timing oracle on the HMAC gate);
#  - zeroize: wipe the transient custodial seed handed to `TurnSigner::from_seed` (the same
#    hygiene the telegram cipherclerk applies).
dreggnet-telegram = { path = "../dreggnet-telegram" }
hmac = { workspace = true }
sha2 = { workspace = true }
subtle = { workspace = true }
zeroize = { workspace = true }

# OBSERVABILITY — the SAME crate + versions node/Cargo.toml uses (workspace-consistent), so the
# web surface's `GET /metrics` (src/metrics.rs) speaks the same Prometheus exposition the
# deploy/observability stack already scrapes from the nodes. The `metrics` macros are no-ops
# until `metrics::install_recorder()` runs (make_app installs it), so the library stays
# zero-cost for embedders that never mount /metrics.
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# THE FEDERATION NODE-TARGET SEAM — `NodeTarget::{Local, Federation}` + `from_env` (reads
# `DREGG_NODE_URL`) + the real `http` transport (`HttpNode`, POSTs a turn to `/turn/submit` +
# confirms it landed on `/api/receipts`). Enabled with `features = ["http"]` so the Federation
# path COMPILES from the web surface and is selectable AT RUNTIME by the `DREGG_NODE_URL` env
# (unset → `NodeTarget::Local`, the in-process default: the committed tests + demo are untouched).
# This is what makes the games/adventure RUNNABLE AGAINST A DEVNET: with `DREGG_NODE_URL` set, a
# settled Descent run submits its winning turn's commitment to the running node and lands on its
# ledger. `dreggnet-offerings` also depends on this crate (for `DailyDescentOffering::settle`);
# enabling `http` here unifies the feature across the whole `dreggnet-web` build.
dregg-node-target = { path = "../node-target", features = ["http"] }

# DURABLE PERSISTENCE for the no-cheat Descent leaderboard (`descent_store`). rusqlite — NOT sqlx —
# deliberately: `dreggnet-web` is a ROOT-workspace member, and the workspace already links `sqlite3`
# once (via deos-matrix's `rusqlite 0.37` -> `libsqlite3-sys 0.35`). Cargo permits exactly ONE
# `links = "sqlite3"` per resolve, so sqlx's own `libsqlite3-sys 0.30` would break the whole-workspace
# resolution (see the root Cargo.toml note on why discord-bot is an EXCLUDED workspace). Depending on
# the SAME `rusqlite 0.37` unifies onto the existing linker (zero new `links` packages) and — being
# synchronous — needs no sync<->async bridge. `bundled` compiles sqlite from source (self-contained,
# no system libsqlite3 needed). The store persists ONLY reproducible public input (a day seed + a
# run's move sequence), re-verified by replay on boot — the same shape as the bot's SqliteGalleryStore.
rusqlite = { version = "0.37", features = ["bundled"] }

# THE SERVER BINARY (`src/bin/dreggnet-web-server.rs`) — the public-demo unblocker. The async
# runtime for `axum::serve` (`net` = the TcpListener bind, `signal` = ctrl-c graceful shutdown).
# The library stays runtime-agnostic; only the bin drives the runtime.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal", "time"] }
# Structured startup / request logging for the server bin.
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# THE DESCENT spectator/provenance surface (`descent.rs`) consumes these AS-IS to
# INDEPENDENTLY re-verify a run on render — it modifies none of them:
#  - ugc-dregg: the no-cheat verifier (`verify_completion`) + `Universe`/`Completion`
#    (the leaderboard re-verification target — the same tooth `Registry::submit` runs);
#  - spween-dregg: the audited replay re-verifier (`verify`) + the compiled var→slot map
#    (read a committed var off a re-verified state) + `WorldCell`/`Scene`;
#  - procgen-dregg: `CommittedSeed` / `daily_seed` (the day's reproducible seed).
ugc-dregg = { path = "../ugc-dregg" }
spween-dregg = { path = "../spween-dregg" }
procgen-dregg = { path = "../procgen-dregg" }

[dev-dependencies]
# Drive the axum handlers with no real network — `ServiceExt::oneshot`.
tower = { version = "0.5", features = ["util"] }
# The async test runtime for the oneshot-driven handlers.
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
# The KP_* choice constants the driven test plays a winning / illegal line with.
dungeon-on-dregg = { path = "../dungeon-on-dregg" }

# A workspace MEMBER of the breadstuffs root (registered in `members`, not
# `default-members`). The root `[workspace]` + `[patch]` tables apply; no standalone
# `[workspace]`/`[patch]` here.
