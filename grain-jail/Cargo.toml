# grain-jail — an OS-jailed subprocess body behind the grain's `AgentBrain`
# seam. A `ConfinedBrain` plugs a jailed body (proposing tool-calls over the
# newline-JSON line protocol) into the existing brain seam, so a grain gains an
# OS-jailed body with no change to its lease/lifecycle/attestation drive path.
#
# Deps are DELIBERATELY light: `dregg-agent` for the brain seam, serde for the
# wire protocol. The jail mechanism (firmament `process-pd`) is added as a
# feature when the real-jail body-spawn lands (staged; see
# docs/deos/GRAIN-CONFINED-BODY.md) — the seam here is jail-agnostic (any
# `BufRead + Write` pair is a channel), so this crate never pulls the heavy
# verified-executor sdk.

[package]
name = "grain-jail"
description = "An OS-jailed subprocess agent body behind the grain's AgentBrain seam: the ConfinedBrain + confined-body line protocol"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lib]
name = "grain_jail"

[features]
# The real firmament OS-jail body-spawn (`jail` module). Off by default so the
# seam + protocol build stays `dregg-agent`-light; `real-jail` pulls the
# process-PD confinement (macOS Seatbelt / Linux seccomp+Landlock).
real-jail = ["dep:dregg-firmament", "dep:libc"]

[dependencies]
# The brain seam this crate implements: AgentBrain / AgentAction / ActionObservation.
dregg-agent = { path = "../dregg-agent" }
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }
# The OS-jail (process-PD confinement) — OPTIONAL, only under `real-jail`.
# process-pd-sandbox is the Endpoint-only floor + host OS sandbox. firmament is
# its own (excluded) workspace; a member path-dep is fine (cargo ignores its
# `[workspace]`), the same way servo-render / starbridge-v2 depend on it.
dregg-firmament = { path = "../sel4/dregg-firmament", features = ["process-pd-sandbox"], optional = true }
# SIGKILL a hung jailed body by pid (only under `real-jail`).
libc = { version = "0.2", optional = true }

[dev-dependencies]
# The end-to-end proof drives a REAL grain: rent → confined-brain drive → meter
# → receipt → R2 verify. Dev-only, so grain-jail's own dep graph stays light
# (no cycle: agent-platform does not depend on grain-jail).
agent-platform = { path = "../agent-platform" }
hosted-lease = { path = "../hosted-lease" }
dregg-types = { path = "../types" }

[lints]
workspace = true
