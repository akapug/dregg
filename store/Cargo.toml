[package]
name = "pyana-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "Persistent storage backend for pyana token chains, federation state, and audit logs"

[features]
default = ["audit-bridge"]
audit-bridge = ["pyana-audit"]

[dependencies]
redb = "2"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
getrandom = { workspace = true }
chacha20poly1305 = { workspace = true }
subtle = "2"
pyana-types = { path = "../types" }
pyana-commit = { path = "../commit" }
pyana-cell = { path = "../cell" }
pyana-circuit = { path = "../circuit" }
pyana-blocklace = { path = "../blocklace" }
pyana-federation = { path = "../federation" }
pyana-audit = { path = "../audit", optional = true }

[dev-dependencies]
tempfile = "3"

[lib]
name = "pyana_store"
crate-type = ["rlib"]

[lints]
workspace = true
