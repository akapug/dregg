# procgen-dregg â€” provably-fair procedural dungeon generation.
#
# A dungeon generated from a COMMITTED verifiable seed: the same seed yields the
# same dungeon, provably. The pipeline is
#
#   committed seed  ->  dregg-dice RandomnessRequest  ->  verified DrawStream
#                   ->  a deterministic dungeon graph  ->  a VALID `.dungeon` source
#
# The randomness is the real `dregg-dice` reject-free, unbiased, indexed draw
# stream (never `rand`): the seed is verified through the source's pure verifier
# (producer + verifier agree), and every draw is bound by the transcript
# commitment. So a verifier who holds the committed seed re-derives the exact
# same draws and re-generates the byte-identical dungeon.
#
# CONSUMES, reimplementing nothing:
#   * dregg-dice â€” the DrawStream / Seed / RandomnessSource verifiable-randomness
#     machinery (Deterministic source: reproducible offline generation).
#   * attested-dm â€” `parse_dungeon` / `validate` (a DEV dependency): the generated
#     `.dungeon` text parses + validates through the real attested-dm DSL, proving
#     the emitted world is a first-class, playable, sound dungeon.
#
# A workspace MEMBER (registered in the root `members`). The root `[workspace]` +
# `[patch]` tables apply; no standalone workspace here.

[package]
name = "procgen-dregg"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

description = "Provably-fair procedural dungeon generation from a committed verifiable dregg-dice seed."

[lints]
workspace = true

[dependencies]
# The verifiable-randomness engine: a committed seed -> verified Seed -> the
# unbiased, reject-free, indexed DrawStream. This is the ONLY randomness source;
# no `rand`.
dregg-dice = { path = "../dice" }
# Domain-separated hashing for the daily-seed derivation (same blake3 1.x already
# resolved workspace-wide, the same hash dregg-dice uses internally).
blake3 = "1"
# Decode the drand round signature (hex) â€” both the LIVE fetch's fetched signature
# and the pinned offline-fallback round vector (`beacon.rs`). Promoted from a
# dev-dep now the fetch path builds a `DailyBeacon` from a hex signature at runtime.
hex = "0.4"
# The LIVE drand HTTP fetch (`beacon::fetch_quicknet_round`): a blocking GET of a
# `quicknet` round + parse of the tiny `{round,randomness,signature}` JSON. Reuses
# the workspace's already-locked reqwest + rustls stack (no new registry crates);
# `blocking` keeps this crate tokio-runtime-free at its API (the caller drives the
# GET from a `spawn_blocking` on the bot's runtime). The fetched round is BLS-verified
# through the existing `dregg-dice` pairing check before it can seed a day.
# The LIVE drand HTTP fetch (`beacon::http_get`) is NATIVE-ONLY â€” see the target-gated
# `reqwest` dependency at the end of this file.
# Parse the drand `public/{round}` JSON body (round + signature). Already resolved
# workspace-wide; adds nothing new to the closure.
serde_json = "1"
# THE PQ HALF OF THE HYBRID DAY SEED (`beacon.rs`) â€” the federation's finalization
# types, consumed READ-ONLY (nothing re-implemented):
#   * `dregg-types`      â€” `finalization_vote_signing_message` (the ONE canonical
#     preimage `dregg-finalization-vote-v2 || block_id || merkle_root` the node's
#     `FinalizationVote` signs) and `HybridQuorumSig` (the wire record carrying a
#     signer's ed25519 half + ML-DSA-65 half + its self-carried PQ key).
#   * `dregg-federation` â€” `receipt::verify_hybrid_quorum_sigs` (the ONE place the
#     `classical âˆ§ pq` quorum rule with the ENROLLED-key PIN lives) and
#     `frost::MlDsaPublicKey` (FIPS 204 ML-DSA-65 verification under `HYBRID_PQ_CTX`).
# The day seed therefore folds a root the SAME quorum evidence a node re-verifies on
# restart authenticates â€” a re-deriver re-checks the PQ half against the pinned
# committee roster with no node running.
dregg-types = { path = "../types" }
dregg-federation = { path = "../federation", default-features = false }

[dev-dependencies]
# Sign the hybrid-quorum test fixtures' CLASSICAL half (the ML-DSA half is signed by
# `dregg_federation::frost::MlDsaSigningKey`) â€” the tests build REAL hybrid quorum
# evidence over the real canonical preimage, so the PQ verification bites for real.
ed25519-dalek = { version = "2", features = ["std"] }
# The real attested-dm DSL parser + validator. Dev-only: the generator emits
# `.dungeon` TEXT; the tests + example prove that text parses and validates as a
# first-class attested dungeon through the shipped engine.
attested-dm = { path = "../attested-dm" }

# NATIVE-ONLY: the LIVE drand HTTP fetch (`beacon::http_get` â†’ `fetch_quicknet_round`).
# `reqwest::blocking` is gated out on wasm32 (a browser has no synchronous cross-thread
# GET), so on wasm `http_get` fails CLOSED and callers fall back to the pinned,
# BLS-verifiable round; the pure verify core (`verified_beacon_from_body`) stays portable so
# a browser client fetches the round body in JS and verifies it in-tab. Keeping this off
# wasm32 is what lets dregg-wasm's descent + multiway-tug on-device bindings compile.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { version = "0.12", default-features = false, features = [
    "blocking",
    "rustls-tls",
] }
