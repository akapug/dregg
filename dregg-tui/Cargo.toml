# dregg-tui — the face of the Robigalia v0 demo: a terminal light client.
#
# A STANDALONE crate (its own workspace root — deliberately NOT a member of the
# repo-root workspace, so it can pin a TUI/HTTP toolchain without perturbing the
# main tree). It is a light client: it connects over HTTP to a running dregg
# node's API (node/src/api.rs — /api/node/identity, /api/cells, /api/receipts),
# lists cells, shows receipts, and renders the node identity. This is M4 of the
# seL4 boot ladder (docs/SEL4-EMBEDDING.md §5): once the M3 net stack carries
# the node onto seL4, this same TUI is the operator's window onto it.
#
# Runs on the host (the operator's terminal). It reaches the node over the
# network the M3 PD provides — it does not itself boot on seL4.

[package]
name = "dregg-tui"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "dregg-tui"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
ureq = { version = "2", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

# The REAL light-client verify path — no mocks. The TUI fetches a node's DWR1
# witness artifact (`/api/receipts/{hash}/witnesses`), decodes it with the SDK's
# canonical decoder (`dregg-sdk::decode_witnessed_receipt_artifact_hex`), and
# runs the REAL plonky3 STARK verifier (`dregg-verifier::verify_effect_vm_proof`)
# over the proof bytes + public inputs the artifact carries. Both are pulled with
# `no-lean-link` so the TUI stays a pure host binary (no Lean runtime / libuv /
# GMP) — link-suppression only; the verify path is plonky3 + crypto, never Lean.
dregg-sdk = { path = "../sdk", default-features = false, features = ["no-lean-link"] }
dregg-verifier = { path = "../verifier", features = ["no-lean-link"] }
dregg-turn = { path = "../turn", default-features = false }
# Used only by `--selfcheck`: prove a fresh HEAD-version Effect-VM turn so the
# verify core can be shown reaching VERIFIED on a version-matched proof (the live
# devnet runs an older PI layout). Same audited plonky3 prover the node uses.
dregg-circuit = { path = "../circuit" }
