[package]
name = "dregg-dfa"
version.workspace = true
edition.workspace = true
description = "Canonical DFA routing engine and userspace dispatch primitive for dregg"

[features]
default = []

[dependencies]
blake3 = "1"
serde = { workspace = true, features = ["derive", "alloc"] }
postcard = { version = "1", features = ["use-std"] }
# NOTE: the real federation threshold `ThresholdVerifier` for governed
# route-table swaps lives in the separate `dregg-dfa-federation` crate — NOT
# here. Keeping `dregg-federation` (which transitively reaches `dregg-cell`)
# out of this crate is what lets `dregg-cell` depend on `dregg-dfa` for the
# real `Dfa` predicate verifier without closing a dependency cycle.

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true
