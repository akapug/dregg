# `dreggnet-telegram` ŌĆö the FIRST non-Discord frontend for DreggNet Cloud.
#
# A `TelegramFrontend` implementing the frontend-agnostic `Frontend` trait from
# the committed `dreggnet-offerings` crate, so a Telegram user plays the SAME
# `DungeonOffering` (offering #0) on the SAME real dregg substrate as the Discord
# bot ŌĆö the same cap-gated affordances, the same real verifiable `TurnReceipt`s.
# It proves the frontend-agnostic core: only the SURFACE differs (an inline
# keyboard instead of Discord buttons); the executor stays the sole referee.
#
# THE INJECTED-TRANSPORT SEAM (the load-bearing design decision): the Telegram
# Bot API surface is split into a PURE request-builder (`api::build_present_request`
# ŌåÆ a serde `SendMessageRequest` == the real Bot API `sendMessage` wire body) and a
# `Transport` trait that actually sends it. `MockTransport` records requests with NO
# token and NO network, so the whole frontend logic is driven in a unit test ŌĆö the
# same split the discord-bot uses (`build_*_request` pure, separate from the live
# `Http` call). A live `RawBotApi<H>` over an injected `HttpPost` is provided for a
# real deploy; it needs a token + a reqwest-backed `HttpPost` impl (honest scope).
#
# A breadstuffs workspace MEMBER (registered in the root `members`, not
# `default-members` ŌĆö a heavy narrative-adjacent crate). Build/test on persvati:
#   scripts/pbuild tg 'cargo test -p dreggnet-telegram'
[package]
name = "dreggnet-telegram"
version = "0.1.0"
edition = "2024"
description = "A TelegramFrontend implementing dreggnet-offerings' Frontend trait: a Telegram user plays the same DungeonOffering on the same real dregg substrate as the Discord bot (derived identity, Surface->inline keyboard, callback->Action), with the Bot API transport INJECTED so the logic is testable with no token/network."

[dependencies]
# THE CORE ŌĆö the frontend-agnostic Offering/Session/Frontend model + `DungeonOffering`
# (offering #0) over the real substrate. This crate is a `Frontend` impl; it does NOT
# re-implement any offering logic.
dreggnet-offerings = { path = "../dreggnet-offerings" }
# THE FULL PORTFOLIO ŌĆö the ONE shared registrar (`dreggnet_catalog::build_full_catalog`), so
# Telegram registers the SAME 18 offerings the web catalog (`dreggnet_web::demo_host`) does ŌĆö the
# five games (incl. the shared seat-claiming `SeatedTug` tug adapter, re-exported at
# `src/seated.rs`), the eight do-once RPG feature surfaces, the five service offerings ŌĆö from ONE
# list instead of this crate's own hand-maintained copy (docs/BOT-SHARED-BACKEND-DESIGN.md).
dreggnet-catalog = { path = "../dreggnet-catalog" }
# THE INTERACTION-ENVELOPE AUDIT FACILITY (docs/BOT-AUDIT-LOGGING-DESIGN.md) ŌĆö the shared
# event shape + non-blocking JSONL writer all three frontends emit through; `src/audit.rs`
# is only this deploy's log resolution over it.
dreggnet-audit = { path = "../dreggnet-audit" }
# THE DEOS SURFACE ŌĆö `ViewNode`, the serializable affordance view-tree an offering's
# `render` produces. The Telegram renderer walks it into message text + an inline
# keyboard. `default-features = false` = the gpui-free view-tree model only; the
# `telegram` feature adds the `TelegramBackend` text walker this crate renders through.
deos-view = { path = "../deos-view", default-features = false, features = ["telegram"] }
# REAL DERIVED IDENTITY ŌĆö `AgentCipherclerk::from_key_bytes` ŌåÆ a genuine Ed25519 signing
# identity, mirroring `discord-bot/cipherclerk.rs`'s `UserCipherclerk::derive` (only the
# BLAKE3 domain differs: `dregg-telegram-bot-v1` vs `-discord-bot-v1`). `default-features
# = false` = the offline cipherclerk core (no prover / exec-lean).
dregg-sdk = { path = "../sdk", default-features = false }
# The seed derivation (BLAKE3 derive_key) + the callback-data hash-free identity path.
blake3 = "1"
# Wipe the transient seed copy handed to `from_key_bytes` (as the discord cclerk does).
zeroize = { workspace = true }
# Hex-encode the derived Ed25519 public key (the `DreggIdentity` handle), matching the
# discord bot's `hex::encode(agent.public_key().0)`.
hex = "0.4"
# The Bot API request/response bodies ARE serde types: a `SendMessageRequest` serializes
# to exactly the real `sendMessage` JSON wire body (chat_id/text/reply_markup), so a test
# asserting the request shape asserts the real wire shape.
serde = { workspace = true }
serde_json = { workspace = true }
# THE LIVE BYTE SEAM ŌĆö the reqwest-backed `HttpPost` (`reqwest_transport::ReqwestHttpPost`)
# under `RawBotApi` + the `runtime` long-poll loop's `BotApi`. Blocking (the update loop is a
# plain synchronous long-poll; no tokio) + rustls (no OpenSSL link), mirroring the discord-bot's
# reqwest posture. The verified core stays net-free: everything above `HttpPost` is pure.
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }

# A workspace MEMBER of the breadstuffs root (registered in `members`, not
# `default-members`). The root `[workspace]` + `[patch]` tables apply; no standalone
# `[workspace]`/`[patch]` here.

# THE RUNNING BOT ŌĆö the runtime shell over the library: token from TELEGRAM_BOT_TOKEN, a
# durable `FileResumeStore` session dir, the getUpdates long-poll loop routing presses through
# `TelegramHost::press`/`open`. The real deploy additionally needs the token installed
# (ops-gated) ŌĆö see deploy/telegram/RUNBOOK-TELEGRAM.md.
[[bin]]
name = "dreggnet-telegram-bot"
path = "src/bin/dreggnet-telegram-bot.rs"

[dev-dependencies]
# Offering #0's committed universe ŌĆö the `KP_*` choice constants the driven tests play a
# winning / illegal line with (exactly as `dreggnet-offerings/tests/driven.rs` does). A
# test-only dep: the frontend itself is offering-agnostic (it renders any `Offering`).
dungeon-on-dregg = { path = "../dungeon-on-dregg" }
# THE PARITY REFEREE ŌĆö the both-polarity offering-set test drives this crate's host over
# `MockTransport` and compares its key set against the LIVE web catalog (`demo_host`), not a
# hand-copied list, so webŌåötelegram drift in EITHER direction fails the test.
dreggnet-web = { path = "../dreggnet-web" }

[lints]
workspace = true
