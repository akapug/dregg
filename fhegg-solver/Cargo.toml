[package]
name = "fhegg-solver"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "fhEgg Stage-1 fast UNTRUSTED solver: uniform-price aggregation clearing + PDHG flow-LP, emitting the Cert-F primal-dual certificate the Lean-verified checker validates."

# Folded into the root workspace (members, NOT default-members — its wgpu 24 is
# already present in the root default build via circuit-prove, and circuit-prove
# already dev-path-deps this crate; kept out of default-members so its GPU bench
# bins do not compile in the bare dev loop).
# See docs/deos/PRIVATE-CONVEX-ENGINE.md (§2.3 Cert-F, §2.x PDHG, §2.5
# topology-only preconditioner) and docs/deos/FHEGG-KERNEL.md (§2 the fold + crossing).
[dependencies]
wgpu = "24"
pollster = "0.4"
bytemuck = { version = "1", features = ["derive"] }
rayon = "1"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "fhegg-bench"
path = "src/bin/bench.rs"

[[bin]]
name = "fhegg-e2e"
path = "src/bin/e2e.rs"

[[bin]]
name = "pricecert-bench"
path = "src/bin/pricecert_bench.rs"

[[bin]]
name = "fhegg_clear"
path = "src/bin/fhegg_clear.rs"

[[bin]]
name = "package-bench"
path = "src/bin/package_bench.rs"

[[bin]]
name = "smooth-bench"
path = "src/bin/smooth_bench.rs"

# The DreggFi offerings wire: thin JSON-in/JSON-out runners (siblings of
# fhegg_clear) that drive the derivatives desk + the package auction as
# clickable offerings — same library, same certificates, no benchmark harness.
[[bin]]
name = "pricecert_clear"
path = "src/bin/pricecert_clear.rs"

[[bin]]
name = "package_clear"
path = "src/bin/package_clear.rs"

[[bin]]
name = "fhegg_uniform"
path = "src/bin/fhegg_uniform.rs"

[lints]
workspace = true
