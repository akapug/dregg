[package]
name = "grain-turn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "The R2 kernel-turn weld (THE-GRAIN.md face #1): the REAL GrainTurnMinter — it drives every admitted dregg-agent action through a genuine dregg_sdk::ToolGateway::invoke on a real dregg_cell::Cell grain turn-cell, so the agent's receipts become VIEWS over committed kernel turns and the executor's own calls_made caveat enforces the meter host-side. The heavyweight kernel-facing half kept OUT of the std-only dregg-agent crate."

[lib]
name = "grain_turn"
path = "src/lib.rs"

[features]
# `prover` is DEFAULT-ON so the R3-adapter test (`tests/r3_grain_adapter.rs`, whole-file
# `#![cfg(feature = "prover")]`) actually COMPILES under `cargo test` / `cargo check
# --all-targets`. Before this, the crate declared no `default`, so the whole test compiled
# to an EMPTY crate (doubly dead — also `#[ignore]`d) and CI compile-checked nothing. The
# gate must be default-on for the same reason the peers align it there (`turn`, `tests`,
# `teasting`, `lightclient` all put `prover`/`plonky3` in `default`): a feature-gated test
# that is never built catches no drift.
#
# TRADE-OFF (see the report): this pulls the STARK prover (`dregg-circuit-prove`) into
# grain-turn's DEFAULT build, so a STANDALONE `cargo build -p <consumer>` of the lean R2
# minters that depend on grain-turn (dreggnet-grain, agent-platform, deos-hermes) now links
# the prover unless they opt out with `default-features = false`. In a `--workspace` build
# there is NO extra cost — `dregg-circuit-prove` is already a workspace member built anyway,
# and feature unification would build grain-turn with `prover` there regardless.
default = ["prover"]
# The R3 ADAPTER (heavy — mirrors `dregg-turn`'s own `prover` gate). Enables
# `finalize_grain_turn` / `finalize_session`: minting the rotated wide-anchored EffectVM
# leg(s) for a committed grain turn so each becomes a `FinalizedTurn` the whole-history
# fold (grain-verify::r3_verify) can fold. Pulls the STARK prover. Consumers that must keep
# the R2 minter lean (no circuit/prover link on the commit path) take grain-turn with
# `default-features = false`.
prover = ["dep:dregg-turn", "dep:dregg-circuit", "dep:dregg-circuit-prove", "dregg-turn/prover"]

[dependencies]
# The std-only agent runtime + the GrainTurnMinter seam we implement.
dregg-agent = { path = "../dregg-agent" }
# The verified executor + the proven ToolGateway (delegAdmit mandate: the
# calls_made FieldLte/Monotonic caveat is the host-side meter). Also carries the
# EffectVM marshaller (`convert_effects_to_vm`) + `split_into_cohort_runs` +
# `RotationTurnWitness` the R3 adapter uses (all non-prover-gated).
dregg-sdk = { path = "../sdk" }
# The grain turn-cell's field-slot helpers (field_from_u64) + Effect/CellId types.
dregg-cell = { path = "../cell" }
# The action commit witnessed at ACTION_SLOT (same crypto tier dregg-agent uses).
blake3 = "1"
# The receipt-log MMR (`Blake3Mmr`, the Rust embodiment of `Dregg2.Lightclient.MMR`)
# whose per-grain root the minter binds at HISTORY_ROOT_SLOT on every metered turn —
# the per-grain CommitBindsMMR rung (witnessed history rides the committed cell state).
# Lean-free, prover-free crate (serde + blake3), so the R2 minter stays lean.
dregg-query = { path = "../dregg-query" }

# The R3 adapter's proving deps — OPTIONAL, only under `prover`. `dregg-turn` carries
# the rotated-leg mint recipe (`mint_rotated_participant_leg`); `dregg-circuit` the
# EffectVM `CellState`/`Effect`; `dregg-circuit-prove` the `FinalizedTurn` shape.
dregg-turn = { path = "../turn", optional = true }
dregg-circuit = { path = "../circuit", optional = true }
dregg-circuit-prove = { path = "../circuit-prove", optional = true }

[dev-dependencies]
# The R3 accept gate the adapter feeds: the end-to-end test drives a tiny grain session,
# `finalize_session`s it, and hands the `Vec<FinalizedTurn>` to `grain_verify::r3_verify`
# (the Lean-proven decision). Consuming grain-verify here keeps it a pure CONSUMER — the
# producer (this crate's `finalize_grain_turn`) is the minter-side half.
grain-verify = { path = "../grain-verify" }
# The test's core-availability gate (`grain_r3_verify_core_available`) + the tamper case's
# leg-PI surgery (`dregg-circuit`/`dregg-circuit-prove` are already `prover` deps).
dregg-lean-ffi = { path = "../dregg-lean-ffi" }

# NOTE: breadstuffs (the core) depends on a downstream operated layer ZERO times.
# The R2 verifier (grain-verify) lives in a downstream verifier crate
# the cross-repo end-to-end test lives there too. See docs/GRAIN-VERIFY-HOME.md.
