gpui_wgpu = { git = "https://github.com/emberian/zed", rev = "54fbcb6943", optional = true }

# --- gpui-component: the real widget library (gated on `gpui-ui`) ------------
# VENDORED fork `emberian/gpui-component@dregg-repoint` (upstream
# longbridge/gpui-component, Apache-2.0). Upstream pins zed-industries/zed@1d217ee
# whose gpui/src is BYTE-IDENTICAL to our fork emberian/zed@407a6ff (our fork only
# patches gpui_linux/platform/wgpu — the offscreen renderer — not the gpui API); the
# fork re-points every zed-derived dep at the SAME rev pinned above, so cargo
# resolves ONE gpui instance across the cockpit + widget graph. This crate is the
