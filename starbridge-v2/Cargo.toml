# file (`default-features = false` + `no-lean-link`, mirroring `wasm/Cargo.toml`),
# so wasm32 compiles the Rust fallback paths — a statement about wasm32's linker
# (it cannot link libdregg_lean.a), never about which guarantees native has.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
