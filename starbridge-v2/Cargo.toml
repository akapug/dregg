# amplifying). captp path-deps the SAME `../types`/`../cell` this crate already
# pulls (its `CellId`/`PeerId` UNIFY with ours) and is wire-free (no tokio/quinn;
# blake3 + x25519 + dregg-lean-ffi, the SAME Lean link `dregg-sdk` already brings).
# Gated on `embedded-executor` (the gpui-free, `cargo test`-able surface).
dregg-captp = { path = "../captp", optional = true }
# THE APP FRAMEWORK + a STARTER SET of pre-built starbridge-apps (gated on the
# `app-registry` feature, pulled by `embedded-executor`). `dregg-app-framework`
# is the `DeosApp` builder + the `AppCipherclerk`/`EmbeddedExecutor` SDK surface
# every app fires through; the apps below each expose a `*_app(cipherclerk,
# executor) -> DeosApp` ctor + a `seed_*` + `fire_*` set. They path-dep the SAME
# `../sdk`/`../turn`/`../cell` this crate already pulls, so cargo resolves
# IDENTICAL crate instances — a launched app's verified turn lands on an
# app-framework ledger the cockpit's app-substrate inspector reads. The framework
# drags its server tree (axum/tokio/tower-http/reqwest); acceptable for the native
# desktop build (it already links Lean + servo). `src/app_registry.rs` is the seam.
dregg-app-framework = { path = "../app-framework", optional = true }
starbridge-gallery = { path = "../starbridge-apps/gallery", optional = true }
starbridge-tussle = { path = "../starbridge-apps/tussle", optional = true }
starbridge-sealed-auction = { path = "../starbridge-apps/sealed-auction", optional = true }
starbridge-bounty-board = { path = "../starbridge-apps/bounty-board", optional = true }
# The SECOND WAVE of pre-built starbridge-apps wired onto the cockpit's LIVE
# `World` ledger (`src/app_registry.rs`). Each path-deps the SAME `../sdk`/
# `../turn`/`../cell` (so cargo resolves IDENTICAL `Effect`/`CellProgram`/
# `TurnReceipt` instances) and exposes the gallery-shape ctor + `*_program()` +
# `*_effects()`/seed surface the World bridge re-expresses. NON-WASM ONLY (these
# crates don't build on wasm32; the wasm `gpui-web` bundle must never resolve
# them — they are absent from the `cfg(target_arch = "wasm32")` mirror below).
starbridge-agent-orchestration = { path = "../starbridge-apps/agent-orchestration", optional = true }
starbridge-agent-provenance = { path = "../starbridge-apps/agent-provenance", optional = true }
starbridge-compartment-workflow-mandate = { path = "../starbridge-apps/compartment-workflow-mandate", optional = true }
starbridge-compute-exchange = { path = "../starbridge-apps/compute-exchange", optional = true }
starbridge-escrow-market = { path = "../starbridge-apps/escrow-market", optional = true }
starbridge-nameservice = { path = "../starbridge-apps/nameservice", optional = true }
starbridge-privacy-voting = { path = "../starbridge-apps/privacy-voting", optional = true }
starbridge-storage-gateway-mandate = { path = "../starbridge-apps/storage-gateway-mandate", optional = true }
starbridge-subscription = { path = "../starbridge-apps/subscription", optional = true }
starbridge-swarm-orchestration = { path = "../starbridge-apps/swarm-orchestration", optional = true }
starbridge-tool-access-delegation = { path = "../starbridge-apps/tool-access-delegation", optional = true }
starbridge-supply-chain-provenance = { path = "../starbridge-apps/supply-chain-provenance", optional = true }
starbridge-identity = { path = "../starbridge-apps/identity", optional = true }
starbridge-governed-namespace = { path = "../starbridge-apps/governed-namespace", optional = true }
# THE POLIS GOVERNANCE LAYER — unlike the apps above, `starbridge-polis` is NOT a
# `DeosApp`: its pure library ships per-charter content-addressed `CellProgram`s
# directly (`council::council_cell_program(charter)` &c.). The registry's polis
# entry is therefore a PROGRAM entry (`AppEntry::program`): it installs a
# governance cell carrying a polis `CellProgram` onto the cockpit `World` via
# `AppWorldSpine::seed` and fires ONE representative governance affordance (a
# council `propose`) through `AppWorldSpine::commit` — the SAME World machinery the
# 18 framework apps use, only the program source is polis's pure library, not a
# composed app. The pure library path-deps ONLY `../cell` (default-features off),
# so it pulls NO new heavy tree. NON-WASM ONLY (kept out of the wasm32 mirror).
starbridge-polis = { path = "../starbridge-apps/polis", optional = true }
# THE SERVO RENDER LANE — the HOST SWGL render path that IS deos's compositor
# render pass (Stage A of docs/desktop-os-research/SERVO-ON-SEL4.md). Default
# `swgl-standalone` features ONLY (swgl's CPU-only C++ rasterizer + gleam + the real
# cap gate + the real compositor seam) — NOT the `libservo` feature, so this does
# NOT pull the mozjs/SpiderMonkey elephant into the cockpit build. It gives the
# web-of-cells tab (`src/web_cells.rs`) its FIRST real rendered `dregg://` content:
# `servo_render::render_dregg_page(surface, origin, attested_bytes, w, h)` runs the
# page's fetch through the REAL `CapGatedDelegate` (the SAME `granted ⊆ held` gate
# the panel's affordance projection already uses) and rasterizes the attested page
# bytes into a real, content-distinct RGBA8 `RgbaFrame` the cockpit can paint with a
# gpui `img()`. It path-depends on the SAME `../starbridge-web-surface` +
# `../sel4/dregg-firmament` this crate already pulls (so `SurfaceCapability` /
# `CellId` / `Capability` UNIFY — the cap that gates the affordance surface IS the
# cap that gates the render). Gated on `embedded-executor` (the gpui-free,
# `cargo test`-able web-of-cells surface). The `libservo`/mozjs WebView upgrade
# (full HTML layout into the SAME frame, behind the SAME gate) is a feature flip in
# servo-render, NOT a new seam here.
servo-render = { path = "../servo-render", optional = true }

# THE WASM COCKPIT MIRROR — the in-browser skin (one model, three skins). These
# re-declare the SAME executor crates the native block above pulls, but
# `default-features = false` + `no-lean-link` (the platform gate: wasm32 cannot
# link libdregg_lean.a, so the Rust fallback paths compile). Features mirror
# `wasm/Cargo.toml`'s exact per-crate set. EXCLUDED from this mirror:
#   * `dregg-persist` — pulls `redb` (native-only embedded store); the browser
#     image is always ephemeral (`src/persistence_wasm.rs` stub supplies the
#     `WorldPersist`/`OpenError`/`RecoveredImage`/`canonical_ledger_root` surface
#     `world.rs` imports).
#   * `servo-render` — the C++ SWGL rasterizer (non-wasm32).
# The `getrandom` shims below are the wasm32 entropy backend (mirrors wasm/).
[target.'cfg(target_arch = "wasm32")'.dependencies]
dregg-turn = { path = "../turn", optional = true, default-features = false }
dregg-cell = { path = "../cell", optional = true, default-features = false }
dregg-cell-crypto = { path = "../cell-crypto", optional = true }
dregg-types = { path = "../types", optional = true }
dregg-sdk = { path = "../sdk", optional = true, default-features = false, features = ["no-lean-link", "embed-core", "prover"] }
dregg-coord = { path = "../coord", optional = true, default-features = false }
dregg-token = { path = "../token", optional = true, default-features = false, features = ["macaroon", "rand-deps"] }
dregg-doc = { path = "../dregg-doc", optional = true, features = ["substrate"] }
dregg-userspace-verify = { path = "../dregg-userspace-verify", optional = true }
dregg-firmament = { path = "../sel4/dregg-firmament", optional = true }
starbridge-web-surface = { path = "../starbridge-web-surface", optional = true, default-features = false }
deos-web-cells = { path = "../deos-web-cells", optional = true }
dregg-captp = { path = "../captp", optional = true, default-features = false }
# wasm32 entropy backend (mirrors wasm/Cargo.toml lines 18-20): the three
# getrandom majors the dep tree pulls, each forced onto its js/wasm_js backend.
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }
# The browser clock for `world::now_unix` (wasm32 has no `SystemTime::now()`).
js-sys = "0.3"
# ed25519 signing — `world.rs` (grant-receipt signing) + `shared_fork.rs` (the
# consent-resolution ConditionProof) call `ed25519_dalek::` UNCONDITIONALLY, so
# the wasm lib build needs it here too (the native copy is under the
# `cfg(not(wasm32))` block above). `default-features = false` drops `rand_core`'s
# OS-rng pull (the wasm build only uses `from_bytes` / verify, never `generate`);
# `alloc` keeps `to_bytes`. Without this the wasm lib fails E0433 "unlinked crate
# ed25519_dalek" — which broke the existing atlas skin's wasm build too.
ed25519-dalek = { version = "2", default-features = false, features = ["alloc"] }
# THE THREE WASM-UNIFICATION FORCINGS (mirrors wasm/Cargo.toml lines 119-131) —
# indirect deps the executor tree pulls that need a wasm32-specific feature flip,
# forced here so cargo feature-unification applies it to the transitive copy:
#   * `clear_on_drop` (via bulletproofs/cell crypto) — default build invokes a C
#     compiler (cc → clang --target=wasm32) with no working wasm32 toolchain; the
#     `no_cc` feature switches to a pure-Rust impl.
clear_on_drop = { version = "0.2", features = ["no_cc"] }
#   * `lockstitch` (via federation → hints) — uses x86_64/aarch64 AES intrinsics
#     unless `portable` is on; wasm32 has neither.
lockstitch = { version = "0.29", features = ["portable"] }
#   * `biscuit-auth` (via dregg-token's `biscuit` feature) — its wasm32 `Instant`
#     shim + `TryInto` are gated behind the crate's own `wasm` feature.
biscuit-auth = { version = "6.0.0", features = ["wasm"] }
