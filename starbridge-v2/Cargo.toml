# Starbridge v2 — the NATIVE dregg master interface.
#
# STANDALONE WORKSPACE (this file declares its own `[workspace]`). It is
# deliberately EXCLUDED from the main `/Users/ember/dev/breadstuffs/Cargo.toml`
# members for two reasons:
#   1. gpui drags a very heavy native dep tree (windowing/font/GPU: metal,
#      harfbuzz/cosmic-text, objc on macOS, a winit-class event loop).
#   2. THE EMBEDDED EXECUTOR links the verified Lean archive (`libdregg_lean.a`,
#      multi-MB) via `dregg-turn`/`dregg-cell`. That is exactly what we WANT for
#      a native desktop master interface — but it is the link the `no-lean-link`
#      crates (wasm/, verifier/) exist to AVOID, so unifying it onto the main
#      workspace would be a feature-unification footgun.
#
# Build FROM INSIDE this directory (never at the repo root):
#   cd starbridge-v2 && cargo build                                  # native-full (default)
#   cd starbridge-v2 && cargo build --no-default-features --features sel4-thin
#
# `cd` IN FIRST — do NOT use `--manifest-path` from the repo root. `rust-toolchain.toml`
# resolution is DIRECTORY-scoped: this crate pins the ROLLING `nightly` (see
# rust-toolchain.toml — gpui needs `std::hint::cold_path`, stabilized after the
# repo root's `nightly-2026-01-01`). Running `cargo --manifest-path starbridge-v2/...`
# from the repo root picks up the ROOT's `nightly-2026-01-01` toolchain, which is
# too old and fails to compile gpui's `profiler.rs` with E0658 (`cold_path` unstable).
# If the rolling `nightly` is itself stale, `rustup update nightly` refreshes it
# (this affects ONLY this crate — the root + every other lane pin a dated nightly).
#
# =============================================================================
# TWO BUILDS, ONE CODEBASE  (mirrors the verifier/ `no-lean-link` pattern)
# =============================================================================
#
# * `native-full` (DEFAULT) — the master interface. EMBEDS THE REAL VERIFIED
#   EXECUTOR (`dregg_turn::executor::TurnExecutor` over a `dregg_cell::Ledger`)
#   and runs a live local dregg world NATIVELY. Links the Lean archive. This is
#   the "smalltalk-surpassing" cockpit: a live, inspectable, capability-secured,
#   verified, provenance-carrying image. Renders via gpui.
#
# * `sel4-thin` (feature-gated, Lean-free) — the thin HTTP client / verifier-
#   only path for the eventual seL4 protection-domain component
#   (docs/SEL4-EMBEDDING.md, owned by another lane — do NOT edit it). Compiles
#   WITHOUT the embedded executor and WITHOUT gpui's heavy stack; it speaks the
#   node's HTTP+SSE wire contract (`src/client.rs` + `src/model.rs`). The
#   `NodeClient::{Mock,Http}` surface stays available in BOTH builds so the
#   master interface can ALSO connect to remote nodes/federations.

[workspace]
members = [".", "web"]
resolver = "2"

# gpui is consumed FROM GIT (it is not on crates.io), and the zed monorepo it
# lives in applies a `[patch.crates-io]` table that consumers must replicate.
[patch.crates-io]
async-process = { git = "https://github.com/zed-industries/async-process.git", rev = "0b6d6713570af61806e1e5cb40e0f757cb93fd9d" }
async-task = { git = "https://github.com/smol-rs/async-task.git", rev = "b4486cd71e4e94fbda54ce6302444de14f4d190e" }
# Vendored pathfinder_simd 0.5.6 (transitive via gpui → font-kit → pathfinder)
# with one fix: `build.rs` no longer sets `pf_rustc_nightly`, selecting the
# portable SCALAR path on aarch64 (the nightly portable-SIMD intrinsics it
# would otherwise use were removed in current toolchains).
pathfinder_simd = { path = "vendor/pathfinder_simd" }
# `dregg-sdk` (embedded cipherclerk) drags the proof dep tree, which needs the
# same `ark-serialize` `serde_with`-feature fork the MAIN workspace patches in
# (root Cargo.toml §patch). Replicate it here so this standalone workspace
# re-resolves the federation/intent transitive deps identically.
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

# THE stylo FORK PATCH — load-bearing for `web-shell` (→ servo-render/libservo →
# servo → stylo). stylo's `ToCss` derive (`stylo_derive`) emits a `to_css` body
# whose `?` operators rely on an implicit `From` into `core::fmt::Error`. THIS
# workspace's dep graph pulls `serde_fmt` (via `value-bag-serde1` ← log/tracing),
# whose `impl From<serde_fmt::Error> for core::fmt::Error` makes the `?` residual
# source type ambiguous on recent nightlies → ~30 E0282/E0283 in every
# `#[derive(ToCss)]` generic stylo type (servo-render alone does NOT pull
# serde_fmt, so its libservo build is unaffected — only the full cockpit graph
# trips it). The fork pins the residual error type to `core::fmt::Error`,
# defeating the ambiguity. Same version (0.15.0) so it unifies with servo's
# pinned stylo family. Reverts once upstream stylo carries the fix. Fork:
# `emberian/stylo@ember-nightly-fix`. (servo-render/Cargo.toml replicates this.)
stylo_derive = { path = "../../stylo/style_derive" }

# THE PLONKY3-RECURSION FORK PATCH — load-bearing for the `embedded-executor`
# feature. `dregg-circuit` (pulled transitively via dregg-turn/dregg-sdk)
# references the recursion-fork-only `NativeBatchStark` variant + the
# `verify_p3_native_batch_proof_circuit` entry, which the PINNED git rev
# (rev c14b5fc0 in the root [workspace.dependencies]) does NOT carry — that
# WIP lives only in the LOCAL fork checkout. This standalone workspace does NOT
# inherit the breadstuffs root Cargo.toml's `[patch."…/plonky3-recursion"]`, so
# without replicating it here the embedded executor fails to compile at the
# `NativeBatchStark` reference. We point the four fork crates at the SAME local
# fork checkout the root does (`../plonky3-recursion`, relative to the repo root
# = `../../plonky3-recursion` from here). When the fork change is committed +
# pushed and the root bumps the git rev, this block + the root's are dropped
# together (the cutover-settle does that properly via a fork push).
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../../plonky3-recursion/recursion" }
p3-circuit = { path = "../../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../../plonky3-recursion/poseidon2-circuit-air" }

[package]
name = "starbridge-v2"
version = "0.1.0"
edition = "2021"
rust-version = "1.94.0"
authors = ["Dregg Contributors"]
license = "AGPL-3.0-or-later"
homepage = "https://dregg.fg-goose.online"
repository = "https://github.com/emberian/dregg"
description = "Starbridge v2 — the native dregg master interface: a live, verified, ocap world (someday an seL4 component)"

[lib]
name = "starbridge_v2"
path = "src/lib.rs"

[[bin]]
name = "starbridge-v2"
path = "src/main.rs"

# dregg-mcp — the MCP server that drives the live verified image (inspect / act /
# map / screenshot). gpui-free: build it under `embedded-executor` alone (it
# shells out to the headless-render `starbridge-v2` binary for screenshots).
#   cargo build --release --no-default-features --features embedded-executor --bin dregg-mcp
[[bin]]
name = "dregg-mcp"
path = "src/bin/dregg_mcp.rs"
required-features = ["embedded-executor"]

[features]
# DEFAULT = the master interface: embedded verified executor + gpui window.
default = ["native-full"]

# native-full pulls the embedded executor (`embedded-executor`) AND the gpui
# renderer (`gpui-ui`) AND the LIVE-NODE connection (`live-node`, so the master
# interface can ALSO connect to a remote node/federation). This is the headline build.
native-full = ["embedded-executor", "gpui-ui", "live-node", "render-capture", "web-shell", "dev-surfaces"]

# dev-surfaces — mount the real editor + terminal as dock panes (the self-hosting
# dev loop: edit deos's own repos in deos-zed, run cargo/git in deos-terminal,
# all INSIDE deos). Pulls the deos-zed + deos-terminal crates (own workspaces,
# same gpui fork @407a6ff so one gpui resolves). gpui-ui-gated via dock/mod.rs.
dev-surfaces = ["dep:deos-zed", "dep:deos-terminal"]

# The LIVE-NODE connection — the real HTTP+SSE link to a running dregg node
# (`NodeClient::Http` + the `/api/events/stream` reader). Pulls `reqwest` (its
# blocking client runs its own internal runtime on a private thread, so it needs
# NO tokio runtime from the caller — clean to add to the otherwise-async-free
# embedded build). The PURE layer of `live_node` (the SSE parser + reflection +
# the receipt-feed cursor) compiles WITHOUT this feature and is `cargo test`-able;
# only the byte-pull (`LiveNode::sync` + the SSE reader) is gated here. Both
# `native-full` and `sel4-thin` enable it (the wire contract is shared).
live-node = ["dep:reqwest"]

# The embedded verified executor + live local world. Links libdregg_lean.a.
# Headless-usable (the `World` engine + dynamics + reflection are gpui-free and
# `cargo test`-able under just this feature).
#
# `dregg-sdk` rides the SAME Lean link (it pulls dregg-lean-ffi unconditionally,
# exactly as dregg-turn does) — so the cipherclerk panel surfaces the REAL
# `dregg_sdk::AgentCipherclerk`, never a parallel toy. We take it
# `default-features = false` to keep the heavy networking/captp (tokio/quinn,
# async) deps out of this headless, `cargo test`-able build: the cipherclerk +
# token surface we surface (identities, mint/attenuate/delegate, cell_id) is in
# the SDK's un-gated core.
embedded-executor = ["dep:dregg-turn", "dep:dregg-cell", "dep:dregg-cell-crypto", "dep:dregg-types", "dep:dregg-sdk", "dep:dregg-coord", "dep:dregg-token", "dep:dregg-userspace-verify", "dep:dregg-firmament", "dep:starbridge-web-surface", "dep:deos-web-cells", "dep:dregg-persist", "dep:dregg-doc", "dep:dregg-captp"]

# OPT-IN real-content rendering. `servo` pulls `servo-render` (the SWGL software
# rasterizer + the cap-gated `render_dregg_page` content-tile entry) so the
# web-of-cells tab can paint a real `dregg://` page. Kept OFF the default
# `embedded-executor` build so the cockpit stays lean (no C++ swgl build) unless
# real-content rendering is deliberately turned on. The heavy `libservo`/mozjs
# WebView upgrade is a further feature INSIDE servo-render, not here. The tile
# wiring (web_cells.rs populate + cockpit.rs `img()`) is LIVE: the opened cell's
# attested page rasterizes to a cap-gated `RgbaFrame` (web_cells) which the cockpit
# paints with a gpui `img()`. That paint builds a `gpui::RenderImage` from raw
# RGBA8, which requires the `image` crate (gpui's `RenderImage`/`Frame` are
# `image`-typed and not re-exported) — so `servo` pulls `dep:image` (the SAME
# `image 0.25` gpui + servo-render already resolve; the default build is unchanged,
# `image` is still pulled only when `servo` or `headless-render` is on).
servo = ["embedded-executor", "dep:servo-render", "dep:image"]

# THE WEB SHELL — real libservo (the full `WebView` HTML-layout engine) as the deos
# app's web-content render path, ALWAYS-ON in the windowed build. `web-shell`
# enables `servo-render/libservo` (the real `ServoBuilder → WebViewBuilder → SWGL
# context → read_to_image` flow in `servo-render/src/webview.rs`) ON TOP OF the
# `servo` content-tile wiring, so a web-shell surface calls `render_url_to_frame`
# into the SAME cap-gated `RgbaFrame → present_frame` path the `dregg://` tile
# already uses. It is pulled by `native-full` so the DEOS app gets the real engine
# by default; it is NOT on `embedded-executor` (the gpui-free `cargo test --lib`
# headless lane), which stays on `servo-render`'s default `swgl-standalone` — so the
# verification economy (the root workspace + dregg-doc + the lean/headless test
# lanes) never grinds mozjs. The de-risk path is preserved automatically:
# `libservo` INCLUDES `swgl-standalone`, so the standalone RGBA8 proof still builds.
web-shell = ["servo", "servo-render/libservo"]

# The gpui renderer. `runtime_shaders` is LOAD-BEARING on macOS: it makes gpui
# compile its Metal shaders AT RUNTIME (via `MTLDevice::newLibraryWithSource`,
# using the system Metal framework) instead of at BUILD time (via `xcrun metal`,
# which needs the offline Metal Toolchain component). On a host whose
# MetalToolchain download is blocked/damaged, this is the difference between a
# window that opens and a build that fails. See docs/STARBRIDGE-V2.md §Window.
# `gpui_platform/{x11,wayland}` light up the wgpu/Vulkan X11 + Wayland windowing
# backends for the LINUX build. They are enabled UNCONDITIONALLY here (rather than
# via a `[target.cfg(linux)].dependencies` re-declaration of the optional
# `gpui_platform`) because that target-block re-declaration TRIPPED A CARGO
# RESOLVER PATHOLOGY: on macOS it made the package resolve with ONLY its optional
# gpui deps and DROP every crates.io + path dependency (the lib's rustc carried the
# feature flags but ZERO `--extern` for serde/postcard/blake3/dregg-*, so
# `world.rs`'s `use dregg_cell::…` failed "unlinked crate"). Enabling the features
# here instead is INERT on macOS — `gpui_platform`'s `x11`/`wayland` features
# forward to `gpui_linux`, which is itself ONLY a `cfg(any(linux,freebsd))`
# dependency of `gpui_platform`, so on macOS it is not in the graph and the
# features activate nothing — while on Linux they enable x11+wayland exactly as the
# old target block did.
gpui-ui = ["dep:gpui", "dep:gpui_platform", "dep:gpui-component", "gpui_platform/runtime_shaders", "gpui_platform/x11", "gpui_platform/wayland"]

# WEB DEOS — the gpui cockpit IN THE BROWSER (wasm32 + WebGPU canvas).
#
# Pulls `gpui` + `gpui_platform` for the SAME element-tree rendering the native
# cockpit uses, but on wasm32 `gpui_platform` forwards to the `gpui_web` backend
# (a full Platform: dispatcher/display/events/keyboard/window over WgpuRenderer →
# WebGPU; see ~/.cargo/git/checkouts/zed-.../crates/gpui_web). It does NOT pull
# the native-only sub-features (`runtime_shaders` = macOS Metal, `x11`/`wayland`
# = Linux windowing — all inert on wasm but kept out of the web feature for
# clarity) and does NOT pull web-shell (servo/libservo — native-only), dev-surfaces
# (alacritty PTY / RealFs — native-only), or render-capture (gpui test-support
# offscreen wgpu — native bake). The in-browser executor (`embedded-executor`,
# already wasm-clean per starbridge-v2/web) is the data plane; gpui_web is the
# presentation plane. This is THE FULL COCKPIT PATH, not a lesser skin — the first
# slice (starbridge-v2/web `gpui-web` feature) proves gpui renders to a canvas
# driving the live `World`. See docs/deos/WEB-DEOS.md.
gpui-web = ["embedded-executor", "dep:gpui", "dep:gpui_platform"]

# The Lean-free thin-client / verifier path for the seL4 component end-state.
# Mutually exclusive with native-full at the linker level (no executor, no
# gpui); selected with `--no-default-features --features sel4-thin`. It speaks the
# same HTTP+SSE wire contract (`live-node`) the embedded build's remote panel uses.
sel4-thin = ["live-node"]

# THE HEADLESS COCKPIT BAKE (`--render-cockpit <out>`, `src/main.rs`) — render
# the REAL `cockpit::Cockpit` element tree to an 800x600 RGBA8 frame with NO GPU
# and NO window, the byte image the seL4 deos-image PD blits onto its ramfb
# (sel4/dregg-pd/deos-image/src/cockpit_frame.rgba). Pulls the full native-full
# build (embedded executor + gpui) PLUS gpui's headless capture path: gpui +
# gpui_platform `test-support` light up `HeadlessAppContext` + the offscreen
# wgpu renderer (`WgpuHeadlessRenderer`) + `Window::render_to_image`; gpui_wgpu
# gives the `CosmicTextSystem` text system; `image` re-encodes the PNG check.
# Run where software Vulkan (lavapipe) exists, e.g. persvati:
#   ZED_OFFSCREEN_PREFER_CPU=1 VK_ICD_FILENAMES=…/lvp_icd.json \
#     cargo run --release --features headless-render -- --render-cockpit OUT
# RENDER-CAPTURE — the offscreen output-buffer capture (Window::render_to_image +
# the wgpu offscreen renderer). This is INTRINSIC to the default build: the cockpit
# must ALWAYS be able to bake its own output buffer to a frame (the MCP screenshot,
# the seL4 framebuffer blit, the atlas/UI-tree crawl). It is NOT an opt-in toggle —
# `native-full` (the default) pulls it. (gpui exposes the offscreen path under its
# `test-support` flag; the name is gpui's, the capability is first-class for us.)
render-capture = [
    "gpui/test-support",
    "gpui_platform/test-support",
    "dep:gpui_wgpu",
    "gpui_wgpu/test-support",
    "dep:image",
]
# Back-compat alias: existing `--features headless-render` invocations still work,
# but capture is already in the default build, so you rarely need it.
headless-render = ["native-full"]

[dependencies]
# --- wire contract (always available: remote-node + sel4-thin + wasm paths) --
# Target-AGNOSTIC deps (the model + wire contract). `reqwest`/`image` are
# `optional` and gated on the `live-node`/`headless-render` features, which the
# wasm `embedded-executor` build never enables — so cargo never pulls them on
# wasm32. `serde`/`blake3`/`postcard` are all wasm32-safe and used by the model.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# HTTP client against the node's routes — needed by the thin path and by the
# master interface's optional remote-federation connection. Gated on `live-node`.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream", "blocking"], optional = true }
hex = "0.4"
anyhow = "1"
# Used by the embedded `World` for the image-commitment root + cell snapshots.
blake3 = "1"
postcard = { version = "1", features = ["use-std"] }
# The headless cockpit bake re-encodes the captured RGBA to a PNG visual check
# (the raw `.rgba` the seL4 PD bakes is written directly). Gated on
# `headless-render`. 0.25 matches gpui_wgpu's `image` (one resolved version).
image = { version = "0.25", default-features = false, features = ["png"], optional = true }

# --- gpui (gated on `gpui-ui`) ----------------------------------------------
# DREGG-OWNED FORK: `emberian/zed@dregg-offscreen` is `zed-industries/zed`'s
# `fca2ccd` (the previously-pinned rev — gpui/gpui_platform are byte-identical to
# `fca2ccd` there; the one commit between them touches only editor/agent_ui) PLUS
# the offscreen/headless wgpu renderer the `headless-render` bake needs (the
# `gpui_wgpu` surfaceless `render_scene_to_image` + `WgpuHeadlessRenderer:
# PlatformHeadlessRenderer`, wired into `current_headless_renderer` on Linux).
# Patch source of record: docs/desktop-os-research/patches/gpui-offscreen.patch
# (+ this session's headless wiring). The windowed `run_window` path is unchanged.
gpui = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", optional = true }
# `font-kit` is LOAD-BEARING: gpui_platform's default features are empty, so without
# this gpui_macos's MacPlatform falls back to `NoopTextSystem` (`platform.rs:197`,
# `#[cfg(not(feature = "font-kit"))]`) — the windowed cockpit renders BLANK TEXT.
# Enabling it forwards to `gpui_macos/font-kit` → the real CoreText `MacTextSystem`.
gpui_platform = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", optional = true, features = ["font-kit"] }
# The wgpu renderer leaf, pulled DIRECTLY only for the headless bake (the
# `CosmicTextSystem` platform text system + the offscreen renderer). Gated on
# `headless-render`; absent from the windowed build. Same fork rev as gpui above
# so cargo resolves ONE gpui instance across the graph.
gpui_wgpu = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", optional = true }

# --- gpui-component: the real widget library (gated on `gpui-ui`) ------------
# VENDORED fork `emberian/gpui-component@dregg-repoint` (upstream
# longbridge/gpui-component, Apache-2.0). Upstream pins zed-industries/zed@1d217ee
# whose gpui/src is BYTE-IDENTICAL to our fork emberian/zed@407a6ff (our fork only
# patches gpui_linux/platform/wgpu — the offscreen renderer — not the gpui API); the
# fork re-points every zed-derived dep at the SAME rev pinned above, so cargo
# resolves ONE gpui instance across the cockpit + widget graph. This crate is the
# `crates/ui` member (gpui-component); it gives the cockpit a real text `Input`
# (which dregg had NONE of), Button, and the full shadcn-style widget set.
#
# Default features OFF: the `ui` crate has no `default`, and its heavy bits
# (tree-sitter syntax grammars for the CodeEditor/Markdown) are all opt-IN — none
# are enabled here, keeping the cockpit lean. Add a `tree-sitter-*` feature later
# only if the CodeEditor is wanted. Provenance + license: LICENSE-APACHE +
# NOTICE-gpui-component at the repo root (AGPL hygiene for vendored Apache-2.0).
gpui-component = { path = "../../gpui-component/crates/ui", default-features = false, optional = true }

# --- LINUX display backend for gpui ------------------------------------------
# The x11/wayland windowing backends gpui needs on Linux are enabled via the
# `gpui-ui` feature above (`gpui_platform/{x11,wayland}`), NOT a
# `[target.cfg(linux)].dependencies` re-declaration of the optional
# `gpui_platform`. The target-block form (which this REPLACES) re-declared the
# same optional dep and TRIPPED a cargo resolver pathology that dropped every
# crates.io + path dependency on macOS (the lib compiled with feature flags but
# zero `--extern`). The feature-list form is inert on macOS (gpui_linux is not in
# the macOS graph) and lights up x11+wayland on Linux identically — without the
# resolver hazard. On Linux without these, only `gpui_linux`'s "Headless" arm
# compiles and a real DISPLAY/WAYLAND_DISPLAY session hits `_ => unreachable!()`
# (gpui_linux/src/linux.rs) — the window panics the instant it opens.

# --- the embedded verified executor (gated on `embedded-executor`) ----------
# These link libdregg_lean.a on native. `default-features = true` keeps the
# Lean shadow/gate path compiled in (the verified producer).
#
# TARGET-SPLIT (wasm cockpit, the in-browser skin): these NATIVE declarations are
# Lean-linked (the verified producer); the wasm32 re-declarations live in a mirror
# `[target.'cfg(target_arch = "wasm32")'.dependencies]` block at the END of this
# file (`default-features = false` + `no-lean-link`, mirroring `wasm/Cargo.toml`),
# so wasm32 compiles the Rust fallback paths — a statement about wasm32's linker
# (it cannot link libdregg_lean.a), never about which guarantees native has.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# The self-hosting dev-loop surfaces (pulled by `dev-surfaces`). Own workspaces,
# same gpui fork @407a6ff → one gpui resolves across the graph. deos-zed rides
# gpui-component (vendored); deos-terminal rides alacritty_terminal.
deos-zed = { path = "../deos-zed", default-features = false, features = ["cockpit-surface", "highlight-common"], optional = true }
deos-terminal = { path = "../deos-terminal", features = ["cockpit-surface"], optional = true }
# Signing for the consent-resolution / shared-fork signing domain (world.rs signs
# a grant receipt the ConditionProof checks). A regular (not dev-only) dep since
# world.rs lib code uses it, not just tests.
ed25519-dalek = { version = "2" }
dregg-turn = { path = "../turn", optional = true }
dregg-cell = { path = "../cell", optional = true }
dregg-cell-crypto = { path = "../cell-crypto", optional = true }
dregg-types = { path = "../types", optional = true }
# The wallet-grade clerk itself (`dregg_sdk::AgentCipherclerk`) + the REAL
# embedded engine (`dregg_sdk::embed::DreggEngine`, the executor+ledger+token
# core our `World` wraps). `default-features = false` drops the SDK's
# networking/captp stack (tokio/quinn/async); `embed-core` pulls the wire-free
# engine core (the cipherclerk + macaroon-token + DreggEngine surface we use is
# all in the SDK's always-compiled / embed-core core, NOT the network stack).
#
# `prover` is LOAD-BEARING here (the C7 GREP-ZERO drive): `dregg-circuit`'s
# default features include `prover` (circuit/Cargo.toml), and `dregg-turn`
# (this crate's dep, default-features-on) forwards `prover = ["dregg-circuit/
# prover"]` — so cargo feature-unifies `dregg-circuit` with `prover` ON
# across this workspace. Under `prover`, `dregg-circuit::effect_vm_p3_full_air`
# is `#[cfg(not(feature = "prover"))]`-DELETED (the v1 hand-AIR is retired);
# `dregg-sdk`'s `use` of it (`sdk/src/full_turn_proof.rs`) is itself
# `not(prover)`-fenced, so sdk MUST also see `prover` ON or its fence
# misaligns with the prover-on circuit (E0432: cannot find
# `effect_vm_p3_full_air`). We enable `prover` on the SDK to keep the fences
# aligned — `embed-core` (wire-free engine) and `prover` (rotated IR-v2
# verify) coexist; this pulls NO networking. Without it the embedded build fails
# to compile against the post-C7 circuit.
dregg-sdk = { path = "../sdk", optional = true, default-features = false, features = ["embed-core", "prover"] }
# THE VERIFIED SHARED-BUDGET PRIMITIVE — `dregg_coord::StingrayCounter` (the
# bounded conserved counter, `coord/src/budget.rs`). The swarm's N9 shared budget
# IS this counter (the conservation bound "the swarm spent at most B"); the over-
# draw is refused by its gate, never faked. A clean, wire-free dep (coord pulls
# only dregg-cell + blake3 + ed25519 + serde — no networking; its platform
# feature is off by default).
dregg-coord = { path = "../coord", optional = true }
# The macaroon token vocabulary (`Attenuation` etc.) the clerk speaks — re-exported
# by dregg-sdk, but we name it directly for the panel's caveat projection.
dregg-token = { path = "../token", optional = true }
# THE DREGGVERSE DOCUMENT LANGUAGE patch-core (`dregg-doc`, `docs/deos/DOCUMENT-LANGUAGE.md`)
# pulled with its `substrate` feature — so a document IS a real `dregg_cell::Cell`
# and an edit IS a cap-gated turn through the genuine `dregg_turn::TurnExecutor`
# (`ExecutorDrivenDoc`), with conflicts-as-`ConflictRegion`-states and provenance =
# the real `TurnReceipt`. `dregg-doc` is its OWN (empty) workspace and path-deps the
# SAME `../cell`/`../turn` this crate already pulls under `embedded-executor`, so
# cargo resolves IDENTICAL `Cell`/`Effect`/`TurnReceipt` instances (its document
# cell IS our cell). The DOCS-tab editor (`src/doc_editor.rs`) reuses its
# `ExecutorDrivenDoc`/`Doc`/`content`/`merge`/`resolve` patch algebra — never a
# parallel re-expression. Gated on `embedded-executor` (the gpui-free, test-able
# surface). The plonky3-recursion `[patch]` above is replicated here so the
# transitive `dregg-circuit` (via `dregg-turn`'s `substrate`) resolves identically.
dregg-doc = { path = "../dregg-doc", features = ["substrate"], optional = true }
# The static, userspace, pre-submission assurance toolkit (`analyze`) — the
# REAL `check_conservation`/`check_no_amplification`/`check_wellformed` the live
# editor's validate() rail delegates to (never a parallel re-expression).
dregg-userspace-verify = { path = "../dregg-userspace-verify", optional = true }
# THE FIRMAMENT cap-gradation bridge (sel4/dregg-firmament): the REAL
# `Capability{ target: Surface(cell), rights }` + `SurfaceBacking` (a genuine
# dregg_cell::Ledger + dregg_turn::TurnExecutor) the cap-first shell rides — so a
# window IS a firmament surface cap, checked through the SAME `granted ⊆ held`
# gate and delegated through the SAME real executor as every other dregg cap
# (docs/DREGG-DESKTOP-OS.md §7 — the one latent divergence, closed). Path-dep
# from this standalone workspace into firmament's standalone workspace is fine:
# cargo resolves firmament + the real dregg crates it depends on and links them
# here. Gated on `embedded-executor` (the gpui-free surface/shell test path).
dregg-firmament = { path = "../sel4/dregg-firmament", optional = true }
# THE WEB-OF-CELLS crate — the `dregg://` attested-fetch docuverse the cockpit
# browses NATIVELY: the real `WebOfCells` addressing + attested cross-cell read,
# the `AffordanceSurface::project_for` per-viewer attenuation, the `OriginChrome`
# trusted-path chrome, the `Rehydration` liveness-type. It path-depends on the
# SAME real dregg crates this crate pulls under `embedded-executor`
# (`dregg-firmament`/`dregg-cell`/`dregg-types`/`dregg-turn`) and replicates the
# SAME plonky3-recursion fork `[patch]` (above), so cargo resolves IDENTICAL
# crate instances — its `Effect` IS our `Effect`, its `Capability` IS our window
# cap. The web-of-cells browser panel (`src/web_cells.rs`) browses it and fires
# affordances through THIS crate's embedded executor (the seam the web crate could
# only model is closed here). Gated on `embedded-executor` (the gpui-free,
# `cargo test`-able surface).
starbridge-web-surface = { path = "../starbridge-web-surface", optional = true }
# THE DREGGVERSE-DOCUMENT crate — Xanadu's EDL made honest on the verified
# substrate: a `DreggverseDocument` is an ordered list of `Span`s (OWN content
# interleaved with TRANSCLUDED byte-ranges of peer cells), resolved PER-VIEWER
# through the REAL `Membrane` (`DreggverseDocument::resolve_for`) — a span the
# viewer's projected fetch-allowlist cannot reach DARKENS (its provenance
# survives, its bytes withheld; never forged). It is a thin layer over the SAME
# `starbridge-web-surface` (`TranscludedField`/`Membrane`/`SurfaceCapability`)
# this crate already pulls — so its `DreggUri`/`WebOfCells`/`Provenance` ARE our
# web-surface's (cargo resolves IDENTICAL instances: same path-dep, same
# plonky3-recursion `[patch]`). The web-of-cells browser panel
# (`src/web_cells.rs`) renders a multi-span document beside the whole-field
# transclusion — the rich EDL span model welded into the cockpit's docuverse.
# Gated on `embedded-executor` (the gpui-free, `cargo test`-able surface).
deos-web-cells = { path = "../deos-web-cells", optional = true }
# THE NODE'S DURABLE STORE (M4 native World persistence — the durable image).
# `dregg-persist` is the SAME redb commit log + checkpoint⊕overlay recovery spine
# the node uses (`node/src/state.rs`): wiring it onto the World's single
# `commit_turn` seam makes the image durable + rewindable by REUSE — never a
# parallel persistence — so the World inherits `CrashRecovery.lean::recover_eq_replay`.
# A pure-Rust embedded ACID store (redb + serde + postcard); no networking, no
# Lean link, no async. Gated on `embedded-executor` (the gpui-free, test-able
# surface). It path-deps the SAME `../cell`/`../types`/`../circuit` this crate
# already pulls, so cargo resolves IDENTICAL crate instances (its `Cell` IS our
# `Cell`, its `CommitRecord.touched_cells` ARE our ledger cells).
dregg-persist = { path = "../persist", optional = true }
# THE CapTP NETLAYER — the REAL wire the reflexive distributed image (n>1) dials.
# `dregg-captp`'s `netlayer::{InProcessNetlayer, NetConnection, NetSession}` (the
# OCapN/Goblins transport abstraction + its in-process instance) is what
# `src/netlayer_image.rs` resolves a `RemoteImage` over: a `MirrorFrame` request/
# response (FetchCell/CellSnapshot) carried on `NetConnection::send`/`recv`, served
# by an `ImageResponder` at the inbound mirror-cap's authorized depth (never
# amplifying). captp path-deps the SAME `../types`/`../cell` this crate already
# pulls (its `CellId`/`PeerId` UNIFY with ours) and is wire-free (no tokio/quinn;
# blake3 + x25519 + dregg-lean-ffi, the SAME Lean link `dregg-sdk` already brings).
# Gated on `embedded-executor` (the gpui-free, `cargo test`-able surface).
dregg-captp = { path = "../captp", optional = true }
# THE SERVO RENDER LANE — the HOST SWGL render path that IS deos's compositor
# render pass (Stage A of docs/desktop-os-research/SERVO-ON-SEL4.md). Default
# `swgl-standalone` features ONLY (swgl's CPU-only C++ rasterizer + gleam + the real
# cap gate + the real compositor seam) — NOT the `libservo` feature, so this does
# NOT pull the mozjs/SpiderMonkey elephant into the cockpit build. It gives the
# web-of-cells tab (`src/web_cells.rs`) its FIRST real rendered `dregg://` content:
# `servo_render::render_dregg_page(surface, origin, attested_bytes, w, h)` runs the
# page's fetch through the REAL `CapGatedDelegate` (the SAME `granted ⊆ held` gate
# the panel's affordance projection already uses) and rasterizes the attested page
# bytes into a real, content-distinct RGBA8 `RgbaFrame` the cockpit can paint with a
# gpui `img()`. It path-depends on the SAME `../starbridge-web-surface` +
# `../sel4/dregg-firmament` this crate already pulls (so `SurfaceCapability` /
# `CellId` / `Capability` UNIFY — the cap that gates the affordance surface IS the
# cap that gates the render). Gated on `embedded-executor` (the gpui-free,
# `cargo test`-able web-of-cells surface). The `libservo`/mozjs WebView upgrade
# (full HTML layout into the SAME frame, behind the SAME gate) is a feature flip in
# servo-render, NOT a new seam here.
servo-render = { path = "../servo-render", optional = true }

# THE WASM COCKPIT MIRROR — the in-browser skin (one model, three skins). These
# re-declare the SAME executor crates the native block above pulls, but
# `default-features = false` + `no-lean-link` (the platform gate: wasm32 cannot
# link libdregg_lean.a, so the Rust fallback paths compile). Features mirror
# `wasm/Cargo.toml`'s exact per-crate set. EXCLUDED from this mirror:
#   * `dregg-persist` — pulls `redb` (native-only embedded store); the browser
#     image is always ephemeral (`src/persistence_wasm.rs` stub supplies the
#     `WorldPersist`/`OpenError`/`RecoveredImage`/`canonical_ledger_root` surface
#     `world.rs` imports).
#   * `servo-render` — the C++ SWGL rasterizer (non-wasm32).
# The `getrandom` shims below are the wasm32 entropy backend (mirrors wasm/).
[target.'cfg(target_arch = "wasm32")'.dependencies]
dregg-turn = { path = "../turn", optional = true, default-features = false }
dregg-cell = { path = "../cell", optional = true, default-features = false }
dregg-cell-crypto = { path = "../cell-crypto", optional = true }
dregg-types = { path = "../types", optional = true }
dregg-sdk = { path = "../sdk", optional = true, default-features = false, features = ["no-lean-link", "embed-core", "prover"] }
dregg-coord = { path = "../coord", optional = true, default-features = false }
dregg-token = { path = "../token", optional = true, default-features = false, features = ["macaroon", "rand-deps"] }
dregg-doc = { path = "../dregg-doc", optional = true, features = ["substrate"] }
dregg-userspace-verify = { path = "../dregg-userspace-verify", optional = true }
dregg-firmament = { path = "../sel4/dregg-firmament", optional = true }
starbridge-web-surface = { path = "../starbridge-web-surface", optional = true, default-features = false }
deos-web-cells = { path = "../deos-web-cells", optional = true }
dregg-captp = { path = "../captp", optional = true, default-features = false }
# wasm32 entropy backend (mirrors wasm/Cargo.toml lines 18-20): the three
# getrandom majors the dep tree pulls, each forced onto its js/wasm_js backend.
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }
# The browser clock for `world::now_unix` (wasm32 has no `SystemTime::now()`).
js-sys = "0.3"
# ed25519 signing — `world.rs` (grant-receipt signing) + `shared_fork.rs` (the
# consent-resolution ConditionProof) call `ed25519_dalek::` UNCONDITIONALLY, so
# the wasm lib build needs it here too (the native copy is under the
# `cfg(not(wasm32))` block above). `default-features = false` drops `rand_core`'s
# OS-rng pull (the wasm build only uses `from_bytes` / verify, never `generate`);
# `alloc` keeps `to_bytes`. Without this the wasm lib fails E0433 "unlinked crate
# ed25519_dalek" — which broke the existing atlas skin's wasm build too.
ed25519-dalek = { version = "2", default-features = false, features = ["alloc"] }
# THE THREE WASM-UNIFICATION FORCINGS (mirrors wasm/Cargo.toml lines 119-131) —
# indirect deps the executor tree pulls that need a wasm32-specific feature flip,
# forced here so cargo feature-unification applies it to the transitive copy:
#   * `clear_on_drop` (via bulletproofs/cell crypto) — default build invokes a C
#     compiler (cc → clang --target=wasm32) with no working wasm32 toolchain; the
#     `no_cc` feature switches to a pure-Rust impl.
clear_on_drop = { version = "0.2", features = ["no_cc"] }
#   * `lockstitch` (via federation → hints) — uses x86_64/aarch64 AES intrinsics
#     unless `portable` is on; wasm32 has neither.
lockstitch = { version = "0.29", features = ["portable"] }
#   * `biscuit-auth` (via dregg-token's `biscuit` feature) — its wasm32 `Instant`
#     shim + `TryInto` are gated behind the crate's own `wasm` feature.
biscuit-auth = { version = "6.0.0", features = ["wasm"] }
