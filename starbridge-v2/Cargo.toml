# `fca2ccd` (the previously-pinned rev — gpui/gpui_platform are byte-identical to
# `fca2ccd` there; the one commit between them touches only editor/agent_ui) PLUS
# the offscreen/headless wgpu renderer the `headless-render` bake needs (the
# `gpui_wgpu` surfaceless `render_scene_to_image` + `WgpuHeadlessRenderer:
# PlatformHeadlessRenderer`, wired into `current_headless_renderer` on Linux).
# Patch source of record: docs/desktop-os-research/patches/gpui-offscreen.patch
# (+ this session's headless wiring). The windowed `run_window` path is unchanged.
gpui = { git = "https://github.com/emberian/zed", rev = "54fbcb6943", optional = true }
# `font-kit` is LOAD-BEARING: gpui_platform's default features are empty, so without
# this gpui_macos's MacPlatform falls back to `NoopTextSystem` (`platform.rs:197`,
