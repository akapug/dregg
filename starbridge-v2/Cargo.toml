#
# Default features OFF: the `ui` crate has no `default`, and its heavy bits
# (tree-sitter syntax grammars for the CodeEditor/Markdown) are all opt-IN — none
# are enabled here, keeping the cockpit lean. Add a `tree-sitter-*` feature later
# only if the CodeEditor is wanted. Provenance + license: LICENSE-APACHE +
# NOTICE-gpui-component at the repo root (AGPL hygiene for vendored Apache-2.0).
gpui-component = { git = "https://github.com/emberian/gpui-component", rev = "b2deb2aa", default-features = false, optional = true }

# --- LINUX display backend for gpui ------------------------------------------
# The x11/wayland windowing backends gpui needs on Linux are enabled via the
# `gpui-ui` feature above (`gpui_platform/{x11,wayland}`), NOT a
# `[target.cfg(linux)].dependencies` re-declaration of the optional
# `gpui_platform`. The target-block form (which this REPLACES) re-declared the
# same optional dep and TRIPPED a cargo resolver pathology that dropped every
# crates.io + path dependency on macOS (the lib compiled with feature flags but
# zero `--extern`). The feature-list form is inert on macOS (gpui_linux is not in
# the macOS graph) and lights up x11+wayland on Linux identically — without the
# resolver hazard. On Linux without these, only `gpui_linux`'s "Headless" arm
# compiles and a real DISPLAY/WAYLAND_DISPLAY session hits `_ => unreachable!()`
# (gpui_linux/src/linux.rs) — the window panics the instant it opens.

# --- the embedded verified executor (gated on `embedded-executor`) ----------
# These link libdregg_lean.a on native. `default-features = true` keeps the
# Lean shadow/gate path compiled in (the verified producer).
#
# TARGET-SPLIT (wasm cockpit, the in-browser skin): these NATIVE declarations are
