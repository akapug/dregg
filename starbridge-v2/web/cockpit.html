<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>dregg · live in the browser</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#0a0e14;--line:#21262d;--fg:#c9d1d9;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#f0883e;--purple:#bc8cff}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:13px/1.5 ui-monospace,Menlo,monospace}
.app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--bg3)}
header h1{font-size:15px;margin:0;color:var(--accent)}
header h1 small{color:var(--muted);font-weight:normal;font-size:11px}
.live{color:var(--green)}.stat{color:var(--muted);font-size:11px;margin-left:auto}
.main{flex:1;display:flex;min-height:0}
.col{overflow:auto;padding:12px}
.rail{width:280px;border-right:1px solid var(--line);background:var(--bg3)}
.center{flex:1;border-right:1px solid var(--line)}
.acts{width:340px;background:var(--bg3)}
h2{font-size:13px;color:var(--accent);margin:0 0 8px}
h3{font-size:12px;color:var(--green);border-bottom:1px solid var(--line);padding-bottom:3px;margin:16px 0 6px}
.cell{padding:7px 9px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;cursor:pointer;background:var(--bg2)}
.cell:hover{border-color:var(--accent)}.cell.sel{border-color:var(--orange);background:#1c2128}
.cell .id{color:var(--accent)}.cell .bal{color:var(--orange);float:right}
.muted{color:var(--muted)}.bal{color:var(--orange)}.id{color:var(--accent)}
table{border-collapse:collapse;width:100%}td{padding:2px 7px;border-bottom:1px solid var(--bg2);vertical-align:top}
td.k{color:var(--muted);width:38%}
.face{margin:8px 0;border:1px solid var(--line);border-radius:7px;padding:9px;background:var(--bg2)}
.prose{white-space:pre-wrap;color:#a5d6ff}
.msg{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;background:var(--bg2)}
.msg.ok{cursor:pointer}.msg.ok:hover{border-color:var(--green)}.msg.no{opacity:.65}
.send{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--green);color:var(--green)}
.no .send{border-color:var(--red);color:var(--red)}
.log{font-size:11px}.log .committed{color:var(--green)}.log .refused{color:var(--red)}
.log div{padding:3px 0;border-bottom:1px solid var(--bg2)}
</style>
</head>
<body>
<div class=app>
  <header>
    <h1>dregg <small>· the verified ocap cockpit, live in your browser</small></h1>
    <span class=live id=live>● booting wasm…</span>
    <span class=stat id=stat></span>
  </header>
  <div class=main>
    <div class="col rail"><h2>cells</h2><div id=cells></div>
      <p class=muted style="margin-top:14px">Every act here is a REAL cap-gated turn through the verified executor — running in wasm, in this tab. No server.</p>
    </div>
    <div class="col center" id=center><h2>inspector</h2><p class=muted>select a cell</p></div>
    <div class="col acts" id=acts><h2>affordances</h2><p class=muted>select a cell</p></div>
  </div>
</div>
<script type=module>
import init, { WebImage } from './pkg/starbridge_web.js';
const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let img, sel = 'user', log = [];

async function boot() {
  await init();
  img = new WebImage();
  $('#live').textContent = '● live · wasm executor';
  render();
}

function render() {
  const s = JSON.parse(img.survey());
  $('#stat').textContent = `${s.cell_count} cells · ${log.length} acts committed/refused`;
  // cell rail
  $('#cells').innerHTML = s.cells.map(c =>
    `<div class="cell ${c.short.replace(/…/g,'_')===sel||resolveShort(c)===sel?'sel':''}" data-id="${esc(c.id)}">
       <span class=bal>${c.balance==null?'':c.balance}</span>
       <span class=id>${esc(c.short)}</span><div class=muted>${esc(c.kind)} · ${c.cap_edges} caps</div></div>`).join('');
  $('#cells').querySelectorAll('.cell').forEach(el => el.onclick = () => { sel = el.dataset.id; render(); });
  renderCenter(); renderActs();
}
function resolveShort(c){ return c.id; }

function renderCenter() {
  const r = JSON.parse(img.inspect(sel));
  if (r.error) { $('#center').innerHTML = `<h2>inspector</h2><p class=muted>${esc(r.error)}</p>`; return; }
  let h = `<h2>inspector · <span class=id>${esc(r.short)}</span></h2>`;
  for (const f of r.faces) {
    h += `<h3>${esc(f.kind)} · ${esc(f.label)}</h3>` + faceHtml(f.body);
  }
  $('#center').innerHTML = h;
}
function faceHtml(b) {
  if (b.shape==='fields') return '<table>' + b.fields.fields.map(f=>`<tr><td class=k>${esc(f.key)}</td><td>${fieldVal(f.value)}</td></tr>`).join('') + '</table>';
  if (b.shape==='graph') return '<table>' + (b.edges||[]).map(e=>`<tr><td class=id>${esc(e.from)}</td><td>→ ${esc(e.to)} · slot ${e.slot} · ${esc(e.rights)}</td></tr>`).join('') + (b.edges&&b.edges.length?'':'<tr><td class=muted>(no capability edges)</td></tr>') + '</table>';
  if (b.shape==='prose') return `<div class=face prose>${esc(b.text)}</div>`;
  if (b.shape==='timeline') return '<table>' + (b.events||[]).map(e=>`<tr><td class=k>@${e.at}</td><td>${esc(e.label)}</td></tr>`).join('') + '</table>';
  if (b.shape==='state-machine') return `<div>current: <b>${esc(b.current)}</b></div>`;
  return `<div class=prose>${esc(JSON.stringify(b).slice(0,300))}</div>`;
}
function fieldVal(v){
  if(!v) return '';
  if(v.t==='balance') return `<span class=bal>${v.v}</span>`;
  if(v.t==='id'||v.t==='hash') return `<span class=id>${esc(v.short)}</span>`;
  if(v.t==='cap-edge') return `→ <span class=id>${esc(v.short)}</span> slot ${v.slot}`;
  if(v.t==='count'||v.t==='bool') return esc(v.v);
  return esc(v.v);
}

function renderActs() {
  const a = JSON.parse(img.affordances(sel));
  if (a.error) { $('#acts').innerHTML = `<h2>affordances</h2><p class=muted>${esc(a.error)}</p>`; return; }
  let h = `<h2>affordances · <span class=id>${esc(a.cell)}</span></h2><p class=muted>click an authorized message to fire a real turn</p>`;
  for (const m of a.messages) {
    h += `<div class="msg ${m.authorized?'ok':'no'}" data-msg="${esc(m.name)}">
      <span><b>${esc(m.name)}</b> <span class=muted>${esc(m.effect)} · ${esc(m.required)}</span></span>
      <span class=send>${m.authorized?'▶ send':'○ refused'}</span></div>`;
  }
  h += `<h3>act log</h3><div class=log id=log>${log.slice().reverse().map(l=>`<div><span class=${l.outcome}>${l.outcome==='committed'?'✓':'✕'}</span> ${esc(l.cell)} · ${esc(l.message)} ${l.note?'<span class=muted>'+esc(l.note)+'</span>':''}</div>`).join('')||'<div class=muted>(none yet)</div>'}</div>`;
  $('#acts').innerHTML = h;
  $('#acts').querySelectorAll('.msg.ok').forEach(el => el.onclick = () => fire(el.dataset.msg));
}

function fire(message) {
  const res = JSON.parse(img.act(sel, message));
  log.push({
    cell: res.cell, message,
    outcome: res.outcome,
    note: res.outcome==='committed' ? `post ${res.receipt.post_state} · ${res.receipt.computrons} computrons`
        : `${res.by_executor?'executor':'cap-gate'}: ${(res.reason||'').slice(0,40)}`,
  });
  render(); // live re-render: the whole image reflects the committed turn
}

boot().catch(e => { $('#live').textContent = 'wasm error'; $('#center').innerHTML = '<pre>'+esc(e+'\n'+(e.stack||''))+'</pre>'; });
</script>
</body>
</html>
