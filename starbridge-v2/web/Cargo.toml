[package]
name = "starbridge-web"
version = "0.1.0"
edition = "2021"
description = "The dregg cockpit MODEL in the browser — the gpui-free Presentable/World surface, driven live by the wasm executor (the atlas grown up). One model, web skin."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The gpui-free model + the embedded executor, wasm-configured (no gpui, no Lean
# link, no redb) — the SAME crate the native cockpit renders, compiled for wasm.
starbridge-v2 = { path = "..", default-features = false, features = ["embedded-executor"] }
dregg-cell = { path = "../../cell", default-features = false }
wasm-bindgen = "0.2"
serde_json = "1"
hex = "0.4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
