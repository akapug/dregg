# Starbridge v2 pins the ROLLING `nightly` channel, OVERRIDING the repo root's
# `nightly-2026-01-01` pin (../rust-toolchain.toml) for this crate only.
#
# Why: gpui at the pinned zed rev uses `std::hint::cold_path` (an unstable
# library feature). It stabilized in nightly between 2026-01-22 and 2026-02-14,
# so the repo's `nightly-2026-01-01` is just-too-old and fails to compile gpui's
# `profiler.rs`. The rolling `nightly` (>= 2026-02-14) has it. The
# pathfinder_simd-on-nightly intrinsics breakage is handled separately by the
# vendored patch + `pf-no-simd` (see Cargo.toml), so it does not return here.
#
# This is purely a "newer compiler for a newer dep" bump; it does not change any
# protocol-crate toolchain (this crate is a standalone workspace).
[toolchain]
channel = "nightly"
profile = "default"
components = ["cargo", "clippy", "rustc", "rustfmt"]
