# deos-js — a deos-native JavaScript scripting surface.
#
# THE SPIKE: JS (real SpiderMonkey via `mozjs`) drives deos *substance* — sovereign
# cells + cap-gated *verified turns* — with ember's factoring:
#
#   - a CELL is a sovereignty/distribution boundary (one whole interactive "applet"),
#     NOT a DOM node. It is a polynomial-functor interface: positions = the views it
#     presents, directions = the affordances (turns) it accepts.
#   - the applet's MODEL is the cell's state; the only mutators are its affordances =
#     cap-gated verified turns leaving a real `TurnReceipt`.
#   - ephemeral view-state (draft text, hover) is NOT cell state and is NEVER a turn.
#   - applets COMPOSE via transclusion (the cap-gated, provenanced distributed DOM).
#
# STANDALONE WORKSPACE (own `[workspace]` below, and listed in the repo-root
# `exclude`): `mozjs` pulls the multi-GB SpiderMonkey C++ build — exactly the reason
# `servo-render`/`wasm` are kept out of `cargo test --workspace`. Keeping `deos-js`
# standalone stops that elephant from feature-unifying onto the whole workspace.
[package]
name = "deos-js"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "A deos-native JavaScript scripting surface: JS drives sovereign-cell applets via cap-gated verified turns."

[workspace]
# Own workspace root: deos-js is excluded from the repo-root members (see the
# repo-root Cargo.toml `exclude` list) so the mozjs build does not unify features
# across the whole tree.

[dependencies]
# THE ENGINE — real SpiderMonkey. The SAME version servo-render's `libservo` path
# resolves (mozjs 0.15.7 / mozjs_sys 0.140.8-2), so "the engine is already in the
# workspace dep graph". `jit`/`intl` default features are kept (the prebuilt static
# archive ships with them); this is the genuine C++ SpiderMonkey, not a stub.
mozjs = "0.15.7"

# THE SUBSTANCE — the embedded verified executor + cells + turns.
dregg-sdk = { path = "../sdk" }       # DreggEngine: execute_turn -> real TurnReceipt; ledger() witnessed reads.
dregg-cell = { path = "../cell" }     # Cell / CellState / AuthRequired / is_attenuation.
dregg-turn = { path = "../turn" }     # TurnBuilder / ActionBuilder / Effect / Turn / TurnReceipt.
dregg-types = { path = "../types" }   # CellId.

# THE REFLECTIVE SUBSTRATE — cap-bounded, attested crawl of the live image (slice 2).
# gpui-free; the JS `deos.world`/`deos.cell` object graph binds to it.
deos-reflect = { path = "../deos-reflect" }

# THE TRANSCLUSION PRIMITIVE — the cap-gated, provenanced distributed-DOM compose.
# `WholeCellTransclusion` lives in starbridge-v2 (off-limits) but is a THIN welder over
# this crate's REAL `WebOfCells` + `TranscludedField` (content -> commitment -> receipt
# -> receipt-stream-root -> quorum). We reuse that genuine primitive directly.
starbridge-web-surface = { path = "../starbridge-web-surface" }

[dev-dependencies]
blake3 = "1"

# ── THE FORK SEAMS (mirrored from servo-render/starbridge-v2, the other standalone
#    workspaces that path-dep the dregg crates). Because deos-js is its OWN workspace
#    root, the repo-root `[patch]` does NOT reach it, so the transitive dregg deps
#    cannot re-resolve without these. They revert with the others once the forks land.

# ark-serialize FORK — the transitive `dregg-hints` (via dregg-turn's threshold-sig)
# needs ark-serialize with the `serde_with` feature, which exists ONLY on the
# emberian/algebra fork, not crates.io 0.5.0.
[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

# plonky3-recursion FORK — the transitive `dregg-circuit` (via dregg-turn) resolves
# `p3-recursion` from a pinned git rev lacking `RecursionInput::NativeBatchStark`;
# point at the SAME local fork checkout the root/servo-render blocks use.
# `../../plonky3-recursion` = deos-js → breadstuffs → dev → plonky3-recursion.
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../../plonky3-recursion/recursion" }
p3-circuit = { path = "../../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../../plonky3-recursion/poseidon2-circuit-air" }
