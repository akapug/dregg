[package]
name = "dregg-verifier"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Standalone Effect VM proof verifier â€” no shared state with the prover"

[[bin]]
name = "dregg-verifier"
path = "src/main.rs"

[dependencies]
# `dregg-circuit` is the prover-FREE VERIFY FLOOR (the batch-STARK verify surface
# `descriptor_ir2::verify_vm_descriptor2` the rotated replay rides) â€” exactly what
# the seL4 verifier-PD floor needs, with NO recursion prover. The RECURSION-replay
# entries (`verify_recursive_replay{,_from_bundle}`) need the recursion tower
# (`dregg-circuit-prove`), pulled only by this crate's `prover` feature below.
dregg-circuit = { path = "../circuit" }
dregg-circuit-prove = { path = "../circuit-prove", optional = true }
dregg-types = { path = "../types" }
dregg-commit = { path = "../commit" }
# Federation primitives (cross-fed bundle, FederationReceipt verify path).
# `default-features = false` so we do NOT pull tokio / crossbeam-channel â€” the
# verifier binary stays a non-async, no-runtime, ledger-free process.
dregg-federation = { path = "../federation", default-features = false }
dregg-turn = { path = "../turn" }
dregg-captp = { path = "../captp" }
serde = { workspace = true }
serde_json = { workspace = true }
hex = "0.4"
blake3 = "1"
postcard = { version = "1", features = ["alloc"] }

[features]
# THE PROVE-vs-VERIFY AXIS (mirrors `dregg-circuit`: prover âŠƒ verifier âŠƒ plonky3).
#
# `verifier` = the PROVER-FREE rotated VERIFY floor. It forwards `dregg-circuit/
# verifier` (the prover-free batch-STARK verify surface) so `rotated_replay`
# (`#[cfg(feature = "verifier")]`) â€” the `"effect-vm-rotated"` IR-v2 legs verified
# via the audited `descriptor_ir2::verify_vm_descriptor2` â€” is the LIVE replay-chain
# verify on the seL4 verifier-PD floor, with NO prover linked.
verifier = []
# `prover` pulls the RECURSION tower (`dregg-circuit-prove`) so the recursive-replay
# entries (`verify_recursive_replay{,_from_bundle}`) compile. It implies `verifier`
# so the rotated verify is present too. The v1 single-proof / replay-chain entries
# (`verify_effect_vm_proof`, `replay_chain`) are RETIRED (the v1 hand-AIR
# `EffectVmAir` is gone); a rotated chain is verified through `rotated_replay`.
prover = ["verifier", "dep:dregg-circuit-prove"]
default = ["prover"]

# The seL4 protection-domain floor selector (see docs/FEATURE-HYGIENE.md Â§Lean and
# docs/SEL4-EMBEDDING.md Â§2). After the lean-FFI boundary carve the verifier has NO
# transitive reach to `libdregg_lean.a` at all â€” {federation, captp, turn} are FFI-free by
# construction (they route their verified gates through `verified_gate` seams that only a
# Lean-boundary crate, never depended on here, registers). So Lean-freedom is now STRUCTURAL,
# not a flag. This feature's sole remaining job is to pull the verifier crate's own `verifier`
# feature so the prover-free rotated VERIFY surface (`rotated_replay`) is present on the floor â€”
# the standalone-verifier-PD invariant: a rotated chain verifies with NO prover, NO Lean, NO
# ledger. (The verify path itself never calls Lean â€” plonky3 STARK + crypto only.)
no-lean-link = [
    "verifier",
]

[dev-dependencies]
# Verify-surface only (the v1 hand-AIR integration tests are retired/ported to the
# rotated path).
dregg-circuit = { path = "../circuit" }
dregg-cell = { path = "../cell" }
tempfile = { workspace = true }
serde_json = { workspace = true }
hex = "0.4"

[lints]
workspace = true
