[package]
name = "dregg-verifier"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Standalone Effect VM proof verifier — no shared state with the prover"

[[bin]]
name = "dregg-verifier"
path = "src/main.rs"

[dependencies]
# `default-features = false`: the verifier never needs the circuit's PROVER stack
# (DFT / `prove_batch` / the p3-recursion prover crates). The crate's own `prover`
# / `verifier` features (below) forward the matching circuit feature, so a default
# build carries `dregg-circuit/prover` and the floor build (`no-lean-link`) carries
# only `dregg-circuit/verifier` — the prover-free batch-STARK VERIFY surface that
# `descriptor_ir2::verify_vm_descriptor2` (the rotated replay verify) rides. Without
# this, the circuit's own default `prover` was always unified ON, so the floor's
# `not(prover)` legs referenced the `prover`-deleted `EffectVmAir` (E0432).
dregg-circuit = { path = "../circuit", default-features = false }
dregg-types = { path = "../types" }
dregg-commit = { path = "../commit" }
# Federation primitives (cross-fed bundle, FederationReceipt verify path).
# `default-features = false` so we do NOT pull tokio / crossbeam-channel — the
# verifier binary stays a non-async, no-runtime, ledger-free process.
dregg-federation = { path = "../federation", default-features = false }
dregg-turn = { path = "../turn" }
dregg-captp = { path = "../captp" }
serde = { workspace = true }
serde_json = { workspace = true }
hex = "0.4"
blake3 = "1"
postcard = { version = "1", features = ["alloc"] }

[features]
# THE PROVE-vs-VERIFY AXIS (mirrors `dregg-circuit`: prover ⊃ verifier ⊃ plonky3).
#
# `verifier` = the PROVER-FREE rotated VERIFY floor. It forwards `dregg-circuit/
# verifier` (the prover-free batch-STARK verify surface) so `rotated_replay`
# (`#[cfg(feature = "verifier")]`) — the `"effect-vm-rotated"` IR-v2 legs verified
# via the audited `descriptor_ir2::verify_vm_descriptor2` — is the LIVE replay-chain
# verify on the seL4 verifier-PD floor, with NO prover linked.
verifier = ["dregg-circuit/verifier"]
# `prover` carries the full STARK prover (DFT / `prove_batch` / p3-recursion). It
# implies `verifier` so the rotated verify is present under the prover too. The v1
# single-proof / replay-chain entries (`verify_effect_vm_proof`, `replay_chain`)
# are RETIRED — they fail closed under every config (the v1 hand-AIR `EffectVmAir`
# is gone); a rotated chain is verified through `rotated_replay`.
prover = ["verifier", "dregg-circuit/prover"]
default = ["prover"]

# The seL4 protection-domain floor selector (see docs/FEATURE-HYGIENE.md §Lean and
# docs/SEL4-EMBEDDING.md §2). After the lean-FFI boundary carve the verifier has NO
# transitive reach to `libdregg_lean.a` at all — {federation, captp, turn} are FFI-free by
# construction (they route their verified gates through `verified_gate` seams that only a
# Lean-boundary crate, never depended on here, registers). So Lean-freedom is now STRUCTURAL,
# not a flag. This feature's sole remaining job is to pull the verifier crate's own `verifier`
# feature so the prover-free rotated VERIFY surface (`rotated_replay`) is present on the floor —
# the standalone-verifier-PD invariant: a rotated chain verifies with NO prover, NO Lean, NO
# ledger. (The verify path itself never calls Lean — plonky3 STARK + crypto only.)
no-lean-link = [
    "verifier",
]

[dev-dependencies]
# Verify-surface only (the v1 hand-AIR integration tests are retired/ported to the
# rotated path). `default cargo test` unifies this with the crate's `prover` default.
dregg-circuit = { path = "../circuit", default-features = false, features = ["verifier"] }
dregg-cell = { path = "../cell" }
tempfile = { workspace = true }
serde_json = { workspace = true }
hex = "0.4"

[lints]
workspace = true
