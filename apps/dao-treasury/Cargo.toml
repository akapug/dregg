[package]
name = "pyana-dao-treasury"
version = "0.1.0"
edition = "2024"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-storage = { path = "../../storage" }
pyana-types = { path = "../../types" }

serde = { workspace = true }
serde_json = { workspace = true }
blake3 = "1"
thiserror = { workspace = true }
tokio = { version = "1", features = ["full"] }
axum = "0.8"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[[bin]]
name = "pyana-dao-treasury"
path = "src/bin/pyana_dao_treasury.rs"

[lints]
workspace = true
