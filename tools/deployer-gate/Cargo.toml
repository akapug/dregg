# A workspace MEMBER (added 2026-07-16). This header previously claimed a "Standalone workspace (own
# [workspace] opt-out, like crypto-hermine / fhegg-solver)" — but there was NO `[workspace]` stanza here
# and never had been, and crypto-hermine is itself a member. The crate was simply never listed in the root
# `members`, so cargo ignored it and CI never ran its 14 tests. It path-depends on `dregg-macaroon`, a
# member, so standalone resolution was duplicating the workspace anyway.

[package]
name = "dregg-deployer-gate"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "The dreggic deployer-gate: a deploy capability gated on bond / skeptical-interview / audit, composing the real dregg-macaroon primitive."

[dependencies]
dregg-macaroon = { path = "../../macaroon" }
sha2 = "0.10"
thiserror = "2"

[dev-dependencies]

[lints]
workspace = true
