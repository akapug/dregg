[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
# The real-Groth16 settlement test replays the proof fixture emitted by
# chain/gnark/settlement_snark_test.go (TestSettlementGroth16EndToEnd).
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
# Robinhood Chain testnet — Arbitrum-Orbit EVM L2 (chainId 46630, ETH gas).
# Permissionless deploy; the DeploySettlement stack deploys identically here.
# Override via ROBINHOOD_TESTNET_RPC_URL for a private/Alchemy endpoint.
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
# Blockscout-style verify: forge script ... --verify \
#   --verifier blockscout --verifier-url https://explorer.testnet.chain.robinhood.com/api/
