[package]
name = "dregg-sdk-net"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Networked layer for the dregg agent SDK — CapTP capability sharing, federation registration, hosted-mailbox crank, receipt event streams, and the wire codec. The offline core lives in `dregg-sdk`."

[dependencies]
# The OFFLINE CORE. dregg-sdk-net is the networked layer on top of it: the core
# AgentCipherclerk type, its receipt/turn surface, and the SdkError type all
# come from here. The net layer holds the CapTP client state OFF the core type
# (NetClerk wrapper) and exposes the federation/discovery free functions over a
# `&AgentCipherclerk`.
dregg-sdk = { path = "../sdk" }

# The distributed-core crates that the core SDK no longer depends on. These are
# REAL deps here (not optional flags): dregg-sdk-net IS the networked layer.
dregg-wire = { path = "../wire" }
dregg-captp = { path = "../captp" }
dregg-storage = { path = "../storage" }
dregg-storage-templates = { path = "../dregg-storage-templates" }

# Protocol types shared with the core (re-using the core's exact types).
dregg-types = { path = "../types" }
dregg-cell = { path = "../cell" }
dregg-cell-crypto = { path = "../cell-crypto" }
dregg-turn = { path = "../turn" }
dregg-commit = { path = "../commit" }
dregg-circuit = { path = "../circuit" }
dregg-intent = { path = "../intent" }
dregg-macaroon = { workspace = true, features = ["crypto"] }
dregg-token = { path = "../token", default-features = false, features = ["macaroon", "biscuit", "rand-deps"] }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }

# OPTIONAL: the `deos-js` WorldSink trait, pulled ONLY under the `world-sink`
# feature so the base net layer stays free of the mozjs elephant (mirrors how
# `node`'s in-process NodeWorldSink is `deos-host`-gated). The light HTTP client
# half (`/turns/submit` POST + `/api/cells` read) carries no deos-js dep; the
# `WorldSink` impl over it lives behind this feature.
deos-js = { path = "../deos-js", optional = true }

async-trait = "0.1"
base64 = { workspace = true }
blake3 = "1"
chacha20poly1305 = { workspace = true }
futures-core = "0.3"
getrandom = { workspace = true }
hex = "0.4"
postcard = { version = "1", features = ["use-std"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
zeroize = { workspace = true }

[features]
# The client-side NodeWorldSink (a deos_js::WorldSink over a remote node's HTTP
# API). Off by default: the base net layer stays mozjs-free.
world-sink = ["dep:deos-js"]

[dev-dependencies]
dregg-intent = { path = "../intent" }

[[example]]
name = "reactive_agent"
path = "examples/reactive_agent.rs"

[lints]
workspace = true
