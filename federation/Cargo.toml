[package]
name = "dregg-federation"
version.workspace = true
edition.workspace = true

[dependencies]
dregg-captp = { path = "../captp" }
dregg-cell = { path = "../cell" }
dregg-commit = { path = "../commit" }
dregg-turn = { path = "../turn" }
dregg-types = { path = "../types" }
serde_json = { workspace = true }
hints = { path = "../hints", package = "dregg-hints" }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
hex = "0.4"
getrandom = { workspace = true }
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
tracing = "0.1"
ark-serialize = { version = "0.5.0", features = ["serde_with"] }
ark-ff = "0.5.0"
ark-std = "0.5.0"
# `runtime` feature: gates async/TCP transport + the in-memory tokio mpsc
# transport in `transport.rs`. Both pull tokio (mio, signal-hook on unix) and
# crossbeam-channel, neither of which cross-compiles cleanly to wasm32 nor
# is meaningful in the browser. Native consumers keep these via `default`.
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "net", "sync", "time"], optional = true }
crossbeam-channel = { version = "0.5", optional = true }
# The verified strand-admission gate (`lean-admission` feature): routes `AdmissionRegistry::admitted`
# through the VERIFIED Lean `dregg_strand_admit` export (F-4 closed by the verified rule the node
# calls, not a Rust mirror). Optional + native-only (links the Lean archive); the Rust gate stays as
# the differential sibling + the fallback when the archive is absent.
dregg-lean-ffi = { path = "../dregg-lean-ffi", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "consensus_bench"
harness = false

[features]
# Native default keeps full networking surface — backward-compatible. Wasm
# consumers (and any embedded callers that only want the pure-state /
# consensus-orchestration types) pass `default-features = false`.
default = ["runtime"]
runtime = ["dep:tokio", "dep:crossbeam-channel"]
# Route the F-4 admission gate through the verified Lean `dregg_strand_admit` export. Native-only
# (the Lean archive does not cross-compile to wasm32); the Rust gate is the fallback + differential
# sibling. Enabled by the node (which already links `dregg-lean-ffi` with the Lean archive).
lean-admission = ["dep:dregg-lean-ffi", "dregg-lean-ffi/lean-lib"]

[lints]
workspace = true
