[package]
name = "dregg-federation"
version.workspace = true
edition.workspace = true

[dependencies]
# The adjudication court (`court.rs`): the equivocation-evidence wire value
# lives where the lace retains it. blocklace has no dregg deps besides types,
# so this edge introduces no cycle.
dregg-blocklace = { path = "../blocklace" }
dregg-captp = { path = "../captp" }
dregg-cell = { path = "../cell" }
dregg-cell-crypto = { path = "../cell-crypto" }
dregg-commit = { path = "../commit" }
dregg-turn = { path = "../turn" }
dregg-types = { path = "../types" }
serde_json = { workspace = true }
hints = { path = "../hints", package = "dregg-hints" }
blake3 = "1"
# `vrf.rs` (RFC 9381 ECVRF-EDWARDS25519-SHA512-TAI) needs the raw group ops
# (decompress / cofactor-clear / double-scalar-mul) under the SAME curve
# ed25519-dalek already pins here â€” no new curve enters the tree.
curve25519-dalek = { version = "4", features = ["alloc"] }
ed25519-dalek = { version = "2", features = ["std"] }
# FIPS 204 ML-DSA-65 (Dilithium) â€” a MATURE, standardized post-quantum signature, pure Rust (no C),
# via the shared `dregg-pq` leaf. Used for the HYBRID quorum certificate (`frost.rs`): each vote
# carries an ed25519 (FROST) AND an ML-DSA signature, so the QC survives a quantum adversary that
# breaks the classical half. Staged behind the `QuorumScheme` selector, not yet wired into live
# consensus.
dregg-pq = { path = "../dregg-pq" }
# crypto-hermine: the COMPACT post-quantum half of the hybrid quorum certificate
# (`frost.rs`, `HermineHybridQC`). A lattice (Raccoon/Hermine) THRESHOLD signature â€”
# so the PQ half is ONE committee-independent cert, not the `t Ă— ~3.3 KB` ML-DSA
# concatenation the `HybridVotes` path carries. STAGED behind `QuorumScheme::HermineHybrid`,
# default-off, reference-only: crypto-hermine is pre-audit (toy challenge hash, no formal
# ROS argument) â€” the ML-DSA `HybridVotes` path stays the deployable one. crypto-hermine
# is a standalone crate (its own `[workspace]` opt-out), so this is a plain external path dep.
crypto-hermine = { path = "../crypto-hermine" }
sha2 = { workspace = true }
hex = "0.4"
getrandom = { workspace = true }
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
tracing = "0.1"
ark-serialize = { version = "0.5.0", features = ["serde_with"] }
ark-ff = "0.5.0"
ark-ec = "0.5.0"
ark-std = "0.5.0"
# FFI-FREE BY CONSTRUCTION: `AdmissionRegistry::admitted` routes the F-4 hybrid gate through the
# `verified_gate` SEAM (`FederationVerifiedGate`), never `dregg-lean-ffi` directly. A native node
# installs the Lean-backed gate (from `dregg-exec-lean`) once at startup; an FFI-free target (wasm /
# verifier-PD / pg) never registers one and the Rust `admitted_rust` differential sibling decides.
# The deleted `no-lean-link` feature is now a dependency choice, not a flag.

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "consensus_bench"
harness = false

[lints]
workspace = true
