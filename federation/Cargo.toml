[package]
name = "dregg-federation"
version.workspace = true
edition.workspace = true

[dependencies]
dregg-captp = { path = "../captp" }
dregg-cell = { path = "../cell" }
dregg-commit = { path = "../commit" }
dregg-turn = { path = "../turn" }
dregg-types = { path = "../types" }
serde_json = { workspace = true }
hints = { path = "../hints", package = "dregg-hints" }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std"] }
hex = "0.4"
getrandom = { workspace = true }
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
tracing = "0.1"
ark-serialize = { version = "0.5.0", features = ["serde_with"] }
ark-ff = "0.5.0"
ark-ec = "0.5.0"
ark-std = "0.5.0"
# `runtime` feature: gates async/TCP transport + the in-memory tokio mpsc
# transport in `transport.rs`. Both pull tokio (mio, signal-hook on unix) and
# crossbeam-channel, neither of which cross-compiles cleanly to wasm32 nor
# is meaningful in the browser. Native consumers keep these via `default`.
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-util", "net", "sync", "time"], optional = true }
crossbeam-channel = { version = "0.5", optional = true }
# UNCONDITIONAL (polarity-inverted, docs/FEATURE-HYGIENE.md §Lean): `AdmissionRegistry::admitted`
# routes through the VERIFIED Lean `dregg_strand_admit` export on every native build (F-4 closed
# by the verified rule, not a Rust mirror); the Rust gate stays as the differential sibling + the
# runtime fallback when the archive lacks the export. The ONE opt-out is the `no-lean-link`
# platform feature (wasm32/zkvm — targets that cannot link libdregg_lean.a).
dregg-lean-ffi = { path = "../dregg-lean-ffi" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "consensus_bench"
harness = false

[features]
# Native default keeps full networking surface — backward-compatible. Wasm
# consumers (and any embedded callers that only want the pure-state /
# consensus-orchestration types) pass `default-features = false`.
default = ["runtime"]
runtime = ["dep:tokio", "dep:crossbeam-channel"]
# PLATFORM gate, OFF by default: only wasm32/zkvm builds set it. It compiles the Rust admission
# gate IN PLACE OF the verified Lean F-4 gate — a statement about the target's linker, never
# about which guarantees this dregg has.
no-lean-link = ["dregg-lean-ffi/no-lean-link", "dregg-captp/no-lean-link", "dregg-turn/no-lean-link"]

[lints]
workspace = true
