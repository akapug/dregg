# deos-terminal — a REAL terminal emulator as a deos surface.
#
# ## What this is
#
# A working terminal emulator (alacritty_terminal-backed PTY + grid, rendered by
# a lean gpui view) so we can run commands — cargo, git, shells — INSIDE deos.
# This is the terminal half of the self-hosting dev loop (the editor half lives
# in the cockpit's doc surfaces).
#
# The model is `alacritty_terminal` directly: a real `tty::Pty` over `$SHELL`,
# the `EventLoop` IO thread parsing the byte stream into a `Term` grid, and the
# `renderable_content()` snapshot we paint each frame. The view is a small gpui
# element that draws the grid as monospace rows, owns a `FocusHandle`, and turns
# gpui `KeyDownEvent`s into PTY bytes via a vendored copy of Zed's xterm keymap
# (`src/keymap.rs`, adapted from `terminal/src/mappings/keys.rs`).
#
# We deliberately did NOT vendor Zed's `terminal`/`terminal_view` crates whole:
# those drag `settings`/`theme`/`task`/`project`/`workspace`/`editor`/`db` — the
# entire Zed world. The PTY+grid logic underneath is small, so we wrote a lean
# model over `alacritty_terminal` and a lean gpui view, keeping only the pure
# xterm key-encoding table from Zed (the one genuinely fiddly piece).
#
# ## Standalone workspace (the `servo-render` / `deos-matrix` pattern)
#
# The empty `[workspace]` table makes this crate its OWN workspace root, NOT a
# member of the repo-root workspace. Deliberate: gpui + alacritty_terminal drag a
# heavy native dep tree (metal/wgpu/font-kit + a unix PTY + vte parser). Keeping
# it OUT of the repo-root workspace keeps the lean dregg/Lean lanes (and their
# `./target`) untouched. `cd deos-terminal && cargo build` builds into THIS
# crate's local target only.
#
# gpui is consumed from our fork `emberian/zed@407a6ff` (byte-identical gpui API
# to upstream Zed at this rev, per the gpui-component scout), and
# `alacritty_terminal` from the same fork Zed pins (`zed-industries/alacritty`),
# so both compile against our gpui cleanly.
[workspace]

[package]
name = "deos-terminal"
version = "0.1.0"
edition = "2021"
publish = false
description = "A real terminal emulator (alacritty_terminal PTY + grid) rendered as a gpui view — the terminal surface of deos, mountable as a cockpit dock pane."

[lib]
name = "deos_terminal"
path = "src/lib.rs"

# The native demo window (gpui). wasm32 has no native windowing — the gpui view
# mounts on `gpui_web` from the cockpit-web crate, not from a standalone bin — so
# this bin is native-only.
[[bin]]
name = "deos-terminal-demo"
path = "src/bin/demo.rs"
required-features = ["native-ui"]

# The PTY-over-WebSocket dev backend: spawns `$SHELL` on a real PTY per WS
# connection and bridges raw bytes both ways, so an in-browser terminal grid (no
# PTY in a tab) can drive a real shell. Native-only (it IS the native resource the
# browser reaches over the wire).
[[bin]]
name = "deos-terminal-pty-ws"
path = "src/bin/pty_ws.rs"
required-features = ["pty-ws-server"]

[features]
# Default builds the native presentation stack (gpui view + alacritty grid) AND
# the PTY-over-WS dev backend — `cargo build` (native) gives you the demo window
# and the pty-ws server. On wasm32 these features must be turned OFF (alacritty's
# PTY/`polling` and the native gpui platform don't link to wasm); the wasm build
# is `cargo build --target wasm32-unknown-unknown --no-default-features` and gets
# the `transport` module's WS client only.
default = ["native-ui", "pty-ws-server"]

# The gpui view + alacritty grid model + the native (PTY) transport. Native-only.
native-ui = []

# The PTY-over-WebSocket server bin + its native PTY/WS deps.
pty-ws-server = ["dep:tokio", "dep:tokio-tungstenite", "dep:futures-util", "dep:portable-pty"]

# Build the `cockpit_surface` adapter module (the dock-mountable `TerminalSurface`
# handle). Off by default so the standalone demo doesn't pull it; starbridge-v2
# enables it to mount the terminal as a dock pane. Implies `native-ui` (the view).
cockpit-surface = ["native-ui"]

[dependencies]
# ── all-target deps (the transport seam + its wire codec) ────────────────────
anyhow = "1"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# ── native deps (the gpui view + alacritty grid + the PTY backend) ───────────
# alacritty pulls `polling`/`home` which do NOT compile to wasm32; gpui here is
# the NATIVE platform. Both are gated off the wasm build.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# The terminal model: a real PTY + xterm/vt parser + grid, the exact fork+rev Zed
# pins (and that our gpui fork's terminal crate compiled against), so the API
# matches what we read out of Zed's `alacritty.rs`.
alacritty_terminal = { git = "https://github.com/zed-industries/alacritty", rev = "fcf32feacb367b75ec84dd40f041e4fd411d3cc1" }

# The gpui view layer — our dregg-owned fork (byte-identical gpui API to the Zed
# rev gpui-component pins). default-features off matches starbridge-v2's usage.
gpui = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", default-features = false }
gpui_platform = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", features = ["font-kit", "runtime_shaders"] }

bitflags = "2"
parking_lot = "0.12"
libc = "0.2"

# The PTY-over-WS dev backend (a small tokio + tokio-tungstenite server + a real
# PTY via portable-pty). Optional, pulled by the `pty-ws-server` feature.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time"], optional = true }
tokio-tungstenite = { version = "0.24", optional = true }
futures-util = { version = "0.3", optional = true }
portable-pty = { version = "0.8", optional = true }

# ── wasm deps (the WebSocket transport the browser terminal speaks) ──────────
# On wasm32 the transport is a `web_sys::WebSocket` to the pty-ws server: it sends
# keystrokes/resize out and pushes PTY output bytes into a vte-parsed grid sink.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
vte = { version = "0.15", default-features = false, features = ["std", "ansi"] }
web-sys = { version = "0.3", features = [
    "BinaryType",
    "Event",
    "MessageEvent",
    "CloseEvent",
    "WebSocket",
    "Blob",
] }

# Native dev-deps for the end-to-end PTY-over-WS test: a real tungstenite WS
# client that dials the `deos-terminal-pty-ws` server bin and proves the wire.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"

# gpui → font-kit → pathfinder pulls `pathfinder_simd 0.5.6`, which fails to
# compile on a modern toolchain (the `simd_{minimum,maximum}_number_nsz`
# intrinsics were renamed). starbridge-v2 already vendors a fixed copy; we reuse
# it (the same stance servo-render takes). This patch is local to THIS standalone
# workspace; it does not affect the repo-root workspace.
[patch.crates-io]
pathfinder_simd = { path = "../starbridge-v2/vendor/pathfinder_simd" }
# gpui's vendored `util` crate calls `smol::process::Child::adopt_raw_pid`, which
# only exists on the zed-industries `async-process`/`async-task` forks the zed
# monorepo's `[patch]` table pins. Consumers of gpui-from-git must replicate them
# (starbridge-v2 does the same).
async-process = { git = "https://github.com/zed-industries/async-process.git", rev = "0b6d6713570af61806e1e5cb40e0f757cb93fd9d" }
async-task = { git = "https://github.com/smol-rs/async-task.git", rev = "b4486cd71e4e94fbda54ce6302444de14f4d190e" }
