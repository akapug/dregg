# pgrx on macOS: postgres symbols (palloc, errmsg, SPI_*, …) are not available at
# link time — they resolve at runtime when the extension is loaded into a
# postgres backend. This flag tells the linker to leave them undefined.
# (Generated by `cargo pgrx new`; the skeleton predated it.) Linux does not need
# it (undefined symbols resolve at dlopen). See cargo-pgrx templates/cargo_config_toml.
[target.'cfg(target_os="macos")']
rustflags = ["-Clink-arg=-Wl,-undefined,dynamic_lookup"]
