# pg-dregg — dregg verified object-capability authorization as a PostgreSQL
# RLS/policy layer (pgrx extension). Milestone 1.
#
# This crate is a STANDALONE workspace root (its own empty `[workspace]`), kept
# OUT of the parent workspace `members` list (.docs-history-noclaude/PG-DREGG.md §5): a
# `cargo-pgrx`-managed cdylib does not want to participate in
# `cargo check --workspace`, and excluding it protects the shared `./target`
# from pgrx's postgres-binding build during concurrent lanes / VK rotation.
#
# TWO build modes (see .docs-history-noclaude/PG-DREGG.md §5 + the M1 verification boundary):
#
#   1. CORE (no postgres needed) — the postgres-independent cores live in
#      `src/authz.rs` (Tier-A: decode+verify, the verified-credential LRU,
#      revocation, the caveat algebra), `src/jsonpath.rs` (Pred→jsonpath compile),
#      `src/mirror.rs` (Tier-B/C row types + the RootChain anti-substitution tooth
#      + the §15 federation subscriber re-validation), and `src/attest.rs` (the
#      Tier-C range-attest proof gate + the circuit-link seam) — all proven by
#      plain `cargo test`:
#          cargo test                     # builds the cores + their #[cfg(test)] tests
#      The default feature set is EMPTY, so this builds NO pgrx code and needs no
#      postgres / cargo-pgrx toolchain. This is the always-runnable verification.
#
#   2. EXTENSION (needs cargo-pgrx + a managed postgres) — the thin
#      `#[pg_extern]` wrappers in `src/lib.rs` are gated behind the `pgrx`
#      feature; building/running them is a cargo-pgrx job. The PRIMARY target is
#      PostgreSQL 18 (the current release); pg13–pg17 stay available.
#          cargo install cargo-pgrx --version 0.17.0
#          cargo pgrx init --pg18 $(brew --prefix postgresql@18)/bin/pg_config
#          cargo pgrx test pg18          # runs the #[pg_test]s against managed pg18
#          cargo pgrx run  pg18          # opens psql with the extension loaded
#      `pg18` is the default ABI cargo-pgrx targets here (the `[features]` block
#      and `pg_dregg.control` name it as primary). pg13–pg17 remain selectable
#      for older deployments (`cargo pgrx test pg17`, etc.). The pg18 leverage
#      (virtual generated columns, RETURNING old/new, uuidv7, OAuth, async I/O)
#      is surveyed in .docs-history-noclaude/PG-DREGG-PG18.md.
[workspace]

[package]
name = "pg-dregg"
version = "0.1.0"
edition = "2021"
description = "dregg verified object-capability authorization as a PostgreSQL-native RLS/policy layer (pgrx extension). Milestone 1."

[lib]
crate-type = ["cdylib", "lib"]

# cargo-pgrx's schema generator builds this binary (with --cfg pgrx_embed) to
# emit the extension SQL. It is only meaningful with the pgrx feature on, so it
# is gated by `required-features` — plain `cargo test` (no features) never
# compiles it, keeping the core path postgres-free. The name MUST be
# `pgrx_embed_<crate-name>` (cargo-pgrx looks it up by that name).
[[bin]]
name = "pgrx_embed_pg-dregg"
path = "./src/bin/pgrx_embed.rs"
required-features = ["pgrx"]

[features]
# Default is EMPTY so `cargo test` builds only the postgres-independent core.
# (A pgNN feature CANNOT be a cargo default: pgrx requires exactly one pg ABI
# and would force the extension to compile under plain `cargo test`, defeating
# the postgres-free core path. The PRIMARY ABI is `pg18` — the current
# PostgreSQL — selected explicitly on the cargo-pgrx command line and named as
# primary in `pg_dregg.control`; pg13–pg17 remain available below.)
default = []
# Turning on `pgrx` compiles the #[pg_extern] wrappers; pick a pg ABI alongside.
pgrx = ["dep:pgrx"]
pg13 = ["pgrx", "pgrx/pg13", "dep:pgrx-tests", "pgrx-tests/pg13"]
pg14 = ["pgrx", "pgrx/pg14", "dep:pgrx-tests", "pgrx-tests/pg14"]
pg15 = ["pgrx", "pgrx/pg15", "dep:pgrx-tests", "pgrx-tests/pg15"]
pg16 = ["pgrx", "pgrx/pg16", "dep:pgrx-tests", "pgrx-tests/pg16"]
pg17 = ["pgrx", "pgrx/pg17", "dep:pgrx-tests", "pgrx-tests/pg17"]
pg18 = ["pgrx", "pgrx/pg18", "dep:pgrx-tests", "pgrx-tests/pg18"]
# pg_test enables the #[pg_test]s (cargo-pgrx sets this).
pg_test = []
# Tier C (.docs-history-noclaude/PG-DREGG.md §10) — the VERIFIED STORE.
#
# The CHAIN re-validation half ships UNCONDITIONALLY (no feature needed): the
# `dregg_verify_turn` extern + the `dregg.commit_log` gate are backed by
# `mirror::verify_chain_step` (pure, circuit-free), so the verified-store gate —
# a tampered/reordered batch refused by the database engine — is live in the
# default `pgNN` build. This is the realizable per-row half of the spine
# invariant (a `CommitRecord` carries no per-turn proof, §10.2).
#
# This `tier-c` feature gates the heavyweight PROOF verifier — the whole-chain IVC
# light client (`circuit::ivc_turn_chain::verify_turn_chain_recursive`) so a receipt
# RANGE can be proof-attested (the orthogonal soundness half `dregg_verify_turn` does
# NOT do per-row). The RANGE-ATTEST SRF SHAPE already ships in `src/attest.rs` + the
# `dregg_attest_range`/`dregg_attest_explain` externs (the request/verdict types, the
# anti-overclaim tooth, the fail-closed discipline), written ONCE against the single
# circuit-link seam `attest::verify_serialized_proof`. With `tier-c` OFF (default,
# circuit-free) that seam is STUBBED and the SRF FAILS CLOSED — attests nothing — which
# is the only safe default (§10.3: a labeled proof gate that does not verify must say
# "unattested", never "attested"). Turning `tier-c` ON wires the seam to the real,
# Lean-FREE circuit verifier (§8.1; `dregg-circuit` with `--features verifier`/`prover`,
# NO executor/NO Lean). The remaining settle items (named in `src/attest.rs` + §10.2):
# S1 = serialize `WholeChainProof` (LANDED: `circuit::ivc_turn_chain::WholeChainProofBytes`
# + `verify_turn_chain_recursive_from_parts`); S2 = node-side proof producer +
# `dregg.turn_proofs`; S3 = the `dregg-circuit` dep itself (wired below). Pulls the
# Lean-FREE circuit verifier (`--features prover`: NO executor, NO Lean runtime — §8.1
# authorizes the circuit link for Tier C) so `attest::verify_serialized_proof` becomes the
# REAL `verify_turn_chain_recursive_from_parts` instead of the fail-closed stub.
tier-c = ["dep:dregg-circuit-prove"]
# Tier D (.docs-history-noclaude/PG-DREGG.md §11) — the EXECUTOR-IN-POSTGRES endgame. There are now
# TWO executor producers, the same ship-Rust-default split `sdk-py` took
# (`3dd988be`); both supersede the default `FoldProducer` stand-in on the live path.
#
#   * `tier-d-rust` (the LIGHT executor) — the drainer's PRODUCE gate runs the REAL
#     pure-Rust `dregg_turn::TurnExecutor` (`src/rust_producer.rs`). It links NO
#     Lean (`dregg-turn` carries no `dregg-lean-ffi` edge), needs no `libleanshared`
#     and no Lean toolchain (`elan`/`lake`), and is at parity with the verified Lean
#     spec (`docs/RUST-LEAN-EXECUTOR-PARITY.md`: audited under-enforcement alignment
#     + the differential gauntlet). This is the genuine, lightweight in-Postgres
#     executor — the default-grade producer a node ships. `dregg-turn`/`dregg-cell`
#     are pulled with default-features OFF (no `prover`/recursion, no `threshold-sig`,
#     no Lean), so the executor builds verify-light.
#   * `tier-d` (alias `tier-d-lean`, the HEAVY executor) — the drainer's PRODUCE gate
#     runs the verified Lean `execFullForestG` SINGLE-THREADED, IN the backend
#     process (`.docs-history-noclaude/EMBEDDABLE-LEAN-RUNTIME.md`: mimalloc is private + the task
#     manager is lazy + the libuv-thread-free init `dregg_ffi_init_st`, so the
#     verified executor lives in a single-threaded `palloc`/`longjmp`/`fork`
#     backend). Implies tier-c (executing implies verifying); pulls the optional
#     `dregg-lean-ffi` dep, which links `libdregg_lean.a` (~150 MB). Build the cdylib
#     with `DREGG_LEAN_LINK=shared`. This is the verified opt-in: a node that wants
#     the verified guarantee end-to-end links it as the authoritative producer.
#
# The default build sees NEITHER (keeps the `FoldProducer` stand-in, no executor, no
# archive). When both are on, `tier-d` (Lean) wins the producer selection.
tier-d-rust = ["dep:dregg-turn", "dep:dregg-cell"]
tier-d = ["tier-c", "dep:dregg-lean-ffi"]
# `tier-d-lean` is a readable alias for the verified Lean executor tier.
tier-d-lean = ["tier-d"]

[dependencies]
# pgrx is OPTIONAL: only the extension build pulls it (and its postgres
# bindings). The core (`src/core.rs`) never touches it.
pgrx = { version = "0.17", optional = true }
# pgrx-tests backs the #[pg_test] harness; OPTIONAL so plain `cargo test` (the
# core path) never compiles the postgres test machinery. cargo-pgrx enables it
# via the chosen pgNN feature.
pgrx-tests = { version = "0.17", optional = true }
# The whole authorization core. Already circuit-free + offline:
# `cargo tree -i dregg-circuit -p dregg-auth` is empty.
dregg-auth = { path = "../dregg-auth" }
# The verified Lean executor FFI — OPTIONAL, pulled ONLY by the `tier-d` feature
# (the executor-in-backend producer, `src/lean_producer.rs`). It links
# `libdregg_lean.a` + the Lean runtime; the default build does not depend on it, so
# the postgres-free core + the `pgNN` extension stay executor-free (the
# `FoldProducer` stand-in). On the cdylib (extension `.so` / pgrx) link, the runtime
# must be linked SHARED (`DREGG_LEAN_LINK=shared`).
dregg-lean-ffi = { path = "../dregg-lean-ffi", optional = true }
# The whole-chain IVC verifier — OPTIONAL, pulled ONLY by `tier-c`. Built Lean-FREE
# (the `prover` feature pulls the plonky3 verify/recursion stack, NOT the executor
# or the Lean runtime; §8.1). With it linked, `attest::verify_serialized_proof` decodes
# the transport's proof blobs and runs `verify_turn_chain_recursive_from_parts` — the
# real cryptographic teeth. The default `cargo test` core + the `pgNN` extension never
# pull it (the SRF fails closed there). `cargo tree -i dregg-circuit -p dregg-auth` stays
# empty — this is the ONLY pg-dregg edge to the circuit, gated behind `tier-c`.
# The recursion/IVC tower (`ivc_turn_chain::verify_turn_chain_recursive_from_blobs`)
# now lives in the SPLIT prove crate `dregg-circuit-prove` (circuit crate-split #5
# retired the `prover` feature and moved the p3-recursion cluster out of the verify
# floor). tier-c depends on it directly; it re-deps `dregg-circuit` (the verify
# floor) transitively. The default `cargo test` core never pulls it.
dregg-circuit-prove = { path = "../circuit-prove", optional = true }
# The pure-Rust verified executor — OPTIONAL, pulled ONLY by `tier-d-rust` (the
# LIGHT executor-in-backend producer, `src/rust_producer.rs`). The decisive point is
# that `dregg-turn` carries NO `dregg-lean-ffi` edge, so this links NO
# `libleanshared`/`libdregg_lean.a` and needs no Lean toolchain (`elan`/`lake`) — the
# "light" in ship-Rust-default is Lean-freeness, exactly as `sdk-py` (`3dd988be`).
# `threshold-sig` is OFF (no arkworks: the synthesized transfer uses a plain
# signature/unchecked auth, never the governance-VK `Authorization::Custom`); `prover`
# stays ON (the verify path's `*_wide` PI reconstruction + turn's own gating need the
# circuit-prove crate `tier-c` already pulls — NOT the Lean runtime). This is the SAME
# feature set as the tier-c dev-dep below; cargo unifies them. The default `cargo test`
# core + the `pgNN` extension never pull it (they keep the `FoldProducer` stand-in).
dregg-turn = { path = "../turn", default-features = false, features = ["prover"], optional = true }
# `dregg-cell` for the executor's `Cell`/`Ledger`/`Permissions` types the Rust
# producer builds its synthesized turn over. Pulled with `tier-d-rust` (and already a
# transitive dep of `dregg-turn`); default-features OFF, Lean-free. Also a dev-dep
# (for the tier-c test); cargo unifies the two.
dregg-cell = { path = "../cell", default-features = false, optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# postcard backs the S1 whole-chain-proof transport (`attest::SerializedWholeChainProof`)
# + the S2 producer's serialized proof bytes (`turn_proofs`): the verify-sufficient subset
# of `circuit::ivc_turn_chain::WholeChainProof` crosses the SQL boundary as `bytea`,
# postcard-encoded — the SAME codec `dregg-auth` already pulls and the circuit's prover
# VK fingerprint uses. Already in the resolved tree (via dregg-auth); named directly here
# because `attest`/`turn_proofs` encode + decode the transport in the postgres-free core.
postcard = { version = "1", features = ["use-std"] }
# libc backs the `drainerd` daemon's graceful-shutdown signal handlers
# (SIGINT/SIGTERM → an atomic stop flag). Already in the resolved tree; used only
# by the `src/bin/drainerd.rs` worker, never by the postgres-free library core.
libc = "0.2"

[dev-dependencies]
# criterion backs the throughput/latency benches (`cargo bench`). It is a
# dev-dep only — it never touches the extension build or the postgres-free core.
criterion = "0.5"
# proptest backs the property/fuzz tests (`tests/proptest_*.rs`): the MirrorBatch
# serde round-trip, the RootChain anti-substitution discipline, and authz.
proptest = "1"
# The TIER-C ADMIT TOOTH (`tests/tier_c_real_proof.rs`) produces a REAL whole-chain
# IVC proof and routes it through `attest::verify_serialized_proof` to prove the
# gate ACCEPTS a genuine proof (and REFUSES tampers) — the admit polarity the
# default circuit-free `cargo test` cannot reach. These three crates compile ONLY
# under `--features tier-c` (the test file is wholly `#[cfg(feature = "tier-c")]`),
# so the default `cargo test` core/extension stays postgres- and circuit-free; they
# are listed (not gated) because cargo dev-deps cannot be `optional`, but cargo
# compiles them only when the `tier-c`-gated test target is actually built. Feature
# choices mirror `wasm/Cargo.toml` (the proven light-client demo graph): cell with
# default-features off, turn `prover`, and the recursion tower from the SPLIT prove
# crate `dregg-circuit-prove` (circuit crate-split #5 moved `ivc_turn_chain` +
# the p3-recursion cluster out of the `dregg-circuit` verify floor and retired the
# `prover` feature). `dregg-circuit` (the verify floor) is pulled with no features;
# `dregg-circuit-prove` carries the IVC prove/verify surface the tier-c test drives.
dregg-circuit = { path = "../circuit" }
dregg-circuit-prove = { path = "../circuit-prove" }
dregg-cell = { path = "../cell", default-features = false }
# turn `prover` takes the ROTATED sovereign-verify path (the weak v1 hand-AIR floor
# is RETIRED) and forwards to `dregg-circuit-prove`; it is the same prove graph the
# tier-c proof-construction needs. `threshold-sig` stays off (the rotated mint does
# not need arkworks); `no-lean-link` keeps the Lean archive out.
dregg-turn = { path = "../turn", default-features = false, features = ["prover"] }
# postcard is already a normal dependency above; the test re-uses it to project a
# `WholeChainProof` into the transport blobs (the documented S2 producer mapping).

# The marketable throughput/latency numbers (.docs-history-noclaude/PG-DREGG-VS-DBOS.md): the
# verified-write submit-decision path, the MirrorBatch chain-gate apply, the
# free-SQL read projection (the RLS filter), the RootChain anti-substitution
# tooth, and the MirrorBatch serde decode. `harness = false` so criterion owns
# `fn main`. All over the postgres-free cores, so it runs with plain `cargo bench`.
[[bench]]
name = "pg_dregg_bench"
harness = false

[profile.dev]
panic = "unwind"
[profile.release]
panic = "unwind"
opt-level = 3
lto = "thin"
