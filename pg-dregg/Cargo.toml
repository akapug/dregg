# pg-dregg — dregg verified object-capability authorization as a PostgreSQL
# RLS/policy layer (pgrx extension). Milestone 1.
#
# This crate is a STANDALONE workspace root (its own empty `[workspace]`), kept
# OUT of the parent workspace `members` list (docs/PG-DREGG.md §5): a
# `cargo-pgrx`-managed cdylib does not want to participate in
# `cargo check --workspace`, and excluding it protects the shared `./target`
# from pgrx's postgres-binding build during concurrent lanes / VK rotation.
#
# TWO build modes (see docs/PG-DREGG.md §5 + the M1 verification boundary):
#
#   1. CORE (no postgres needed) — the authorization core lives in `src/core.rs`
#      and is proven by plain `cargo test`:
#          cargo test                     # builds core.rs + its #[cfg(test)] tests
#      The default feature set is EMPTY, so this builds NO pgrx code and needs no
#      postgres / cargo-pgrx toolchain. This is the always-runnable verification.
#
#   2. EXTENSION (needs cargo-pgrx + a managed postgres) — the thin
#      `#[pg_extern]` wrappers in `src/lib.rs` are gated behind the `pgrx`
#      feature; building/running them is a cargo-pgrx job:
#          cargo install cargo-pgrx --version 0.17.0
#          cargo pgrx init --pg16 <download|existing>
#          cargo pgrx test pg16          # runs the #[pg_test]s against managed pg16
#          cargo pgrx run  pg16          # opens psql with the extension loaded
[workspace]

[package]
name = "pg-dregg"
version = "0.1.0"
edition = "2021"
description = "dregg verified object-capability authorization as a PostgreSQL-native RLS/policy layer (pgrx extension). Milestone 1."

[lib]
crate-type = ["cdylib", "lib"]

# cargo-pgrx's schema generator builds this binary (with --cfg pgrx_embed) to
# emit the extension SQL. It is only meaningful with the pgrx feature on, so it
# is gated by `required-features` — plain `cargo test` (no features) never
# compiles it, keeping the core path postgres-free. The name MUST be
# `pgrx_embed_<crate-name>` (cargo-pgrx looks it up by that name).
[[bin]]
name = "pgrx_embed_pg-dregg"
path = "./src/bin/pgrx_embed.rs"
required-features = ["pgrx"]

[features]
# Default is EMPTY so `cargo test` builds only the postgres-independent core.
default = []
# Turning on `pgrx` compiles the #[pg_extern] wrappers; pick a pg ABI alongside.
pgrx = ["dep:pgrx"]
pg13 = ["pgrx", "pgrx/pg13", "dep:pgrx-tests", "pgrx-tests/pg13"]
pg14 = ["pgrx", "pgrx/pg14", "dep:pgrx-tests", "pgrx-tests/pg14"]
pg15 = ["pgrx", "pgrx/pg15", "dep:pgrx-tests", "pgrx-tests/pg15"]
pg16 = ["pgrx", "pgrx/pg16", "dep:pgrx-tests", "pgrx-tests/pg16"]
pg17 = ["pgrx", "pgrx/pg17", "dep:pgrx-tests", "pgrx-tests/pg17"]
# pg_test enables the #[pg_test]s (cargo-pgrx sets this).
pg_test = []
# Tier C (docs/PG-DREGG.md §10) — the VERIFIED STORE. Links the proof verifier
# (the STARK/PI light-client checker) so `dregg_verify_turn` runs the REAL
# verifier in the backend (AUTHORIZED, §8.1). Off by default: the Tier A authz
# build stays circuit-free; the verified-store build opts in. (The verifier
# crate dep is wired when this tier is implemented; the feature is declared now
# so the build path is explicit and the mirror core compiles either way.)
tier-c = []
# Tier D (docs/PG-DREGG.md §11) — the EXECUTOR-IN-POSTGRES endgame. Links the
# verified Lean executor so `dregg_submit_turn` executes a turn inside the
# backend (AUTHORIZED, §8.1; gated on the pg/Lean process-model spike). Implies
# tier-c (executing implies verifying).
tier-d = ["tier-c"]

[dependencies]
# pgrx is OPTIONAL: only the extension build pulls it (and its postgres
# bindings). The core (`src/core.rs`) never touches it.
pgrx = { version = "0.17", optional = true }
# pgrx-tests backs the #[pg_test] harness; OPTIONAL so plain `cargo test` (the
# core path) never compiles the postgres test machinery. cargo-pgrx enables it
# via the chosen pgNN feature.
pgrx-tests = { version = "0.17", optional = true }
# The whole authorization core. Already circuit-free + offline:
# `cargo tree -i dregg-circuit -p dregg-auth` is empty.
dregg-auth = { path = "../dregg-auth" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.dev]
panic = "unwind"
[profile.release]
panic = "unwind"
opt-level = 3
lto = "thin"
