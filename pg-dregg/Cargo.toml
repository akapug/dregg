# pg-dregg — dregg verified object-capability authorization as a PostgreSQL
# RLS/policy layer (pgrx extension). Milestone 1.
#
# This crate is a STANDALONE workspace root (its own empty `[workspace]`), kept
# OUT of the parent workspace `members` list (docs/PG-DREGG.md §5): a
# `cargo-pgrx`-managed cdylib does not want to participate in
# `cargo check --workspace`, and excluding it protects the shared `./target`
# from pgrx's postgres-binding build during concurrent lanes / VK rotation.
#
# TWO build modes (see docs/PG-DREGG.md §5 + the M1 verification boundary):
#
#   1. CORE (no postgres needed) — the postgres-independent cores live in
#      `src/authz.rs` (Tier-A: decode+verify, the verified-credential LRU,
#      revocation, the caveat algebra), `src/jsonpath.rs` (Pred→jsonpath compile),
#      `src/mirror.rs` (Tier-B/C row types + the RootChain anti-substitution tooth
#      + the §15 federation subscriber re-validation), and `src/attest.rs` (the
#      Tier-C range-attest proof gate + the circuit-link seam) — all proven by
#      plain `cargo test`:
#          cargo test                     # builds the cores + their #[cfg(test)] tests
#      The default feature set is EMPTY, so this builds NO pgrx code and needs no
#      postgres / cargo-pgrx toolchain. This is the always-runnable verification.
#
#   2. EXTENSION (needs cargo-pgrx + a managed postgres) — the thin
#      `#[pg_extern]` wrappers in `src/lib.rs` are gated behind the `pgrx`
#      feature; building/running them is a cargo-pgrx job. The PRIMARY target is
#      PostgreSQL 18 (the current release); pg13–pg17 stay available.
#          cargo install cargo-pgrx --version 0.17.0
#          cargo pgrx init --pg18 $(brew --prefix postgresql@18)/bin/pg_config
#          cargo pgrx test pg18          # runs the #[pg_test]s against managed pg18
#          cargo pgrx run  pg18          # opens psql with the extension loaded
#      `pg18` is the default ABI cargo-pgrx targets here (the `[features]` block
#      and `pg_dregg.control` name it as primary). pg13–pg17 remain selectable
#      for older deployments (`cargo pgrx test pg17`, etc.). The pg18 leverage
#      (virtual generated columns, RETURNING old/new, uuidv7, OAuth, async I/O)
#      is surveyed in docs/PG-DREGG-PG18.md.
[workspace]

[package]
name = "pg-dregg"
version = "0.1.0"
edition = "2021"
description = "dregg verified object-capability authorization as a PostgreSQL-native RLS/policy layer (pgrx extension). Milestone 1."

[lib]
crate-type = ["cdylib", "lib"]

# cargo-pgrx's schema generator builds this binary (with --cfg pgrx_embed) to
# emit the extension SQL. It is only meaningful with the pgrx feature on, so it
# is gated by `required-features` — plain `cargo test` (no features) never
# compiles it, keeping the core path postgres-free. The name MUST be
# `pgrx_embed_<crate-name>` (cargo-pgrx looks it up by that name).
[[bin]]
name = "pgrx_embed_pg-dregg"
path = "./src/bin/pgrx_embed.rs"
required-features = ["pgrx"]

[features]
# Default is EMPTY so `cargo test` builds only the postgres-independent core.
# (A pgNN feature CANNOT be a cargo default: pgrx requires exactly one pg ABI
# and would force the extension to compile under plain `cargo test`, defeating
# the postgres-free core path. The PRIMARY ABI is `pg18` — the current
# PostgreSQL — selected explicitly on the cargo-pgrx command line and named as
# primary in `pg_dregg.control`; pg13–pg17 remain available below.)
default = []
# Turning on `pgrx` compiles the #[pg_extern] wrappers; pick a pg ABI alongside.
pgrx = ["dep:pgrx"]
pg13 = ["pgrx", "pgrx/pg13", "dep:pgrx-tests", "pgrx-tests/pg13"]
pg14 = ["pgrx", "pgrx/pg14", "dep:pgrx-tests", "pgrx-tests/pg14"]
pg15 = ["pgrx", "pgrx/pg15", "dep:pgrx-tests", "pgrx-tests/pg15"]
pg16 = ["pgrx", "pgrx/pg16", "dep:pgrx-tests", "pgrx-tests/pg16"]
pg17 = ["pgrx", "pgrx/pg17", "dep:pgrx-tests", "pgrx-tests/pg17"]
pg18 = ["pgrx", "pgrx/pg18", "dep:pgrx-tests", "pgrx-tests/pg18"]
# pg_test enables the #[pg_test]s (cargo-pgrx sets this).
pg_test = []
# Tier C (docs/PG-DREGG.md §10) — the VERIFIED STORE.
#
# The CHAIN re-validation half ships UNCONDITIONALLY (no feature needed): the
# `dregg_verify_turn` extern + the `dregg.commit_log` gate are backed by
# `mirror::verify_chain_step` (pure, circuit-free), so the verified-store gate —
# a tampered/reordered batch refused by the database engine — is live in the
# default `pgNN` build. This is the realizable per-row half of the spine
# invariant (a `CommitRecord` carries no per-turn proof, §10.2).
#
# This `tier-c` feature gates the heavyweight PROOF verifier — the whole-chain IVC
# light client (`circuit::ivc_turn_chain::verify_turn_chain_recursive`) so a receipt
# RANGE can be proof-attested (the orthogonal soundness half `dregg_verify_turn` does
# NOT do per-row). The RANGE-ATTEST SRF SHAPE already ships in `src/attest.rs` + the
# `dregg_attest_range`/`dregg_attest_explain` externs (the request/verdict types, the
# anti-overclaim tooth, the fail-closed discipline), written ONCE against the single
# circuit-link seam `attest::verify_serialized_proof`. With `tier-c` OFF (default,
# circuit-free) that seam is STUBBED and the SRF FAILS CLOSED — attests nothing — which
# is the only safe default (§10.3: a labeled proof gate that does not verify must say
# "unattested", never "attested"). Turning `tier-c` ON wires the seam to the real,
# Lean-FREE circuit verifier (§8.1; `dregg-circuit` with `--features verifier`/`recursion`,
# NO executor/NO Lean). The remaining settle items (named in `src/attest.rs` + §10.2):
# S1 = serialize `WholeChainProof`; S2 = node-side proof producer + `dregg.turn_proofs`;
# S3 = the `dregg-circuit` dep itself (added here when S1 lands). Declared depless now so
# the staged shape is explicit and the default build stays circuit-free.
tier-c = []
# Tier D (docs/PG-DREGG.md §11) — the EXECUTOR-IN-POSTGRES endgame. Links the
# verified Lean executor so `dregg_submit_turn` executes a turn inside the
# backend (AUTHORIZED, §8.1; gated on the pg/Lean process-model spike). Implies
# tier-c (executing implies verifying).
tier-d = ["tier-c"]

[dependencies]
# pgrx is OPTIONAL: only the extension build pulls it (and its postgres
# bindings). The core (`src/core.rs`) never touches it.
pgrx = { version = "0.17", optional = true }
# pgrx-tests backs the #[pg_test] harness; OPTIONAL so plain `cargo test` (the
# core path) never compiles the postgres test machinery. cargo-pgrx enables it
# via the chosen pgNN feature.
pgrx-tests = { version = "0.17", optional = true }
# The whole authorization core. Already circuit-free + offline:
# `cargo tree -i dregg-circuit -p dregg-auth` is empty.
dregg-auth = { path = "../dregg-auth" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# criterion backs the throughput/latency benches (`cargo bench`). It is a
# dev-dep only — it never touches the extension build or the postgres-free core.
criterion = "0.5"
# proptest backs the property/fuzz tests (`tests/proptest_*.rs`): the MirrorBatch
# serde round-trip, the RootChain anti-substitution discipline, and authz.
proptest = "1"

# The marketable throughput/latency numbers (docs/PG-DREGG-VS-DBOS.md): the
# verified-write submit-decision path, the MirrorBatch chain-gate apply, the
# free-SQL read projection (the RLS filter), the RootChain anti-substitution
# tooth, and the MirrorBatch serde decode. `harness = false` so criterion owns
# `fn main`. All over the postgres-free cores, so it runs with plain `cargo bench`.
[[bench]]
name = "pg_dregg_bench"
harness = false

[profile.dev]
panic = "unwind"
[profile.release]
panic = "unwind"
opt-level = 3
lto = "thin"
