[package]
name = "dreggnet-landing"
description = "DreggNet Cloud public landing page — the front door at the public domain: what the verifiable agent cloud IS, the LIVE status (a client-side embed of the public status page, honest-unknown until it loads), and the quickstart (deploy a site / run the agent / verify it yourself)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_landing"
path = "src/lib.rs"

# `dreggnet-landing` — the PUBLIC front door. Like `dreggnet-ops` /
# `dreggnet-status` / `dreggnet-console` it is a pure-std thread-per-connection
# HTTP server (no httpe/Elide closure) serving one self-contained, no-build page,
# so it cross-builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-landing
#
# The page is SERVER-rendered HTML with a small progressive-enhancement script
# that fetches the public status page's `/status.json` to show the live banner —
# so the landing server's own liveness is never coupled to the status service
# (honest "checking…" until the fetch lands; never a false green). The live-edge
# deploy (the Caddy route at the public apex + the real status URL) is the
# reviewed-go step; the page + render + tests here are complete.
[[bin]]
name = "dreggnet-landing"
path = "src/bin/dreggnet-landing.rs"
