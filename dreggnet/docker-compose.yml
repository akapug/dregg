# DreggNet — local stack on a Mac (or any Docker host).
#
#   docker compose up -d --build      # bring up postgres + the dreggnet container
#   docker compose run --rm dreggnet dreggnet-demo   # the turnkey end-to-end demo
#
# See docs/RUN-LOCALLY.md for the full runbook.

services:
  # The durable / billing substrate. This is the Postgres the `dreggnet-durable`
  # `pg` store + the `dreggnet_meter` transactional outbox checkpoint into, and
  # where breadstuffs' `pg-dregg` (dregg-in-Postgres) composes the lease, the
  # meter, and the workflow checkpoint into one transaction. The default CLI demo
  # uses the bundled SQLite durable store; this service is the multi-host
  # durability boundary + the place the pg-gated durable test runs against.
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: dreggnet
      POSTGRES_PASSWORD: dreggnet
      POSTGRES_DB: dreggnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreggnet -d dreggnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The DreggNet operator container — the runnable wasmi-tier exec demo path.
  # The `dreggnet` CLI drives control → bridge → durable → exec (owned wasmi
  # sandbox), genuinely running a metered, durable, sandboxed workload. It is an operator
  # CLI (not a long-running daemon), so this service idles and you drive it with
  # `docker compose exec dreggnet dreggnet ...` (or `run --rm dreggnet dreggnet-demo`).
  dreggnet:
    build:
      context: .
      dockerfile: Dockerfile
    image: dreggnet:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Wired to the postgres service. The durable `pg` store + meter outbox read
      # this; the default CLI demo path uses the bundled SQLite store and does not
      # require it.
      DATABASE_URL: postgres://dreggnet:dreggnet@postgres:5432/dreggnet
      DREGGNET_STATE_DIR: /var/lib/dreggnet
    volumes:
      - dreggnet-state:/var/lib/dreggnet
    command: ["sleep", "infinity"]

  # The httpe `dreggnet-gateway` — the fly-compatible machines API, served.
  #
  # The `dreggnet-gateway` binary binds a TCP listener and serves the machines
  # API `Handler` over HTTP/1.1, so this is a real long-running service (unlike
  # the operator `dreggnet` CLI above). It exposes the API on :8080; a create
  # runs through the bridge's real lease-gate. The image is built with
  # `BUILD_PKG=dreggnet-gateway`, which pulls the Linux-only Elide net closure
  # (forked ntex/compio/rustls + capnp codegen) — the heaviest part of the build.
  #
  #   docker compose up -d --build dreggnet-gateway
  #   curl -s localhost:8080/v1/apps/demo/machines
  #
  dreggnet-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PKG: dreggnet-gateway
    image: dreggnet-gateway:local
    command: ["dreggnet-gateway", "--port", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  dreggnet-state:
