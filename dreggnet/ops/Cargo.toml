[package]
name = "dreggnet-ops"
description = "DreggNet Cloud OPS/ADMIN dashboard — aggregates the live node/gateway/durable/bot surfaces into one admin-gated ops view"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_ops"
path = "src/lib.rs"

# `dreggnet-ops` — the admin-only ops/observability dashboard. It does NOT
# duplicate any service: it AGGREGATES the live read surfaces of the DreggNet
# cloud over plain HTTP (the dregg node :8420, the gateway :8080, the discord
# bot's read API :8080) plus the durable layer's Postgres meter outbox, and
# tails the running services' logs over the Docker Engine API. It serves one
# self-contained HTML dashboard + a JSON snapshot API, gated behind a SEPARATE
# admin password at the Caddy edge.
#
# It is a pure-std HTTP server (thread-per-connection, like the gateway's serving
# binary) and deliberately does NOT pull the heavy Linux-only `httpe`/Elide net
# closure, so it cross-builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-ops
[[bin]]
name = "dreggnet-ops"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
# RFC3339 timestamps on the snapshot + parsed charge timestamps.
time = { workspace = true, features = ["formatting", "parsing", "macros"] }
# The durable layer's meter outbox lives in Postgres (`dreggnet_meter`). We read
# it (runtime queries, no compile-time DB) for the lease economy + durable-job
# view. No TLS feature — the meter Postgres is reached on the compose-internal
# network in plaintext, so we avoid pulling openssl entirely.
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "postgres", "time"] }
# A small multi-thread runtime to `block_on` the (async) sqlx queries from the
# synchronous thread-per-connection server loop.
tokio = { workspace = true, features = ["rt-multi-thread", "time"] }
