[package]
name = "dregg-domains"
description = "DreggNet custom domains (BYO): bind your own domain to a published site cell — a cap-gated DomainBinding cell, DNS challenge-verify (TXT/CNAME), and verified custom-Host gateway routing"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dregg_domains"

# `dregg domains add <domain> --site <name>` — BYO custom domains
# (docs/PERMISSIONLESS-CLOUD-PLAN.md §3.2). A custom domain is bound to a published
# site cell, proven by the standard ACME-style DNS challenge (a TXT nonce at
# `_dregg-verify.<domain>` or a CNAME to `<site>.example.com`), then routed at the
# edge with a per-domain cert. This crate is a thin disjoint module over the site
# host: a DomainBinding is a cap-gated cell exactly like a SiteCell, and the gateway
# adopts the DomainRegistry beside the `<name>.example.com` SiteRegistry.
#
#   - `dreggnet-webapp` — the site host (SiteRegistry, SiteCell, the cap + label
#                         rules, WebRequest/WebResponse). The binding routes onto a
#                         published site cell; this crate reuses its label validation
#                         and serving path, not a new host.
#
# DNS verification is driven through the `DnsResolver` trait — a real DNS client in
# production, a deterministic `MockDns` in tests — so the bind → challenge → verify →
# route round-trip proves locally with no live DNS and no real cert.

[dependencies]
serde = { workspace = true }
# The DURABLE DATA PLANE backend — now the REAL substrate umem heap (the #2
# re-dregg move, docs/REGISTRIES-AS-UMEM.md): the `DomainRegistry` IS a umem cell, a
# bound / verified `DomainBinding` is laid into the cell's `(collection,key) -> value`
# heap and committed to the kernel's sorted-Poseidon2 boundary root, so a gateway
# restart RECONSTRUCTS the domain bindings (including their Verified state, so routing
# + the cert ask survive) FROM the committed heap. Replaces the from-scratch
# JSON-lines `dreggnet-store` log with a dependency on `dregg-cell`, unlocking
# fork + time-travel + merge-readiness (the heap leaf-set is a `dregg_merge::GrowSet`).
dreggnet-umem = { path = "../umem" }
# The site host this crate binds custom domains onto (SiteRegistry/SiteCell, the
# label rules, WebRequest/WebResponse). Portable (no Linux-only net stack), so
# `cargo test -p dregg-domains` runs the full round-trip on any host.
dreggnet-webapp = { path = "../webapp" }
# The real dregg cap chain (`dga1_` ed25519 caveat-chain): a domain bind is gated by
# a credential that VERIFIES under the trusted root authority as granting the binding
# cap for the domain — it is not a self-asserted token. The binding's owner is the
# credential's derived subject, so only that owner may later rebind/unbind. Pure-std
# (no Linux-only closure), so the crate stays portable.
dreggnet-webauth = { path = "../webauth" }
# The production `DnsResolver` (`LiveDns`): real TXT/CNAME lookups for the verify
# challenge over a live DNS client. Cross-platform (the `tokio` feature drives the
# async client; this crate owns a dedicated runtime and bridges the sync trait), so
# the crate stays portable and `cargo test -p dregg-domains` runs the mock-driven
# state machine on any host with no live DNS.
hickory-resolver = { workspace = true, features = ["tokio"] }
tokio = { workspace = true }
