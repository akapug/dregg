[package]
name = "dreggnet-attach"
description = "DreggNet portal web attach — the web twin of the SSH attach: a signed-in user drives THEIR OWN hosted, cap+budget+receipt-bounded agent session in the browser (a natural-language goal → the live reason→act→observe transcript → the budget meter + accumulating receipts → verify-in-browser), cap-scoped to the webauth dga1_ subject"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_attach"
path = "src/lib.rs"

# `dreggnet-attach` — the portal web attach. The web FACE of the hosted agent
# session: it does NOT duplicate the session logic — it drives + streams +
# re-witnesses the `dreggnet_exec::live::LiveRun` session contract (the same
# record the SSH attach surfaces), cap-scoped to the authenticated subject. Like
# ops/console it is a pure-std thread-per-connection HTTP/1.1 + SSE server (no
# httpe/Elide closure), so it cross-builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-attach
[[bin]]
name = "dreggnet-attach"
path = "src/bin/dreggnet-attach.rs"

[dependencies]
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
# Typed store errors (the session-quota refusals).
thiserror = { workspace = true }
# RFC3339 timestamps on the session record.
time = { workspace = true, features = ["formatting", "macros"] }
# The webauth `dga1_` credential core: the subject derivation (`subject_of`) the
# attach scopes by, and (in tests) minting credentials.
dreggnet-webauth = { path = "../webauth" }
# The hosted-agent-session contract: the `live::LiveRun` record (goal · budget ·
# cap bundle · the reason→act→observe transcript · the re-witnessable receipt
# chain · `verify_live`) PLUS the `agent` braid that produces it (deploy → run →
# seal a signed chain). `default-features = false` drops polyana/wasmtime/tokio
# entirely — the session braid is std-only and compiles bare.
dreggnet-exec = { path = "../exec", default-features = false }
