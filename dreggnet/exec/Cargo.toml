[package]
name = "dreggnet-exec"
description = "DreggNet execution surface: an owned wasmi sandbox for the wasm tier, honest fail-closed seams for the stronger tiers"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_exec"

[features]
default = []
# `kimi-live` (NOT default-on) wires the LIVE OpenAI-compatible brain transport
# ([`kimi::LiveKimiCaller`]) via `dregg-agent`'s `live-brain`: a real blocking
# HTTP POST to the chat endpoint. OFF by default so the std-only green build (the
# recorded-transport tests) needs no HTTP/TLS stack. This is a brain feature,
# entirely independent of the compute engine.
kimi-live = ["dregg-agent/live-brain"]

[dependencies]
anyhow = { workspace = true }
# THE OPEN-SOURCE AGENT RUNTIME (breadstuffs, AGPL): the agent loop + budget +
# meter + the OpenAI-compatible / Hermes brain + the BYO-harness + the cap-gated
# toolkit + the federation-QA core. EXTRACTED to the substrate; the cloud now
# WRAPS it (re-exported from `lib.rs`, with the owned compute engine injected
# behind the toolkit's runner seam — see `src/agent_toolkit.rs`). One agent
# runtime; the cloud is the wrapper. See breadstuffs `docs/AGENT-RUNTIME-OPEN-SOURCE.md`.
dregg-agent = { path = "../../dregg-agent" }

# The OWNED wasm execution engine: `wasmi` is a pure-Rust, zero-`unsafe` wasm
# interpreter (DreggNet-owned dependency, no external submodule). It backs the
# `CapTier::Sandboxed` tier — a real in-process wasm sandbox with deny-all host
# imports (an empty `Linker`, so the guest reaches NOTHING on the host). This is
# the genuinely-executed tier (the `add(40,2)=42` dogfood runs here). The
# stronger tiers (JIT / native / microVM / GPU) are honest fail-closed seams in
# `run_workload_with_input` until an owned engine backs each — never a fake run.
wasmi = "0.41"
# Assembles WAT workload source into a core-wasm module for the wasmi tier.
wat = "1"
# Public `Input::Json` arg variant + native-tier arg marshalling.
serde_json = { workspace = true }
# The Verifiable Agent Cloud onramp (`agent`): serde-derive on the agent spec /
# run report so the CLI persists + re-witnesses an agent run.
serde = { workspace = true, features = ["std"] }
# The per-tenant log store — the compute-tier run captures its output lines into a
# `LogSink` keyed by resource + owner (the `capture` module), so `dregg-cloud logs`
# shows a tenant their app's real output.
dreggnet-logs = { path = "../dreggnet-logs" }

[dev-dependencies]
# The capture round-trip tests write a `LogSink` under a scratch dir.
tempfile = { workspace = true }

# Workload-exec characterization (latency/throughput per cap-tier + a wide
# N-thread scaling sweep). Hand-rolled timing harness — no criterion dep, fully
# offline; `harness = false` so it runs its own `fn main()`.
[[bench]]
name = "workload_exec"
harness = false
