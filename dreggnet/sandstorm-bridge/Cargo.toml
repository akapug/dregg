# sandstorm-bridge — the dregg-native Sandstorm integration, WELDED to production.
#
# A wired DreggNet workspace member (no longer a detached `[workspace]` spike).
# A `.spk` grain runs through the real `dreggnet-exec` Caged/MicroVm compute tier,
# its powerbox capability is a real `dreggnet-webauth` `dga1_` credential (the
# ed25519 caveat-chain cap rail, host-rooted), and it is served through the real
# `dreggnet-webapp` site-serving surface (`WebRequest`/`WebResponse`/`SiteRegistry`
# — exactly the surface the httpe `dreggnet-gateway` `SiteHostHandler` adopts).
# The keystone mappings (manifest → grain spec, grain = cell + lease, the `.spk`
# package, powerbox SturdyRef ↔ dregg cap, the 7-layer defense-in-depth) are the
# design twin; the deployed path is the real weld. See
# ../docs/SANDSTORM-INTEGRATION-PLAN.md and ../docs/SANDSTORM-DEVNET-READY.md.

[package]
name = "sandstorm-bridge"
version = { workspace = true }
edition = "2021"
publish = false
description = "Sandstorm grain=cell + .spk runner + powerbox=dregg-cap bridge, welded to the real exec/webauth/webapp surfaces"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
# Real `.spk` container crypto + compression (the security-load-bearing parts:
# App ID = the Ed25519 signing key, payload integrity = the signature over the
# archive, container = xz). All pure-Rust / vendorable — no C toolchain, offline-ok.
lzma-rs = "0.3"          # pure-Rust xz (de)compression
ed25519-dalek = { workspace = true }   # Ed25519 sign/verify (the App ID = pubkey discipline)
sha2 = { workspace = true }            # content-addressed umem `data_root` + caveat-chain hashing
data-encoding = "2"      # Sandstorm's base32 alphabet for App IDs / dga1_ tokens

# --- the production weld targets (the prototype→devnet welds) ---
# The real compute tier: a grain workload RUNS via `run_workload_with_input` at
# `CapTier::Caged` (seccomp+Landlock native process) / `CapTier::MicroVm`
# (Firecracker microVM behind KVM) — never weaker (the `check_floor` rule).
dreggnet-exec = { path = "../exec" }
# The real dregg-cap rail: a powerbox grant is a real `dga1_` ed25519
# caveat-chain credential, host-rooted, attenuating-only, verified on present.
dreggnet-webauth = { path = "../webauth" }
# The real site-serving surface (`WebRequest`/`WebResponse`/`SiteRegistry`/
# `PublishCap`) — the one the httpe `dreggnet-gateway` adopts verbatim. A grain
# is served as a hosted cell; its served snapshot can be published + re-witnessed.
dreggnet-webapp = { path = "../webapp" }

[lints.rust]
unsafe_code = "forbid"
