[package]
name = "dreggnet-guard"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_guard"
path = "src/lib.rs"

# `dreggnet-guard` — the per-account ABUSE-PREVENTION layer that makes a
# permissionless (KYC-free) cloud responsibly openable: per-account quotas,
# rate-limiting, receipted abuse-takedown, and account standing. It is the
# cross-cutting admission gate every resource-creating surface (gateway create,
# webapp publish, control server create, storage bucket create, agent run,
# domain bind) and the request-serving path consult before doing work for an
# anonymous `dga1_` subject. Std-only + dependency-light + portable, so
# `cargo test -p dreggnet-guard` runs the whole teeth suite on any host.

[dependencies]
serde = { workspace = true, features = ["std", "derive"] }
# The ONE product-wide receipt contract: a takedown / standing-change IS a turn,
# sealed into a prev-hash-chained, ed25519-signed governance stream so the
# moderation record is auditable + re-witnessable, not an arbitrary host action.
dreggnet-receipt = { path = "../receipt" }
# The replenishing-budget cell — the rate-bounded-ceiling primitive the quota and
# the rate-limiter are built over (a quota IS a rate-bounded ceiling). Linked with
# default features OFF so none of the heavy wasmtime/tokio execution tree
# comes along; only the std-only `budget` module is used.
dreggnet-exec = { path = "../exec", default-features = false }
