# DreggNet workspace.
#
# The net/ crates were bundled from an internal Elide HTTP-engine source tree.
# They share one [workspace.package] +
# [workspace.dependencies] surface; this root reconstitutes that surface so the
# bundled crates resolve their `{ workspace = true }` references.
#
# Build-ladder rung 1: only the two self-contained net crates (iocoreo, pki)
# are workspace members and build green. httpe / transport / tailscale /
# wireguard depend on local Elide crates that were NOT bundled (see
# ARCHITECTURE.md "net crate status") and are `exclude`d until those land.

[workspace]
resolver = "3"
members = [
  # NOTE: the Elide-copyright net/* stack (httpe · transport · tailscale · wireguard ·
  # iocoreo · pki · base · bindings · builder · core · dns · foreign-gai · macros ·
  # native-dispatch · nodeapi · rpc · sys · jvm-stubs) was EJECTED — it was
  # Elide Technologies, Inc. proprietary code that blocked a public AGPL release.
  # The gateway had already moved to the owned `http` crate (dreggnet-http); the last
  # real linkage was `control` → `wireguard` (the userspace WireGuard mesh engine),
  # now replaced by the owned AGPL-clean `dreggnet-control::wg` module over `boringtun`
  # (Cloudflare, BSD-3-Clause). See docs/ELIDE-NET-EJECTION.md. With that edge cut,
  # every net/* Elide crate was vestigial (nothing linked it) and was deleted from the
  # tree. Only the DreggNet-authored conformance-kit survives under net/.
  # The artifact-agnostic conformance / test / perf kit — the FOURTH consumer of
  # the one DSL description (docs/engine/42-CONFORMANCE-KIT.md + the reconciled seam
  # contract 48-SEAM-AUDIT.md). DreggNet-authored, self-contained (bitflags/blake3/
  # serde only — no Elide code), builds standalone with `cargo build -p conformance-kit`.
  "net/conformance-kit",
  "exec",
  "durable",
  "bridge",
  # NOTE: the from-scratch `dreggnet-store` durable-registry crate (an append-only,
  # fsync'd, content-addressed JSON-lines log) was DELETED — every consumer (sites,
  # domains, buckets, servers, mesh) now rides the real umem heap (`umem`, below),
  # which gives the same durable, content-addressed, witnessed state the kernel's
  # committed umem heap already is, plus fork / time-travel / merge-readiness the
  # append-log never could (docs/REGISTRIES-AS-UMEM.md, the #2 re-dregg move).
  # The substrate-native data-plane primitive (docs/REGISTRIES-AS-UMEM.md, the #2
  # re-dregg move of docs/MYOPIA-AUDIT.md): a registry IS a umem cell — a committed
  # `(collection,key) -> value` heap whose boundary is the kernel's real
  # sorted-Poseidon2 `dregg_cell::compute_heap_root`. Persistence + reconstruction
  # IS the heap commit/restore (not a JSON-lines log), which unlocks fork (copy the
  # heap, diverge), time-travel (restore an earlier root), and merge-readiness (the
  # heap leaf-set is a `dregg_merge::GrowSet`). The site + domain registries ride it
  # in place of `store`; it DEPENDS on the real breadstuffs `dregg-cell`.
  "umem",
  # The gateway's own HTTP/1.1 value vocabulary (Method/StatusCode/Request/
  # ResponseWriter/Handler/HandlerResult) — clean-room, pure-std, AGPL-clean.
  # Owning these lets the gateway drop the Elide `httpe` engine dependency.
  "http",
  # DreggNet-native service layers (fanned out in parallel).
  "gateway",
  "control",
  "cli",
  # The HOSTED AGENT SESSION host: maps an SSH public key (or token) → a `dga1_`
  # cap-account + a budget + a cap bundle, and emits the OpenSSH `authorized_keys`
  # forced-command lines that drop a connecting user into THEIR confined
  # `dregg-agent attach` session (the brain + tools run server-side, per-user
  # isolated). Pure-std + serde over the breadstuffs `dregg-agent` session core;
  # the live-edge sshd that serves the generated authorized_keys is the
  # reviewed-go deploy step. See docs/HOSTED-AGENT-SESSIONS.md.
  "agent-host",
  # The OPS/ADMIN dashboard — aggregates the live node/gateway/durable/bot read
  # surfaces into one admin-password-gated observability view. Pure-std HTTP
  # server (no httpe closure), cross-builds trivially.
  "ops",
  # The signed-in CUSTOMER CONSOLE — the front door a real user logs into to see
  # + manage THEIR OWN sites/servers/agents/domains/storage/$DREGG, cap-scoped to
  # the webauth `dga1_` subject (the cap holder = the owner of their cells), with
  # in-page verify-don't-trust. Pure-std HTTP server like ops; std-only deps
  # (webauth + the exec `agent`/`budget` braid, no polyana), cross-builds trivially.
  "console",
  # The PORTAL WEB ATTACH — the web twin of the SSH attach: a signed-in user
  # drives THEIR OWN hosted, cap+budget+receipt-bounded agent session in the
  # browser (a natural-language goal → the live reason→act→observe transcript →
  # the budget meter + accumulating receipts → verify-in-browser). Built against
  # the hosted-session contract (`dreggnet_exec::live::LiveRun`), cap-scoped to the
  # webauth `dga1_` subject. Pure-std HTTP+SSE server like ops/console; std-only
  # deps (webauth + the exec `agent`/`live` braid, no polyana), cross-builds trivially.
  "attach",
  # The PUBLIC STATUS PAGE — the no-auth "is the cloud up?" page anyone can check.
  # The public subset of `ops`: an overall banner + per-service rows + the n=5
  # federation panel (with the rust↔lean differential + gossip storm visibility)
  # + recent incidents + uptime, plus a machine-readable
  # /status.json. Reads the live health surfaces behind a `StatusSource` seam (an
  # unreachable surface = Unknown, never falsely green). Pure-std HTTP server like
  # ops/console (no httpe closure), cross-builds trivially.
  "status",
  # The PUBLIC LANDING PAGE — the front door at the public apex: what the
  # verifiable agent cloud IS, the LIVE status (a client-side embed of the status
  # page's /status.json, honest-unknown until it loads), and the deploy/run/verify
  # quickstart. Pure-std HTTP server like ops/console/status (no httpe closure),
  # cross-builds trivially; links into `status` + `console`.
  "landing",
  # The agent-served-web-API capability: an agent declares routes → polyana
  # handlers; DreggNet runs them on polyana under a lease and serves them.
  "webapp",
  # The ONE product-wide receipt contract: a receipt is prev-hash-chained +
  # ed25519-signed + re-witnessable (the kernel TurnReceipt/BridgeReceipt
  # discipline). Every product `Receipt` IS one or is a typed VIEW of one.
  "receipt",
  # The durable object-store service: a bucket is a dregg cell, objects are
  # content-addressed assets, ops are cap-gated/metered/receipted turns with a
  # trustless (re-witnessable) read. Dependency-light + portable (like webapp).
  "storage",
  # The per-account ABUSE-PREVENTION layer — what makes a permissionless (KYC-free)
  # cloud responsibly openable: per-account quotas (the budget-`402` ceiling),
  # rate-limiting (deploy + request, the `429`), receipted abuse-takedown + account
  # standing (good/flagged/suspended gating creation). Cross-cutting admission gate
  # over the resource surfaces (gateway/webapp/control/storage/exec/dregg-domains);
  # std-only + dependency-light (receipt + the exec budget cell), so it cross-builds
  # + tests on any host; the live wire is the gateway create + serve chokepoints.
  "guard",
  # Customer-facing BILLING over the existing meter (docs/CLOUD-PROVIDER-READINESS.md
  # Billing: "usage is metered but there are no invoices, spending limits, or cost
  # estimation"). Aggregates a cap-account's settled meter charges into per-resource
  # INVOICES whose every line traces back to its metered settle receipts (a verifiable
  # bill — the dregg differentiator), enforces a per-account SPEND CAP + budget ALERTS
  # over the exec budget cell, and ESTIMATES the DEC cost of a resource declaration
  # before deploy. Std-only + dependency-light (serde + receipt + the budget cell),
  # so it cross-builds + tests anywhere; the live wires (console billing panel,
  # `dregg-cloud invoice`/`estimate` verbs, the control settle-ledger adapter) are
  # named seams.
  "billing",
  # Per-tenant runtime LOGS — capture + durable store + cap-scoped tail/follow/
  # search (docs/CLOUD-PROVIDER-READINESS.md LOG blocker #6). Closes the gap where
  # `dregg-cloud logs` printed cached step metadata and the only real tail was the
  # operator-only `docker logs`. A `LogSink` captures a resource's stdout/stderr as
  # durable line records, scoped to the owner subject (the cap-scoping teeth), with
  # a tamper-evident hash chain. Dependency-light (serde + sha2, std-only), so it
  # cross-builds anywhere; the exec capture hook (`exec/src/capture.rs`) + the
  # `dregg-cloud logs` verb wire it; deploy/server/console are named seams.
  "dreggnet-logs",
  # The IPFS bridge: a dregg blake3 content commitment IS an IPFS CIDv1 (blake3
  # multihash, raw codec), so a content-addressed object/site/delta is pinned +
  # fetched over IPFS and re-witnessed against the same address. The verified core
  # is net-free; the IPFS transport is an injected `IpfsClient` seam. New crate over
  # storage/webapp (dev-dep on storage for the round-trip proof). See
  # docs/IPFS-INTEGRATION-PLAN.md.
  "dregg-ipfs",
  # The compute-backend bridge agent — serves /fulfill on the mesh (:8021), the
  # dispatch_lease_over_mesh target. Deployed on the compute node (see deploy/).
  "deploy/node-agent",
  # The dregg-cap forward-auth service — Caddy's `forward_auth` calls its /auth
  # to gate the operator surfaces (ops/grafana/gateway admin) on a dregg
  # capability instead of legacy basic-auth. Pure-std HTTP, cross-builds like ops.
  "webauth",
  # Auto-deploy-from-git — the keystone DX (docs/PERMISSIONLESS-CLOUD-PLAN.md §3.1):
  # `dregg deploy <repo>` → clone → detect → build (cap-bounded) → publish a site cell,
  # modeled as a crash-resumable, metered durable workflow. A thin weld over exec (the
  # build tier), webapp::hosting (the publish), durable (the conserving settlement), and
  # duroxide (the durable runtime). Disjoint new crate; depends on the above by path.
  "dregg-deploy",
  # Custom domains — BYO-domain → a dregg-hosted site (docs/PERMISSIONLESS-CLOUD-PLAN.md
  # §3.2): a cap-gated DomainBinding cell + the DNS challenge-verify (TXT/CNAME) state
  # machine + verified custom-Host gateway routing + the on-demand-TLS ask gating.
  # Disjoint new crate over webapp::hosting (the site host it binds onto).
  "dregg-domains",
  # The workload-simulation test harness (docs/WORKLOAD-TEST-PLAN.md): drives the
  # real Orchestrator / ConservingLedger / run_workload surfaces under realistic
  # multi-tenant, concurrent, fault-injected, soak load. It is a workspace member
  # so `cargo build`/`cargo check` keep it green, but it is deliberately NOT in
  # `scripts/test.sh`'s service-crate list and every scenario is `#[ignore]`d, so
  # `make test` never runs it — run it with `make test-workload`.
  "tests/workload",
  # The Sandstorm.io integration, welded onto the real surfaces (docs/
  # SANDSTORM-INTEGRATION-PLAN.md / SANDSTORM-DEVNET-READY.md): a `.spk` grain
  # runs through the real `dreggnet-exec` compute tier, its powerbox cap is a
  # real `dreggnet-webauth` `dga1_` credential, and it is served through the
  # real `dreggnet-webapp` site-serving surface (the one the httpe gateway
  # adopts). Promoted from a detached prototype to a wired workspace member.
  "sandstorm-bridge",
  # Managed secrets / KMS — cloud table-stakes (docs/CLOUD-PROVIDER-READINESS.md:
  # "no secrets/KMS"). A cap-account-owned, AEAD-encrypted-at-rest secret store
  # (envelope encryption: KMS-root → per-account KEK → per-secret DEK), a cap-gated
  # runtime-injection seam (a secret reaches a sandbox as env/file, NEVER a
  # log/receipt/operator view — the BYO-LLM-key confinement pattern), versioned
  # rotation, and a receipted (re-witnessable) access audit. Dependency-light
  # (AEAD + BLAKE3 KDF + webauth cap + receipt chain), cross-builds like receipt;
  # the live wires are NAMED seams (exec injection, console panel), not edited here.
  "dregg-secrets",
  # Teams / organizations (IAM) — docs/CLOUD-PROVIDER-READINESS.md: identity was
  # single-wallet only. An Org is its own dregg cell that OWNS resources; members
  # are dga1_ cap-accounts holding a role (owner/admin/member/billing/viewer); a
  # role IS an attenuation of the org-owner's authority over the org's resources
  # (the legible face of the webauth cap lattice — no new auth primitive). Invites/
  # accept/remove/transfer are receipted membership turns; org-scoping + role-gating
  # are cap teeth. Disjoint new crate over webauth; std-only, cross-builds like ops.
  "org",
]
exclude = [
  # polyana is its own (Apache-2.0) workspace, pinned as a submodule and
  # referenced — never absorbed. `dreggnet-exec` path-deps two of its member
  # crates (polyana-core + polyana-wasmi-provider) behind the `polyana`
  # feature; cargo resolves them inside polyana's own workspace. Excluding it
  # here keeps the two workspaces distinct.
  "polyana",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["DreggNet"]
license = "AGPL-3.0-only"
homepage = "https://ember.software"
documentation = "https://ember.software"
repository = "https://github.com/emberian/DreggNet"

[profile.dev]
opt-level = 0
incremental = false
debug = true
debug-assertions = true
overflow-checks = true
codegen-units = 256
split-debuginfo = "unpacked"

[profile.release]
opt-level = 3
lto = "off"
panic = "abort"
incremental = false
overflow-checks = false
codegen-units = 1
debug = true
split-debuginfo = "unpacked"

[patch.crates-io]
## Patch set. The Elide net/* stack was ejected (docs/ELIDE-NET-EJECTION.md), so the
## net-only forks it required (ntex, compio, jni) were removed — cargo confirmed they
## are no longer in the crate graph. The `rustls` / `hickory-dns` transport forks it
## once required have been repointed to their crates.io upstreams (they were forks of
## OSS crates, no longer needed with the net stack gone); the workspace resolves them
## from crates.io directly.

## DREGG verified-lease lane (the `dreggnet-bridge` `dregg-verify` feature).
## emberian/dregg's `polyana-bridge` graph needs these: `dregg-hints` requires the
## `serde_with` feature on Ember's arkworks fork, and `dregg-hints` links the
## vendored lockstitch 0.29.0. Cargo does NOT inherit patches across path/git
## deps, so the sibling polyana workspace's patches must be reconstituted here for
## the dregg tree to resolve. Inert on the default build (no ark-serialize /
## lockstitch edge until the feature is enabled).
ark-serialize = { git = "https://github.com/emberian/algebra", rev = "814047cb263115c6388f237614f7fdbff8170c61" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", rev = "814047cb263115c6388f237614f7fdbff8170c61" }
lockstitch = { path = "polyana/src/dregg-bridge/vendor/lockstitch-0.29.0" }

## rustls / hickory-dns: the transport forks the ejected net stack once required
## are gone; these crates now resolve from their crates.io upstreams via the
## [workspace.dependencies] version pins below (rustls 0.23, hickory 0.x).

[workspace.dependencies]

## The Elide-copyright net/* path deps (base/bindings/builder/core/dns/foreign-gai/
## httpe/iocoreo/macros/native-dispatch/nodeapi/pki/rpc/sys/tailscale/transport/
## wireguard) were REMOVED with the net stack ejection (docs/ELIDE-NET-EJECTION.md).
## `http-types` (the crates.io `http` crate) is kept — it is real upstream OSS.
http-types = { package = "http", version = "1" }

