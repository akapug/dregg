[package]
name = "dreggnet-console"
description = "DreggNet customer console — the signed-in 'my stuff' home: a user authenticated via the dregg-cap webauth sees + manages THEIR OWN sites, servers, agents, domains, storage and $DREGG, cap-scoped to their cells, with in-page verify-don't-trust"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_console"
path = "src/lib.rs"

# `dreggnet-console` — the customer-facing signed-in console. It does NOT
# duplicate any service: it AGGREGATES the user's own resource surfaces and
# CAP-SCOPES them to the authenticated subject (the webauth `dga1_` identity =
# the cap holder = the owner of their cells). Like `dreggnet-ops` it is a pure-
# std thread-per-connection HTTP server (no httpe/Elide closure), so it cross-
# builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-console
[[bin]]
name = "dreggnet-console"
path = "src/bin/dreggnet-console.rs"

[dependencies]
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
# RFC3339 timestamps on the generated view.
time = { workspace = true, features = ["formatting", "macros"] }
# The webauth `dga1_` credential core: the subject derivation (`subject_of`) the
# console scopes by, the cap vocabulary, and (in tests) minting credentials.
dreggnet-webauth = { path = "../webauth" }
# The Verifiable Agent Cloud onramp (std-only `agent` + `budget` modules, built
# WITHOUT the heavy polyana engine): the agent panel's budget-bound + receipt
# chain + QA proof, and the in-page re-witness (`verify_agent_run` /
# `verify_witnessed_qa`). `default-features = false` drops polyana/wasmtime/tokio
# entirely — the agent braid is std-only and compiles bare.
dreggnet-exec = { path = "../exec", default-features = false }
# The receipt contract (re-witnessable chain) the agent run report rides.
dreggnet-receipt = { path = "../receipt" }
