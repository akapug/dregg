[package]
name = "dreggnet-receipt"
description = "The ONE product-wide receipt contract: a receipt is prev-hash-chained (append-only, tamper-evident) + ed25519-signed (re-witnessable by a non-witness), the kernel TurnReceipt/BridgeReceipt discipline made shared. Every product `Receipt` either IS one of these or is a typed VIEW carrying the turn-receipt hash."
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_receipt"
path = "src/lib.rs"

# The receipt contract crate. Deliberately dependency-light + platform-portable
# (serde + blake3 + ed25519 only, no net/durable closure) so every product crate
# — webapp, storage, dregg-domains, dregg-deploy — can adopt the ONE discipline
# without pulling a heavy dependency. See `docs/RECEIPT-CONTRACT.md` (breadstuffs).
[dependencies]
serde = { workspace = true, features = ["std"] }
blake3 = "1"
ed25519-dalek = { workspace = true }
