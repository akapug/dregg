[package]
name = "dreggnet-webauth"
description = "DreggNet-native forward-auth: dregg capability (dga1_ ed25519 caveat-chain) auth at the Caddy edge, replacing legacy basic-auth. Caddy forward_auth calls /auth; a valid cap → 2xx, invalid/attenuated-insufficient → 401."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_webauth"
path = "src/lib.rs"

# `dreggnet-webauth` — the forward-auth service Caddy gates the operator
# surfaces behind. It is a pure-std HTTP server (thread-per-connection, the same
# shape as `dreggnet-ops`) and deliberately does NOT pull the heavy Linux-only
# `httpe`/Elide net closure, so it cross-builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-webauth
#
# The credential core (`src/cred.rs`) is a faithful, WIRE-COMPATIBLE port of the
# breadstuffs `dregg-auth::credential` scheme (ed25519 caveat-chain, BLAKE3
# domain-separated digests, postcard/base64url `dga1_` wire form). It is ported
# rather than depended-on so this build stays offline + AGPL-free in its default
# closure — the same discipline `dreggnet-bridge` keeps for its dregg-verify lane.
[[bin]]
name = "dreggnet-webauth"
path = "src/bin/dreggnet-webauth.rs"

[[bin]]
name = "dregg-authctl"
path = "src/bin/dregg-authctl.rs"

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }
ed25519-dalek = { workspace = true }
getrandom = { workspace = true }
# THE re-anchor (Tier 1): the DreggNet account id IS the breadstuffs substrate
# identity-cell id. We DEPEND ON THE REAL SUBSTRATE for the derivation
# (`dregg_types::CellId::derive_raw`, the same `blake3::derive_key("dregg-cell-id-v1",
# pubkey ‖ token)` the executor uses) rather than re-deriving it, so a DreggNet
# account and its rotatable substrate identity cell are byte-identically the same
# principal. `dregg-types` is the LIGHT substrate crate (serde + blake3 + ed25519,
# no Lean/prover closure) — depending on it is free of the heavy build graph.
# This is the AGPL-firewall-dissolved depend-on-substrate the weld calls for.
dregg-types = { path = "../../types" }
# The signed-digest hash + the canonical token byte schema — pinned to the same
# versions the breadstuffs dregg-auth credential core uses so the wire form is
# byte-identical.
blake3 = "1"
postcard = { version = "1", features = ["use-std"] }
