[package]
name = "dreggnet-umem"
description = "DreggNet umem-cell-backed registry primitive: a registry IS a umem cell (a committed (collection,key)->value heap whose boundary is the real sorted-Poseidon2 dregg_cell::compute_heap_root), persisted + reconstructed via the heap commit/restore — the substrate-native replacement for dreggnet-store, gaining fork / time-travel / merge-readiness"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_umem"
path = "src/lib.rs"

# The substrate-native data-plane primitive (docs/REGISTRIES-AS-UMEM.md, the #2
# re-dregg move of docs/MYOPIA-AUDIT.md). Where `dreggnet-store` REIMPLEMENTS what
# a committed umem heap already gives (a from-scratch JSON-lines log), this crate
# DEPENDS on the real umem heap: a registry IS a `dregg_cell::CellState` whose
# `(collection,key) -> value` heap holds the records, whose boundary root is the
# kernel's real sorted-Poseidon2 `compute_heap_root` (pinned by `root_binds_get`),
# and whose durable persistence + reconstruction IS the heap commit/restore. This
# is what unlocks fork (copy the heap, diverge), time-travel (restore an earlier
# root), and merge-readiness (the heap leaf-set is a `dregg_merge::GrowSet`).

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

# The REAL umem heap (the per-cell `(collection,key) -> value` map + the sorted
# Poseidon2 boundary `compute_heap_root`, the Rust shadow of the Lean
# `Substrate.Heap.root`, pinned by `root_binds_get`). Pinned to the SAME
# `emberian/dregg` rev `dreggnet-webapp` already pins for `dregg-circuit`, so the
# registry's committed boundary IS the cryptographic root a dregg light client
# understands and the SAME heap the compute-as-cell + account-recovery lanes ride.
# A NORMAL (unconditional) dependency: there is no non-umem fallback under the
# "a registry is a umem cell" claim. (`emberian/dregg` is ember-owned and DreggNet
# is AGPL, so the prior license firewall is dissolved — `FIREWALL-DISSOLUTION.md`;
# the plonky3/babybear closure is heavy but that is a build-cost note, not a gate.)
dregg-cell = { git = "https://github.com/emberian/dregg.git", rev = "a0a0a019692870d9ec992744042de2df8c19be0c", package = "dregg-cell" }

# The I-confluent offchain merge/write runtime (the #3 re-dregg move,
# `docs/REGISTRIES-AS-UMEM.md §4`): the `GrowSet` CvRDT + `classify_merge` gate +
# the re-witnessable `MergeReceipt`. A `UmemRegistry`'s heap leaf-set IS a
# `dregg_merge::GrowSet` (a record = a content-addressed asserted delta, `join = ∪`),
# so the merge runtime applies directly — two replicas reconcile offchain, free when
# I-confluent, settle at the boundary when a conserved quantity participates. A NORMAL
# (unconditional) path dependency on the breadstuffs crate (the merge runtime's home),
# the WRITE half of the read face `dregg-query` it also brings in. (`breadstuffs` is
# ember-owned and DreggNet is AGPL — the firewall is dissolved, `FIREWALL-DISSOLUTION.md`.)
dregg-merge = { path = "../../dregg-merge" }

[dev-dependencies]
tempfile = { workspace = true }
