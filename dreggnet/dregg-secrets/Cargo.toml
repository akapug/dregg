[package]
name = "dreggnet-secrets"
description = "Managed secrets / KMS for DreggNet workloads: a cap-account-owned, AEAD-encrypted-at-rest secret store (envelope encryption under a KMS-root→per-account→per-secret key hierarchy), a cap-gated runtime injection seam that hands a secret to a sandbox as env/file WITHOUT it ever reaching a log/receipt/operator view (the BYO-LLM-key confinement pattern generalized), versioned rotation, and a receipted (re-witnessable) access audit. The honest limit: an operator-held KMS root can still derive+decrypt — true operator-blindness needs a tenant-held root."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_secrets"
path = "src/lib.rs"

# `dreggnet-secrets` — the managed-secrets/KMS layer. Deliberately
# dependency-light + platform-portable (like `dreggnet-receipt`/`dreggnet-webauth`):
# a vetted AEAD (chacha20poly1305 / XChaCha20-Poly1305) + the BLAKE3 KDF + the
# dregg cap credential (webauth) + the product receipt chain (receipt). No net /
# durable / compute closure, so it cross-builds + tests on any host. The two LIVE
# wires are NAMED seams the owning crates adopt, not edited here (swarm-safe):
#   * THE EXEC-SECRET-INJECTION SEAM — `inject::inject_for_workload` (exec's
#     run_workload calls it to resolve a workload's declared secrets into confined
#     sandbox env/files).
#   * THE CONSOLE-SECRETS-PANEL SEAM — `console::panel_for` (the signed-in console
#     renders the cap-scoped names/versions/last-access, never plaintext).
[dependencies]
dreggnet-webauth = { path = "../webauth" }
dreggnet-receipt = { path = "../receipt" }
serde = { workspace = true, features = ["std"] }
thiserror = { workspace = true }
getrandom = { workspace = true }
zeroize = { workspace = true }
# The vetted AEAD — XChaCha20-Poly1305 (24-byte random nonce, so per-message
# random nonces are collision-safe). Same crate the workspace already pins.
chacha20poly1305 = { workspace = true }
# The KDF for the key hierarchy (BLAKE3 derive_key, domain-separated) — the same
# hash webauth/receipt use, pinned identically.
blake3 = "1"
