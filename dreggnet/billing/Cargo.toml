[package]
name = "dreggnet-billing"
description = "Invoices + spending limits + cost estimation over the DreggNet metering rail. An invoice aggregates a cap-account's metered usage into per-resource line items (quantity x rate = amount) and is RECEIPT-ANCHORED: every line traces back to the settled meter receipts it was billed from (a verifiable bill, not a mystery charge), and the invoice itself is sealed into the prev-hash-chained, ed25519-signed receipt contract."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_billing"
path = "src/lib.rs"

# `dreggnet-billing` — the customer-facing BILLING layer over the existing meter
# (`dreggnet-control::HostingMeter` / the settle ledger / the meter outbox). It does
# NOT meter; it AGGREGATES already-metered, already-settled charges into per-account
# invoices, enforces per-account spend caps + budget alerts, and estimates the DEC
# cost of a resource declaration before it is deployed. Std-only + dependency-light +
# portable (serde + the receipt contract + the exec budget cell, no compute/control
# execution closure), so `cargo test -p dreggnet-billing` runs the whole teeth suite
# on any host. The live wires are NAMED SEAMS (see lib.rs): the console billing panel,
# the `dregg-cloud invoice` / `estimate` CLI verbs, and the control settle-ledger
# adapter. The dev-dep on control proves ingestion from the REAL meter end to end.

[dependencies]
serde = { workspace = true, features = ["std", "derive"] }
serde_json = { workspace = true }
# The ONE product-wide receipt contract: an invoice IS a turn — sealed into a
# prev-hash-chained, ed25519-signed stream so the BILL is tamper-evident +
# re-witnessable by a non-witness (the customer), AND each line item carries the
# metered settle receipts it was aggregated from. This is the verifiable-invoice
# differentiator: every line traces to a receipt.
dreggnet-receipt = { path = "../receipt" }
# The replenishing-budget cell — the rate-bounded-ceiling primitive a per-account
# SPEND CAP is enforced through (a spend cap IS a ceiling). Linked with default
# features OFF so none of the heavy wasmtime/tokio execution tree comes
# along; only the std-only `budget` module is used (the same way `guard` does).
dreggnet-exec = { path = "../exec", default-features = false }

[dev-dependencies]
# Prove ingestion from the REAL meter end to end: build a real `HostingMeter` over a
# conserving ledger, meter publish/cert/build/uptime/bandwidth charges for an account,
# and aggregate the emitted `HostingReceipt`s into a receipt-traced invoice whose total
# equals what the meter actually settled to the provider. This is the named control
# adapter seam, exercised for real (not just documented). Dev-only, so the shipped
# billing artifact never links the control plane.
dreggnet-control = { path = "../control" }
dreggnet-durable = { path = "../durable" }
