# DreggNet STAGING — the OBSERVABILITY stack: Prometheus + Grafana + Alertmanager.
#
# A SEPARATE compose project, deliberately decoupled from the main edge stack
# (docker-compose.yml). It attaches to the MAIN stack's network as an EXTERNAL
# network so it can scrape the running services by their compose DNS names
# (dregg-node:8420, ops:8090, gateway:8080, dreggnet-discord-bot:8080) and so the
# main Caddy can reverse-proxy `grafana:3000`. It NEVER edits the main compose or
# Caddyfile — those are owned by the redeploy lane.
#
#   # on the box, after the main stack is up:
#   docker compose -f docker-compose.observability.yml up -d
#
# What it scrapes (see ../observability/prometheus/prometheus.yml):
#   - dregg-node:8420/metrics        native Prometheus (dregg_* families)
#   - ops:8090/api/health            JSON → time-series via json-exporter (the rich source)
#   - http_2xx blackbox probes       node /health, gateway /status, ops /healthz,
#                                    bot /api/cells, node-a 100.64.0.2:8021/health (overlay)
#
# GATING:
#   - Grafana is behind its own admin login (GF_SECURITY_ADMIN_PASSWORD).
#   - Prometheus + Alertmanager are NOT publicly exposed: they bind host LOOPBACK
#     only (127.0.0.1) and are reachable in-cluster by name. Reach them for ops via
#     an SSH local-forward (e.g. `ssh -L 9090:127.0.0.1:9090 ...`).
#   - To put Grafana on the public web, the main loop adds ONE vhost to the main
#     Caddyfile (snippet in ../observability/README.md): reverse_proxy grafana:3000.

name: dreggnet-obs

services:
  # --------------------------------------------------------------------------
  # Prometheus — the time-series store + scrape engine + alert-rule evaluator.
  # Bound to host loopback only (NOT public). 15d retention keeps a t3-class box
  # honest on disk.
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    user: root
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - dreggnet_default
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --------------------------------------------------------------------------
  # Alertmanager — routes fired alert rules to a notification sink, mirroring the
  # ops dashboard's page/warn severity model. The default sink is `alert-sink`
  # (a request-logger); swap the webhook_config url in alertmanager.yml for a real
  # Slack/Discord/email sink once ember provides the webhook. Loopback-only.
  # --------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ../observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - dreggnet_default
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # alert-sink — a tiny HTTP request-logger that stands in for a real chat/email
  # webhook. Alertmanager POSTs fired alerts here and they land in this container's
  # logs (`docker logs dreggnet-obs-alert-sink-1`). REPLACE with a real sink by
  # editing alertmanager.yml's receiver url (needs ember's Slack/Discord webhook).
  # --------------------------------------------------------------------------
  alert-sink:
    image: mendhak/http-https-echo:31
    restart: unless-stopped
    environment:
      HTTP_PORT: "8888"
      LOG_WITHOUT_NEWLINE: "true"
    networks:
      - dreggnet_default

  # --------------------------------------------------------------------------
  # json-exporter — translates the ops dashboard's JSON (/api/health) into
  # Prometheus time-series. This is the RICH source: block height, peers,
  # federation members, consensus-live/finalizing, machines, durable jobs,
  # units spent, pg stats, bridge mints/conservation, and the divergence/tau
  # fields (which appear as samples the moment ops reports them non-null).
  # Prometheus calls it with ?module=ops_health&target=http://ops:8090/api/health.
  # --------------------------------------------------------------------------
  json-exporter:
    image: quay.io/prometheuscommunity/json-exporter:v0.6.0
    restart: unless-stopped
    command:
      - --config.file=/config/config.yml
    volumes:
      - ../observability/json-exporter/config.yml:/config/config.yml:ro
    networks:
      - dreggnet_default

  # --------------------------------------------------------------------------
  # blackbox-exporter — http_2xx up/down probes. Reaches the edge services by
  # compose DNS and node-a over the headscale overlay (100.64.0.2:8021) the same
  # way the gateway does (the bridge network masquerades to the host, whose routing
  # table sends 100.64.0.0/10 over tailscale0).
  # --------------------------------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command:
      - --config.file=/config/config.yml
    volumes:
      - ../observability/blackbox-exporter/config.yml:/config/config.yml:ro
    networks:
      - dreggnet_default

  # --------------------------------------------------------------------------
  # node-exporter (EDGE host metrics) — the standard Prometheus host exporter for
  # the AWS edge box itself: CPU / RAM / disk usage+IO / network / load / uptime.
  # Runs with the host's PID namespace and the root filesystem bind-mounted read-
  # only at /host so it reads the BOX's /proc, /sys and filesystems (not the
  # container's). Scraped by Prometheus as `node-exporter:9100` over
  # dreggnet_default (relabelled to instance=edge). node-a and node-b run their
  # own node_exporter over the overlay (deploy/observability/node-exporter/).
  # --------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|run/credentials)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
    volumes:
      - /:/host:ro,rslave
    networks:
      - dreggnet_default

  # --------------------------------------------------------------------------
  # Grafana — provisioned dashboards-as-code over the Prometheus datasource.
  # Behind its own admin login (user `admin`, password GF_SECURITY_ADMIN_PASSWORD).
  # Bound to host loopback for SSH-tunnel verification; reachable in-cluster as
  # `grafana:3000` so the main Caddy can publish it (see ../observability/README.md).
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      # The admin login. Override by exporting GRAFANA_ADMIN_PASSWORD before
      # `docker compose up`; the baked default is the credential reported out of band.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-jtB2twnhJ8cKN4ayAseW0wdW}
      # No anonymous access, no signups — admin login is the only door.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Served under a subpath when the main Caddy proxies it at grafana.<domain>/
      # is the default (root); keep root_url generic.
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Land on the Cloud Health rollup instead of Grafana's blank "Welcome" page,
      # so an operator who just logs in immediately sees "is the cloud working".
      # (This is the file the dashboards-as-code provisioner mounts; the path is the
      # in-container dashboards dir below.) See docs/GRAFANA-GUIDE.md.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dreggnet-cloud-health.json
      # Open links default to the last 6h with a 30s refresh (matches each board's
      # own saved defaults), so a fresh tab is immediately useful.
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "10s"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - dreggnet_default
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# The MAIN edge stack's network, joined as external so we can scrape services by
# name and the main Caddy can proxy grafana. Created by the main compose project
# (`dreggnet`); we never define or own it here.
networks:
  dreggnet_default:
    external: true
    name: dreggnet_default

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
