# DreggNet STAGING — the full serving stack + a dregg node, on one cheap box.
#
# This compose is meant to RUN pre-built artifacts on a small box (t3.small /
# t3.medium). It does NOT compile Rust on the box — the heavy DreggNet binaries
# (gateway + cli) are cross-built locally with `cargo zigbuild` and shipped, and
# the dregg-node arrives as a pre-built linux/amd64 image (it links a host-native
# Lean archive and cannot be cross-compiled — see README.md). The only thing the
# box "builds" is the trivial COPY-a-binary-into-debian-slim runtime image, which
# is seconds and uses no Rust toolchain.
#
#   deploy/staging/deploy.sh           # cross-build + ship + bring up (from your Mac)
#   docker compose -f docker-compose.yml up -d   # on the box, once binaries are present
#
# Layout on the box (populated by deploy.sh via rsync):
#   /opt/dreggnet/
#     docker-compose.yml     (this file)
#     Dockerfile.runtime     (wraps the shipped binaries in debian-slim)
#     .env                   (staging config; see .env.example)
#     bin/dreggnet-gateway   (cross-built, x86_64-unknown-linux-gnu)
#     bin/dreggnet           (cross-built operator CLI)

services:
  # --------------------------------------------------------------------------
  # The durable / billing substrate (Postgres). The durable `pg` store + the
  # `dreggnet_meter` outbox checkpoint here; pg-dregg composes lease+meter+
  # checkpoint in one transaction. The default CLI demo path uses the bundled
  # SQLite store and does not require this, but staging keeps the real boundary.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dreggnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dreggnet}
      POSTGRES_DB: ${POSTGRES_DB:-dreggnet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dreggnet} -d ${POSTGRES_DB:-dreggnet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # The httpe `dreggnet-gateway` — the fly-compatible machines API, served on
  # :8080. The shipped binary is wrapped in debian-slim by Dockerfile.runtime.
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    image: dreggnet-runtime:staging
    restart: unless-stopped
    # Ordered startup: postgres (the durable/billing substrate the gateway's
    # dispatch closure meters into) must be accepting connections, and the node
    # container should have started, before the gateway comes up.
    depends_on:
      postgres:
        condition: service_healthy
      dregg-node:
        condition: service_started
    command: ["dreggnet-gateway", "--bind", "0.0.0.0", "--port", "8080"]
    # NOT published to the host — the gateway is reachable only inside the compose
    # network, through the `caddy` reverse proxy (basic-auth + TLS). `expose`
    # documents the internal port; sibling services reach it as `gateway:8080`.
    expose:
      - "8080"
    # The runtime image ships curl; probe the gateway's own /status. Marks the
    # gateway healthy for the dependents (ops/caddy/dreggnet) below.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8080/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # Dispatch a created machine's workload over the headscale overlay to the
      # compute node (node-a at 100.64.0.2:8021) — a `POST .../machines` then
      # RUNS a real durable metered workload there (control/src/mesh.rs::
      # dispatch_lease_over_mesh, the proven edge→node-a path). The gateway
      # container reaches 100.64.0.2 through the host's tailscale0: Docker masquerades
      # the container's egress to the host, whose routing table sends 100.64.0.0/10
      # over the overlay. Set DREGGNET_DISPATCH=local to fall back to in-process.
      DREGGNET_DISPATCH: ${DREGGNET_DISPATCH:-tailscale}
      DREGGNET_NODE_A_OVERLAY: ${DREGGNET_NODE_A_OVERLAY:-100.64.0.2}
      DREGGNET_NODE_A_PORT: ${DREGGNET_NODE_A_PORT:-8021}
      # W1 — the LEASE-1a funding gate, LIVE in the serving binary. The gateway
      # reads FUNDED execution-leases from this dregg node on every create (never
      # synthesizing funding from the request); a create is admitted only against a
      # lease the chain attests covers it. Defaulted to the compose-internal node so
      # the staging path ADMITS funded work; if this were unset the gateway would
      # fail closed and refuse every create. Node-trusted (cell-API) by default; the
      # light-client-VERIFIED read is the same wire built with the `dregg-verify`
      # feature (BUILD_FEATURES below) — a deploy choice (it links the verified core).
      DREGGNET_NODE_URL: ${DREGGNET_NODE_URL:-http://dregg-node:8420}
      # W4 — the per-account abuse guard, LIVE in the serving binary. `on` attaches
      # conservative default quotas + deploy/request rate limits so an over-quota /
      # rate-limited / suspended create is refused in-band (402/429/403). The
      # governance-log signing seed (stable moderation key across restarts).
      DREGGNET_GUARD: ${DREGGNET_GUARD:-on}
      DREGGNET_GUARD_SEED: ${DREGGNET_GUARD_SEED:-}
      # The friendly root: name + portal pointer + the dregg node health it probes
      # for federation health (the compose-internal node API).
      DREGGNET_GATEWAY_NAME: ${DREGGNET_GATEWAY_NAME:-DreggNet gateway}
      DREGGNET_PORTAL_URL: ${DREGGNET_PORTAL_URL:-https://portal.example.com}
      DREGGNET_NODE_HEALTH_URL: ${DREGGNET_NODE_HEALTH_URL:-http://dregg-node:8420/health}
      # Static web hosting: each subdirectory of DREGGNET_SITES_DIR is published
      # at boot as a minisite cell `<name>`, served at `<name>.example.com` through
      # the gateway's SiteHostHandler (the `./sites` host dir is mounted below).
      DREGGNET_SITES_DIR: ${DREGGNET_SITES_DIR:-/srv/sites}
      DREGGNET_SITE_OWNER: ${DREGGNET_SITE_OWNER:-agent:dreggnet}
    volumes:
      # The published minisites: `./sites/<name>/…` → served at `<name>.example.com`.
      # Read-only; the gateway publishes each subdir through the cap-gated publish
      # turn at startup. Drop a directory here and `docker compose restart gateway`.
      - ./sites:/srv/sites:ro

  # --------------------------------------------------------------------------
  # W3 — the AUTONOMOUS provider loop (`dreggnet-provider`). This is what makes the
  # cloud "run itself": the orchestrator daemon READS funded execution-leases off
  # the live dregg node (CellSource::DreggNode), schedules + DISPATCHES each onto
  # the compute fleet over the overlay, METERS the work, and SETTLES every metered
  # period as a real conserving `Transfer` turn back to the node — then reaps.
  # (control/src/orchestrator.rs::Orchestrator::run_until_shutdown over the real
  # NodeApiLeaseSource + NodeApiSettlement seams; see docs/GO-REAL.md.) It runs as a
  # daemon (restart: unless-stopped), not a manual `cargo run`. Reuses the runtime
  # image (the dreggnet-provider binary is COPYed in by Dockerfile.runtime via the
  # cross-built ./bin/ — deploy.sh builds it).
  #
  # The lease read is node-TRUSTED over the cell API by default; the
  # light-client-VERIFIED read (CommitBindsMMR checkpoint anchor) is the same loop
  # built `--features dregg-verify`. SETTLEMENT requires the node's operator bearer
  # (DREGGNET_NODE_BEARER, from `dregg unlock`): until it is set the loop still runs,
  # reads, dispatches + meters, but settlement Transfers are rejected by the node's
  # protected submit endpoint (the daemon WARNs and idles on settlement) — the one
  # operator step the full live edge needs (docs/GO-REAL.md "Live-edge proof").
  # --------------------------------------------------------------------------
  provider:
    image: dreggnet-runtime:staging
    restart: unless-stopped
    depends_on:
      dregg-node:
        condition: service_healthy
    command: ["dreggnet-provider"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # Read funded leases from the live node (CellSource::DreggNode) — the same
      # node the gateway funds creates against.
      DREGGNET_NODE_URL: ${DREGGNET_NODE_URL:-http://dregg-node:8420}
      DREGGNET_REGION: ${DREGGNET_REGION:-staging}
      # The compute backend the loop dispatches onto + the cell metered work settles
      # INTO (node-a over the headscale overlay — the same target the gateway
      # dispatches to). DREGGNET_COMPUTE_PAYABLE is the 64-hex cell id the settlement
      # Transfer pays; set it in .env to the backend's real payable cell.
      DREGGNET_COMPUTE_NAME: ${DREGGNET_COMPUTE_NAME:-node-a}
      DREGGNET_COMPUTE_ADDR: ${DREGGNET_NODE_A_OVERLAY:-100.64.0.2}
      DREGGNET_COMPUTE_PORT: ${DREGGNET_NODE_A_PORT:-8021}
      DREGGNET_COMPUTE_PAYABLE: ${DREGGNET_COMPUTE_PAYABLE:-}
      # The node's operator bearer for the protected submit endpoint (settlement).
      # Unset → the loop runs/reads/meters but cannot settle (it WARNs). Set after
      # `dregg unlock` to settle real Transfers.
      DREGGNET_NODE_BEARER: ${DREGGNET_NODE_BEARER:-}
      # DURABLE settlement dedup (LEASE-3): exactly-once per (lease, period) across a
      # daemon restart, persisted on the provider volume below.
      DREGGNET_SETTLE_LEDGER: /var/lib/dreggnet-provider/dreggnet-settle.jsonl
    volumes:
      - provider-data:/var/lib/dreggnet-provider

  # --------------------------------------------------------------------------
  # The DreggNet Cloud OPS/ADMIN dashboard (`dreggnet-ops`) — the operator's
  # single pane of glass. It does NOT duplicate any service: it AGGREGATES the
  # live read surfaces (the dregg node :8420, the gateway :8080, the discord bot's
  # read API :8080) plus the durable layer's `dreggnet_meter` Postgres outbox, and
  # tails each running service's logs over the mounted Docker Engine socket. It
  # serves one HTML dashboard + a JSON snapshot API on :8090, reached ONLY through
  # Caddy at https://ops.dreggnet.example.com behind a SEPARATE, stronger
  # admin password (a dedicated basic-auth block distinct from the public `operator`
  # credential). Reuses the same runtime image (the binary is COPYed in).
  # --------------------------------------------------------------------------
  ops:
    image: dreggnet-runtime:staging
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    command: ["dreggnet-ops", "--bind", "0.0.0.0", "--port", "8090"]
    expose:
      - "8090"
    # /healthz is the ops liveness probe (always open, no auth).
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # The live read surfaces to aggregate (compose-internal DNS).
      OPS_NODE_URL: ${OPS_NODE_URL:-http://dregg-node:8420}
      OPS_GATEWAY_URL: ${OPS_GATEWAY_URL:-http://gateway:8080}
      OPS_BOT_URL: ${OPS_BOT_URL:-http://dreggnet-discord-bot:8080}
      # Reuse the bot's ADMIN_TOKEN to pull its /admin/api/hermes (when the bot is
      # up); empty → only the bot's public /api/* is aggregated.
      OPS_BOT_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # The durable meter outbox lives in the staging Postgres.
      DATABASE_URL: postgres://${POSTGRES_USER:-dreggnet}:${POSTGRES_PASSWORD:-dreggnet}@postgres:5432/${POSTGRES_DB:-dreggnet}
      # Log tailing over the Docker Engine API (socket mounted read-only below).
      OPS_DOCKER_SOCKET: /var/run/docker.sock
      # OPTIONAL app-layer defence-in-depth UNDER the Caddy admin password. Leave
      # unset so the browser-behind-Caddy flow works; set to require a Bearer/token
      # at the app layer too.
      OPS_ADMIN_TOKEN: ${OPS_ADMIN_TOKEN:-}
      # The compute backend's /health (node-a / homelab agent on :8021, reached
      # over the headscale overlay — the same egress path the gateway uses). A
      # WARN-level reachability signal; a refused lease maps to a lapse, so a down
      # backend is the dominant lease-lapse cause. Unset OPS_BACKEND_URL to silence
      # (e.g. while node-a is offline for hardware surgery).
      OPS_BACKEND_URL: ${OPS_BACKEND_URL:-http://${DREGGNET_NODE_A_OVERLAY:-100.64.0.2}:${DREGGNET_NODE_A_PORT:-8021}/health}
      # OPTIONAL alert webhook (plain HTTP only — the ops binary carries no TLS
      # closure). The background alerter POSTs page/warn alerts as JSON
      # {"text":..,"content":..} (Slack/Discord-shaped). For an https sink, poll
      # GET /api/alerts from a cron instead. Alerts always also go to the ops log.
      OPS_ALERT_WEBHOOK: ${OPS_ALERT_WEBHOOK:-}
      OPS_ALERT_INTERVAL_SECS: ${OPS_ALERT_INTERVAL_SECS:-30}
      # Public Grafana base URL → the dashboard's `Grafana ↗` header link + the
      # per-viewer deep-links (<url>/d/<uid>). Unset → the cross-links stay hidden.
      OPS_GRAFANA_URL: ${OPS_GRAFANA_URL:-https://grafana.${DREGGNET_DOMAIN:-dreggnet.example.com}}
      # DEFENCE-IN-DEPTH: require the `ops-admin` dregg cap (the X-Dregg-Cap the
      # webauth forward-auth verifies) on every request, so the dashboard fails
      # closed even if the Caddy forward_auth is ever misconfigured away. Unset
      # (default) trusts the edge gate alone; set `ops-admin` to internalize it.
      OPS_REQUIRE_CAP: ${OPS_REQUIRE_CAP:-}
      # Where webauth serves /login + /logout (the "sign out" control); matches the
      # Caddyfile's `import dregg_login` base.
      OPS_LOGIN_BASE: ${OPS_LOGIN_BASE:-/.dregg-auth}
    volumes:
      # Read-only Docker socket: lets the dashboard list containers + tail logs via
      # the Engine API. Read-only — the dashboard never controls the daemon.
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # --------------------------------------------------------------------------
  # dregg-webauth — the dregg-CAPABILITY forward-auth service. Caddy's
  # `forward_auth` calls its /auth once per request on the gated surfaces
  # (ops/grafana/gateway-admin); a valid dregg capability (a `dga1_…` token held
  # in the operator's cipherclerk) → 2xx, otherwise → 401 (browsers are bounced
  # to the dregg login page). This REPLACES the legacy HTTP basic-auth.
  #
  # Pure-std HTTP (no httpe/Elide closure), so it's in the same cross-built
  # runtime image as ops. NOT publicly published — only Caddy reaches it
  # in-cluster as `webauth:8099`.
  #
  # BOOTSTRAP (one-time): mint a root authority + an ops capability with the
  # bundled CLI, then set DREGG_WEBAUTH_ROOT_PUBKEY in .env:
  #   docker compose exec webauth dregg-authctl keygen
  #   docker compose exec webauth dregg-authctl mint --seed <seed> --caps ops-admin,grafana-view,gateway-admin
  # Paste the printed dga1_… into https://ops.…/.dregg-auth/login (one login,
  # cookie scoped to .dreggnet.example.com, covers every subdomain).
  # --------------------------------------------------------------------------
  webauth:
    image: dreggnet-runtime:staging
    restart: unless-stopped
    command: ["dreggnet-webauth", "--bind", "0.0.0.0:8099"]
    expose:
      - "8099"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8099/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # The issuer public key every presented capability verifies under. REQUIRED:
      # while unset, every cap check DENIES (fail-closed) and only the break-glass
      # override admits. Set it from `dregg-authctl keygen` (the pubkey line).
      DREGG_WEBAUTH_ROOT_PUBKEY: ${DREGG_WEBAUTH_ROOT_PUBKEY:-}
      # Surface (Host) → required capability. The forward_auth blocks also pass an
      # explicit ?cap=, which wins; this map is the belt-and-suspenders default.
      DREGG_WEBAUTH_HOST_CAPS: ${DREGG_WEBAUTH_HOST_CAPS:-ops.dreggnet.example.com=ops-admin,grafana.dreggnet.example.com=grafana-view,dreggnet.example.com=gateway-admin}
      # BREAK-GLASS override: a request presenting this token in the
      # X-Dregg-Break-Glass header is admitted regardless of the cap flow, so the
      # operator is never locked out if the cap flow breaks. KEEP THIS SET until
      # the cap flow is exercised in production; then it can be rotated/retired.
      DREGG_WEBAUTH_BREAK_GLASS: ${DREGG_WEBAUTH_BREAK_GLASS:-}
      # The session cookie is scoped to the parent domain so one login covers all
      # gated subdomains (ops./grafana./…). The login flow lives under this PUBLIC
      # path prefix (Caddy strips it; it must not collide with grafana's own /login).
      DREGG_WEBAUTH_COOKIE_DOMAIN: ${DREGG_WEBAUTH_COOKIE_DOMAIN:-.dreggnet.example.com}
      DREGG_WEBAUTH_LOGIN_BASE: ${DREGG_WEBAUTH_LOGIN_BASE:-/.dregg-auth}
      # SESSION lifetime (seconds) — stamped as the default expiry on a minted
      # session credential AND the cap on the session cookie's Max-Age, so a
      # leaked bearer token self-expires. 24h default.
      DREGG_WEBAUTH_SESSION_TTL: ${DREGG_WEBAUTH_SESSION_TTL:-86400}
      # The CHALLENGE key (hex, 32 bytes) that authenticates the stateless
      # proof-of-possession login nonces. Set it (shared across replicas) so a
      # challenge issued by one webauth verifies at another; unset → a per-process
      # random key (single-instance safe, a pending challenge just does not survive
      # a restart). Mint one with `openssl rand -hex 32`.
      DREGG_WEBAUTH_CHALLENGE_KEY: ${DREGG_WEBAUTH_CHALLENGE_KEY:-}
      DREGG_WEBAUTH_CHALLENGE_TTL: ${DREGG_WEBAUTH_CHALLENGE_TTL:-120}
      # The revocation deny-set FILE (the cloud-side Effect::RevokeCapability): a
      # newline list of credential tails and/or `dregg:<subject>`s to refuse even
      # when their signature would admit. Mount it read-only and point here.
      DREGG_WEBAUTH_REVOKED_FILE: ${DREGG_WEBAUTH_REVOKED_FILE:-}

  # --------------------------------------------------------------------------
  # Caddy — the public HTTP surface: reverse proxy + dregg-cap forward-auth gate +
  # automatic HTTPS. This is the ONLY way in to the gateway. See ./Caddyfile.
  #   - :443 — TLS (Let's Encrypt for dreggnet.example.com once the A-record
  #     propagates; self-signed fallback for raw-IP before then).
  #   - :80  — ACME HTTP-01 challenge + redirect to https.
  # Two accounts (ember, operator); bcrypt creds live in the Caddyfile.
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
      ops:
        condition: service_healthy
      webauth:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    # Caddy ships curl + wget; probe its admin API so a wedged proxy is visible.
    # The admin endpoint is local-only on :2019 (never published). Use 127.0.0.1,
    # NOT localhost: Caddy binds admin on IPv4 and busybox wget resolves localhost
    # to IPv6 [::1] first (→ connection refused) without curl's happy-eyeballs.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      # THE CAP-AUTH FLIP: this defaults to the current `./Caddyfile`; the redeploy
      # that turns cap-auth ON sets DREGGNET_CADDYFILE=./Caddyfile.capauth in .env
      # (the hardened forward_auth generation with the no-forge header strip on
      # every gated route) and clears DREGG_WEBAUTH_BREAK_GLASS. A one-line,
      # reviewable swap + a one-line rollback.
      - ${DREGGNET_CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      # The baked public portal (portal.example.com): static index.html/cell.html +
      # the wasm light-client bundle under pkg/. Read-only. Populated by deploy.sh
      # (which copies the wasm bundle from breadstuffs/wasm/pkg at stage time).
      - ./portal:/srv/portal:ro
      - caddy-data:/data
      - caddy-config:/config

  # --------------------------------------------------------------------------
  # The DreggNet operator CLI (`dreggnet`). Not a daemon — it idles, and you
  # drive the stack through it:
  #   docker compose exec dreggnet dreggnet-demo
  #   docker compose exec dreggnet dreggnet lease open --cap-tier sandboxed --budget 100
  # Reuses the same runtime image as the gateway (both binaries are COPYed in).
  # --------------------------------------------------------------------------
  dreggnet:
    image: dreggnet-runtime:staging
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dreggnet}:${POSTGRES_PASSWORD:-dreggnet}@postgres:5432/${POSTGRES_DB:-dreggnet}
      DREGGNET_STATE_DIR: /var/lib/dreggnet
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - dreggnet-state:/var/lib/dreggnet
    command: ["sleep", "infinity"]

  # --------------------------------------------------------------------------
  # The dregg NODE — the substrate the bridge/leases talk to. This box is the
  # edge validator (node-index 0) of the n=4 BFT committee (threshold 3): edge +
  # node-a (×2: lean + rust-producer) + node-b, full-mesh over the overlay. The
  # HTTP API is on :8420 and the QUIC gossip on :9420/udp. The committee meshes
  # only because every node dials the OTHERS (--federation-peers): a node registers
  # a peer link on DIAL-OUT, not from an inbound connection. NOTE: gossip is QUIC
  # (UDP) — the gossip port MUST be published `/udp` or peers never connect.
  #
  # IMAGE: this is a PRE-BUILT linux/amd64 image. dregg-node links a host-native
  # Lean static archive (libdregg_lean.a) UNCONDITIONALLY and therefore CANNOT be
  # cross-compiled with zigbuild — it must be built on a Lean-capable linux/amd64
  # builder (elan/lake + warm mathlib) and either pushed to a registry or
  # `docker save`d + loaded onto the box. Set DREGG_NODE_IMAGE in .env to the ref.
  # See README.md ("The dregg node").
  # --------------------------------------------------------------------------
  dregg-node:
    image: ${DREGG_NODE_IMAGE:-dregg-node:staging}
    restart: unless-stopped
    command: >
      run --data-dir /data
      --bind 0.0.0.0 --port 8420 --gossip-port 9420
      --key-file node.key
      --node-index 0 --federation-size 4 --federation-mode full
      --federation-peers 100.64.0.2:9420,100.64.0.2:9421,100.64.0.3:9420 --enable-faucet
    ports:
      - "8420:8420"
      - "9420:9420/udp"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # Set DREGG_PROVE_TURNS=1 for an audit-grade node (every finalized turn is
      # STARK-proven). OFF by default — proving is memory-hungry and a t3.small
      # (2 GB) will struggle; prefer t3.medium (4 GB) before turning it on.
      DREGG_PROVE_TURNS: ${DREGG_PROVE_TURNS:-0}
    volumes:
      - node-data:/data
    # Graceful shutdown: the node catches SIGTERM (docker stop) and flushes a
    # ledger checkpoint before exiting (node/src/main.rs::shutdown_signal +
    # persist_on_shutdown). Give that flush room so `docker stop`/redeploy does NOT
    # SIGKILL mid-checkpoint (the cause of the restart STORE-INTEGRITY event the
    # genesis-first-then-overlay recovery now also absorbs). Default grace is 10s.
    stop_grace_period: 45s
    healthcheck:
      # The node image ships no curl/wget; bash (present) does a real HTTP probe of
      # the API's /health over /dev/tcp and confirms the status JSON is served. A
      # restart auto-recovers (genesis-first-then-overlay); a hung-but-listening
      # node fails this (port-open alone would not). start_period covers boot +
      # recovery replay. The "up but not finalizing" verdict is the ops layer's job.
      test:
        - CMD
        - bash
        - -c
        - "exec 3<>/dev/tcp/localhost/8420; printf 'GET /health HTTP/1.0\r\nConnection: close\r\n\r\n' >&3; grep -q healthy <&3"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 90s

  # --------------------------------------------------------------------------
  # The DreggNet Discord bot — the community front door. Per-user semi-private
  # channels, the drive-your-Hermes metered loop, and the `/admin` webportal.
  # It is a CUSTODIAL dregg peer: each Discord user gets a deterministically
  # derived cipherclerk + cell, and a channel message becomes a cap-gated,
  # metered, receipted dregg turn submitted to the LIVE edge node below
  # (DEVNET_URL=http://dregg-node:8420) — so user cells/turns land on the real
  # staging chain.
  #
  # IMAGE: a pre-built linux/amd64 image. The bot is a member of a STANDALONE
  # cargo workspace and is built NATIVELY (no cross-compile) WITHOUT the Lean
  # archive (`--features dregg-sdk/no-lean-link`) on a capable Linux box, then
  # `docker save`d + loaded onto this box (the same shape as dregg-node). See
  # MINI-DEVNET.md. Set DREGG_BOT_IMAGE in .env to the loaded ref.
  #
  # TOKEN-GATED GO-LIVE: the bot REQUIRES DISCORD_TOKEN / DISCORD_APP_ID /
  # BOT_SECRET (it exits 1 without them). Until those are set in .env it simply
  # will not stay up (restart loop with a friendly "var is required" message).
  # The MOMENT they are present + `docker compose up -d dreggnet-discord-bot`,
  # the bot connects to Discord, registers its slash commands, and serves the
  # per-user channels. See MINI-DEVNET.md "Go-live".
  # --------------------------------------------------------------------------
  dreggnet-discord-bot:
    image: ${DREGG_BOT_IMAGE:-dregg-discord-bot:staging}
    restart: unless-stopped
    depends_on:
      dregg-node:
        condition: service_healthy
    environment:
      # ── REQUIRED for go-live (ember drops these in .env; NOT committed) ──
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_APP_ID: ${DISCORD_APP_ID:-}
      BOT_SECRET: ${BOT_SECRET:-}
      # ── The live edge node this bot drives (compose-internal DNS) ──
      DEVNET_URL: ${DEVNET_URL:-http://dregg-node:8420}
      # blake3(node_pubkey) for the SOLO edge node — transfers fail with an
      # Ed25519 error if this is wrong. The bot LOGS the expected value at
      # startup if it mismatches; copy that into .env. See MINI-DEVNET.md.
      FEDERATION_ID: ${FEDERATION_ID:-}
      # ── The custodial SQLite DB on a docker volume (sqlx creates it: rwc) ──
      DATABASE_URL: sqlite:/data/bot.db?mode=rwc
      # ── The HTTP read + /admin webportal surface (reached via Caddy) ──
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      # ADMIN_TOKEN gates the /admin portal underneath Caddy basic-auth
      # (defence in depth). ADMIN_DISCORD_ID = ember's numeric Discord id.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      ADMIN_DISCORD_ID: ${ADMIN_DISCORD_ID:-}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - bot-data:/data
    # The HTTP surface is reached only through Caddy (`/admin*`), not published
    # to the host. `expose` documents the internal port.
    expose:
      - "8080"

  # --------------------------------------------------------------------------
  # headscale — the self-hosted Tailscale CONTROL SERVER for the DreggNet private
  # mesh. It ties this AWS edge box (relay / stable IP) to node-a (the primary
  # compute backend, home box, joins after its hardware surgery) and to ember's
  # devices into ONE tailnet on the 100.64.0.0/10 overlay — the same range the
  # DreggNet control-plane mesh module routes to (control/src/mesh.rs).
  #
  # Served by Caddy at https://headscale.dreggnet.example.com (TLS terminated
  # in front; headscale speaks plain HTTP on :8080 inside this network). The
  # embedded DERP relay rides that HTTPS endpoint; STUN is published on 3478/udp
  # for NAT traversal (AWS security group must allow inbound 3478/udp).
  # Config: ./headscale/config.yaml + ./headscale/acls.hujson.
  # See deploy/ARCHITECTURE-COMPUTE-BACKEND.md.
  # --------------------------------------------------------------------------
  headscale:
    image: headscale/headscale:stable  # v0.29.1 at deploy time
    restart: unless-stopped
    command: ["serve"]
    volumes:
      - ./headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./headscale/acls.hujson:/etc/headscale/acls.hujson:ro
      - headscale-data:/var/lib/headscale
    # :8080 is reached by Caddy inside the compose network. Also bound to the host
    # loopback so the edge box itself can enroll over http://127.0.0.1:8080 before
    # the public HTTPS endpoint (DNS + Let's Encrypt) is live.
    ports:
      - "127.0.0.1:8080:8080"
      - "3478:3478/udp"   # embedded DERP STUN — NAT traversal for node-a
    expose:
      - "8080"

volumes:
  pgdata:
  dreggnet-state:
  node-data:
  caddy-data:
  caddy-config:
  headscale-data:
  bot-data:          # the Discord bot's custodial SQLite DB (bot.db)
  provider-data:     # the provider's durable settlement ledger (exactly-once)
