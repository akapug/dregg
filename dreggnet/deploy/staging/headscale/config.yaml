# DreggNet — headscale (self-hosted Tailscale control server) on the AWS edge box.
#
# headscale is the control plane of the PRIVATE MESH that ties the cheap AWS edge
# box (relay / stable IP / web surface) to node-a (the home box that is
# the PRIMARY compute backend) and to ember's personal devices. See
# deploy/ARCHITECTURE-COMPUTE-BACKEND.md for the whole picture.
#
# It runs as a container in deploy/staging/docker-compose.yml, behind Caddy at
# https://headscale.dreggnet.example.com. Caddy terminates TLS and reverse-
# proxies to headscale on :8080 inside the compose network; the embedded DERP
# relay rides the same HTTPS endpoint (websockets) with STUN on 3478/udp.
#
# Tested against headscale v0.29.1 (the :stable image digest pinned in compose).

# The PUBLIC URL clients (tailscale) reach this control server at. TLS is
# terminated by Caddy in front; headscale itself listens plain-HTTP on :8080
# inside the compose network. server_url MUST be https for the embedded DERP.
server_url: https://headscale.dreggnet.example.com

# Listen on all interfaces inside the compose network so Caddy (and, for local
# bootstrap enrollment, the host loopback) can reach it. Never published raw to
# the internet — Caddy is the only public door.
listen_addr: 0.0.0.0:8080

# Metrics + gRPC stay on loopback (operator-only, via `docker compose exec`).
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: false

# Honour X-Forwarded-For / X-Real-IP from Caddy so headscale logs the real client
# IP. Caddy sits on the docker bridge network (172.16.0.0/12); also trust loopback
# for the host-local bootstrap enrollment path.
trusted_proxies:
  - 172.16.0.0/12
  - 127.0.0.1/32

noise:
  private_key_path: /var/lib/headscale/noise_private.key

# The overlay address pool. 100.64.0.0/10 is EXACTLY the carrier-grade-NAT range
# the DreggNet control-plane mesh module already routes to (control/src/mesh.rs:
# OVERLAY_CIDR = "100.64.0.0/10"). The control plane addresses node-a by the
# /32 host route headscale allocates here — the headscale tailnet IS that overlay.
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# Embedded DERP relay: when the edge (public IP) and node-a (behind home NAT)
# cannot form a direct WireGuard path, traffic relays through this server. STUN on
# 3478/udp assists NAT traversal. The edge box's public IP makes most paths direct;
# DERP is the always-works fallback. urls is empty: this is a FULLY SELF-HOSTED
# private mesh — no dependence on Tailscale's public DERP infrastructure.
#   NOTE: AWS security group must allow inbound 3478/udp on the edge box for STUN.
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "dreggnet"
    region_name: "DreggNet Edge (AWS us-east-1)"
    verify_clients: true
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
    automatically_add_embedded_derp_region: true
  urls: []
  paths: []
  auto_update_enabled: false
  update_frequency: 24h

disable_check_updates: true

# Nodes never expire (long-lived fleet); ephemeral nodes (CI runners etc.) are
# reaped 30m after going offline.
node:
  expiry: 0
  ephemeral:
    inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

# TLS is terminated by Caddy in front — headscale serves plain HTTP here.
tls_cert_path: ""
tls_key_path: ""

log:
  level: info
  format: text

# ACL / tagOwners policy: which node can reach which over the overlay. File mode,
# reloaded on SIGHUP / restart. See ./acls.hujson.
policy:
  mode: file
  path: /etc/headscale/acls.hujson

# MagicDNS: gives every node a stable name under the tailnet base domain. The base
# domain MUST differ from the server_url domain, so the mesh names live under
# `*.dregg.mesh` (e.g. node-a.dregg.mesh, edge.dregg.mesh). The DreggNet control
# plane can address node-a as `node-a.dregg.mesh:8021` instead of a raw /32.
dns:
  magic_dns: true
  base_domain: dregg.mesh
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 1.0.0.1
  search_domains: []
  extra_records: []

unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

logtail:
  enabled: false
