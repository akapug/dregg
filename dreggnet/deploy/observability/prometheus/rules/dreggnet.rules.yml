# DreggNet alert rules — a Prometheus mirror of the ops dashboard's page/warn
# model (ops/src/aggregate.rs + ops/src/bridge.rs). Severity label `page` |
# `warn` routes in alertmanager.yml. Each rule reconstructs an ops alert condition
# from the SAME underlying signals (the json-exporter'd ops /api/health fields, the
# native node dregg_* metrics, and the blackbox up/down probes).
#
# LIVE today: node up/down, consensus-live/finalizing, divergence, tau shifts,
# backend(node-a) up/down, pg pressure. PLACEHOLDER (fire only once the
# enrichment follow-up lands the metric): bridge double-mint, auth-fail/rejected.

groups:
  - name: dreggnet-consensus
    rules:
      # PAGE — rust↔lean finality divergence (the consensus-implementation bug).
      # Fires from EITHER the native node counter or the ops-reported field.
      - alert: ConsensusDivergence
        expr: >
          (max(dregg_consensus_differential_divergence_total) > 0)
          or (max(dreggnet_ops_consensus_divergence) > 0)
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "rust↔lean finality DIVERGENCE detected"
          description: "consensus_differential_divergence > 0 — a consensus-implementation bug; investigate now."

      # PAGE — the node is unreachable (the chain is down).
      - alert: NodeDown
        expr: probe_success{instance="http://dregg-node:8420/health"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "dregg node unreachable"
          description: "the node /health blackbox probe has failed for 2m — the chain is down."

      # PAGE — the node is up but not finalizing (consensus stalled).
      - alert: NodeNotFinalizing
        expr: (dreggnet_ops_node_finalizing == 0) or (dreggnet_ops_consensus_live == 0)
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "dregg node is up but NOT finalizing"
          description: "consensus_live/node_finalizing is false for 5m — consensus stalled / store unreachable / no blocks."

      # WARN/PAGE — inbound gossip streams being rejected at the edge. This is the
      # signal that was MISSING when the edge gossip storm took the cloud down with
      # zero dashboard visibility: dregg_gossip_stream_rejected_total{peer,reason}
      # is emitted by dregg-net at every inbound reject site (conn_limit /
      # read_timeout / unknown_sender / bad_signature / decode_failed). A rate is
      # the early warning — a sustained moderate rate WARNs, a storm PAGEs before
      # the edge falls over.
      - alert: GossipStreamRejectionRate
        expr: sum(rate(dregg_gossip_stream_rejected_total[5m])) > 0.5
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "gossip stream rejections elevated"
          description: "the federation is rejecting inbound gossip streams at >0.5/s for 5m — a misbehaving peer or the onset of a gossip storm. See DreggNet · Federation (gossip rejection rate, by reason). Runbook: runbooks/INCIDENT-RESPONSE.md."
      - alert: GossipStreamStorm
        expr: sum(rate(dregg_gossip_stream_rejected_total[5m])) > 5
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "GOSSIP STORM — inbound streams rejected at storm rate"
          description: "inbound gossip stream rejections exceed 5/s for 2m — the edge gossip-storm signature. Shed/triage the offending peer(s) before the edge saturates. By-reason + by-peer breakdown: DreggNet · Federation. Runbook: runbooks/INCIDENT-RESPONSE.md."

      # WARN — tau-prefix-shift activity (informational pressure signal in ops).
      - alert: TauPrefixShifts
        expr: increase(dregg_tau_prefix_shifts_total[15m]) > 0
        for: 0m
        labels:
          severity: warn
        annotations:
          summary: "tau-prefix shifts observed"
          description: "dregg_tau_prefix_shifts_total advanced in the last 15m — reorg/prefix churn; watch."

  - name: dreggnet-economy-compute
    rules:
      # WARN — the compute backend is down → dispatched leases will lapse. This is
      # the dominant lease-lapse cause (ops backend_down).
      - alert: BackendDown
        expr: probe_success{instance="http://100.64.0.2:8021/health"} == 0
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "compute backend (node-a :8021) unreachable"
          description: "the node-a /health overlay probe has failed for 5m — dispatched leases will lapse."

      # WARN — gateway (the machines API) is down.
      - alert: GatewayDown
        expr: probe_success{instance="http://gateway:8080/status"} == 0
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "gateway unreachable"
          description: "the gateway /status blackbox probe has failed for 5m — the machines API is down."

      # WARN — postgres connection pressure (≥85% of max), mirrors ops.
      - alert: PostgresConnectionPressure
        expr: (dreggnet_ops_pg_active_connections / dreggnet_ops_pg_max_connections) >= 0.85
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "postgres connection pressure ≥85%"
          description: "active/max postgres connections ≥ 0.85 for 5m."

  - name: dreggnet-bridge
    rules:
      # PAGE — bridge conservation breach (more mirror asset circulates than backed).
      # `bridge_conservation_ok` is null until a relayer is configured; the `== 0`
      # only fires on an observed breach.
      - alert: BridgeConservationBreach
        expr: dreggnet_ops_bridge_conservation_ok == 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "BRIDGE CONSERVATION BREACH"
          description: "bridge_conservation_ok is false — more mirror asset circulates than is backed (a critical bridge bug)."

  - name: dreggnet-security
    rules:
      # WARN — revocations advancing. dregg_revocations_total exists on the node;
      # a spike can indicate cap churn / response to compromise.
      - alert: RevocationSpike
        expr: increase(dregg_revocations_total[15m]) > 0
        for: 0m
        labels:
          severity: warn
        annotations:
          summary: "revocations observed"
          description: "dregg_revocations_total advanced in the last 15m."
      # WARN — a spike of refused turns. dregg_turns_rejected_total is live on the
      # node (every TurnResult::Rejected). A burst can mean a probe of the gates or
      # a client bug; the Security/Protocol dashboards classify it (auth vs cap).
      - alert: TurnRejectSpike
        expr: increase(dregg_turns_rejected_total[10m]) > 20
        for: 0m
        labels:
          severity: warn
        annotations:
          summary: "turn-rejection spike"
          description: ">20 turns rejected in 10m — a gate probe or a misbehaving client; see DreggNet · Security / Protocol."

  - name: dreggnet-protocol
    rules:
      # WARN — the finalized height is not advancing while consensus reports live.
      # Idle chains legitimately hold height flat, so this is a WARN (look soon),
      # not a page; NodeNotFinalizing (consensus_live==0) is the paging condition.
      - alert: HeightNotAdvancing
        expr: (delta(dreggnet_ops_block_height[30m]) == 0) and (dreggnet_ops_consensus_live == 1)
        for: 30m
        labels:
          severity: warn
        annotations:
          summary: "finalized height flat for 30m (consensus live)"
          description: "block_height has not advanced in 30m though consensus is live — confirm there is real load, else investigate a finality stall. Runbook: runbooks/INCIDENT-RESPONSE.md."

  - name: dreggnet-hosts
    rules:
      # WARN — a node_exporter host target is down (host unreachable / exporter
      # crashed). Distinct from NodeDown (the dregg node /health probe).
      - alert: HostExporterDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "host node_exporter target down ({{ $labels.instance }})"
          description: "the node_exporter on {{ $labels.instance }} has been unreachable for 5m — the host may be down or the exporter crashed."

      # PAGE — a root/data filesystem is nearly full. >85% warns, >95% pages.
      - alert: HostDiskAlmostFull
        expr: >
          100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/host/.*"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/host/.*"})) > 85
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "disk >85% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is over 85% full for 10m. Runbook: runbooks/INCIDENT-RESPONSE.md."
      - alert: HostDiskCritical
        expr: >
          100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/host/.*"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"/host/.*"})) > 95
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "disk >95% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is over 95% full — imminent write failure."

      # WARN — sustained memory pressure (<10% available).
      - alert: HostMemoryPressure
        expr: 100 * (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 10
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "memory <10% available on {{ $labels.instance }}"
          description: "available memory has been under 10% for 10m on {{ $labels.instance }} — OOM risk."

      # PAGE — the kernel OOM killer fired.
      - alert: HostOOMKill
        expr: increase(node_vmstat_oom_kill[5m]) > 0
        for: 0m
        labels:
          severity: page
        annotations:
          summary: "OOM kill on {{ $labels.instance }}"
          description: "the kernel OOM killer reaped a process on {{ $labels.instance }} in the last 5m."
