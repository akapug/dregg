# DreggNet edge — Prometheus scrape config.
#
# Targets are reached by compose DNS over the (external) dreggnet_default network,
# except node-a, which is reached over the headscale overlay (100.64.0.2:8021).
#
# Live today:
#   - dregg-node:8420/metrics  (native dregg_* — incl. the security counters
#                               dregg_turns_rejected_total / dregg_auth_failures_total /
#                               dregg_cap_refusals_total, and the consensus signals
#                               dregg_consensus_finality_latency_seconds /
#                               dregg_validator_last_seen_timestamp_seconds)
#   - ops:8090/api/health      (the RICH source, via json-exporter)
#   - node-a-thermal (100.64.0.2:8022) → node_a_cpu_temp_celsius/_freq_mhz/_fan_level/_load1
#                               (UP once the sidecar is enabled on node-a)
#   - http_2xx blackbox probes for node/gateway/ops/bot/node-a up-down
# Enrichment follow-up (NOT here):
#   - dregg_sandbox_denials_total (registered on the node; emitted by the exec plane once it has a surface)
#   - bridge relayer/solana/stripe metrics (currently not-configured)

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: dreggnet-staging
    env: edge

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # --- Prometheus self ------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # --- the dregg NODE: native Prometheus exposition -------------------------
  # dregg_block_height, dregg_federation_peers_connected,
  # dregg_consensus_differential_divergence_total, dregg_tau_prefix_shifts_total,
  # dregg_revocations_total, dregg_turns_*_total, dregg_proofs_verified_total, …
  # Gossip family (dashboarded on DreggNet · Federation / · Protocol / · Consensus):
  #   dregg_gossip_messages_total{direction} and
  #   dregg_gossip_stream_rejected_total{peer,reason} — the latter emitted by
  #   dregg-net at every inbound stream-reject site (the edge-storm early-warning;
  #   rate() drives GossipStreamRejectionRate / GossipStreamStorm in the rules).
  - job_name: dregg-node
    metrics_path: /metrics
    static_configs:
      - targets: ["dregg-node:8420"]
        labels:
          service: dregg-node

  # --- the OPS dashboard JSON → time-series via json-exporter ---------------
  # The aggregator's /api/health is the richest LIVE signal surface. The exporter
  # fetches the target and applies the `ops_health` module's JSONPath rules.
  - job_name: ops-health
    metrics_path: /probe
    params:
      module: [ops_health]
    static_configs:
      - targets: ["http://ops:8090/api/health"]
        labels:
          service: ops
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: json-exporter:7979

  # --- the GATEWAY status JSON → time-series via json-exporter --------------
  # Thin (machines count + dispatch/federation health), but a real live signal.
  - job_name: gateway-status
    metrics_path: /probe
    params:
      module: [gateway_status]
    static_configs:
      - targets: ["http://gateway:8080/status"]
        labels:
          service: gateway
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: json-exporter:7979

  # --- BLACKBOX up/down probes ----------------------------------------------
  # http_2xx against each service's liveness surface. node-a is probed over the
  # overlay (the only signal it exposes — /health returns "ok"; no /metrics).
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://dregg-node:8420/health
          - http://gateway:8080/status
          - http://ops:8090/healthz
          - http://dreggnet-discord-bot:8080/api/cells
          - http://100.64.0.2:8021/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # --- HOST metrics: prometheus node_exporter on all three boxes ------------
  # CPU / RAM / disk usage+IO / network / load / uptime. The edge runs it as a
  # container on dreggnet_default (compose DNS `node-exporter:9100`); node-a and
  # node-b run it as a systemd service reached over the headscale overlay
  # (100.64.0.x:9100 — ACL opens 9100 on tag:compute from tag:edge). The `instance`
  # label is normalized to edge/node-a/node-b so the Host Overview dashboard's
  # $host variable groups them. node-b is UP once it is reachable + the installer
  # has run (deploy/observability/node-exporter/).
  - job_name: node-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: edge
      - targets: ["100.64.0.2:9100"]
        labels:
          instance: node-a
      - targets: ["100.64.0.3:9100"]
        labels:
          instance: node-b

  # --- the OPS SNAPSHOT (/api/snapshot) → lease-economy series --------------
  # /api/health is the rollup; /api/snapshot carries the durable lease economy
  # (total_leases, total_units_spent). json-exporter's `ops_snapshot` module pulls
  # the few extra fields the Cloud dashboard's lease panels need.
  - job_name: ops-snapshot
    metrics_path: /probe
    params:
      module: [ops_snapshot]
    static_configs:
      - targets: ["http://ops:8090/api/snapshot"]
        labels:
          service: ops
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: json-exporter:7979

  # --- node-a THERMALS over the overlay -------------------------------------
  # The node-thermal-exporter sidecar (deploy/observability/node-thermal-
  # exporter/) runs ON node-a and serves the box's CPU temp/freq/fan/load over
  # the headscale overlay. node_a_cpu_temp_celsius, node_a_cpu_freq_mhz,
  # node_a_fan_level, node_a_load1, node_a_thermal_up — the Compute
  # dashboard's thermal panels. UP only once the sidecar is deployed on node-a.
  - job_name: node-a-thermal
    metrics_path: /metrics
    static_configs:
      - targets: ["100.64.0.2:8022"]
        labels:
          service: node-a

  # --- exporters' own /metrics (self-observability) -------------------------
  - job_name: json-exporter
    static_configs:
      - targets: ["json-exporter:7979"]
  - job_name: blackbox-exporter
    static_configs:
      - targets: ["blackbox-exporter:9115"]
