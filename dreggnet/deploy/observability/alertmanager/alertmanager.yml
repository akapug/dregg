# DreggNet Alertmanager — routes fired rules to a notification sink, mirroring the
# ops dashboard's page/warn model (page = wake someone; warn = look soon).
#
# DEFAULT SINK: `alert-sink` (a request-logger container) — alerts land in
# `docker logs dreggnet-obs-alert-sink-1`. This is a real, inspectable webhook path
# with no external dependency. To page a human, REPLACE the webhook url below with
# ember's Slack/Discord/email webhook (Discord: append `/slack` to a Discord webhook
# for Slack-compatible payloads; or use a slack_configs/email_configs receiver).

global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    # page-severity alerts route to the page receiver (swap to a real human sink).
    - matchers:
        - severity = "page"
      receiver: page-log
      repeat_interval: 10m   # mirror the ops alerter's 10-minute re-fire
    # warn-severity alerts route to the warn receiver.
    - matchers:
        - severity = "warn"
      receiver: warn-log

receivers:
  - name: default-log
    webhook_configs:
      - url: http://alert-sink:8888/alert
        send_resolved: true
  - name: page-log
    webhook_configs:
      - url: http://alert-sink:8888/page
        send_resolved: true
        # REPLACE with ember's real page sink, e.g.:
        #   slack_configs / a Discord webhook + `/slack` suffix / email_configs.
  - name: warn-log
    webhook_configs:
      - url: http://alert-sink:8888/warn
        send_resolved: true

inhibit_rules:
  # A node-down page suppresses the dependent finalizing/backend warns.
  - source_matchers: [severity = "page", alertname = "NodeDown"]
    target_matchers: [severity = "warn"]
    equal: ['cluster']
