# blackbox-exporter — up/down probing of the DreggNet HTTP surfaces.
# http_2xx treats any 2xx response as success (probe_success=1). node-a /health
# returns "200 ok\n"; the node /health and ops /healthz return 200 JSON.
modules:
  http_2xx:
    prober: http
    timeout: 8s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.0", "HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []   # default: any 2xx
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
      fail_if_not_ssl: false
