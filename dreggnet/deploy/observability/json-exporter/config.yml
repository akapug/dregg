# prometheus-community/json_exporter — translate DreggNet JSON surfaces into
# Prometheus time-series. Prometheus calls /probe?module=<m>&target=<url>.
#
# Module `ops_health`  → the ops dashboard /api/health (ops/src/aggregate.rs::CloudHealth).
# Module `gateway_status` → the gateway /status (gateway/src/status.rs::GatewayStatus).
#
# JSON booleans map to 1/0. Fields that are null (e.g. consensus_divergence /
# tau_prefix_shifts / bridge_conservation_ok before a relayer is configured) yield
# NO sample — the series simply appears the moment ops reports them, which is the
# honest behaviour.

modules:
  ops_health:
    metrics:
      - name: dreggnet_ops_block_height
        help: "Latest finalized block height (ops /api/health.block_height)."
        path: '{.block_height}'
      - name: dreggnet_ops_peers
        help: "Connected federation peers."
        path: '{.peers}'
      - name: dreggnet_ops_federation_members
        help: "Federation member count."
        path: '{.federation_members}'
      - name: dreggnet_ops_consensus_live
        help: "Whether blocklace consensus is live (1/0)."
        path: '{.consensus_live}'
      - name: dreggnet_ops_node_finalizing
        help: "Whether the node is finalizing blocks (1/0)."
        path: '{.node_finalizing}'
      - name: dreggnet_ops_consensus_divergence
        help: "rust↔lean differential divergence count (null until observed)."
        path: '{.consensus_divergence}'
      - name: dreggnet_ops_tau_prefix_shifts
        help: "tau-prefix shift count (null until observed)."
        path: '{.tau_prefix_shifts}'
      - name: dreggnet_ops_gossip_messages
        help: "Cumulative federation gossip messages (dregg_gossip_messages_total summed)."
        path: '{.gossip_messages}'
      - name: dreggnet_ops_gossip_stream_rejected
        help: "Cumulative inbound gossip streams rejected at the edge (the gossip-storm signal; rate() is the early warning)."
        path: '{.gossip_stream_rejected}'
      - name: dreggnet_ops_finality_latency_avg
        help: "Mean finality latency in seconds (first-vote to quorum; null until the node finalizes once)."
        path: '{.finality_latency_avg}'
      - name: dreggnet_ops_machines
        help: "Gateway machine records."
        path: '{.machines}'
      - name: dreggnet_ops_durable_jobs_in_flight
        help: "Durable jobs charged within the last 300s (lease economy)."
        path: '{.durable_jobs_in_flight}'
      - name: dreggnet_ops_total_units_spent
        help: "Total metered units spent across all leases."
        path: '{.total_units_spent}'
      - name: dreggnet_ops_pg_active_connections
        help: "Postgres connections in use."
        path: '{.pg_active_connections}'
      - name: dreggnet_ops_pg_max_connections
        help: "Postgres max_connections setting."
        path: '{.pg_max_connections}'
      - name: dreggnet_ops_pg_db_size_bytes
        help: "Durable Postgres database size on disk (bytes)."
        path: '{.pg_db_size_bytes}'
      - name: dreggnet_ops_bridge_mints_observed
        help: "Bridge mint/bridgemint effects observed in the event window."
        path: '{.bridge_mints_observed}'
      - name: dreggnet_ops_bridge_conservation_ok
        help: "Whether all observed bridge mirror ledgers conserve (1/0; null until a relayer is configured)."
        path: '{.bridge_conservation_ok}'

  gateway_status:
    metrics:
      - name: dreggnet_gateway_machines
        help: "Machine records the gateway holds (gateway /status.machines)."
        path: '{.machines}'
      - name: dreggnet_gateway_dispatch_enabled
        help: "Whether the gateway dispatches workloads to a backend (1/0)."
        path: '{.compute.dispatch}'

  # The full snapshot (ops/src/aggregate.rs::CloudSnapshot). /api/health is the
  # rollup; /api/snapshot carries the durable lease economy. The Cloud dashboard's
  # lease panels read these.
  ops_snapshot:
    metrics:
      - name: dreggnet_ops_total_leases
        help: "Distinct leases ever metered (snapshot.durable.total_leases)."
        path: '{.durable.total_leases}'
      - name: dreggnet_ops_durable_total_units_spent
        help: "Total units charged across the durable outbox (snapshot.durable.total_units_spent)."
        path: '{.durable.total_units_spent}'
      - name: dreggnet_ops_durable_jobs_in_flight
        help: "Durable jobs charged within the recent in-flight window (snapshot.durable.jobs_in_flight)."
        path: '{.durable.jobs_in_flight}'
