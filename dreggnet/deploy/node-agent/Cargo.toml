[package]
name = "dreggnet-node-agent"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-only"
description = "The DreggNet compute-backend bridge agent: serves POST /fulfill on the mesh (overlay :8021) by running a funded lease as a real durable metered workflow via dreggnet-bridge::fulfill. This is the dispatch_lease_over_mesh target (control/src/mesh.rs)."

[[bin]]
name = "node-agent"
path = "src/main.rs"

[dependencies]
# The real lease->durable-metered-workflow weld. Pulls dreggnet-exec so
# add(40,2) genuinely runs in the owned wasmi sandbox, metered.
dreggnet-bridge = { path = "../../bridge" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
