# dreggnet-stripe-receiver — the local webhook endpoint for the LIVE Stripe step.
#
# This is a DEMO INTEGRATION TOOL, deliberately a STANDALONE crate (its own
# `[workspace]` table below) so it is NOT part of the DreggNet
# workspace's dependency graph: the DreggNet product never links dregg.
#
# It links breadstuffs' `dregg-bridge` (AGPL-3.0) by a path dep so that an inbound
# Stripe webhook is verified + minted by the GENUINE `stripe_mirror` code path —
# the same `StripeMirrorState::mint_against_webhook` the `dregg-bridge` test suite
# exercises. Because it links AGPL, this demo tool is itself AGPL-3.0 (it is part of
# the "two repos, scripted together" demo, not the DreggNet service itself).
#
# Build it pointed at breadstuffs' warm target so the heavy dregg crates are reused:
#   CARGO_TARGET_DIR="$BREADSTUFFS_DIR/target" \
#     cargo build --manifest-path demo/stripe-receiver/Cargo.toml --release
# (demo/stripe-receiver.sh does exactly this.)

[package]
name = "dreggnet-stripe-receiver"
version = "0.1.0"
edition = "2021"
publish = false
license = "AGPL-3.0-only"
description = "Local Stripe webhook receiver that runs breadstuffs' real stripe_mirror verify+mint (demo tool)."

# Standalone workspace: keep this out of the DreggNet workspace graph entirely.
[workspace]

[[bin]]
name = "dreggnet-stripe-receiver"
path = "src/main.rs"

[dependencies]
# The REAL Stripe verify+mint. Path-relative to breadstuffs as a sibling checkout
# (~/dev/DreggNet and ~/dev/breadstuffs). If breadstuffs lives elsewhere, point this
# at <breadstuffs>/bridge (or symlink it).
#
# `test-utils` enables the in-process RAM mint path
# (`StripeMirrorState::mint_against_webhook`): the dregg-side `seen_payments` dedup
# + conservation accounting + the REAL `Effect::Mint` production, the same code the
# `dregg-bridge` suite exercises. It ADDS the in-process applier, removes no
# guarantee. This demo receiver is the DreggNet-plane in-process twin; the
# REVIEWED-GO production form drives the COMMITTED `bridge_mint_against_lock`
# (the global consume-once `note_nullifiers` authority) against a live node.
dregg-bridge = { path = "../../../bridge", features = ["test-utils"] }

[dev-dependencies]
# TEST-ONLY: pattern-match the emitted kernel `Effect::Mint` and build `CellId`
# recipients in the mock-webhook proof tests. Not linked by the binary itself
# (which prints the effect via Debug). Path-relative to the breadstuffs siblings.
dregg-turn = { path = "../../../turn" }
dregg-types = { path = "../../../types" }

# [patch] is resolved at the building workspace's root, NOT the dependency's, so this
# standalone crate must re-state the ONE patch dregg-bridge's tree needs: the
# ark-serialize fork carrying the `serde_with` feature `dregg-hints` requires. (This
# mirrors how breadstuffs' excluded `dregg-tui` crate carries its own [patch].) Stating
# the SAME git source as breadstuffs lets a build with CARGO_TARGET_DIR=$BREADSTUFFS/target
# reuse breadstuffs' already-compiled artifacts. The plonky3 git pins resolve for free via
# breadstuffs' own [workspace.dependencies] (the dregg crates inherit them as path-deps).
[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
