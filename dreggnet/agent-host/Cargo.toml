[package]
name = "dreggnet-agent-host"
description = "The HOSTED AGENT SESSION host: map an SSH public key / token to a dga1_ cap-account + budget + cap bundle, and emit the OpenSSH authorized_keys forced-command lines that drop a connecting user into THEIR confined `dregg-agent attach` session — the brain + tools run server-side, every action cap-gated + budget-drawn + receipted, per-user isolated. The substrate session core is the breadstuffs `dregg-agent` crate; this is the hosting/identity glue + the SSH-edge enrolment."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_agent_host"
path = "src/lib.rs"

# `dreggnet-agent-host` — the SSH-attach hosting layer. Pure-std + serde; it
# carries NO heavy net/Elide closure, so it cross-builds trivially. It depends on
# the open-source breadstuffs `dregg-agent` crate ONLY for the cap-bundle parser
# (so an enrolled caps string is validated against the real grant vocabulary at
# enrol time) and for the documented attach contract — the session itself runs in
# the `dregg-agent` binary the forced-command names.
[[bin]]
name = "dreggnet-agent-hostctl"
path = "src/bin/dreggnet-agent-hostctl.rs"

[dependencies]
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
# The cap-bundle parser (validate an enrolled caps string against the real grant
# vocabulary) + the attach session contract. The open-source agent runtime.
dregg-agent = { path = "../../dregg-agent" }

[dev-dependencies]
tempfile = { workspace = true }
