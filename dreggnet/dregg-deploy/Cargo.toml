[package]
name = "dregg-deploy"
description = "DreggNet auto-deploy-from-git: clone → detect → build (cap-bounded) → publish a site cell, as a crash-resumable, metered durable workflow"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dregg_deploy"

# `dregg deploy <repo>` — the keystone DX (docs/PERMISSIONLESS-CLOUD-PLAN.md §3.1).
#
# A deploy is a durable workflow whose activities are Clone, Build, Publish — so it
# is crash-resumable + exactly-once + metered, the same way a compute lease is. This
# crate is a thin WELD over four already-built surfaces, not a new engine:
#   - `duroxide`         — the durable-execution runtime (its own registries here, since
#                          `dreggnet-durable` registers only the polyana + meter activities;
#                          the deploy needs Clone/Build/Publish activities of its own).
#   - `dreggnet-exec`    — the cap-bounded compute tier a build runs in (the wasm/Caged path).
#   - `dreggnet-webapp`  — the site-publish flow (a built tree → a `SiteCell` + receipt).
#   - `dreggnet-durable` — the conserving settlement ledger (the metered build → a real
#                          exactly-once `Transfer`, the verifiable-billing tie-in).
#
# Durable store: the bundled SQLite provider on an on-disk DB (single-host, WAL-durable):
# a deploy that crashes mid-build resumes from its last checkpoint. The build's source
# commitment (the cloned commit hash) lands in the deploy receipt AND is committed into
# the published cell's `content_root` (a `/.well-known/dregg-deploy.json` manifest asset),
# so "this site was built from THAT commit" is re-witnessable.

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tokio = { workspace = true }
# The durable-execution runtime. Bundled SQLite provider (matches dreggnet-durable's
# pin so the duroxide build unifies to one version across the workspace).
duroxide = { version = "0.1.29", default-features = false, features = ["sqlite"] }
# The cap-bounded compute tier a build runs in.
dreggnet-exec = { path = "../exec" }
# The site-publish flow (a built tree → a SiteCell + PublishReceipt).
dreggnet-webapp = { path = "../webapp" }
# The conserving settlement ledger — a metered build settles as a real exactly-once
# Transfer (the verifiable-billing tie-in).
dreggnet-durable = { path = "../durable" }

# The deny-default build sandbox (D-1/D-3) drops resource rlimits + process-group
# isolation onto the untrusted-repo build subprocess. Unix-only (the cage primitives
# are POSIX); the build path is only ever exercised on Linux/macOS.
[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

# openssl loose end (Linux cross-build): duroxide pins sqlx with native-tls, which on
# Linux pulls openssl-sys. Cargo feature unification is additive, so a downstream crate
# cannot drop it — vendor a bundled OpenSSL on Linux so the cross-build is self-contained.
# (macOS uses the Security framework and never pulls openssl-sys.) Mirrors dreggnet-durable.
[target.'cfg(target_os = "linux")'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[dev-dependencies]
# The crash-resume test uses an on-disk SQLite DB + an on-disk workdir in a temp dir, so
# the durable store + the built tree genuinely survive the runtime being torn down.
tempfile = { workspace = true }
