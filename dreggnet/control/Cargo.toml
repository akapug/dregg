[package]
name = "dreggnet-control"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_control"
path = "src/lib.rs"

# The self-hostable provider entrypoint: load a ProviderConfig (your cells, your
# machines, your gateway) and stand up the VmProvider it describes. This is the
# unit a stranger runs to host their own DreggNet provider.
#   dreggnet-provider --config provider.toml
[[bin]]
name = "dreggnet-provider"
path = "src/bin/dreggnet-provider.rs"

# The control plane (ARCHITECTURE.md ladder rung 4): scheduling + workload
# lifecycle + a rentable-machine provider abstraction. It sits ABOVE the bridge:
#
#   dregg execution-lease   (the AUTHORIZATION — who, what cap-grade, what budget)
#     └─ dreggnet-control    (THIS crate — decides WHICH machine, places + reaps)
#        └─ dreggnet-bridge   (fulfills the lease as a durable polyana workflow)
#           └─ dreggnet-durable / dreggnet-exec / polyana
#
# The bridge runs a workload on the LOCAL machine; the control plane chooses the
# machine. The `VmProvider` trait is the rentable-machine abstraction: the
# `LocalProvider` runs the workload in-process via the bridge (dev + the proven
# end-to-end path); the `Ec2Provider` is the AWS EC2 scale-out — it shells out to
# the `aws` CLI for real (run-instances / terminate-instances / describe-instances /
# describe-instance-status, JSON-parsed). There is deliberately NO Hetzner provider.

[features]
default = []
# Link the dregg verified core so the orchestration loop reads leases through the
# LIGHT-CLIENT VERIFIED on-chain read (`VerifiedNodeLeaseSource` →
# `dreggnet_bridge::dregg_verify::verified_leases_from_range`) rather than trusting
# the node's cell API. Off by default; the heavy verified-core link is opt-in.
dregg-verify = ["dreggnet-bridge/dregg-verify", "dep:dregg-query"]

[dependencies]
# The dregg attested-query types (`Mmr` / `IndexRangeResponse` / `ReceiptRecord`),
# used by the trusted-root-anchor + windowed-read tests to build REAL receipt-index
# MMR openings the `VerifiedNodeLeaseSource` verifies. Optional + compiled only
# under `dregg-verify` (same pinned rev as the bridge); the default build links no
# dregg git.
dregg-query = { git = "https://github.com/emberian/dregg.git", rev = "a0a0a019692870d9ec992744042de2df8c19be0c", package = "dregg-query", optional = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true }
# The DURABLE DATA PLANE backend — now the REAL substrate umem heap (the #2
# re-dregg move, docs/REGISTRIES-AS-UMEM.md): both the persistent-server record
# store (`server::ServerStore`) and the mesh node registry (`mesh::MeshNodeRegistry`,
# the machine→mesh-identity map) ARE umem cells. A record is laid into the cell's
# `(collection,key) -> value` heap and committed to the kernel's sorted-Poseidon2
# boundary root, so a control-plane restart RECONSTRUCTS the fleet + the registered
# nodes FROM the committed heap. This replaces the from-scratch JSON-lines log (the
# `dreggnet-store` myopia the compute-as-cell lane already named) with a dependency on
# the real `dregg-cell`, unlocking fork (branch the fleet/mesh) + time-travel (restore
# an earlier root) + merge-readiness (the heap leaf-set is a `dregg_merge::GrowSet`).
dreggnet-umem = { path = "../umem" }
# Structured control-plane observability: spans over admission / metering / reaping
# carrying `server_id` / `lessee` / `period` / `units` so a roll-up or lapse is
# traceable end to end. `tracing-subscriber` is installed by the binaries (below).
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
# The self-hostable provider config (`config.rs`) is loaded from a TOML file.
toml = "0.9"
# `process` (additive over the workspace feature set) lets the `Ec2Provider` shell
# out to the `aws` CLI from async code (`tokio::process::Command`); `time` is used
# to back off between `describe-instance-status` polls while an instance boots;
# `net` lets a live (Linux) `MeshLink` TCP-probe a fleet node over the overlay.
tokio = { workspace = true, features = ["process", "time", "net"] }

# The bridge fulfills a funded lease as a durable polyana workflow on the local
# machine; the control plane drives it for the `LocalProvider` path.
dreggnet-bridge = { path = "../bridge" }
# The durable layer carries the meter + the conserving `Settlement` (Payable) rail
# the orchestrator settles metered work through (the metering→Payable fold).
dreggnet-durable = { path = "../durable" }
# The static-hosting data plane: the per-site `BandwidthMeter` byte-counter the
# hosting-billing meter (`hosting_meter.rs`) rolls up + settles, and lapses when a
# site's hosting budget is exhausted (stops serving). The serving path increments
# it; the control meter bills it.
dreggnet-webapp = { path = "../webapp" }
# The cap-tier a lease's grade resolves to (the machine sizing/isolation axis).
dreggnet-exec = { path = "../exec" }

# COMPUTE-AS-CELL (`src/compute_cell.rs`, `docs/COMPUTE-AS-CELL.md`): the persistent
# server's STATE is a umem cell with a committed boundary root. `ComputeCell` is a thin
# server-state wrapper over the CANONICAL umem-cell primitive — ONE umem heap, two
# wrappers (the registries lane wraps the same `dreggnet_umem::UmemCell`). It no longer
# re-implements the heap-root/checkpoint logic over `dregg-circuit` directly; that
# duplication is retired (`docs/REGISTRIES-AS-UMEM.md`, `docs/COMPUTE-AS-CELL.md`). These
# remain the REAL deployed substrate pieces (the AGPL firewall is dissolved —
# `FIREWALL-DISSOLUTION.md`), not stand-ins:
#   - `dreggnet-umem` — the canonical `UmemCell` (the committed `(key→value)` heap whose
#     boundary is the kernel's real sorted-Poseidon2 `dregg_cell::compute_heap_root`,
#     pinned by `root_binds_get`) + checkpoint/restore/fork/time-travel. It pulls the same
#     pinned `emberian/dregg` substrate the verified-lease + storage lanes use.
#   - `dregg-types` — `CellId::derive_raw`, the substrate cell-id `webauth/` anchors
#     an account with (the LIGHT crate: serde + blake3 + ed25519, no heavy closure).
# (`dreggnet-umem` is declared once, above — the same canonical crate backs both the
# registry record-stores and the `ComputeCell` server-state wrapper.)
dregg-types = { path = "../../types" }
blake3 = "1"

# The secure-mesh identity (`mesh.rs`): an x25519 WireGuard keypair, base64 key
# encoding, and zeroized private-key material. These are pure crypto crates that
# build on every host, so the mesh config/keypair/link-setup path stays green on
# the macOS dev box even though the WireGuard *engine* is Linux-only (below).
x25519-dalek = { workspace = true }
base64 = { workspace = true }
zeroize = { workspace = true }
rand_core = { version = "0.6", features = ["getrandom"] }

# The userspace WireGuard engine the mesh brings a link up with, via DreggNet's own
# AGPL-clean `crate::wg` wrapper over `boringtun` (Cloudflare, BSD-3-Clause — the
# reference userspace WireGuard). This replaces the previously-vendored Elide
# `elidewireguard` crate; unlike the old Linux-only Elide net/ stack, boringtun is
# cross-platform, so the engine now builds + is exercised on every host. The live
# TUN-up + Noise handshake against a node remains the deploy step. On non-Linux
# hosts `mesh::default_mesh` still returns the in-crate `StubMesh` (unchanged).
boringtun = { workspace = true }

# Control-plane (scheduler) characterization: full lease lifecycle place+reap,
# sequential + concurrent. Hand-rolled timing harness, offline.
[[bench]]
name = "scheduler_bench"
harness = false
