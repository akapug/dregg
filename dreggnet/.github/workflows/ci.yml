# DreggNet CI — the build-gate for the proprietary serving stack.
#
# DreggNet is a Linux serving stack (the net/ gateway uses epoll/io_uring and
# Linux-only socket primitives — see ARCHITECTURE.md "Target: Linux"). The
# service layers (cli/durable/exec/bridge/control/webapp) build + test on macOS
# too. So the gate is split:
#
#   * service-stack — `cargo test` the macOS-buildable service crates.
#   * gateway-linux — build the Linux-only net gateway (httpe + dreggnet-gateway)
#                     natively on an ubuntu runner.
#   * fmt           — `cargo fmt --check` (a hard gate).
#   * clippy        — advisory (reports, does not fail the build).
#
# The toolchain is pinned by rust-toolchain.toml (nightly-2026-03-24); each job
# also names it explicitly so the setup action installs the right channel +
# components. The exec crate path-deps only owned workspace crates plus wasmi
# from crates.io — no git submodule is needed to build.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
  # Nightly + on-demand: the workload-simulation suite (the only place the
  # concurrency + economy invariants run) is gated to these, not every push.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # The macOS-buildable service stack. exec uses the owned pure-Rust wasmi
  # sandbox, so no native toolchain is strictly required; cmake is kept as a
  # belt-and-suspenders for any transitive build script (preinstalled on the
  # GitHub macos-latest image; the `brew install` is a no-op safety net).
  service-stack:
    name: Service stack (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure cmake (native build scripts)
        run: brew list cmake >/dev/null 2>&1 || brew install cmake
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      # The second block (storage/org/status/attach/billing/agent-host/umem) was
      # EXCLUDED from CI until the test-rigor audit (docs/TEST-RIGOR-agent-cloud.md
      # §G5) — their real tests never ran, and `dreggnet-umem` holds the ONLY
      # real-Poseidon2-crypto tests (it depends on `dregg-cell` non-optionally). They
      # are portable and now run here. (`dreggnet-gateway` is Linux-only and runs in
      # the `gateway-linux` job below.)
      - name: cargo test (service crates)
        run: |
          cargo test \
            -p dreggnet-cli \
            -p dreggnet-durable \
            -p dreggnet-exec \
            -p dreggnet-bridge \
            -p dreggnet-control \
            -p dreggnet-webapp \
            -p dreggnet-ops \
            -p dreggnet-storage \
            -p dreggnet-org \
            -p dreggnet-status \
            -p dreggnet-attach \
            -p dreggnet-billing \
            -p dreggnet-agent-host \
            -p dreggnet-umem

  # The Linux-only net gateway. httpe (and its transport closure) use epoll/
  # io_uring + Linux socket primitives and do not compile on macOS, so they are
  # gated on a real Linux runner with a native `cargo build`. (From a macOS dev
  # box the equivalent is `cargo zigbuild --target x86_64-unknown-linux-gnu
  # -p httpe -p dreggnet-gateway` — see ARCHITECTURE.md.) System deps mirror the
  # Dockerfile build stage (build-essential/perl/pkg-config/libssl-dev/cmake/clang).
  gateway-linux:
    name: Gateway (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (gateway)
        run: cargo build -p httpe -p dreggnet-gateway
      # The gateway test lane: CI previously only `cargo build`-ed the gateway, so
      # its no-free-compute / funding tests never ran in CI. Run them natively on
      # this Linux runner (the macOS-dev equivalent is
      # `cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-gateway --tests`).
      - name: cargo test (gateway)
        run: cargo test -p dreggnet-gateway

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
          components: rustfmt
      - run: |
          cargo fmt --all -- --check \
            || { echo '::error::format drift — run `cargo fmt --all`'; exit 1; }

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # ADVISORY, not a gate — mirrors breadstuffs. It runs + annotates but does
    # not fail the build (a pinned-CI clippy can carry lints the local clippy
    # lacks, making a hard gate non-reproducible). Run `cargo clippy` locally.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p httpe -p dreggnet-gateway -- -D warnings

  # The service-stack characterization benches (exec/durable/webapp) — a
  # compile-and-quick-run SMOKE, not a perf gate. It proves the benches build and
  # their harnesses run; `make bench-smoke` caps iterations to a handful and skips
  # the durable bench's slow on-disk duroxide path. cmake + clang are installed to
  # mirror the gateway/clippy jobs' build environment.
  bench-smoke:
    name: Benches (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: make bench-smoke
        run: make bench-smoke

  # The Postgres durable-resume lane. The `pg` feature swaps duroxide's SQLite
  # provider for the in-process duroxide-pg PostgreSQL provider; its resume +
  # transactional-outbox test is `#[ignore]` + `DATABASE_URL`-gated, so it never
  # runs in the offline service-stack job. This lane stands up a real Postgres and
  # runs it. (The `pg-dregg` verified-store lane needs the sibling breadstuffs
  # checkout — `../../breadstuffs/pg-dregg` — so it is out of this single-repo CI.)
  postgres:
    name: Durable (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: dreggnet
          POSTGRES_PASSWORD: dreggnet
          POSTGRES_DB: dreggnet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dreggnet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dreggnet:dreggnet@localhost:5432/dreggnet
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (durable, pg feature)
        run: |
          cargo test -p dreggnet-durable --features pg \
            --test durable_resume_pg -- --ignored --test-threads=1

  # The compute-backend bridge agent (serves /fulfill on the mesh). It is not in
  # the service-stack test list, so CI never built or tested it. It is portable
  # (pure tokio over dreggnet-bridge); build + test it here. (It carries 0 tests
  # today — this lane is the build gate + the home for its tests when they land.)
  persvati-agent:
    name: Persvati agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (persvati-agent)
        run: cargo test -p dreggnet-persvati-agent

  # The workload-simulation suite (docs/WORKLOAD-TEST-PLAN.md) — the only place the
  # multi-tenant concurrency + economy (Σδ=0, no double-charge) invariants run
  # under realistic, fault-injected load. Every scenario is `#[ignore]`d and out of
  # `make test`, so it runs ONLY nightly (the `schedule` cron) or on demand
  # (`workflow_dispatch`) — never on every push/PR. Default (short) durations; soak
  # it longer with DREGGNET_WL_DURATION.
  workload:
    name: Workload simulation (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: make test-workload
        run: make test-workload

  # The twin==substrate cross-check (docs/TEST-RIGOR-agent-cloud.md F1/G1). Every
  # default test settles on the in-process `ConservingLedger` twin; this lane runs
  # the SAME settlement sweep through the twin AND the real `dregg_cell::CellState`
  # substrate (`--features dregg-conserve`) and asserts they agree — so the twin is
  # provably faithful, not just assumed. It needs the sibling breadstuffs (dregg)
  # checkout for the `dregg-cell` path-dep — the same cross-repo boundary that keeps
  # the pg-dregg verified-store lane out of single-repo CI — so it is nightly/on-
  # demand and gated on a repo-access token secret (DREGG_REPO_TOKEN). With the token
  # absent it self-skips loudly (never a false green); wire the token to run it real.
  twin-substrate:
    name: twin==substrate (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          path: DreggNet
      # The sibling dregg (breadstuffs) checkout, for the `dregg-cell` path-dep
      # (`../../breadstuffs/cell`). Needs a token with read access to emberian/dregg;
      # continue-on-error so an unconfigured token yields a clean skip below, not a
      # hard CI failure.
      - name: Checkout sibling breadstuffs (dregg)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: emberian/dregg
          token: ${{ secrets.DREGG_REPO_TOKEN }}
          path: breadstuffs
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential perl pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-24
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (twin==substrate, dregg-conserve)
        working-directory: DreggNet
        run: |
          if [ ! -d ../breadstuffs/cell ]; then
            echo "::warning::sibling breadstuffs checkout absent (set the DREGG_REPO_TOKEN secret) — skipping the twin==substrate lane"
            exit 0
          fi
          cargo test -p dreggnet-durable --features dregg-conserve \
            --test twin_equals_substrate
