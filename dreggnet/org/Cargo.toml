[package]
name = "dreggnet-org"
description = "DreggNet organizations/teams (IAM): an Org is its own dregg cell/identity that OWNS resources; members are dga1_ cap-accounts holding a role; a role IS an attenuation of the org-owner's authority over the org's resources (the legible face of the webauth cap lattice). Invites/accept/remove/transfer are receipted membership turns; org-scoping + role-gating are cap teeth, not trusted flags."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_org"
path = "src/lib.rs"

# `dreggnet-org` — the teams/orgs layer. It does NOT introduce a new authority
# primitive: it RE-USES the `dreggnet-webauth` `dga1_` credential core (the
# ed25519 caveat-chain, the `attenuate` no-amplify lattice, `Credential::verify`)
# and reads it as orgs + roles. A role-cap is literally `org_owner_grant(...)
# .attenuate(role_perms)`, so "viewer is read-only" / "admin can't delete the
# org" are the SAME no-amplify property webauth already proves, surfaced as IAM.
# Pure-std, dependency-light (only webauth + serde), so it cross-builds + tests
# on any host like ops/console/guard.
[dependencies]
serde = { workspace = true, features = ["std", "derive"] }
# The dregg-cap credential core: RootKey/Credential/Caveat/Pred/Context + the
# `attenuate`/`verify` lattice the role-caps are built from.
dreggnet-webauth = { path = "../webauth" }

[dev-dependencies]
# The integration test names the credential type directly (the member's role-cap
# handed back by accept/transfer); pull webauth into the test crate's closure too.
dreggnet-webauth = { path = "../webauth" }
