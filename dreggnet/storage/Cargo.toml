[package]
name = "dreggnet-storage"
description = "DreggNet durable object storage: a bucket is a dregg cell, objects are content-addressed assets, operations are cap-gated, metered, receipted turns with a trustless (re-witnessable) read"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_storage"
path = "src/lib.rs"

# The durable object-store service on the verified rail: **a bucket is a dregg
# cell.** A bucket cell holds an owner, a cap-gated namespace, and a content
# commitment over content-addressed objects; put/get/list/delete are cap-gated,
# metered, receipted operations, and the read path is *trustless* — a reader
# re-witnesses that the served bytes are committed in the bucket's root.
#
#   PUT/DELETE (cap-gated, metered, receipted)     GET (trustless, re-witnessable)
#   ──────────────────────────────────────────     ───────────────────────────────
#   StorageCap  storage-bucket/<name>              verified_get ─▶ ObjectOpening
#     └─ BucketRegistry::put ─▶ BucketCell             └─ verify_opening (pure)
#          { name, owner, content_root,                     re-derive leaf from bytes,
#            content: key → Object }                        re-fold → == bucket_root
#          + PutReceipt + Account charge
#
# Deliberately dependency-light + platform-portable (mirrors `dreggnet-webapp`'s
# `hosting` module): it depends only on `serde`/`serde_json`/`anyhow`, not on the
# Linux-only `net/` gateway stack, so `cargo test -p dreggnet-storage` runs the
# full put/get/list/delete round-trip, the cap-gate, the meter, and the trustless
# read in-process on any host. The gateway mounts the typed `BucketRegistry`
# surface the way `gateway/src/hosting.rs` mounts the `SiteRegistry`.

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# The ONE product-wide receipt contract: each bucket op (create/put/delete) is a
# turn, sealed into the registry's prev-hash-chained, ed25519-signed receipt
# stream so a client can verify it without trusting the host.
dreggnet-receipt = { path = "../receipt" }
# The DURABLE DATA PLANE backend — now the REAL substrate umem heap (the #2
# re-dregg move, docs/REGISTRIES-AS-UMEM.md): the `BucketRegistry` IS a umem cell.
# Each bucket cell mutation (create/put/delete) is laid into the cell's
# `(collection,key) -> value` heap and committed to the kernel's sorted-Poseidon2
# boundary root, so a gateway restart RECONSTRUCTS the buckets + their objects FROM
# the committed heap. This replaces the from-scratch JSON-lines `dreggnet-store` log
# (which reimplemented exactly what a committed umem heap already gives) with a
# dependency on the real `dregg-cell`, unlocking namespace fork (a tenant forks
# their whole set of buckets) + time-travel (restore an earlier root) + merge-
# readiness (the heap leaf-set is a `dregg_merge::GrowSet`).
dreggnet-umem = { path = "../umem" }

# The REAL Poseidon2 carrier (sorted cell-heap root + 8-felt faithful state
# commitment), pinned to the SAME `emberian/dregg` rev the verified-lease lane
# reads against. A NORMAL (unconditional) dependency: the object leaf hash + the
# bucket `content_root` are the real Poseidon2 commitment on EVERY build — no FNV
# fallback under the trustless-read claim. (`emberian/dregg` is ember-owned and
# DreggNet is AGPL, so the prior license firewall is dissolved; the plonky3 closure
# is a build-cost note, not a soundness gate.)
dregg-circuit = { git = "https://github.com/emberian/dregg.git", rev = "a0a0a019692870d9ec992744042de2df8c19be0c", package = "dregg-circuit" }
