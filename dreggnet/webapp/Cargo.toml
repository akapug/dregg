[package]
name = "dreggnet-webapp"
description = "DreggNet agent-served web apps: an agent declares routes â†’ polyana handlers; DreggNet runs them on polyana under a lease and serves them over HTTP"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_webapp"
path = "src/lib.rs"

# The agent-served-web-API capability (ARCHITECTURE.md headline: "fully agentic
# web-facing apps"). An agent assembles a `WebApp` â€” a set of HTTP routes, each
# bound to a polyana workload handler â€” and DreggNet serves it:
#
#   inbound HTTP  â”€â”€â–¶  Router::serve   (match the route)
#                        â”‚  build the handler's WorkloadSpec from the request
#                        â–Ľ
#                      dreggnet_exec::run_workload  (the handler RUNS on polyana)
#                        â”‚  render the returned value(s)
#                        â–Ľ
#                      WebResponse     (served back over HTTP)
#
# This crate is deliberately platform-portable: it depends on `dreggnet-exec`
# (the wasm tiers build + run on macOS and Linux) and `dreggnet-bridge` (for the
# `Lease` type + the real lease gate, for per-request metering), NOT on the
# Linux-only `net/` gateway stack. So `cargo test -p dreggnet-webapp` runs a real
# requestâ†’polyana-handlerâ†’response end to end on any host, and the bundled
# `dreggnet-serve` binary serves an assembled WebApp over real TCP cross-platform.
# The fly-machines gateway (Linux-only) adopts this crate's `Router` to route
# inbound HTTP to a served app (`gateway/src/webapp.rs`).

# A cross-platform serving binary: bind a TCP listener and serve an assembled
# WebApp over a small HTTP/1.1 loop, routing each request to its polyana handler.
[[bin]]
name = "dreggnet-serve"
path = "src/bin/dreggnet-serve.rs"

# The static-hosting serving binary: publish a directory as a minisite cell
# (cap-gated, receipted) and serve it by `Host` the way `example.com` routes.
#   dreggnet-host --dir ./site --name blog --port 8080
[[bin]]
name = "dreggnet-host"
path = "src/bin/dreggnet-host.rs"

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# The execution surface: a handler RUNS as a real polyana workload through this
# (the wasm tiers run on macOS + Linux, so the served handler genuinely executes
# in the sandbox on any host).
dreggnet-exec = { path = "../exec" }
# The lease vocabulary + the real lease gate (`workflow_input_for_lease`): a
# served app runs under a funded dregg execution-lease, and each request is
# metered against the lease budget (see `router::LeasedRouter`).
dreggnet-bridge = { path = "../bridge" }
# The durable-execution layer: `LeasedRouter` runs each served request THROUGH a
# durable, crash-resumable, exactly-once-metered duroxide workflow (one request =
# one `WorkloadSpec` step), unifying the webapp data plane with the bridge's
# durability guarantee. The blocking in-memory runner keeps this crate tokio-free.
dreggnet-durable = { path = "../durable" }
# The ONE product-wide receipt contract: a `PublishReceipt` is sealed into a
# prev-hash-chained, ed25519-signed stream (the `SiteRegistry`'s receipt chain)
# so a client can verify a publish without trusting the host. Re-exported as
# `dreggnet_webapp::receipt` so the crates layered on webapp (dregg-deploy,
# dregg-domains) speak the same contract with no extra dependency.
dreggnet-receipt = { path = "../receipt" }
# The DURABLE DATA PLANE backend â€” now the REAL substrate umem heap (the #2
# re-dregg move, docs/REGISTRIES-AS-UMEM.md): the `SiteRegistry` IS a umem cell, a
# published `SiteCell` is laid into the cell's `(collection,key) -> value` heap and
# committed to the kernel's sorted-Poseidon2 boundary root, so a gateway/host
# restart RECONSTRUCTS the published sites FROM the committed heap. This replaces
# the from-scratch JSON-lines `dreggnet-store` log (which reimplemented exactly what
# a committed umem heap already gives) with a dependency on `dregg-cell`, unlocking
# fork (a tenant forks their whole namespace) + time-travel (restore an earlier
# root) + merge-readiness (the heap leaf-set is a `dregg_merge::GrowSet`).
dreggnet-umem = { path = "../umem" }

# The REAL Poseidon2 carrier (the sorted cell-heap root + the 8-felt faithful
# state-commitment primitives the dregg kernel commits with), pinned to the SAME
# `emberian/dregg` rev the `dreggnet-bridge` verified-lease lane reads against, so
# the published content commitment IS the cryptographic root a dregg light client
# understands. A NORMAL (unconditional) dependency: the site `content_root` is the
# real sorted-Poseidon2 heap root pinned by `root_binds_get` on EVERY build â€” there
# is no FNV fallback under the verifiable-hosting "served bytes verify against the
# committed root" claim. (`emberian/dregg` is ember-owned and DreggNet is AGPL, so
# the prior license firewall is dissolved; the arkworks/plonky3 closure is heavy but
# that is a build-cost note, not a soundness gate.)
dregg-circuit = { git = "https://github.com/emberian/dregg.git", rev = "a0a0a019692870d9ec992744042de2df8c19be0c", package = "dregg-circuit" }

[dev-dependencies]
# The webapp crash-resume proof drives a request's durable workflow across a
# simulated crash over an on-disk store, so it uses the durable runtime directly
# (the same building blocks `dreggnet-durable`'s own resume proof uses).
duroxide = { version = "0.1.29", default-features = false, features = ["sqlite"] }
tokio = { workspace = true }
tempfile = { workspace = true }

# Gateway/webapp (router) characterization: req/sec through the non-durable +
# durable data planes, the 402/404 fast paths, and a wide N-thread sweep.
# Hand-rolled timing harness, offline.
[[bench]]
name = "gateway_bench"
harness = false
