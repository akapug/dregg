\* TLC configuration for CellModel.tla — the smallest reasonable model.
\*
\* Two public keys, one token id => up to 2 derivable CellIds.
\* MaxNonce = 2, MaxTurns = 2 keeps the state space tractable while still
\* covering both successful and rejected turns, transfer + nop turns, and
\* receipt chains of non-trivial length.
\*
\* MaxBalance = 2 and InitialEndowment = 2 give just enough room for a
\* couple of value-bearing turns (one transfer drains the holder; a fee
\* burn can be exercised by setting amount=1, fee=1).
\*
\* EffectKinds = {eA, eB}: a two-element abstract facet universe gives a
\* powerset of size 4 plus the NoMask sentinel — enough to exercise the
\* facet-attenuation invariant (I9) without exploding the cap-record
\* space.

SPECIFICATION Spec

CONSTANTS
    PublicKeys       = { pk1, pk2 }
    TokenIds         = { tA }
    MaxNonce         = 2
    MaxTurns         = 2
    MaxBalance       = 1
    InitialEndowment = 1
    EffectKinds      = { eA }

INVARIANT
    Invariant

PROPERTY
    MonotonicNonce
    NoAmplificationProperty
    TurnConservesBalanceProperty
    ReceiptChainAppendOnlyProperty
    TurnAppendsOneReceiptProperty
    NoBackdatedCapProperty
    ExerciseRespectsExpiryProperty
    IntroductionWellShapedProperty
    RevokeDoesNotCascadeProperty

\* State constraint: keep the c-list bounded so TLC doesn't explore an
\* unboundedly growing set of caps.  This bounds |caps| <= 3, |cells| <= 2,
\* and per-chain length <= MaxTurns.  We also bound `exercised`, the
\* `blockHeight` clock, and the `nextCapId` allocator so the new
\* increment's state explosion stays tractable.  The configuration is
\* downscaled relative to the I4/I5 increment (MaxTurns dropped from 2 to
\* 1) because the cap record grew by four fields and the action set grew
\* by Introduce / ExerciseBearer / Tick.
CONSTRAINT
    StateBound
