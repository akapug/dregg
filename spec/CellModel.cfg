\* TLC configuration for CellModel.tla — the smallest reasonable model.
\*
\* Two public keys, two token ids => up to 4 derivable CellIds.
\* MaxNonce = 2, MaxTurns = 3 keeps the state space tractable while still
\* covering both successful and rejected turns.

SPECIFICATION Spec

CONSTANTS
    PublicKeys = { pk1, pk2 }
    TokenIds   = { tA }
    MaxNonce   = 2
    MaxTurns   = 2

INVARIANT
    Invariant

PROPERTY
    MonotonicNonce
    NoAmplificationProperty

\* State constraint: keep the c-list bounded so TLC doesn't explore an
\* unboundedly growing set of caps.  This bounds |caps| <= 6, which is
\* plenty to exercise grant / redelegate / revoke transitions across four
\* possible cells and the five-element auth lattice.
CONSTRAINT
    StateBound
