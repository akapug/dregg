[package]
name = "dregg-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Agent SDK and cipherclerk for the dregg federation â€” token management, turn execution, and proof generation"

[dependencies]
dregg-federation = { path = "../federation", default-features = false }
# hints_onboarding (a lib module) uses the HINTS threshold-BLS crate directly, so it
# must be a real dep (not only a dev-dep, which only covers the test targets).
hints = { path = "../hints", package = "dregg-hints" }
dregg-types = { path = "../types" }
dregg-cell = { path = "../cell" }
dregg-cell-crypto = { path = "../cell-crypto" }
dregg-turn = { path = "../turn" }
starbridge-polis = { path = "../starbridge-apps/polis" }
dregg-bridge = { path = "../bridge" }
# UNCONDITIONAL (polarity-inverted, docs/FEATURE-HYGIENE.md Â§Lean): THE SWAP producer-mode
# path. The verified Lean executor (via `dregg_turn::lean_apply`) and the `dregg-lean-ffi`
# runtime are compiled into every native build, so `AgentRuntime` makes the verified
# executor the authoritative state producer (runtime-gated by `DREGG_LEAN_PRODUCER`,
# archive-gated by `lean_available()`). The ONE opt-out is the `no-lean-link` platform
# feature (wasm32/zkvm â€” targets that cannot link libdregg_lean.a).
dregg-lean-ffi = { path = "../dregg-lean-ffi" }
# THE SWAP producer-mode cluster (`produce_via_lean` = the authoritative verified-Lean state
# producer). Native-only crate (links libdregg_lean.a); pulled by the default-on `exec-lean`
# feature. A `no-lean-link` (wasm/zkvm) build passes `default-features = false`, so `exec-lean` is
# OFF and `run_turn` uses the legacy Rust-producer path â€” the platform boundary is now this dep, not
# a flag carving the cluster out of `dregg-turn`.
dregg-exec-lean = { path = "../exec-lean", optional = true }
# `network` feature: tokio + dregg-wire â€” non-wasm32 (mio, quinn). Wasm
# consumers set `default-features = false`; the modules that depend on
# these (client, embed, discharge, discovery) are `#[cfg]`-gated.
dregg-wire = { path = "../wire", optional = true }
# `captp` feature: dregg-captp pulls async runtimes that are non-wasm32.
# captp_client + names are gated on this.
dregg-captp = { path = "../captp", optional = true }
# `captp` feature (mailbox crank): the relay hosted-inbox dequeue-proof
# verifier (`dregg_storage::queue::verify_dequeue_proof{,_against}`) â€” the
# crank checks custody with the SAME verifier the relay's queue produces
# proofs for, no reimplementation.
dregg-storage = { path = "../storage", optional = true }
dregg-circuit = { path = "../circuit" }
# The SDK's producer path mints rotated proofs and binds custom sub-proofs
# (`dregg_circuit_prove::custom_proof_bind`), so it depends on the heavy prove
# crate. (The SDK's light-client VERIFY path uses only `dregg-circuit` symbols.)
dregg-circuit-prove = { path = "../circuit-prove" }
dregg-commit = { path = "../commit" }
# The light-client artifact (`AttestedHistory`) â€” the SDK's second
# user-facing noun. Pure verifier; rides the dregg-circuit prover
# feature the SDK already carries.
dregg-lightclient = { path = "../lightclient" }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }
dregg-dsl-tests = { path = "../dregg-dsl-tests" }
dregg-intent = { path = "../intent" }
dregg-macaroon = { workspace = true, features = ["crypto"] }
dregg-token = { path = "../token", default-features = false, features = ["macaroon", "biscuit", "rand-deps"] }
dregg-trace = { path = "../trace" }

# council_seal (the threshold-seal organ sealed_governance welds) drives the
# HINTS BLS pairing directly (G1/G2/G_T over BLS12-381), so the arkworks traits
# it calls (AffineRepr/CurveGroup/Pairing/UniformRand/CanonicalSerialize) must be
# direct deps â€” they are already transitively present via `hints`/`dregg-federation`;
# pinned to the same 0.5.0 the federation organ uses (no version skew).
ark-ec = "0.5.0"
ark-ff = "0.5.0"
ark-std = "0.5.0"
ark-serialize = { version = "0.5.0", features = ["serde_with"] }

async-trait = "0.1"
base64 = { workspace = true }
chacha20poly1305 = { workspace = true, optional = true }
futures-core = { version = "0.3", optional = true }
blake3 = "1"
curve25519-dalek = { version = "4", features = ["alloc"] }
ed25519-dalek = { version = "2", features = ["std"] }
getrandom = { workspace = true }
hex = "0.4"
hmac = { workspace = true }
pbkdf2 = "0.12"
postcard = { version = "1", features = ["use-std"] }
rmp-serde = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
reqwest = { version = "0.12", features = ["json"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
tracing = "0.1"
zeroize = { workspace = true }

[features]
# Native default keeps full networking surface â€” backward-compatible. Wasm
# consumers (and any embedded callers that only want the cipherclerk/runtime)
# pass `default-features = false`.
#
# `prover` is in the DEFAULT set: native builds compile the rotated IR-v2
# (R=24) producer + verifier (the cutover's target path; `descriptor_ir2` is
# present via `dregg-circuit`'s own default `prover`). Wasm / no-lean-link
# verifier builds pass `default-features = false`, so they get NEITHER the SDK
# rotated wrappers NOR `dregg-circuit/prover` (the prover-free rotated VERIFY
# surface they need is C2 of the cutover, ROTATION-CUTOVER Â§EXEC).
default = ["federation-client", "network", "captp", "prover", "exec-lean"]
federation-client = ["dep:reqwest"]
# THE SWAP producer cluster (native): pulls `dregg-exec-lean` so `AgentRuntime::run_turn` drives
# the verified Lean executor as the authoritative state producer. ON by default; a
# `default-features = false` (wasm / no-lean-link) build leaves it off and falls back to the Rust
# producer. The platform boundary is this dep, not a core-gating flag.
exec-lean = ["dep:dregg-exec-lean"]
network = ["dep:dregg-wire", "dep:tokio", "dep:futures-core"]
# `embed-core`: the wire-free `DreggEngine` (executor + ledger + token + proof
# core) WITHOUT the `network` stack (no tokio/quinn/dregg-wire). For embedded,
# headless callers (e.g. starbridge-v2's native `World`) that want the real
# engine but not the networking surface. `network` is a superset (it also
# compiles the `embed::WireCodec`).
embed-core = []
captp = ["dep:dregg-captp", "dep:dregg-storage", "dep:chacha20poly1305"]
# PLATFORM gate, OFF by default: only wasm32/zkvm builds set it. It compiles the legacy
# Rust-producer path IN PLACE OF the verified Lean producer â€” a statement about the
# target's linker, never about which guarantees this dregg has. On native the producer is
# always compiled in; it stays runtime-gated by `DREGG_LEAN_PRODUCER` / `set_lean_producer`,
# and an unlinked archive self-falls-back to the Rust producer.
no-lean-link = [
    "dregg-lean-ffi/no-lean-link",
]
dev = []
# The SDK PRODUCER cluster. The rotated prover surface (`descriptor_ir2` prove,
# the `*_wide` generators) is unconditional in `dregg-circuit`; the recursion
# tower + custom-proof-bind ride the unconditional `dregg-circuit-prove` dep. This
# feature now forwards the producer features of the turn/cell deps.
prover = ["dregg-turn/prover", "dregg-cell/prover"]
# Enables `DelegationAuthority::Open`, which accepts any well-signed envelope
# without an authority check. This is a footgun in production and is gated
# behind a feature flag so that production builds cannot construct it at all.
# Only enable in tests or development binaries â€” never in production-facing
# crates.
unsafe-test-utils = []

[dev-dependencies]
x25519-dalek = { workspace = true }
# The human-layer social-recovery e2e seam (`tests/identity_social_recovery_e2e.rs`):
# the guardian M-of-N quorum is a REAL HINTS weighted-threshold BLS aggregate
# (`hints`), assembled test-side via `dregg-federation`'s committee wrapper â€”
# the SAME primitive `dregg-turn`'s already-default `ThresholdSigVerifier`
# discharges. No new crypto; the test welds the green parts.
dregg-federation = { path = "../federation" }
hints = { path = "../hints", package = "dregg-hints" }

[[example]]
name = "agent_demo"
path = "examples/agent_demo.rs"

[[example]]
name = "hello_receipt_chain"
path = "examples/hello_receipt_chain.rs"

[[example]]
name = "polis_sealed_vote"
path = "examples/polis_sealed_vote.rs"

[lints]
workspace = true
