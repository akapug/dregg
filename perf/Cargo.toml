[package]
name = "dregg-perf"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
publish = false

# Performance harnesses for the dregg PRODUCTION turn-proof path.
#
# This crate exists to put real, reproducible numbers on the question the
# product/polis assessment asks: how long does a real turn take to prove and
# verify, and how big is the proof? It benchmarks `prove_effect_vm_p3` /
# `verify_effect_vm_p3` — the AUDITED Plonky3 prover the SDK's
# `full_turn_proof` routes a turn's Effect-VM state transition through — over
# honest Effect-VM traces produced by the same `generate_effect_vm_trace`
# generator the executor witness path uses. No estimates; we time the code that
# actually runs.

[features]
# `recursion` is in the DEFAULT set (matching `dregg-circuit`/`dregg-sdk`/`dregg-turn`, all of which
# default to it) and forwards to `dregg-circuit/recursion`, so this crate's own
# `#[cfg(feature = "recursion")]` gates ALIGN with the circuit's recursion state. Under `recursion`
# (default) the live EffectVM commit path is the rotated IR-v2 tower, so the perf harnesses measure
# `prove_turn_self_sovereign` (the real node turn) + the descriptor-interpreter (`prove_vm_descriptor`),
# NOT the v1 hand-AIR `prove_effect_vm_p3` (which is the `not(recursion)` wasm floor, retired here).
default = ["recursion"]
recursion = ["dregg-circuit/recursion", "dregg-sdk/recursion", "dregg-turn/recursion"]

[dependencies]
dregg-circuit = { path = "../circuit" }
dregg-sdk = { path = "../sdk" }
dregg-intent = { path = "../intent" }
dregg-token = { path = "../token" }
dregg-turn = { path = "../turn" }
dregg-cell = { path = "../cell" }
# The verified Lean kernel FFI — the EMBEDDED executor the node + the seL4
# `executor` PD drive (`shadow_exec_full_forest_auth` = `@[export]
# dregg_exec_full_forest_auth`). Already linked transitively via `dregg-turn`'s
# default Lean link; named here directly so the embedded-commit bench can call it.
dregg-lean-ffi = { path = "../dregg-lean-ffi" }
# The deos desktop — pulled with ONLY its `embedded-executor` feature (NO gpui),
# so the UI-projection bench measures the real `World`/`Shell`/affordance
# projection the cockpit paints WITHOUT dragging gpui's native GPU/window tree.
# This feature shares the exact dep tree perf already pulls (dregg-sdk / -turn /
# -cell / -circuit), so it adds the `starbridge-v2` lib crate itself, not a new
# heavy subtree. The gpui FIRST-PAINT (a real GPU scan-out) needs lavapipe and is
# measured on persvati — see docs/PERFORMANCE.md §UI.
starbridge-v2 = { path = "../starbridge-v2", default-features = false, features = ["embedded-executor"] }
postcard = { version = "1", features = ["use-std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Domain-separated token/turn-hash seeds for the rotated full-turn witness builder.
blake3 = "1"

[dev-dependencies]
criterion = { workspace = true }

# ---------------------------------------------------------------------------
# Criterion benches. Each is a real, compiling benchmark over the PUBLIC API of
# the crate under test. Every bench is parameterized SMOKE-vs-FULL:
#   * SMOKE (default)   — tiny input; cheap `--no-run`, seconds-scale smoke run.
#   * FULL (PERF_FULL=1) — realistic input; the persvati capture run.
# See `perf/src/lib.rs::perf_full()` and `docs/PERF.md`.
# ---------------------------------------------------------------------------

# The original turn-proof bench (prove + verify of the EffectVM transition).
[[bench]]
name = "turn_proof"
harness = false

# Transfer PROVE: hand-AIR EffectVM prover + the verified descriptor-interpreter
# prover (`prove_vm_descriptor`) over the same transition.
[[bench]]
name = "prove"
harness = false

# Proof VERIFY: the audited p3 verifier on a pre-built proof (verify is the
# light side; the future light-client cost lives here).
[[bench]]
name = "verify"
harness = false

# Executor TURN: the live Rust `TurnExecutor::execute` (the executor entry the
# node drives), measured over a real Transfer turn against a `Ledger`.
[[bench]]
name = "executor_turn"
harness = false

# TRACE-GEN: `generate_effect_vm_trace` (witness generation) + the Poseidon2-aux
# extension, the witness surface every EffectVM proof consumes.
[[bench]]
name = "trace_gen"
harness = false

# COMMITMENT: the canonical cell state commitment (`compute_canonical_state_commitment`)
# and the v9 rotated-limbs commitment (the rotation long pole).
[[bench]]
name = "commitment"
harness = false

# POSEIDON2: one BabyBear width-16 permutation + the 2->1 / many sponge hashes —
# the in-circuit hash primitive that dominates aux witness-gen.
[[bench]]
name = "poseidon2"
harness = false

# WITNESS-ONLY vs FULL-PROVING: the headline contrast — the executor admit path
# (no SNARK) and the full self-sovereign turn prover, side by side in one group,
# so the proving multiplier reads off directly. Gap (a).
[[bench]]
name = "turn_witness_vs_proving"
harness = false

# COHORT CIRCUIT: the rotated IR-v2 multi-table batch STARK (prove + verify) per
# effect-cohort table shape (transfer / map-write / umem / absent). Gap (b).
[[bench]]
name = "cohort_circuit"
harness = false

# RECURSION FOLD: the bundle-tree aggregation fold (prove + verify) over the
# N-leaf compress chain — the recursive aggregation cost. Gap (c).
[[bench]]
name = "recursion_fold"
harness = false

# EMBEDDED COMMIT: the verified Lean kernel commit_turn throughput
# (`shadow_exec_full_forest_auth`) — the starbridge-v2 / node / seL4-executor-PD
# hot path. Gap (d).
[[bench]]
name = "embedded_commit"
harness = false

# UI PROJECTION: the deos desktop's first-paint DATA cost (`demo_world` = the five
# real embedded `commit_turn`s the cockpit paints) + the compositor scene
# composition + the per-viewer affordance projection — the whole-system UI measure
# (gpui-free; the GPU first-paint is on persvati). Gap (e).
[[bench]]
name = "ui_projection"
harness = false

[[bin]]
name = "perf-summary"
path = "src/bin/perf_summary.rs"

# Proof-SIZE microbench: the wire-byte numbers the docs cite (descriptor ~120
# KiB, rotated full-turn ~144 KiB), emitted as text or `--json` for regression
# tracking against a committed baseline.
[[bin]]
name = "proof-sizes"
path = "src/bin/proof_sizes.rs"

# Full-system performance report: every prove/verify primitive on the real
# commit path, the descriptor-interpreter vs hand-AIR cost, the silver/gold
# aggregation, and a witness-gen-vs-prove split, with proof sizes. The numbers
# the product/polis usability assessment is grounded on.
[[bin]]
name = "perf-report"
path = "src/bin/perf_report.rs"

# End-to-end multi-agent ORCHESTRATION demo + measurement. Runs the polis loop
# the product assessment only ASSERTED was unit-tested: a parent agent embodies
# in a cell, spawns a worker under an attenuated, executor-enforced mandate, the
# worker's in-scope turn commits and its over-scope turn is REJECTED by the
# executor itself, a provenance chain links the worker's receipts, and two
# workers' outputs settle atomically + conservingly through the verified
# per-asset executor (`settle_ring_verified`). Every leg is wall-clock timed.
[[bin]]
name = "orchestration-demo"
path = "src/bin/orchestration_demo.rs"
