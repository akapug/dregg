[profile.default]
# Fast by default: exclude known slow backend test categories.
# These tests individually run 60–120s+ (cryptographic proof generation).
default-filter = 'not (test(~backends::kimchi_native) or test(~backends::mina) or test(~backends::stark_in_pickles) or test(~poseidon_stark_verifier_circuit) or test(~schnorr_dsl) or test(~preflight_) or test(~ivc_builder_finalize_with_backend_pickles))'
slow-timeout = { period = "30s", terminate-after = 3 }

[profile.full]
# Run everything, be patient. Use: cargo nextest run --profile full
slow-timeout = { period = "60s", terminate-after = 10 }

[profile.ci]
# CI profile: fast + fail-fast on first failure.
default-filter = 'not (test(~backends::kimchi_native) or test(~backends::mina) or test(~backends::stark_in_pickles) or test(~poseidon_stark_verifier_circuit) or test(~schnorr_dsl) or test(~preflight_) or test(~ivc_builder_finalize_with_backend_pickles))'
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = true
