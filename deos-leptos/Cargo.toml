# deos-leptos — the Leptos RUNTIME for the deos cell-affordance surface.
#
# THE HYPOTHESIS (ember): "we can use the leptos runtime if it helps us with the
# deos/cell-stuff — i think it will." This crate confirms it for the dimensions
# Leptos's model actually covers, and names the one seam where the deos trust
# boundary and the WASM target boundary COINCIDE (which is a feature, not a bug).
#
# The three mappings (see src/lib.rs):
#   1. signals ↔ the Reactive rung — a cell's state is a Leptos `RwSignal`;
#      a `ReactiveAffordance` renders as a `Memo`-driven view that lights/darkens
#      as the signal changes. The runtime dual of `fireReactive_window_reactive`.
#   2. Leptos hydration ↔ frustum-snapshot rehydration — SSR renders the surface;
#      per-viewer the membrane (`project_membrane`) decides what is shown. Two
#      viewers → DISTINCT surfaces (`membrane_two_viewers_distinct`).
#   3. htmx-on-crack in Rust — a reactive button press fires a REAL
#      `ReactiveAffordance::fire` through a (mock) executor; the signal updates;
#      the view reacts.
#
# WE DO NOT REINVENT THE GATE. Every gate is the REAL one imported from
# `starbridge-web-surface`: `CellAffordance`/`ReactiveAffordance`/`TransitionGate`,
# `Viewer::membrane_shows`, `AffordanceSurface::project_membrane`, the
# `Sturdyref`/`Membrane`/`Rehydration` rehydration stack — all on the genuine
# `dregg_cell::is_attenuation` lattice and the genuine `dregg_turn::Effect`.

# Empty [workspace] table → this crate is its OWN workspace root, NOT a member of
# the repo-root workspace (the `starbridge-web-surface` / `sel4/dregg-firmament`
# pattern). It path-depends on `starbridge-web-surface`, which path-depends on the
# real dregg crates; cargo resolves those within the root workspace and links them
# into this crate's local target. Being a standalone root keeps the wasm-gated
# feature-unification (and the Lean-path deletion the root `[workspace]` note
# warns about) from leaking in.
[workspace]

# THE FORK SEAM (replicated from `starbridge-web-surface/Cargo.toml`, one level
# deeper). Because this crate is its OWN workspace root, the repo-root `[patch]`
# does NOT apply — so the transitive `dregg-circuit` (via `dregg-turn`, via
# `dregg-firmament`, via `starbridge-web-surface`) would resolve `p3-recursion`
# from the PINNED git rev, which lacks the `RecursionInput::NativeBatchStark`
# variant `dregg-circuit` now calls. Point the patch at the SAME local fork
# checkout the root + `starbridge-web-surface` + `dregg-firmament` do. `../../` =
# deos-leptos → breadstuffs → dev. Keep in sync; all revert to the git rev once the
# fork is pushed.
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../../plonky3-recursion/recursion" }
p3-circuit = { path = "../../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../../plonky3-recursion/poseidon2-circuit-air" }

# THE ARK-SERIALIZE FORK SEAM (replicated from the repo-root `[patch.crates-io]`).
# Closing the executor seam pulls in `dregg-app-framework` → `dregg-sdk`/`dregg-intent`
# → `dregg-federation`, which requires `ark-serialize` with the `serde_with` feature.
# That feature lives only in the root's pinned fork (`emberian/algebra` branch
# `serde-integration`); upstream `ark-serialize 0.5.0` lacks it. Because this crate is
# its OWN workspace root, the repo-root `[patch.crates-io]` does NOT apply — so we
# mirror it here, EXACTLY as the root does. Keep in sync with the repo-root
# `[patch.crates-io]`; reverts once the fork lands upstream.
[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

[package]
name = "deos-leptos"
version = "0.1.0"
edition = "2021"
publish = false
description = "The Leptos runtime as the deos cell-affordance web surface: cell state = signal, affordances = gated reactive components, rehydration = per-viewer Leptos hydration. The reactive predicate IS the real ReactiveAffordance/Viewer gate."

[dependencies]
# THE REAL deos surface types — never a parallel gate. `CellAffordance`,
# `ReactiveAffordance`, `TransitionGate`, `EvalContext`, `Viewer`,
# `AffordanceSurface`, `Sturdyref`, `Membrane`, `Rehydration`, `FireError` and the
# real `is_attenuation`/`AuthRequired`/`CellId`/`Effect` re-exports all come from
# here. This is the load-bearing import: the Leptos view's reactive predicate is a
# call into these, not a reimplementation.
starbridge-web-surface = { path = "../starbridge-web-surface" }

# The REAL cell types we touch directly: `CellState` (the signal payload — the
# council cell's status/tally slots the TransitionGate reads BOTH of) and the
# `AuthRequired` lattice. Named directly so the cell-state-as-signal is the genuine
# `CellState`, not a stand-in.
dregg-cell = { path = "../cell" }
dregg-types = { path = "../types" }
dregg-turn = { path = "../turn" }

# THE REAL EXECUTOR — this is the seam-closer. `dregg_sdk::AgentRuntime` OWNS a genuine
# `dregg_turn::TurnExecutor` over an in-process verified ledger; its `AgentCipherclerk`
# signs the action with a REAL `Authorization::Signature`; `execute_turn(&Turn)` runs
# the verified turn and returns a real `dregg_turn::TurnReceipt`. The prototype's
# MockExecutor is DELETED in favour of this.
#
# We drive `AgentRuntime` DIRECTLY rather than through `dregg-app-framework`'s
# `EmbeddedExecutor` wrapper: app-framework carries an in-flight, currently-uncompilable
# `stark_rehydrate` module (an UNTRACKED WIP that calls the non-generic
# `verify_vm_descriptor2` with a recursion-config proof — a type mismatch that fails in
# the ROOT workspace too, unrelated to this crate). Driving the SDK runtime directly is
# both the working path AND the cleaner architecture: a Leptos SSR crate atop the SDK
# runtime, not dragging app-framework's axum/captp/rehydrate surface. The gate stays the
# REAL one — `starbridge_web_surface::ReactiveAffordance` (the SAME gate the island's
# lit/dark Memo uses), so the client-will predicate and the server-law gate are byte-
# identical. (The browser island still cannot link this: it sits atop the native STARK
# stack — exactly why the executor is server-side and the island POSTs to a server-fn.)
dregg-sdk = { path = "../sdk" }

# Leptos, server-side-render mode. 0.8 resolves to 0.8.19 (current max-stable,
# upstream-verified). `ssr` is the feature that renders a reactive view tree to an
# HTML string on the NATIVE target — which is exactly where the deos gate types
# (native-only: they sit atop the STARK crypto stack) can be linked. The
# fine-grained reactive graph (`RwSignal`/`Memo`) is the same graph CSR/hydrate
# use; only the render backend differs.
leptos = { version = "0.8", features = ["ssr"] }

[dev-dependencies]
# (tests live inline in src/lib.rs)
