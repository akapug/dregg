# dregg-doc — the Pijul-shaped patch-theory core for the dreggverse document
# language (docs/deos/DOCUMENT-LANGUAGE.md §4.1).
#
# A document is a GRAPH of alive/dead content atoms with order-edges; an edit is
# a PATCH (`Add` / `Delete`(tombstone) / `Connect`); `merge` is the categorical
# PUSHOUT (Mimram–Di Giusto), computed as a total graph union; a CONFLICT is a
# first-class STATE — an antichain of >=2 live, mutually-unordered alternatives —
# resolved by a later patch, never a merge failure.
#
# STANDALONE by design: this crate is its OWN workspace root (the empty
# `[workspace]` below) so it stays OUT of the parent dregg workspace's build,
# exactly as `pg-dregg` / `servo-render` do. It has NO dregg dependencies yet —
# pure data structures + algorithms, fast and `cargo test`-able in isolation. It
# will ride the cell substrate later (atoms = content-addressed heap leaves,
# patches = turns, content = the patch-history fold) per the spec; that ride is
# DEFERRED — let the language breathe.

[package]
name = "dregg-doc"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license = "AGPL-3.0-or-later"
description = "Pijul-shaped patch-theory core for the dreggverse document language: a document as a graph of alive/dead atoms, patches as graph operations, merge as the total pushout/union, conflicts as first-class antichain states."
homepage = "https://dregg.fg-goose.online"
repository = "https://github.com/emberian/dregg"

# Folded into the root workspace (members + default-members — light by default;
# all heavy deps are optional behind `cell-heap`/`substrate`/`rope`).
[features]
# OFF by default: the core stays STANDALONE and dependency-free (load-bearing —
# pure data structures + algorithms, fast and `cargo test`-able in isolation).
#
# `cell-heap` welds the document onto the REAL dregg cell substrate's COMMITMENT
# (no executor): it pulls in `dregg-cell` (a path dep into the parent workspace's
# `../cell`) and projects a `DocGraph` into a real `(collection_id, key) ->
# 32-byte` cell heap, committing it via the production `compute_heap_root` — the
# sorted-Poseidon2 binary Merkle tree, the faithful commitment the light client
# actually trusts. This REPLACES the in-crate `DefaultHasher` stand-in
# (`commit::commit`) with the real ride.
#
# It also rides the document onto the per-cell UMEM-HEAP (`src/doc_heap.rs`,
# `docs/deos/UMEM-PRIMITIVE.md` §8): a document IS a `dregg_cell::Cell` whose
# committed `heap_root` (the umem boundary) is its commitment — so a sovereign
# document, conflicts-as-objects, and `dregg://` transclusion all ride the umem
# primitive. Pure `dregg-cell` (NO `dregg-turn`) so the commitment ride stays
# independent of the turn executor + prover tree.
cell-heap = ["dep:dregg-cell", "dep:blake3"]

# `substrate` is `cell-heap` PLUS the executor-drive seam (DOCUMENT-LANGUAGE.md
# §4.1, §4.3 dregg-native): a document IS a real `dregg_cell::Cell`
# (`ExecutorDrivenDoc`) and an edit IS a real turn — `Op::{Add,Delete,Connect,
# SetField}` desugars to genuine `dregg_turn::Effect::SetField` writes driven
# through the real `TurnExecutor` (cap-gated, finalized, journaled), producing a
# real `dregg_turn::TurnReceipt`. The receipt IS the provenance: no more stand-in
# `PatchId` for who-wrote-what. That is why `dregg-turn` is pulled in here.
substrate = [
    "cell-heap",
    "dep:dregg-turn",
    "dep:dregg-commit",
    "dep:dregg-circuit",
    "dep:dregg-blocklace",
    "dep:ed25519-dalek",
    "dep:serde",
    "dep:serde_json",
]

# `rope` welds the patch core onto a `ropey::Rope`-backed editor buffer — the
# rope<->patch BRIDGE the editor needs (DOCUMENT-LANGUAGE.md §4.1, APPS-AS-CELLS.md
# §1: "the rope buffer <-> patch graph impedance is the genuine engineering
# question"). It is OPTIONAL and OFF by default so the core stays dependency-free
# ("let it breathe"). `ropey` is pinned to the SAME `2.0.0-beta.1` deos-zed's
# editor (`deos-zed/src/editor.rs`) uses, so a `RopeDoc` plugs that real buffer in
# directly — no stringification at the seam. See `src/rope.rs`.
rope = ["dep:ropey"]

[dependencies]
# The rope-backed editor buffer (optional, behind `rope`): the SAME crate +
# version deos-zed's `Editor` holds, so the bridge consumes the editor's real
# buffer type. With the feature OFF this pulls in nothing.
ropey = { version = "2.0.0-beta.1", optional = true }
# The REAL substrate (optional, behind `substrate`): a path dep into the parent
# dregg workspace's `cell` crate. Cargo resolves `dregg-cell`'s workspace
# inheritance (`version.workspace`, etc.) from ITS OWN workspace root (the parent
# `../Cargo.toml`), so this cross-workspace path dep resolves cleanly even though
# dregg-doc is its own (empty) workspace.
dregg-cell = { path = "../cell", optional = true }
# The REAL turn substrate (optional, behind `substrate`): the genuine `Effect`
# (the kernel write grammar an edit desugars to) and `TurnReceipt` (the witnessed
# proof of who-wrote-what that BECOMES the document's provenance). A patch IS a
# turn (DOCUMENT-LANGUAGE.md §1.1). Same cross-workspace path-dep resolution as
# `dregg-cell` (turn resolves its own workspace inheritance from `../Cargo.toml`).
dregg-turn = { path = "../turn", optional = true }
# The REAL committed accumulator (optional, behind `substrate`): the production
# sorted 4-ary Merkle tree (`dregg_commit::merkle::MerkleTree`) that backs the
# CI anti-replay nullifier store (`CiNullifierAccumulator`) with a shareable
# committed root + membership / non-membership proofs. ALREADY in the substrate
# dep tree (`dregg-turn` depends on `dregg-commit`), so this adds no new
# transitive dependency; with the feature OFF the core pulls in nothing.
dregg-commit = { path = "../commit", optional = true }
# The REAL circuit prove+verify surface (optional, behind `substrate`): the
# production `dregg_circuit::dsl::circuit::CellProgram` STARK — the prover
# ([`CellProgram::prove_transition`]) and the light-client verifier
# ([`CellProgram::verify_transition`]) the `CiAssurance::Proven` rung composes so
# the proof ALONE attests the CI verdict (no re-execution, no quorum). ALREADY in
# the substrate dep tree (`dregg-turn` depends unconditionally on `dregg-circuit`,
# which resolves its own p3/workspace inheritance from the parent `../Cargo.toml`),
# so this adds no new transitive dependency; with the feature OFF the core pulls
# in nothing.
dregg-circuit = { path = "../circuit", optional = true }
# The leaf-digest hash for the heap projection (32-byte leaf values that bind
# provenance). `blake3` is ALREADY in the substrate dep tree via `dregg-cell`,
# so gating it on `substrate` adds no new transitive dependency; with the
# feature OFF the core pulls in nothing.
blake3 = { version = "1", optional = true }
# The REAL blocklace carrier (optional, behind `substrate`): the SSB-style
# feed-integrity DAG (`dregg_blocklace::{Block, Blocklace}`) that carries an
# OptimisticChallenge dispute. A challenger who re-executed and found the host
# lied posts a signed `Block` (`Block::new_signed`) whose payload is a `Challenge`;
# `detect_upheld_challenge` scans the presented lace for a trusted-signed block
# that CONTRADICTS the host verdict on the same run — the real equivocation the
# `OptimisticChallenge` conviction rides. A path dep into the parent workspace's
# `../blocklace` (package `dregg-blocklace`), resolving its own workspace
# inheritance from `../Cargo.toml` exactly as `dregg-cell` / `dregg-turn` do.
dregg-blocklace = { path = "../blocklace", optional = true }
# Ed25519 signing for a challenger's block (`post_challenge` takes the
# challenger's `SigningKey`; `Block::new_signed` signs the fraud proof). It is the
# SAME `ed25519-dalek` (pinned 2.x) already in the substrate dep tree via
# `dregg-turn` / `dregg-blocklace`, so gating it on `substrate` adds no new
# transitive dependency; with the feature OFF the core pulls in nothing.
ed25519-dalek = { version = "2", optional = true }
# The federation cross-node anti-replay seam (optional, behind `substrate`): the
# nullifier accumulator's committed root is PUBLISHED to the ledger as an
# owner-signed `UpdateCommitmentRequest` (a serde-serialized JSON body mirroring
# node's `/cells/update-commitment`) and FETCHED back from a modeled
# `GET /api/cell/{id}` response (a serde-deserialized JSON body). Both `serde` and
# `serde_json` are ALREADY in the `--features substrate` dep tree (transitively via
# `dregg-turn` / `dregg-circuit` — present in the lockfile), so gating them on
# `substrate` adds no new transitive dependency; with the feature OFF the core
# pulls in nothing. See `src/ci_verdict.rs` (the nullifier-root federation half).
serde = { version = "1", optional = true, features = ["derive"] }
serde_json = { version = "1", optional = true }

# Test-only: derive distinct Ed25519 verifying keys from seeds so the CI-assurance
# tests can exercise a quorum of DISTINCT trusted executors and key revocation.
# Already in the `--features substrate` dep tree via `dregg-turn` (pinned 2.2.0
# in the lockfile), so this adds no new transitive dependency.
[dev-dependencies]
ed25519-dalek = "2"

# The ark-serialize serde-integration fork `[patch.crates-io]` this crate used to
# mirror (needed by the transitive `dregg-hints` under `--features substrate`) is
# now INHERITED from the root workspace manifest.

[lints.rust]
unsafe_code = "forbid"
unexpected_cfgs = "deny"
