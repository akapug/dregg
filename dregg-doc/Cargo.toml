# dregg-doc ŌĆö the Pijul-shaped patch-theory core for the dreggverse document
# language (docs/deos/DOCUMENT-LANGUAGE.md ┬¦4.1).
#
# A document is a GRAPH of alive/dead content atoms with order-edges; an edit is
# a PATCH (`Add` / `Delete`(tombstone) / `Connect`); `merge` is the categorical
# PUSHOUT (MimramŌĆōDi Giusto), computed as a total graph union; a CONFLICT is a
# first-class STATE ŌĆö an antichain of >=2 live, mutually-unordered alternatives ŌĆö
# resolved by a later patch, never a merge failure.
#
# STANDALONE by design: this crate is its OWN workspace root (the empty
# `[workspace]` below) so it stays OUT of the parent dregg workspace's build,
# exactly as `pg-dregg` / `servo-render` do. It has NO dregg dependencies yet ŌĆö
# pure data structures + algorithms, fast and `cargo test`-able in isolation. It
# will ride the cell substrate later (atoms = content-addressed heap leaves,
# patches = turns, content = the patch-history fold) per the spec; that ride is
# DEFERRED ŌĆö let the language breathe.

[package]
name = "dregg-doc"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
license = "AGPL-3.0-or-later"
description = "Pijul-shaped patch-theory core for the dreggverse document language: a document as a graph of alive/dead atoms, patches as graph operations, merge as the total pushout/union, conflicts as first-class antichain states."
homepage = "https://dregg.fg-goose.online"
repository = "https://github.com/emberian/dregg"

# Own (empty) workspace root: keeps dregg-doc out of the parent workspace's
# `cargo build/test --workspace` without touching the root Cargo.toml.
[workspace]

[features]
# OFF by default: the core stays STANDALONE and dependency-free (load-bearing ŌĆö
# pure data structures + algorithms, fast and `cargo test`-able in isolation).
#
# `cell-heap` welds the document onto the REAL dregg cell substrate's COMMITMENT
# (no executor): it pulls in `dregg-cell` (a path dep into the parent workspace's
# `../cell`) and projects a `DocGraph` into a real `(collection_id, key) ->
# 32-byte` cell heap, committing it via the production `compute_heap_root` ŌĆö the
# sorted-Poseidon2 binary Merkle tree, the faithful commitment the light client
# actually trusts. This REPLACES the in-crate `DefaultHasher` stand-in
# (`commit::commit`) with the real ride.
#
# It also rides the document onto the per-cell UMEM-HEAP (`src/doc_heap.rs`,
# `docs/deos/UMEM-PRIMITIVE.md` ┬¦8): a document IS a `dregg_cell::Cell` whose
# committed `heap_root` (the umem boundary) is its commitment ŌĆö so a sovereign
# document, conflicts-as-objects, and `dregg://` transclusion all ride the umem
# primitive. Pure `dregg-cell` (NO `dregg-turn`) so the commitment ride stays
# independent of the turn executor + prover tree.
cell-heap = ["dep:dregg-cell", "dep:blake3"]

# `substrate` is `cell-heap` PLUS the executor-drive seam (DOCUMENT-LANGUAGE.md
# ┬¦4.1, ┬¦4.3 dregg-native): a document IS a real `dregg_cell::Cell`
# (`ExecutorDrivenDoc`) and an edit IS a real turn ŌĆö `Op::{Add,Delete,Connect,
# SetField}` desugars to genuine `dregg_turn::Effect::SetField` writes driven
# through the real `TurnExecutor` (cap-gated, finalized, journaled), producing a
# real `dregg_turn::TurnReceipt`. The receipt IS the provenance: no more stand-in
# `PatchId` for who-wrote-what. That is why `dregg-turn` is pulled in here.
substrate = ["cell-heap", "dep:dregg-turn"]

# `rope` welds the patch core onto a `ropey::Rope`-backed editor buffer ŌĆö the
# rope<->patch BRIDGE the editor needs (DOCUMENT-LANGUAGE.md ┬¦4.1, APPS-AS-CELLS.md
# ┬¦1: "the rope buffer <-> patch graph impedance is the genuine engineering
# question"). It is OPTIONAL and OFF by default so the core stays dependency-free
# ("let it breathe"). `ropey` is pinned to the SAME `2.0.0-beta.1` deos-zed's
# editor (`deos-zed/src/editor.rs`) uses, so a `RopeDoc` plugs that real buffer in
# directly ŌĆö no stringification at the seam. See `src/rope.rs`.
rope = ["dep:ropey"]

[dependencies]
# The rope-backed editor buffer (optional, behind `rope`): the SAME crate +
# version deos-zed's `Editor` holds, so the bridge consumes the editor's real
# buffer type. With the feature OFF this pulls in nothing.
ropey = { version = "2.0.0-beta.1", optional = true }
# The REAL substrate (optional, behind `substrate`): a path dep into the parent
# dregg workspace's `cell` crate. Cargo resolves `dregg-cell`'s workspace
# inheritance (`version.workspace`, etc.) from ITS OWN workspace root (the parent
# `../Cargo.toml`), so this cross-workspace path dep resolves cleanly even though
# dregg-doc is its own (empty) workspace.
dregg-cell = { path = "../cell", optional = true }
# The REAL turn substrate (optional, behind `substrate`): the genuine `Effect`
# (the kernel write grammar an edit desugars to) and `TurnReceipt` (the witnessed
# proof of who-wrote-what that BECOMES the document's provenance). A patch IS a
# turn (DOCUMENT-LANGUAGE.md ┬¦1.1). Same cross-workspace path-dep resolution as
# `dregg-cell` (turn resolves its own workspace inheritance from `../Cargo.toml`).
dregg-turn = { path = "../turn", optional = true }
# The leaf-digest hash for the heap projection (32-byte leaf values that bind
# provenance). `blake3` is ALREADY in the substrate dep tree via `dregg-cell`,
# so gating it on `substrate` adds no new transitive dependency; with the
# feature OFF the core pulls in nothing.
blake3 = { version = "1", optional = true }

# The parent dregg workspace patches `ark-serialize` to ember's fork (the
# `serde_with` feature `dregg-hints` needs, transitively reachable through
# `dregg-turn` under the `substrate` feature). Because dregg-doc is its OWN
# (empty) workspace, it does not inherit the parent's `[patch]`, so it must
# mirror it for `--features substrate` to resolve. The pure-git Plonky3 / p3
# pins need no mirroring (the parent comment: "PURE git deps, no `[patch]` ŌĆö a
# fresh clone resolves identically"); only this `crates.io` patch does.
[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

[lints.rust]
unsafe_code = "forbid"
