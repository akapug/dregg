[package]
name = "dregg-governance"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
description = "The governance + community face of the ONE collective-choice VoteEngine that also drives the CYOA branch-vote. A federation self-governs via the constitutional 2n/3+1 vote with auto-enact; uncensorable, verifiable community polls; one engine, three faces (governance / community / story)."
license = "AGPL-3.0-or-later"

# A workspace MEMBER of the breadstuffs root (registered in `members`, not
# `default-members`). The root `[workspace]` + `[patch]` tables apply; no standalone
# `[workspace]` here.

[lib]
name = "dregg_governance"

[dependencies]
# The REAL constitutional consensus — federations already governing themselves.
# We reuse `ConstitutionManager` / `VoteTracker` / `MembershipProposal` verbatim
# (the 2n/3+1 threshold, the H-rule, distinct-voter counting, votes-as-blocks,
# equivocator auto-eviction), rather than mirroring it.
dregg-blocklace = { path = "../blocklace" }

# The CANONICAL vote substrate — the executor-backed engine (WriteOnce ballot
# cells, Monotonic tallies, the per-option AffineLe quorum gate, Mandate
# delegation, nullifier set). `src/substrate.rs` runs the constitution face over
# it; the in-memory `CollectiveChoice` in this crate remains the causal-log /
# light-client derivation face.
collective-choice = { path = "../collective-choice" }

# The ONE non-amplifying delegation lattice — `Mandate::sub_delegate` /
# `DelegTree::no_amplify`, mirrored in Lean. `community.rs` REUSES it for liquid
# democracy rather than re-implementing a second weight-attenuation lattice in
# host-side Rust (the pre-weld `VoteCap`/`DelegationLedger`, now deleted). Named
# here only so the delegation types can appear in this crate's signatures; the
# engine that exercises them is `collective-choice`.
dregg-intent = { path = "../intent" }

# The NON-CUSTODIAL proof-of-holdings type (`ProvenHolding` / `is_consensus_proven`),
# so a consensus-proven Solana $DREGG balance can grant governance weight WITHOUT the
# holder locking anything. No cycle: dregg-bridge does not depend on dregg-governance.
dregg-bridge = { path = "../bridge" }

# The LEAN-PROVEN weight VERDICT. `grant_weight` does the fast-Rust pre-checks (the ed25519
# owner→voter binding, the consensus-proof read, the positive-amount check) but renders the
# fail-closed weight DECISION by calling the extracted, `#assert_axioms`-clean Lean
# `grantWeightCore` (`Metatheory.Bridge.ProofOfHoldings`) via `shadow_holding_grant_weight` —
# the decision is the verified object, not a Rust `if`-chain. Fail-closed if the Lean core is
# not in the linked archive (no silent Rust-reimpl fallback), matching `grain-verify`.
dregg-lean-ffi = { path = "../dregg-lean-ffi" }

# The holder wallet ↔ VoterId binding is an ed25519 signature by the Solana owner key.
ed25519-dalek = "2"

# The EVM (secp256k1) owner→voter binding: ECDSA public-key RECOVERY over the
# EIP-191 personal_sign prehash, so an EVM-address holder binds non-custodially with
# the SAME wallet key that controls the holding. k256 is the maintained RustCrypto
# secp256k1 (the `ecdsa` feature carries `VerifyingKey::recover_from_prehash` +
# `RecoveryId`); sha3 provides keccak256 for the EIP-191 frame and the
# pubkey→address derivation. Never hand-rolled.
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "std"] }
sha3 = "0.10"

# The Cosmos (secp256k1/bech32-account) owner→voter binding: a Cosmos account
# address is ripemd160(sha256(compressed_pubkey)) — sha2 + ripemd are the
# maintained RustCrypto digests for that derivation (never hand-rolled). The
# signature itself verifies under the SAME k256 dep the EVM binding uses —
# verify-under-carried-pubkey rather than recovery, because Cosmos signatures
# ship the 33-byte pubkey alongside the 64-byte (r, s).
ripemd = "0.1"
sha2 = "0.10"

blake3 = "1"

[lints]
workspace = true
