# dregg-tee-produce — the TEE attestation PRODUCER scaffold: the enclave-side
# quote server + the host-side quote client, over any byte stream (vsock, TCP,
# a pipe). The verify side is `dregg-tee-verify` (COSE/CBOR + chain to the
# pinned AWS root); this crate is the seam that gets a REAL vendor-signed
# document out of the enclave with the caller's 32-byte commitment bound into
# `report_data`, so the quote can ride the dregg WitnessedPredicate rail
# (`dregg_cell::tee_attest`).
#
# HONESTY CONTRACT (the same discipline as tee-verify): no code path in this
# crate ever fabricates an attestation document. Every backend either returns a
# REAL vendor-signed document (the live NSM behind `nitro`, or the captured
# live-enclave fixture behind `fixture-backend`) or fails closed with `Err`.

[package]
name = "dregg-tee-produce"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
description = "TEE attestation producer scaffold: enclave-side quote server + host-side client over any stream; live Nitro NSM backend behind a feature, fail-closed everywhere else."

[features]
default = []
# The REAL AWS Nitro Security Module backend: `GetAttestationDoc` via the
# `/dev/nsm` ioctl driver (`aws-nitro-enclaves-nsm-api`). Only meaningful INSIDE
# a running Nitro Enclave; anywhere else `/dev/nsm` does not exist and the
# backend fails closed at runtime. Off by default (an ARM laptop compiles and
# tests this crate with no enclave anywhere).
nitro = ["dep:aws-nitro-enclaves-nsm-api", "dep:serde_bytes"]
# The captured-fixture backend — a TRANSPORT/WIRING TEST AID, not an attestation
# producer (see `FixtureBackend`'s docs). Serves the one real captured Nitro doc
# (tee-verify/tests/data/nitro_att.bin) and refuses every request whose
# report_data is not the [0xAB; 32] that live enclave actually bound.
fixture-backend = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"

# The NSM driver crate (ioctl to /dev/nsm) — unix-only surface (IoSlice fd
# plumbing via std::os::unix), so the dep is target-gated; on a non-unix host
# the `nitro` feature still compiles to the fail-closed stub.
[target.'cfg(unix)'.dependencies]
aws-nitro-enclaves-nsm-api = { version = "0.4", optional = true }
# The `user_data` buffer type the NSM Attestation request takes (same version the
# NSM API crate itself uses; already in the root lock via tee-verify).
serde_bytes = { version = "0.11", optional = true }

[dev-dependencies]
# Close the produce→verify loop in tests: what the producer transports must be
# exactly what the REAL verifier accepts (COSE sig + chain to the pinned root).
dregg-tee-verify = { path = "../tee-verify" }
dregg-cell = { path = "../cell" }

[lints]
workspace = true
