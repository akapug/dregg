[package]
name = "dregg-dice"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Verifiable randomness for the attested-dm game engine: domain-separated event ids, a pluggable randomness source, and an unbiased indexed draw stream."

[lints]
workspace = true

[dependencies]
# blake3 1.x is already resolved in the workspace lock (used by token/, grain-turn/,
# commit/, cell-crypto/, …). Domain-separated hashing + XOF draw expansion, PQ-secure
# CR hash, dependency-light.
blake3 = "1"
# serde with `std` so Vec<u8>/String fields Serialize/Deserialize (the workspace
# default is default-features=false + derive only, which omits the alloc impls).
serde = { workspace = true, features = ["std"] }
thiserror = { workspace = true }
# The one-time post-quantum LB-VRF (Esgin et al. FC 2021, Set I) backing the
# `ServerVrf` source: verifiable randomness whose one-output-per-input uniqueness
# reduces to Module-SIS. CONSUMED read-only — keygen/eval/verify over the EventId.
pqvrf = { path = "../pqvrf" }
# Pure-Rust BLS12-381 (zkcrypto) backing the real threshold drand-BLS beacon
# (`DrandBeacon` / `BeaconKind::Drand`). The `experimental` feature enables the
# RFC 9380 hash-to-curve used by drand's ciphersuite; `pairings` gives the pairing
# check `e(sig, g2) == e(H(m), pk)` that verifies a round signature against the
# pinned group public key. digest/ff/group/subtle are already in the workspace lock.
bls12_381 = { version = "0.8", features = ["experimental"] }
# SHA-256 (digest 0.9, matching bls12_381 0.8) for drand's round message hashing
# (`msg = SHA256(round_be)`), the RFC 9380 XMD expander, and `randomness = SHA256(sig)`.
sha2 = "0.9"

[dev-dependencies]
serde_json = { workspace = true }
# Decode the hardcoded, cited drand quicknet interop vector (hex → bytes) in tests.
hex = "0.4"
