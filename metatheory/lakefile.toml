name = "Dregg2"
defaultTargets = ["Dregg2", "Metatheory", "Polis"]

# Pin mathlib to the exact revision matching v4.30.0
# (rev 1c2b90b13009c65b090d95a83c98e248deafb6f1). This is a PORTABLE `git`+`rev`
# require: `lake` fetches mathlib itself into `.lake/packages/mathlib` on any host,
# with NO assumption about where the repo was cloned. (It replaced a host-fragile
# `path = "../../../src/mathlib4"` local require that only resolved when breadstuffs
# was cloned exactly two levels under $HOME with mathlib as a $HOME/src sibling —
# which broke a fresh Linux cold-bootstrap on lassie. See docs/LEAN-SEED-ARTIFACT.md.)
#
# LOCAL FAST PATH (optional, no re-download): if you already have a warm mathlib
# checkout at the pinned rev, symlink it into the packages dir BEFORE the first
# `lake build` so lake reuses it instead of cloning + re-fetching oleans:
#     ln -sfn /path/to/your/mathlib4 metatheory/.lake/packages/mathlib
# (`.lake/` is gitignored + per-machine; this changes nothing committed.)
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "1c2b90b13009c65b090d95a83c98e248deafb6f1"

[[lean_lib]]
name = "Dregg2"

# The Metatheory/* epistemic+categorical tree. Globbed (no `Metatheory.lean`
# root needed) so the WHOLE subtree — Categorical, Disputation, and every
# Open/* front — lands in the default `lake build` target and CI covers it.
# Previously only EpistemicConsensus/EpistemicDial were reachable (via Dregg2's
# Crypto imports); Categorical/Open.* were verified only via `lake env lean`.
[[lean_lib]]
name = "Metatheory"
globs = ["Metatheory.+"]

# The Polis/* polisware-constitution theory — split out of `Metatheory/` so the
# core categorical/dynamics/settlement spec stays uncrowded. Files keep their
# `Metatheory.*` namespaces (qualified names resolve unchanged); only the MODULE
# path moved (`Metatheory.PolisX` → `Polis.PolisX`). The two libs interleave at
# the module level (core game files import Polis theory; some Polis files import
# core game/dynamics files) — Lake resolves this fine, no module-import cycle.
[[lean_lib]]
name = "Polis"
globs = ["Polis.+"]

# A CALLABLE GOVERNOR: the verified `Metatheory.PolisSandbox.govStep` as a
# stdin/stdout service. Reads `<d0> <d1> <actor> <action> [victim]` per line,
# applies the SAME envelope `sandbox_governed_safe` proves keeps the floor, and
# prints ADMIT/REFUSE + the resulting world. (Root module: PolisGovernor,
# file ./PolisGovernor.lean.)
[[lean_exe]]
name = "polis_governor"
root = "PolisGovernor"
