[package]
name = "dregg-pay"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Payment backend for accepting $DREGG (SPL token on Solana) for real-AI dungeon runs — the \"B\" (custodial HD-deposit) model: per-user SLIP-0010 deposit addresses, a watcher, a per-user run-credits ledger, and a sweeper. The reusable foundation the discord-bot + demo services consume. DEVNET/MOCK by default; mainnet is an operator-config flip."

[dependencies]
# The REAL watcher core: the SPL token-account decode + the consensus-verified
# balance read live in the bridge crate's `solana_holdings` (reused verbatim, not
# reimplemented). No cycle: bridge does not depend on dregg-pay.
dregg-bridge = { path = "../bridge" }
# The chain-agnostic proven-holding FACT (`ProvenForeignHolding` / `ChainId`) — the
# COMPILED cross-chain read the light clients (Solana / eth-lightclient /
# cosmos-lightclient) render and `dregg-interchain-gov` aggregates. The multichain
# treasury VIEW (`multichain.rs`) points those facts at the TREASURY's own addresses,
# so the treasury proves its cross-chain holdings non-custodially. Read-only reuse: no
# cycle (dregg-governance does not depend on dregg-pay).
dregg-governance = { path = "../dregg-governance" }
# The quorum engine for the liquidity VOTE: poll → write-once ballots → monotone
# tally → the quorum `AffineLe` gate — the SAME engine the bot's `/party` uses. The
# governance module drives a liquidity-event proposal through it; a passed vote is
# what mints a `SwapAuthorization`. No cycle: collective-choice does not depend on
# dregg-pay.
collective-choice = { path = "../collective-choice" }
# The verified cross-cell VALUE-FLOW rail: `resolve_pay` desugars a `pay` to the
# ONE conserving `Effect::Transfer` the kernel checks per-asset (Σδ=0). The
# protocol-native run-budget path (`protocol_native.rs`, Track C rung 2a) settles
# a run through this rail — a conserved cell balance, no custody. Pure data
# construction (builds an `Action`; never runs the executor / Lean producer). No
# cycle: dregg-payable depends only on types/cell/turn, none of which touch dregg-pay.
dregg-payable = { path = "../dregg-payable" }
# The kernel `Effect::Transfer` type the run desugars to, and the `CellId` value id.
dregg-turn = { path = "../turn" }
dregg-types = { path = "../types" }
# SLIP-0010 ed25519 hardened derivation = HMAC-SHA512; the derived key is a real
# ed25519 keypair whose public key IS the Solana deposit address.
hmac = { workspace = true }
sha2 = { workspace = true }
ed25519-dalek = { version = "2", features = ["std"] }
# base58 encode/decode for Solana pubkeys (mint / treasury / deposit addresses).
bs58 = "0.5"
# ed25519 curve-point test for the Associated-Token-Account PDA derivation
# (`find_program_address`): a PDA is valid iff it is OFF the ed25519 curve (no
# private key exists). We decompress the candidate to decide. Already in the tree
# (ed25519-dalek's own curve backend); pinned to the same 4.x.
curve25519-dalek = "4"
# Stable per-user derivation index + payment references.
blake3 = "1"
# The HD seed is secret custody material — wipe it on drop.
zeroize = { workspace = true }
# Parse the Jupiter response structurally. Text-searching for the mint lets an
# attacker place it in an unrelated `id` value and smuggle a different price.
serde_json = { workspace = true }
# Decode Jupiter's base64-encoded `swapTransaction` (the real unsigned v6 tx bytes)
# back into the exact Solana message the operator signs. No network in the core.
base64 = { workspace = true }

[dev-dependencies]
# Verify the derived deposit key produces real, verifiable ed25519 signatures
# (the sweeper custody proof) without any funds or network.
ed25519-dalek = { version = "2", features = ["std"] }
# The bridge's TEST-ONLY fixture builders (`solana_holdings::fixtures`) for
# constructing anchored bank-state holding proofs — used by the watcher's
# anchored-consensus tests, including the attacker-supplied-1-key-stake-table
# forgery rejection.
dregg-bridge = { path = "../bridge", features = ["test-utils"] }

[lints]
workspace = true
