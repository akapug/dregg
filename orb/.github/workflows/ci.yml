name: ci

# Reproducible, honest from-scratch build + verify for drorb, on macOS and Linux.
# Runs scripts/ci.sh, whose gate is `rm -rf .lake/build && lake build` (never an
# incremental build — stale oleans can mask a broken proof), a tree-wide
# sorry/sorryAx scan, the native dataplane link, and the conformance suite.
#
# READY-TO-ACTIVATE: drorb has no git remote yet. This workflow activates the
# moment the repo is pushed to GitHub; nothing here is machine-specific.
#
# ----------------------------------------------------------------------------
# THE ONE REAL SETUP COST: HACL*/EverCrypt.
# ----------------------------------------------------------------------------
# The crypto seam (TLS 1.3, JWT, QUIC header protection) links the F*-verified
# HACL*/EverCrypt as libevercrypt.a. Building that archive from source
# (./configure && make libevercrypt.a) is HEAVY — F*/KaRaMeL extraction + a long
# C compile, tens of minutes — so we do NOT build it on every CI run. Instead we
# cache it (actions/cache) keyed on the pinned HACL* commit, and build it only on
# a cache miss.
#
# For a first activation you must seed the cache once. Options, cheapest first:
#   1. Pre-build libevercrypt.a locally and commit it as a release asset / LFS
#      object, then replace the "build HACL*" step with a download step.
#   2. Let the first run build it (slow) and populate the cache; subsequent runs
#      restore in seconds. This is what the steps below do.
#   3. Vendor a prebuilt gcc-compatible dist as a private artifact and fetch it.
# Pick one before enabling required-status-check on this workflow; option 2 makes
# the first run long but needs no manual seeding.
#
# Pin HACL_REF to the exact commit the project builds against so the cache key is
# stable and the verified backend is reproducible.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  HACL_REF: "master"          # TODO: pin to the exact HACL* commit used by the project
  HACL_DIST_REL: "hacl-star/dist/gcc-compatible"

jobs:
  build-verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Rust toolchain (repo pins a nightly in rust-toolchain.toml) ---
      - name: Install Rust (pinned toolchain)
        run: |
          rustup show active-toolchain || rustup toolchain install stable
          rustc --version && cargo --version

      # --- Lean via elan; the toolchain version is read from lean-toolchain ---
      - name: Install elan / Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o elan-init.sh
          bash elan-init.sh -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean version
        run: lean --version

      # --- C toolchain (Linux; macOS runners already ship clang) ---
      - name: Install C toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # --- HACL*/EverCrypt: restore from cache, or build on a miss ---
      - name: Cache HACL*/EverCrypt dist
        id: hacl-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hacl-star/dist/gcc-compatible
          # Key on OS + the pinned HACL ref. Bump when HACL_REF changes.
          key: hacl-evercrypt-${{ runner.os }}-${{ env.HACL_REF }}

      - name: Build HACL*/EverCrypt (cache miss only — SLOW)
        if: steps.hacl-cache.outputs.cache-hit != 'true'
        run: |
          # This is the heavy path (F*/KaRaMeL already-extracted C is shipped in
          # the gcc-compatible dist; we only run ./configure && make libevercrypt.a).
          # See BUILD.md for building/obtaining the dist locally.
          git clone --depth 1 --branch "$HACL_REF" \
            https://github.com/hacl-star/hacl-star.git hacl-star
          cd hacl-star/dist/gcc-compatible
          ./configure
          make -j"$(nproc 2>/dev/null || sysctl -n hw.ncpu)" libevercrypt.a

      # --- The one command: portable from-scratch build + verify ---
      - name: Build + verify (scripts/ci.sh)
        env:
          HACL_DIST: ${{ github.workspace }}/${{ env.HACL_DIST_REL }}
        run: |
          chmod +x scripts/ci.sh
          scripts/ci.sh

      # --- Surface the conformance JSON for inspection ---
      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ matrix.os }}
          path: |
            conformance/results.json
            conformance/results_parity.json
          if-no-files-found: ignore
