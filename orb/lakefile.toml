# The deployed serve now composes the REAL Jwt gate (Reactor.Stage.Jwt), which
# imports Crypto — the HACL*/EverCrypt @[extern] primitives (ed25519Verify et al.).
# Even though the deployed JWT config routes around them (its verify boundaries are
# pure stubs), the Jwt object references the extern symbols, so the orb binary links
# the crypto shim + libevercrypt.a — the SAME recipe crypto-selftest uses. No
# unverified C crosses this seam. -no_data_const is the ld64/__DATA_CONST macOS
# workaround the other exes use.
moreLinkArgs = ["-Wl,-no_data_const", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

[[lean_lib]]
name = "Reactor"

# `Dataplane`: the proven serve exposed with a C ABI (`@[export drorb_serve]`)
# for a native host to drive. Unlike the `orb-*` exes (Lean owns `main`, the C
# shell is the `@[extern]` callee), here Lean is the CALLEE of an FFI call the
# host makes: `lake build Dataplane` compiles the module + its transitive deps
# to Mach-O objects under .lake/build/ir/**/*.c.o.export, which a host archives
# (libdrorb.a) and links against the Lean runtime (lib/lean/libleanshared*).
# The Rust dataplane in crates/dataplane is that host. A library, not an exe:
# it exports `drorb_serve`, it has no `main`.
[[lean_lib]]
name = "Dataplane"

