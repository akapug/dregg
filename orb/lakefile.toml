# `wg-live`: the WireGuard Noise IK live cross-check (WgLive.lean). drorb, as the
# initiator, builds MessageInitiation with the proven `Wireguard.Wire` construction
# on the verified `Crypto` X25519/ChaCha20-Poly1305 and the pure-Lean BLAKE2s
# ratchet, sends it over a real UDP socket (ffi/wg_udp.c, precompiled to
# ffi/wg_udp.o by `cc -c -O2 -fPIC -I "$(lean --print-prefix)/include"`) to a real
# WireGuard peer, and runs `consumeResponse` on the reply — deriving the transport
# keys iff the real peer accepted the handshake. NOT in defaultTargets (a live
# harness, the WireGuard analogue of crypto-selftest). References the @[extern]
# crypto symbols, so it links the crypto shim + AES fallback + F*-verified
# HACL*/EverCrypt (same recipe/HACL* path convention as crypto-selftest). Set
# LIBRARY_PATH to the HACL* dist when /opt/hacl-star is not symlinked.
[[lean_exe]]
name = "wg-live"
root = "WgLive"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/wg_udp.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `derp-live`: the DERP relay live cross-check (DerpLive.lean). Two clients drive
# the proven `Derp` login handshake — sealing FrameClientInfo and opening
# FrameServerInfo with the verified `Crypto` crypto_box (NaCl box: X25519 +
# XSalsa20-Poly1305, via HACL* NaCl in libevercrypt.a) — against a real DERP relay
# (derper) over a real TCP socket (ffi/derp_net.c, precompiled to ffi/derp_net.o
# by ffi/build-derp-net.sh), then relay a real FrameSendPacket A -> relay -> B.
# NOT in defaultTargets (a live harness, the DERP analogue of crypto-selftest).
# Links the crypto shim + AES fallback + F*-verified HACL*/EverCrypt (same recipe
# and HACL* path convention as crypto-selftest). Set LIBRARY_PATH to the HACL*
# dist when /opt/hacl-star is not symlinked.
[[lean_exe]]
name = "derp-live"
root = "DerpLive"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/derp_net.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `wg-responder`: the RESPONDER-side live cross-check (WgResponder.lean). The
# mirror of wg-live: here a real WireGuard peer is the INITIATOR and drorb is
# the responder. It binds a UDP socket (ffi/wg_udp.c drorb_udp_listen/recv/reply,
# precompiled to ffi/wg_udp.o), receives a real peer's MessageInitiation, runs
# the proven `Peer.handleInitiation` (verify mac1, responder ratchet, open the
# sealed static+timestamp, install the responder-oriented session) and replies
# with the serialized MessageResponse, then `Peer.handleTransport` AEAD-opens the
# peer's transport packet under T_recv — proof the transport keys agree. NOT in
# defaultTargets (a live harness, the WireGuard analogue of crypto-selftest).
# Same crypto shim + AES fallback + F*-verified HACL*/EverCrypt recipe/path
# convention as crypto-selftest and wg-live. Set LIBRARY_PATH to the HACL* dist
# when /opt/hacl-star is not symlinked.
[[lean_exe]]
name = "wg-responder"
root = "WgResponder"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/wg_udp.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `webrtc-live`: the WebRTC/DTLS live cross-check (WebrtcLive.lean). drorb, as the
# DTLS client, builds a byte-exact DTLS 1.2 ClientHello (offering the x25519 named
# group first) and sends it over a real UDP socket (ffi/webrtc_udp.c, precompiled
# to ffi/webrtc_udp.o by `cc -c -O2 -fPIC -I "$(lean --print-prefix)/include"`) to a
# real WebRTC peer's DTLS engine (conformance/webrtc/dtls_peer.py — aiortc's OpenSSL
# DTLS server). It parses the peer's ServerHello flight and runs the verified
# `Crypto.x25519` on the peer's ephemeral key from the ServerKeyExchange. NOT in
# defaultTargets (a live harness, the WebRTC analogue of crypto-selftest / wg-live).
# References the @[extern] crypto symbols, so it links the crypto shim + AES fallback
# + F*-verified HACL*/EverCrypt (same recipe/HACL* path convention as crypto-selftest).
# Set LIBRARY_PATH to the HACL* dist when /opt/hacl-star is not symlinked.
[[lean_exe]]
name = "webrtc-live"
root = "WebrtcLive"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/webrtc_udp.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "ffi/tls_p256_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]
