# `orb-mac`: the proven reactor as a real macOS TCP server. `main` binds a port
# (argv[1] or 8080) and hands the accept loop to the untrusted C shell
# (ffi/mac_io.c), which answers each connection with `deployStepIngress` — the
# SAME proven pipeline the `orb` exe runs, unchanged. The C shell is precompiled
# to ffi/mac_io.o (run ffi/build-mac-io.sh; TOML lakefiles cannot compile a C
# source directly) and linked in via moreLinkArgs. The -no_data_const flag is
# the same ld64/__DATA_CONST workaround the other exes use on current macOS.
# The deployed reactor closure now reaches the REAL Jwt gate (Reactor.Stage.Jwt →
# Crypto), so this exe references the @[extern] crypto symbols and must link the
# SAME backend the `orb` exe does: the crypto FFI shim, the AES-GCM Rust fallback,
# and the F*-verified HACL*/EverCrypt. No unverified C crosses the seam. See the
# HACL* path convention note at the top of this file's crypto targets
# (-L/opt/hacl-star/dist/gcc-compatible; symlink it or see CRYPTO-FFI-README.md).
[[lean_exe]]
name = "orb-mac"
root = "IoMac"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/mac_io.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `IoSel4`: the seL4 Microkit / sDDF IO boundary for the net protection domain.
# A library (NOT a lean_exe): a Microkit PD has no `main` — it exports
# init/notified/protected, which the seL4 image links into a CapDL ELF. It
# elaborates and compiles to .o here (the @[extern] sDDF/Microkit symbols resolve
# only at the final seL4 link, which is not available in this environment). See
# SEL4-IO-README.md. No moreLinkArgs: this target links nothing here.
[[lean_lib]]
name = "IoSel4"

# `Crypto`: the crypto FFI seam — opaque @[extern] primitives + assumed-property
# axioms (Crypto.lean). The library elaborates on its own (the @[extern] symbols
# are unresolved until something links the shim); the *executable* below is what
# links ffi/crypto_shim.o and runs.
[[lean_lib]]
name = "Crypto"

# `crypto-selftest`: runs the FFI primitives against published test vectors
# (RFC 7748 / 8032 / 5869, FIPS-180). The C shim is precompiled to
# ffi/crypto_shim.o (run ffi/build-crypto-shim.sh — TOML lakefiles cannot compile
# a C source directly) and linked here against libevercrypt.a — the F*-verified
# HACL*/EverCrypt crypto (Project Everest), built from /opt/hacl-star/dist. No
# unverified C (no libsodium/OpenSSL) crosses this seam. -no_data_const is the
# same ld64/__DATA_CONST workaround the other exes use on current macOS.
[[lean_exe]]
name = "crypto-selftest"
root = "Crypto.SelfTest"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `orb-linux`: the native Linux IO driver (TASK LINUX-IO). A real TCP accept loop
# (ffi/linux_io.c — io_uring preferred, epoll fallback) that answers each
# connection with `deployStepIngress` — the SAME proven pipeline the `orb` exe
# runs, unchanged. The C shell is precompiled to ffi/linux_io.o (run
# ffi/build-linux-io.sh; TOML lakefiles cannot compile a C source directly) and
# linked via moreLinkArgs. On macOS the shell compiles to a Linux-only stub that
# fails at runtime, so this exe still links here for a build-check; the real
# server runs on Linux. -no_data_const is the same ld64/__DATA_CONST macOS
# workaround the other exes use; on Linux drop it (lld-ELF rejects the Mach-O-only
# flag) — see LINUX-IO-README.md. For io_uring add "-luring" and rebuild the
# object with ORB_IO_URING=1. Like `orb`/`orb-mac`, the reactor closure reaches the
# real Jwt gate → Crypto, so this exe links the crypto shim + AES fallback +
# HACL*/EverCrypt (same recipe, same HACL* path convention as the crypto targets).
[[lean_exe]]
name = "orb-linux"
root = "IoLinux"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/linux_io.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `orb-win`: the native Windows IO driver (TASK WINDOWS-IO). A real TCP accept
# loop over I/O Completion Ports (ffi/win_io.c — AcceptEx/WSARecv/WSASend on an
# IOCP completion loop) that answers each connection with `deployStepIngress` —
# the SAME proven pipeline the `orb` exe runs, unchanged. The C shell is
# precompiled to ffi/win_io.o (run ffi/build-win-io.sh; TOML lakefiles cannot
# compile a C source directly) and linked via moreLinkArgs. The IOCP path is
# `#ifdef _WIN32`-guarded; on macOS the shell compiles to a Windows-only stub that
# fails at runtime, so this exe still links here for a build-check. The real
# server compiles under MSVC/clang-cl and links ws2_32 + mswsock — see
# WINDOWS-IO-README.md. -no_data_const is the same ld64/__DATA_CONST macOS
# workaround the other exes use; drop it on the Windows build. Like `orb`/`orb-mac`,
# the reactor closure reaches the real Jwt gate → Crypto, so this exe links the
# crypto shim + AES fallback + HACL*/EverCrypt (same recipe, same HACL* path
# convention as the crypto targets; on Windows the EverCrypt archive comes from the
# -mingw dist).
[[lean_exe]]
name = "orb-win"
root = "IoWin"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/win_io.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `TlsCrypto`: the TLS 1.3 key schedule and record layer over the verified
# `Crypto` primitives (TlsCrypto.lean). A library — the @[extern] EverCrypt
# symbols resolve only when something links the shim; the *executable* below is
# what links it and runs the RFC 8448 key-schedule vectors.
[[lean_lib]]
name = "TlsCrypto"

# `tls-keyschedule-selftest`: runs the TLS 1.3 key schedule against the RFC 8448
# §3 "Simple 1-RTT Handshake" trace (early secret, empty transcript hash,
# Derive-Secret) plus a real ChaCha20-Poly1305 record roundtrip, on the linked
# HACL*/EverCrypt (ffi/crypto_shim.o + libevercrypt.a). Same link recipe and
# ld64/__DATA_CONST workaround as crypto-selftest.
[[lean_exe]]
name = "tls-keyschedule-selftest"
root = "TlsCrypto.SelfTest"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `TlsHandshake`: the TLS 1.3 server-side handshake MESSAGE layer over the
# `TlsCrypto` key schedule + record layer and the verified `Crypto` primitives
# (TlsHandshake.lean). A library — the @[extern] EverCrypt symbols resolve only
# when something links the shim; the *executable* below runs the handshake.
[[lean_lib]]
name = "TlsHandshake"

# `tls-handshake-selftest`: drives the server handshake message layer against the
# RFC 8448 §3 ClientHello (parses it, agrees the DHE, derives the RFC's handshake
# traffic secrets), then runs a full self-consistent handshake to `established`,
# on the linked HACL*/EverCrypt. Same link recipe as tls-keyschedule-selftest.
[[lean_exe]]
name = "tls-handshake-selftest"
root = "TlsHandshake.SelfTest"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `tls-wire-oracle`: the server handshake message layer exposed over stdio so an
# EXTERNAL conformance battery (openssl s_client / testssl.sh) can drive it: the
# untrusted TCP front in conformance/tls/front.py does accept + record framing
# ONLY and pipes each record here; parsing, negotiation, key schedule, flight,
# and Finished verification all run in `TlsHandshake.serverStep` on the linked
# HACL*/EverCrypt. Same link recipe as tls-handshake-selftest, plus
# ffi/tls_p256_shim.o (HACL* P-256, built by ffi/build-tls-p256-shim.sh) for
# the secp256r1 key exchange this executable instantiates via TlsCrypto.P256.
[[lean_exe]]
name = "tls-wire-oracle"
root = "TlsHandshake.WireOracle"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "ffi/tls_p256_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `Deflate` / `Gzip`: a total, output-bounded model of DEFLATE inflate
# (RFC 1951) and the gzip container (RFC 1952). Single-file libs; Gzip imports
# Deflate. The headline theorem is the decompression-bomb bound
# (`inflate_output_bounded`): output size ≤ the caller's ceiling, for all input.
# `TlsServe`: the DSL TLS-profile READ by the handshake terminator —
# `Dsl.Cfg.TlsProfile.applyServerParams` overrides `TlsHandshake.ServerParams`'
# 0-RTT / OCSP / cert-pool policy from a config profile, so a deployment's
# declared TLS profile drives which cert / staple / early-data the handshake
# serves. Root: Dsl.Cfg.TlsServe.
[[lean_lib]]
name = "TlsServe"
roots = ["Dsl.Cfg.TlsServe"]

[[lean_lib]]
name = "Deflate"

[[lean_lib]]
name = "Gzip"

