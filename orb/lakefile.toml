# (Har, StickTable, DownloadMgr, Sse, Isolation, Metrics), each stated over the
# values `Arena.Orb.main` runs (`Reactor.Deploy.deploySubs`/`deployResp`) and
# anchored to the shared reactor via `Reactor.Bridge`. Root: Reactor.WireMore.
[[lean_lib]]
name = "WireMore"
roots = ["Reactor.WireMore"]

# `WsDeployLane`: the WebSocket lane made runtime-reachable. An HTTP/1.1
# `Upgrade: websocket` request drives the FSM into `.plainWs`, then a masked WS
# text frame runs through the REAL `Ws.wsFeedFn` (decode + unmask + reassembly)
# at runtime. Root: Reactor.WsDeploy (theorem `ws_upgrade_runtime` + a
# kernel-evaluated `#guard` over `deployConfig`).
[[lean_lib]]
name = "WsDeployLane"
roots = ["Reactor.WsDeploy"]

# `ReactorH2Response`: the real HTTP/2 RESPONSE path (H2-RESPONSE task) — encodes a
# `Reactor.Response` as real HEADERS(HPACK :status)+DATA frames and round-trips it
# back through the real H2 frame + HPACK decoders (Reactor/H2Response.lean).
[[lean_lib]]
name = "ReactorH2Response"
srcDir = "."
roots = ["Reactor.H2Response"]

# `ReactorL4`: the layer-4 (raw TCP / UDP) passthrough forwarding model
# (Reactor/L4.lean). The TCP splice state machine (`stepTcp`) and the datagram
# forwarder (`udpStep`) with byte-conservation theorems (`session_up_exact`,
# `runTcp_down_faithful`, `udpRun_faithful`) — bytes-in = bytes-out, verbatim, in
# order — plus the deployed-seam bridge (`deployed_accept_dials_pick`) pinning that
# the upstream the running `crates/dataplane/src/l4.rs` shell dials is exactly the
# proven `Reactor.ProxyDial` (`drorb_proxy_pick`) backend.
[[lean_lib]]
name = "ReactorL4"
srcDir = "."
roots = ["Reactor.L4"]

# `ArenaSound`: the request-line *soundness* theory — the meaning-preservation
# successor to `parse_wf`. Proves each resolved request-line field EQUALS its
# exact input substring (method/target/version), the two SP separators sit at the
# reported offsets with no earlier SP, and serialize-of-parse = input prefix. See
# ArenaSound.lean / ARENA-SOUND-README.md.
[[lean_lib]]
name = "ArenaSound"
srcDir = "."
roots = ["ArenaSound"]

# `HeaderSound`: the header-block *soundness* theory — the meaning-preservation
# successor to `parse_wf` for header fields. Proves each resolved header VALUE
# equals its exact OWS-trimmed input substring and each canonical header NAME
# equals the lowercased pre-colon input name bytes (including the sidecar case).
# See HeaderSound.lean / HEADER-SOUND-README.md.
[[lean_lib]]
name = "HeaderSound"
srcDir = "."
roots = ["HeaderSound"]

# `WireRest`: eight more island libraries attached to the DEPLOYED serve path
# (Fallback, Cgi, Redirect, ForwardProxy, Udp, Mtls, Drain, Resume), each stated
# over the values `Arena.Orb.main` runs (`Reactor.Deploy.deployResp` / the
# dispatched request) or a concrete deployed lifecycle scenario, anchored to the
# shared reactor via `Reactor.Bridge`. Root: Reactor.WireRest.
[[lean_lib]]
name = "WireRest"
srcDir = "."
roots = ["Reactor.WireRest"]

# `orb-mac-multi`: the proven reactor serving REAL traffic ACROSS PROTOCOLS
# (TASK MAC-MULTI) — WebSocket over TCP and QUIC/HTTP-3 over UDP, in addition to
# the H1/h2c the plain orb-mac serves. `main` (IoMacMulti) runs two untrusted C
# shells at once: ffi/mac_io.c's orb_mac_serve_ws keeps a TCP connection OPEN
# after an RFC 6455 Upgrade and runs each frame through the proven wsFeedFn/
# wsEncodeFn; ffi/mac_udp.c's orb_mac_serve_udp recv's a UDP datagram and drives
# the proven QUIC/H3 datagramServe. Both C shells are precompiled to
# ffi/mac_io.o + ffi/mac_udp.o (run ffi/build-mac-multi.sh) and linked via
# moreLinkArgs. -no_data_const is the same ld64/__DATA_CONST macOS workaround the
# other exes use.
[[lean_exe]]
name = "orb-mac-multi"
root = "IoMacMulti"
# This exe's reactor closure (Reactor.Ingress → the Jwt gate) references the
# `Crypto` @[extern] shim symbols, and mac_udp.o now also carries `drorb_chacha20`
# (the QUIC header-protection block → EverCrypt_Cipher_chacha20) for the orb-quic
# lane; so it links crypto_shim.o + libevercrypt.a — the same recipe the `orb` exe
# uses. Inert for the H1/h2c/WS/UDP paths orb-mac-multi actually runs.
moreLinkArgs = ["-Wl,-no_data_const", "ffi/mac_io.o", "ffi/mac_udp.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

[[lean_lib]]
name = "H2Sound"

[[lean_lib]]
name = "QpackSound"

[[lean_lib]]
name = "QuicTransport"

# `quic-transport-selftest`: derives the RFC 9001 Appendix A.1 Initial keys on live
# HACL*/EverCrypt and checks every hex value, then runs a real ChaCha20-Poly1305
# AND a real AES-128-GCM QUIC packet roundtrip (seal→open, plus tamper/wrong-pn
# rejection) through the linked crypto. AES-128-GCM is the cipher RFC 9001 §5.2
# mandates for Initials; off-x86 its AEAD is the portable aws-lc-rs fallback. Same
# link recipe and ld64/__DATA_CONST workaround as the other crypto self-tests.
[[lean_exe]]
name = "quic-transport-selftest"
root = "QuicTransport"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

# `QuicHeaderProt`: QUIC header protection (RFC 9001 §5.4) over the verified
# EverCrypt ChaCha20 block. Adds the one @[extern] the AEAD-only `Crypto` seam
# lacked (`drorb_chacha20` in ffi/mac_udp.c → EverCrypt_Cipher_chacha20), plus the
# mask derivation, truncated-PN decode, and apply/remove-header-protection logic
# IoQuic now runs on real off-the-shelf-client-shaped Initial packets. The
# @[extern] symbol resolves only when something links libevercrypt (orb-quic does).
[[lean_lib]]
name = "QuicHeaderProt"

# `QuicServer`: the QUIC v1 server RESPONSE flight (RFC 9000 / RFC 9001) over the
# TlsHandshake key schedule + the verified Crypto primitives (QuicServer.lean).
# Derives the handshake secrets from a decrypted ClientHello and emits the server
# Initial (ServerHello) + Handshake (EncryptedExtensions/Certificate/
# CertificateVerify/Finished) flight as real QUIC packets, then installs 1-RTT
# keys on the client Finished. A library — the @[extern] EverCrypt symbols resolve
# when orb-quic links the shim.
[[lean_lib]]
name = "QuicServer"

# `orb-quic`: QUIC SOCKET-LIVE (TASK QUIC-SOCKET) — a real/crafted QUIC Initial
# packet is DECRYPTED over a real UDP socket by the verified EverCrypt QUIC packet
# protection (QuicTransport.initialSecrets/deriveChachaKeys/openPacket) and reaches
# the proven H3 dispatch (Reactor.QuicIngress.datagramServe). `main` (IoQuic) runs
# an in-process EverCrypt decrypt→dispatch self-test, then binds the UDP socket via
# the untrusted C shell (ffi/mac_udp.c, precompiled to ffi/mac_udp.o by
# ffi/build-mac-multi.sh) and serves live. Links the crypto shim + libevercrypt.a
# (the F*-verified HACL*/EverCrypt) — the SAME recipe crypto-selftest uses — because
# the callback runs the real AEAD/HKDF primitives. -no_data_const is the ld64/
# __DATA_CONST macOS workaround the other exes use. See QUIC-SOCKET-README.md.
[[lean_exe]]
name = "orb-quic"
root = "IoQuic"
moreLinkArgs = ["-Wl,-no_data_const", "ffi/mac_udp.o", "ffi/cgi_exec.o", "ffi/crypto_shim.o", "target/release/libaes_fallback.a", "-L/opt/hacl-star/dist/gcc-compatible", "-levercrypt"]

