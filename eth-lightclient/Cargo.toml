# Standalone workspace: keeps the blst / BLS12-381 native dependency tree out of
# the main dregg workspace (like `chain/` and `solana-lock/`). This crate is an
# INBOUND foreign-chain verifier — it verifies *Ethereum* Altair sync-committee
# signatures over beacon headers. It is NOT part of dregg's own soundness TCB, so
# a standard audited BLS library (blst, the implementation every ETH consensus
# client uses) is the correct and safe choice here.
#
# Folded into the root workspace (members, NOT default-members — the heavy blst /
# alloy-trie native tree stays out of the bare dev loop, built via `-p eth-lightclient`).
[package]
name = "eth-lightclient"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Inbound Ethereum Altair sync-committee light-client verify core: BLS12-381 verification of beacon block headers + SSZ committee-rotation Merkle-branch verify"

[dependencies]
# blst 0.3.16 — supranational's BLS12-381 library, the reference implementation
# used by Lighthouse, Teku, Prysm, Nimbus, Lodestar. Its `min_pk` variant is
# exactly ETH2's scheme (G1 public keys, G2 signatures) and it implements the
# ciphersuite `BLS_SIG_BLS12381G2_XMD:SHA-256_SSWU_RO_POP_` correctly (the DST is
# passed explicitly; see `DST` in src/lib.rs). Version PINNED.
blst = "=0.3.16"
# SHA-256 for SSZ hash_tree_root / merkleization. Pinned minor.
sha2 = "0.10"

# --- EVM proof-of-holdings (EIP-1186) : maintained Merkle-Patricia-Trie + RLP ---
# alloy-trie is the Alloy/Reth Merkle-Patricia-Trie implementation; its
# `proof::verify_proof(root, key, expected_value, nodes)` is exactly the audited
# EIP-1186 verifier every Rust ETH client uses. We do NOT hand-roll the Patricia trie.
# alloy-primitives supplies keccak256/U256/B256/Bytes; alloy-rlp the account/value RLP.
# Pinned so the trie/RLP semantics are reproducible.
# `ethereum` feature exposes `TrieAccount` (the RLP [nonce,balance,storageRoot,codeHash]
# account leaf) used to reconstruct the account-proof terminal value.
alloy-trie = { version = "=0.9.5", features = ["ethereum"] }
alloy-primitives = "=1.3.0"
alloy-rlp = "=0.3.12"
# hex decoding of the real captured mainnet checkpoint (used by the verify_holding
# bin as well as the tests) — the checkpoint fixtures are hex string constants.
hex = "0.4"

[dev-dependencies]
# hex decoding of the real ethereum/bls12-381-tests KAT hex strings.
hex = "0.4"
# Same pinned trie/RLP stack as the lib, used by the ADVERSARIAL tests to
# SYNTHESIZE hostile tries (a blacklist entry that IS present, truncated
# exclusion proofs) -- integration tests do not see the lib's dependencies.
alloy-trie = { version = "=0.9.5", features = ["ethereum"] }
alloy-primitives = "=1.3.0"
alloy-rlp = "=0.3.12"

[lints]
workspace = true
