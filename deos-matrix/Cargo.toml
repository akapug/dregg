# deos-matrix — the protocol foundation of the NATIVE deos Matrix client.
#
# ## What this is
#
# A native, pure-Rust Matrix client core built on the OFFICIAL `matrix-rust-sdk`
# (`matrix-org/matrix-rust-sdk`, `matrix-sdk 0.18`). The SDK is the protocol +
# E2E-encryption substrate every serious Rust Matrix client stands on (Element X,
# Fractal, iamb). Our value-add is NOT a new protocol stack — it is the gpui UI
# (deferred until `gpui-component` is vendored) and the deos confinement
# integration (identity-cell binding, device-keys-as-caps, comms-PD, dockable
# rooms). This crate is JUST the protocol foundation: configure a homeserver,
# log in, sync, list rooms, read a room timeline — exposed as a small library API
# plus a headless CLI (`deos-matrix-cli`) so it is testable WITHOUT a UI.
#
# ## Standalone workspace (the `servo-render` / firmament pattern)
#
# The empty `[workspace]` table below makes this crate its OWN workspace root, NOT
# a member of the repo-root workspace. This is DELIBERATE and load-bearing:
# `matrix-rust-sdk` drags a heavy tokio-async dependency tree (reqwest/hyper,
# vodozemac, rusqlite, ruma, ~hundreds of transitive crates). Keeping it OUT of
# the repo-root workspace keeps the lean dregg/Lean lanes (and their `./target`,
# owned by the node lane) untouched. `cd deos-matrix && cargo build` builds into
# THIS crate's local target only. Same stance as `servo-render/Cargo.toml`.
#
# ## The async boundary (stated explicitly)
#
# `matrix-rust-sdk` is tokio-async. dregg's embedded executor is SYNC. So the
# Matrix client is — and must stay — a SEPARATE crate/app that owns its own tokio
# runtime, exactly like `servo-render` owns its own render path. The bridge to the
# deos/dregg side is a narrow, explicit seam (a request/response channel from a
# sync caller into the async worker — see `src/worker.rs`), NOT a shared runtime.
[workspace]

[package]
name = "deos-matrix"
version = "0.1.0"
edition = "2021"
publish = false
description = "Native deos Matrix client core on matrix-rust-sdk: homeserver config, password login, encrypted sync, room list, room timeline — headless library + CLI, UI deferred to gpui."

[lib]
name = "deos_matrix"
path = "src/lib.rs"

[[bin]]
name = "deos-matrix-cli"
path = "src/bin/cli.rs"

[features]
default = []

[dependencies]
# The official Matrix client-server SDK — protocol + E2E encryption (vodozemac).
# Default features already give us `e2e-encryption` + `sqlite` (persistent state
# and crypto store). `sso-login` adds the local-HTTP SSO redirect flow (roadmap;
# off by default to keep the dep tree minimal). `markdown` lets us send formatted
# messages. We do NOT pull `matrix-sdk-ui` yet — the headless foundation only
# needs the mid-level `matrix-sdk` Client/Room/Timeline-via-messages surface.
# TLS is bundled into the SDK's default HTTP transport in 0.18 (no separate
# tls feature). We enable the default feature set (which already includes
# `e2e-encryption` + `sqlite`) plus `markdown` for formatted-message sends.
matrix-sdk = { version = "0.18", features = ["markdown"] }

tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
clap = { version = "4", features = ["derive", "env"] }
rpassword = "7"
directories = "5"
