# deos-matrix — the protocol foundation of the NATIVE deos Matrix client.
#
# ## What this is
#
# A native, pure-Rust Matrix client core built on the OFFICIAL `matrix-rust-sdk`
# (`matrix-org/matrix-rust-sdk`, `matrix-sdk 0.18`). The SDK is the protocol +
# E2E-encryption substrate every serious Rust Matrix client stands on (Element X,
# Fractal, iamb). Our value-add is NOT a new protocol stack — it is the gpui UI
# (deferred until `gpui-component` is vendored) and the deos confinement
# integration (identity-cell binding, device-keys-as-caps, comms-PD, dockable
# rooms). This crate is JUST the protocol foundation: configure a homeserver,
# log in, sync, list rooms, read a room timeline — exposed as a small library API
# plus a headless CLI (`deos-matrix-cli`) so it is testable WITHOUT a UI.
#
# ## Standalone workspace (the `servo-render` / firmament pattern)
#
# The empty `[workspace]` table below makes this crate its OWN workspace root, NOT
# a member of the repo-root workspace. This is DELIBERATE and load-bearing:
# `matrix-rust-sdk` drags a heavy tokio-async dependency tree (reqwest/hyper,
# vodozemac, rusqlite, ruma, ~hundreds of transitive crates). Keeping it OUT of
# the repo-root workspace keeps the lean dregg/Lean lanes (and their `./target`,
# owned by the node lane) untouched. `cd deos-matrix && cargo build` builds into
# THIS crate's local target only. Same stance as `servo-render/Cargo.toml`.
#
# ## The async boundary (stated explicitly)
#
# `matrix-rust-sdk` is tokio-async. dregg's embedded executor is SYNC. So the
# Matrix client is — and must stay — a SEPARATE crate/app that owns its own tokio
# runtime, exactly like `servo-render` owns its own render path. The bridge to the
# deos/dregg side is a narrow, explicit seam (a request/response channel from a
# sync caller into the async worker — see `src/worker.rs`), NOT a shared runtime.
[workspace]

[package]
name = "deos-matrix"
version = "0.1.0"
edition = "2021"
publish = false
description = "Native deos Matrix client core on matrix-rust-sdk: homeserver config, password login, encrypted sync, room list, room timeline — headless library + CLI, UI deferred to gpui."

[lib]
name = "deos_matrix"
path = "src/lib.rs"

[[bin]]
name = "deos-matrix-cli"
path = "src/bin/cli.rs"

# The deos-chat gpui demo: a window with a room-list sidebar, a timeline, and a
# real gpui-component composer. Gated on `gui` so the headless library/CLI never
# pulls the gpui graph. Falls back to a mock/recorded sync so the UI is real even
# with no live homeserver.
[[bin]]
name = "deos-chat"
path = "src/bin/chat.rs"
required-features = ["gui"]

[features]
default = []
# The gpui UI (deos-chat): pulls the SAME vendored gpui fork + gpui-component the
# cockpit pins, so the chat surface drops into starbridge-v2's dock without a
# second gpui linkage. Off by default — the protocol foundation + CLI stay lean.
gui = [
    "dep:gpui",
    "dep:gpui_platform",
    "dep:gpui-component",
    "dep:gpui-component-assets",
    # OFFSCREEN SCREENSHOT capture (`deos-chat --screenshot OUT.png`). Mirrors
    # starbridge-v2's `render-capture` feature: gpui's `test-support` lights up
    # `HeadlessAppContext` + the offscreen wgpu renderer (`current_headless_renderer`),
    # `gpui_wgpu` supplies the `CosmicTextSystem` platform text system, and `image`
    # re-encodes the captured RGBA frame to a PNG. Bundled INTO `gui` so the atlas
    # can bake the chat UI headlessly with the same `--features gui` it already uses.
    "gpui/test-support",
    "gpui_platform/test-support",
    "dep:gpui_wgpu",
    "gpui_wgpu/test-support",
    "dep:image",
]
# The CockpitSurface adapter (mounts the chat in starbridge-v2's dock). Inherent
# methods here; the ~20-line forwarder ships ready-to-drop in starbridge-v2.
cockpit-surface = ["gui"]

[dependencies]
# The official Matrix client-server SDK — protocol + E2E encryption (vodozemac).
# Default features already give us `e2e-encryption` + `sqlite` (persistent state
# and crypto store). `sso-login` adds the local-HTTP SSO redirect flow (roadmap;
# off by default to keep the dep tree minimal). `markdown` lets us send formatted
# messages. We do NOT pull `matrix-sdk-ui` yet — the headless foundation only
# needs the mid-level `matrix-sdk` Client/Room/Timeline-via-messages surface.
# TLS is bundled into the SDK's default HTTP transport in 0.18 (no separate
# tls feature). We enable the default feature set (which already includes
# `e2e-encryption` + `sqlite`) plus `markdown` for formatted-message sends.
matrix-sdk = { version = "0.18", features = ["markdown"] }

tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
clap = { version = "4", features = ["derive", "env"] }
rpassword = "7"
directories = "5"

# --- gpui UI deps (gated on `gui`) -----------------------------------------
# Same emberian/zed fork rev as starbridge-v2/Cargo.toml, deos-zed/Cargo.toml,
# and gpui-component/Cargo.toml so the WHOLE graph resolves to ONE gpui — the
# chat `Entity`/`Window` types are byte-identical to the cockpit's, so the
# CockpitSurface adapter drops into starbridge-v2's dock without a second gpui
# linkage. (See deos-zed/Cargo.toml for the rationale this mirrors.)
gpui = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", optional = true }
gpui_platform = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", features = ["font-kit", "x11", "wayland", "runtime_shaders"], optional = true }
gpui-component = { path = "../../gpui-component/crates/ui", default-features = false, optional = true }
gpui-component-assets = { path = "../../gpui-component/crates/assets", optional = true }

# The wgpu renderer leaf, pulled DIRECTLY only for the offscreen screenshot bake
# (the `CosmicTextSystem` platform text system + the surfaceless renderer behind
# `current_headless_renderer`). Same fork rev as gpui above so cargo resolves ONE
# gpui instance across the graph. Gated on `gui`; absent from the lean CLI build.
gpui_wgpu = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", optional = true }
# Re-encodes the captured RGBA frame to a PNG. 0.25 matches gpui_wgpu's `image`
# (one resolved version), exactly as starbridge-v2 pins it for its cockpit bake.
image = { version = "0.25", default-features = false, features = ["png"], optional = true }

# The gpui dep tree carries `[patch.crates-io]` overrides its host workspace must
# replicate (see starbridge-v2/Cargo.toml + deos-zed/Cargo.toml). deos-matrix is
# its own workspace, so we replicate the subset our graph pulls: the vendored
# pathfinder_simd 0.5.6 (nightly portable-SIMD intrinsics removed from current
# toolchains; the vendored build.rs selects the scalar path) and the two
# zed-forked async-* crates gpui depends on.
[patch.crates-io]
async-process = { git = "https://github.com/zed-industries/async-process.git", rev = "0b6d6713570af61806e1e5cb40e0f757cb93fd9d" }
async-task = { git = "https://github.com/smol-rs/async-task.git", rev = "b4486cd71e4e94fbda54ce6302444de14f4d190e" }
pathfinder_simd = { path = "../starbridge-v2/vendor/pathfinder_simd" }
