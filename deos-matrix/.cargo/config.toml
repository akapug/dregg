# getrandom 0.3 (pulled transitively via imbl → rand_core 0.9 under matrix-sdk's
# eyeball-im) moved its backend selection out of cargo features: on
# wasm32-unknown-unknown it requires the `getrandom_backend="wasm_js"` cfg in
# addition to the `wasm_js` feature (set in Cargo.toml). This wires the CSPRNG to
# the browser's `crypto.getRandomValues`. Scoped to the wasm32 target so the
# native build is untouched. See https://docs.rs/getrandom/0.3/#webassembly-support
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
