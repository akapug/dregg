# deos-matrix pins the ROLLING `nightly` channel (same rationale as
# ../deos-zed/rust-toolchain.toml and ../starbridge-v2/rust-toolchain.toml): when
# the `gui` feature is on, gpui at the pinned zed rev uses `std::hint::cold_path`,
# an unstable library feature that stabilized in nightly around 2026-02-14 — so
# the repo root's `nightly-2026-01-01` is just-too-old and fails to compile gpui's
# `profiler.rs`. The rolling `nightly` (>= 2026-02-14) has it. The
# pathfinder_simd-on-nightly intrinsics breakage is handled separately by the
# vendored patch in Cargo.toml.
#
# This is a standalone workspace, so this pin affects only deos-matrix. The
# headless library/CLI (no gpui) build fine on any recent toolchain; the pin is
# only load-bearing for the `gui` feature.
[toolchain]
channel = "nightly"
profile = "default"
components = ["cargo", "clippy", "rustc", "rustfmt"]
