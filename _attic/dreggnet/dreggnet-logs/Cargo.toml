[package]
name = "dreggnet-logs"
description = "DreggNet per-tenant runtime logs — capture, durable store, cap-scoped tail/follow/search"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_logs"

[dependencies]
# Line records (de)serialize as JSONL on the durable append store, and the
# query API hands back typed `LogLine`s.
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
# The tamper-evident hash chain over a resource's log (the verifiable angle): a
# per-line sha256 binds each record to its predecessor so a deletion/edit of an
# already-served line is detectable.
sha2 = { workspace = true }

[dev-dependencies]
# Round-trip tests write the durable store under a scratch dir.
tempfile = { workspace = true }
