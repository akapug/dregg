# A tiny, dependency-free HTTP/1.1 value vocabulary: the `Method`, `StatusCode`,
# `Request`, `ResponseWriter`, `Handler`, and `HandlerResult` types the gateway's
# hand-rolled `std::net` serving loop writes responses through. Owned by DreggNet
# (clean-room — the trivial HTTP value types, not borrowed from any engine), so
# the gateway links no third-party HTTP engine. Pure-std, no dependencies.
