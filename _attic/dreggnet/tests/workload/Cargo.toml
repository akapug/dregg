# dreggnet-workload — the workload-simulation test harness.
#
# Plan + scope: docs/WORKLOAD-TEST-PLAN.md. The harness (`src/`) drives the REAL
# DreggNet surfaces — the `Orchestrator` loop, the `ConservingLedger` settlement
# rail, the durable layer, and `run_workload` — under realistic multi-tenant,
# concurrent, fault-injected, sustained load, and measures throughput / latency /
# finality / economy-conservation / resource use. The only mocks are the lease
# source and the compute backend, at the same `:8021/fulfill` contract boundary
# the offline gauntlet already mocks them.
#
# This crate is a workspace member (so `cargo build`/`cargo check` keep it green),
# but it is NOT in `scripts/test.sh`'s service-crate `-p` list and every scenario
# test is `#[ignore]`d, so `make test` never runs it. Run it explicitly:
#   make test-workload      (cargo test -p dreggnet-workload -- --ignored)
[package]
name = "dreggnet-workload"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
publish = false

[lib]
name = "dreggnet_workload"
path = "src/lib.rs"

[dependencies]
# The control plane: the real `Orchestrator` loop + the fleet + the mesh + the
# `ConservingLedger` settlement rail. It re-exports the bridge `Lease`/`CapGrade`
# and the exec `CapTier`, so the harness speaks the whole stack through it.
dreggnet-control = { path = "../../control" }
# The durable layer: `WorkloadRun`/`WorkloadSpec`/`run_workflow_on_disk` for the
# durability scenario (a population of crash-resumable workflows) + `metrics`.
dreggnet-durable = { path = "../../durable" }
# The execution surface: `run_workload` for the compute-tier load generation.
dreggnet-exec = { path = "../../exec" }

anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# The async runtime the loop + the loopback fulfill backends run on. The
# loopback `:8021/fulfill` stubs need `net` + `io-util` on top of the workspace set.
tokio = { workspace = true, features = ["net", "io-util"] }

[dev-dependencies]
# On-disk durable stores for the durability + crash-resume scenarios.
tempfile = { workspace = true }
# The lease authorization gate (the real refusal path the isolation scenario asserts
# against: an unfunded forged lease authorizes no work).
dreggnet-bridge = { path = "../../bridge" }
# The durable runtime, driven directly by the §5.5 crash-resume *population* test:
# park N workflows mid-run, tear the runtime down, reopen the SAME on-disk stores,
# resume all, and assert each replayed its completed step (exactly-once). Pinned to
# the same version + sqlite provider the durable crate uses so the store type unifies.
duroxide = { version = "0.1.29", default-features = false, features = ["sqlite"] }
