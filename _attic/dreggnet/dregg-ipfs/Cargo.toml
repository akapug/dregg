[package]
name = "dregg-ipfs"
description = "The IPFS bridge for DreggNet: a dregg blake3 content commitment IS an IPFS CIDv1 (blake3 multihash, raw codec), so a content-addressed dregg object/site/delta is pinned + fetched over IPFS and re-witnessed against the same address. The verified core is net-free â€” the IPFS transport is an injected seam (`IpfsClient`), exactly like the bridge's dregg-verify RPCs."
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dregg_ipfs"
path = "src/lib.rs"

# Deliberately dependency-light + platform-portable (mirrors `dreggnet-receipt` /
# `dreggnet-storage`): the CID bridge + the `IpfsClient` seam + `MockIpfs` carry NO
# network closure, so `cargo test -p dregg-ipfs` runs the whole cellâ†”CID alignment
# and the storageâ†’IPFS round-trip in-process on any host. The real Kubo client is a
# pure RPC formatter over an INJECTED `HttpPost` transport (the caller supplies the
# HTTP â€” reqwest in the gateway, the bundled std-only `StdHttpPost` for a local
# daemon), so the verified core never pulls an HTTP/TLS stack.
[dependencies]
blake3 = "1"
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }

[dev-dependencies]
# Used only by the integration test that proves the storageâ†’IPFS bridge fit: a
# bucket `put` (FNV heap-leaf commitment + signed PutReceipt) paired with an IPFS
# pin (blake3 CID), round-tripped + tamper-refused over `MockIpfs`.
dreggnet-storage = { path = "../storage" }
dreggnet-receipt = { path = "../receipt" }
