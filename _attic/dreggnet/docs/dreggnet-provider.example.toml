# Example dreggnet-provider config. Copy to `dreggnet-provider.toml` and edit.
# Every field has a default, so you only need the lines you want to change.
# See docs/SELF-HOST.md.

name         = "my-provider"     # the lease-owner / EC2 instance tag
region       = "home-lab"        # the placement region tag
asset        = "USD"             # the asset leases are denominated in
gateway_bind = "0.0.0.0:8080"    # where this provider's gateway binds

# WHERE funded execution-leases are read from.
[cells]
kind = "mock"                    # in-process leases — dev, no dregg node needed
# To read leases from your own dregg cells (the bridge's `dregg-verify` lane):
# kind     = "dregg_node"
# node_url = "https://my-node:9090"

# WHAT machines this provider rents.
[backend]
kind = "local"                   # run workloads in-process on this host via the bridge
# To rent AWS EC2 instances (needs AWS credentials in the environment):
# kind   = "ec2"
# ami_id = "ami-0abcdef0123456789"
# owner  = "me"
