[package]
name = "dreggnet-status"
description = "DreggNet public status page — a no-auth 'is the cloud up?' page anyone can check: overall + per-service health, the n=4 federation panel, recent incidents + uptime, and a machine-readable /status.json. The public subset of the operator ops dashboard."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "dreggnet_status"
path = "src/lib.rs"

# `dreggnet-status` — the PUBLIC status page. Where `dreggnet-ops` is the
# admin-gated operator view of the whole cloud, this is the public subset anyone
# can check with no auth: a simple "is the cloud up?" page (overall banner +
# per-service rows + the federation panel + incidents/uptime) plus a
# `/status.json` for external monitoring/embedding.
#
# Like `dreggnet-ops`/`dreggnet-console` it is a pure-std thread-per-connection
# HTTP server (no httpe/Elide closure) that reads the live health surfaces behind
# a `StatusSource` seam — so it cross-builds trivially:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-status
#
# HONEST: a surface the page cannot reach renders as Unknown, never falsely
# green. The shipped `FixtureSource` runs + tests green standalone; the live-edge
# `LiveSource` (reading the real node/gateway/control/bridge health) is the
# reviewed-go deploy step.
[[bin]]
name = "dreggnet-status"
path = "src/bin/dreggnet-status.rs"

[dependencies]
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
# RFC3339 timestamps on the generated view + incident timestamps.
time = { workspace = true, features = ["formatting", "parsing", "macros"] }
