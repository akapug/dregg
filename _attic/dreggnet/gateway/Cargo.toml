[package]
name = "dreggnet-gateway"
version.workspace = true
edition.workspace = true
publish = false

[lib]
name = "dreggnet_gateway"
path = "src/lib.rs"

[features]
default = []
# NOTE: gating creates on the light-client verified on-chain funded-lease read
# (`AttestedFunding` / `NodeFunding` via the control plane's verified source) is
# an honest, fail-closed named seam whose verified-core dep is owned future work
# (see `dreggnet_bridge::dregg_verify`). Gating reads funding from the node cell
# API until it lands.

# The runnable serving binary: binds a TCP listener and serves the machines-API
# `Handler` over a small HTTP/1.1 connection loop.
#   dreggnet-gateway --port 8080
[[bin]]
name = "dreggnet-gateway"
path = "src/main.rs"

# Rung 5: the fly.io-compatible machines API. A create maps a fly machine request
# onto a dregg execution-lease and drives the bridge (`dreggnet-bridge::fulfill`).
# Serving is the hand-rolled `std::net` loop in `main.rs` over the clean-room
# `dreggnet-http` types â€” pure-std, so the crate builds and tests natively on
# macOS and Linux. For a Linux deploy artifact from macOS:
#   cargo zigbuild --target x86_64-unknown-linux-gnu -p dreggnet-gateway

[dependencies]
# The HTTP/1.1 value vocabulary the machines API + data planes serve on: the
# `Handler`/`Request`/`ResponseWriter`/`Method`/`StatusCode`/`HandlerResult`
# types. DreggNet's own clean-room crate (pure-std, AGPL-clean) â€” the gateway
# links no third-party HTTP engine; its server is the hand-rolled `std::net`
# thread-per-connection loop in `main.rs`.
dreggnet-http = { path = "../http" }
# The keystone: a funded dregg execution-lease â†’ a durable metered workload.
# A create runs through the bridge's real lease gate; fulfill is the real launch.
dreggnet-bridge = { path = "../bridge" }
# The control plane's REAL dispatch primitive: a created machine's lease is
# dispatched over the overlay to a compute node (`dispatch_lease_over_mesh` +
# `TailscaleMesh`, the live edgeâ†’persvati path). Used, not re-implemented.
dreggnet-control = { path = "../control" }
# The per-account ABUSE-PREVENTION gate: a create consults the `Guard` for account
# standing + deploy-rate + per-account quota (refused in-band â†’ 402/429/403), and the
# serving path checks per-site/per-account request rate + resource suspension. The
# permissionless-cloud admission layer over the gateway's create + serve chokepoints.
dreggnet-guard = { path = "../guard" }
# The agent-served-web-API capability: the data-plane handler
# (`gateway/src/webapp.rs`) routes inbound HTTP to a served app's owned-sandbox
# handlers via `dreggnet_webapp::Router`.
dreggnet-webapp = { path = "../webapp" }
# Custom domains (BYO): the cap-gated DomainBinding cell + DNS challenge-verify
# (TXT/CNAME) + the verified custom-Host resolution the static data plane adopts
# beside the `<name>.dregg.works` SiteRegistry, and the on-demand-TLS `ask` gate.
dregg-domains = { path = "../dregg-domains" }
# The durable object-store core: the cap-gated, metered, receipted `BucketRegistry`
# the storage data-plane handler (`gateway/src/storage.rs`) mounts over HTTP â€” the
# object-store sibling of the hosting `SiteRegistry`.
dreggnet-storage = { path = "../storage" }
# The dregg-cap credential core (`dga1_` ed25519 caveat-chain): the storage write
# gate verifies a presented `storage-bucket/<name>` credential against the gateway's
# configured root authority. Also drives the custom-domain tests.
dreggnet-webauth = { path = "../webauth" }

serde = { workspace = true }
serde_json = { workspace = true }
# RFC3339 timestamps on machine records (fly-compatible `created_at`/`updated_at`).
time = { workspace = true, features = ["formatting"] }
# The serving binary blocks on this runtime to drive the (async) createâ†’dispatch
# path from the synchronous thread-per-connection loop; the lib tests use it too.
# `sync` adds the connection-concurrency semaphore (A4).
tokio = { workspace = true, features = ["rt-multi-thread", "net", "io-util", "macros", "time", "sync"] }
# Per-request structured observability (A6): status/latency/bytes events + a span
# around the connection loop, replacing the bare `eprintln!` error path.
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

