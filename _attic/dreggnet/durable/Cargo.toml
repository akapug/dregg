[package]
name = "dreggnet-durable"
description = "DreggNet durable-execution layer: an owned-sandbox workload as a duroxide workflow, checkpointed for crash-exact resume"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

[lib]
name = "dreggnet_durable"

# This crate WRAPS a `dreggnet-exec` owned-sandbox workload into a durable, recoverable
# `duroxide` workflow (DBOS / Durable-Task / Temporal lineage). Each workflow step
# runs on the owned sandbox; its result is checkpointed to the duroxide `Provider` store, so a
# crash mid-workflow resumes exactly-once from the last completed step rather than
# re-running it.
#
# Durable store: the in-process `duroxide` runtime + a `Provider`. The workflow code in
# `lib.rs` is provider-agnostic (`build_registries()` registers against any `Provider`);
# the store is chosen per deployment by a Cargo feature:
#   - `sqlite` (default): the bundled SQLite provider — single-host, WAL-durable, no system
#     sqlite (libsqlite3-sys is bundled). The always-green crash-recovery proof runs over it.
#   - `pg`: the in-process `duroxide-pg` PostgreSQL provider — the multi-host/replicated
#     durability boundary. Same workflow code; only the `Provider` changes. Its resume test
#     is `#[ignore]`-gated behind a live `DATABASE_URL` (opt-in; not part of the offline run).
# In-database composition (next step, not built here): `pg_durable` (durable execution INSIDE
# Postgres) so the lease, the meter, and the workflow checkpoints share one Postgres
# transaction with breadstuffs' `pg-dregg` (dregg-in-Postgres). That is where `MeterTick`
# becomes a real dregg `Payable` charge committed in the same pg txn as the checkpoint.
# Licenses (checked): duroxide = MIT; duroxide-pg = MIT; pg_durable = PostgreSQL License.

[features]
# Default: the bundled SQLite durable store. Offline, no system deps, always-green.
default = ["sqlite"]
# Bundled SQLite Provider (via duroxide). The local durable store the crash-recovery test
# exercises on an on-disk DB.
sqlite = ["duroxide/sqlite"]
# In-process PostgreSQL Provider (duroxide-pg) + the `dreggnet_meter` transactional outbox
# (via sqlx on the provider's shared pool). Opt-in: same workflow, Postgres-backed
# checkpoints; the pg meter/resume test is `#[ignore]` + `DATABASE_URL`-gated.
pg = ["dep:duroxide-pg", "dep:sqlx"]
# The REAL breadstuffs `pg-dregg` verified store as the settlement backing store
# (off by default — an AGPL license-isolation lane, exactly like `dreggnet-bridge`'s
# `dregg-verify`). Implies `pg` (the shared Postgres pool the verified store persists
# onto). Pulls pg-dregg's postgres-free, circuit-free CORE (`mirror`: the `MirrorBatch`
# / `RootChain` / `verify_chain_step` anti-substitution tooth — the SAME gate the
# extension's `dregg.commit_log` trigger runs). The conserving `Settlement` ledger
# then persists each settled period as a verified-turn row in a hash chain, re-validated
# on read by the chain tooth — `ConservingLedger`'s in-process twin, now durably +
# verifiably stored. The proof-attested settlement + the real on-chain `Payable` are
# the S3-gated half (see `settle::verified` docs); this is the un-gated store + semantics.
pg-dregg = ["pg", "dep:pg-dregg", "dep:blake3"]
# The REAL substrate proven conservation primitive as the settlement's conserving
# move (off by default — a heavy-closure lane, exactly like `pg-dregg`/the bridge's
# `dregg-verify`). When on, `conserve::apply_conserving_transfer` runs the
# debit/credit through breadstuffs' `dregg_cell::CellState` signed-balance epoch —
# the deployed Rust home of `recTransfer_balanceSum_conserve` / the apex
# `conservation_guarantee` — so the cloud's Σδ=0 points at the PROVEN theorem, not
# the hand-rolled `i64` twin (`docs/SOUNDNESS-TWINS-CENSUS.md` #1). It is a LANE and
# not an unconditional dependency because the conservation primitive is welded to
# `dregg-circuit` in every substrate carrier (`dregg-cell` pulls it non-optionally),
# so depending on it by default would pull plonky3 into the whole cloud's offline
# build. The default build keeps the byte-identical inline mirror, cross-checked by
# this lane's test gauntlet. The on-chain/in-circuit `Payable` settle is the S3 seam.
dregg-conserve = ["dep:dregg-cell"]

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# The durable-execution runtime (MIT). The store provider is feature-selected (see above);
# no provider feature is forced on by default beyond `sqlite` (this crate's `default`).
duroxide = { version = "0.1.29", default-features = false }
# The in-process PostgreSQL `Provider` for duroxide (MIT). Enabled by the `pg` feature.
duroxide-pg = { version = "0.1.34", optional = true }
# The `dreggnet_meter` transactional outbox writes through the SAME pool the
# `PostgresProvider` checkpoints into (`store.pool()`), so the version + feature set are
# matched to duroxide-pg's so the `PgPool` type unifies to one sqlx build.
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-native-tls", "postgres"], optional = true }
# The execution surface: a workflow step runs a real owned-sandbox workload through this.
dreggnet-exec = { path = "../exec" }
# The REAL breadstuffs verified store — OPTIONAL, pulled ONLY by the `pg-dregg`
# feature (the off-by-default AGPL verified-store lane). `default-features = false`
# keeps it to the postgres-free, circuit-free CORE (`mirror`): NO pgrx, NO
# dregg-circuit, NO Lean — `cargo tree -i dregg-circuit -p dregg-auth` stays empty,
# the same circuit-free property pg-dregg's own core build keeps. The default
# DreggNet build never compiles it (Apache-pure, offline), exactly as the bridge's
# `dregg-verify` lane stays off.
pg-dregg = { path = "../../pg-dregg", default-features = false, optional = true }
# The deterministic content-binding hash for the settlement chain's per-turn root
# (`prev_root` ⟶ `ledger_root`). OPTIONAL, pulled only by `pg-dregg`. This is the
# STAND-IN for the kernel's Poseidon2 `ledger_root` (the census #4/#5 content-root):
# the anti-substitution CHAIN STRUCTURE it binds is real + un-gated, but a light
# client witnessing it as the real committed kernel state is the S3-gated half.
blake3 = { version = "1", optional = true }
# The REAL substrate proven signed-balance conservation primitive — OPTIONAL,
# pulled ONLY by the `dregg-conserve` lane. `dregg_cell::CellState`'s
# `debit_balance`/`credit_balance` are the deployed Rust home of
# `recTransfer_balanceSum_conserve`; routing the settlement's conserving move
# through them makes the cloud's Σδ=0 the PROVEN theorem, not the `i64` twin.
# `dregg-cell` is the LIGHTEST substrate carrier of the conservation primitive
# (it pulls `dregg-circuit` — every carrier does — but NOT turn/captp/dsl/token),
# so this lane stays as small as the circuit-welded primitive allows. Off by
# default, exactly like the `pg-dregg` verified-store lane above.
dregg-cell = { path = "../../cell", optional = true }
# Activities run on duroxide's tokio runtime; `run_workload` drives its own current-thread
# runtime, so the activity offloads it to `spawn_blocking` (see lib.rs).
tokio = { workspace = true }

# openssl loose end (Linux cross-build): duroxide 0.1.29 (and duroxide-pg) hardcode `sqlx`
# with `runtime-tokio-native-tls`, which on Linux pulls `native-tls` -> `openssl-sys`.
# Cargo feature unification is additive, so a downstream crate cannot *drop* that native-tls
# request — only a root `[patch.crates-io]` on duroxide could fully remove openssl-sys.
# Within this crate's scope we make the build self-contained instead: enable openssl-sys's
# `vendored` feature on Linux so it compiles a bundled OpenSSL from source. No system
# libssl/openssl-dev is needed, so the Linux cross-build is no longer blocked. (macOS uses
# the Security framework and never pulls openssl-sys, so this is Linux-target only.)
[target.'cfg(target_os = "linux")'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[dev-dependencies]
# The crash-recovery test uses an on-disk SQLite DB in a temp dir so the durable store
# genuinely survives the runtime being torn down and re-created.
tempfile = { workspace = true }

# Durable-layer characterization (in-memory per-step overhead + on-disk SQLite
# I/O tax + checkpoint/crash-resume cost). Hand-rolled timing harness, offline.
[[bench]]
name = "durable_bench"
harness = false
