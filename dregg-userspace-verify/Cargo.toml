[package]
name = "dregg-userspace-verify"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Userspace 'lint your turn before you spend gas' toolkit: static assurance checks (conservation, non-amplification, well-formedness, ring-balance) over a constructed-but-not-yet-submitted CallForest"

[dependencies]
# The artifact under analysis IS the SDK's emitted turn shape: dregg_turn::{CallForest,
# CallTree, Action, Effect}. We read it, never execute it (no executor, no circuit).
dregg-turn = { path = "../turn" }
dregg-cell = { path = "../cell" }
dregg-types = { path = "../types" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[lints]
workspace = true

[[bin]]
name = "dregg-uverify"
path = "src/main.rs"
