[package]
name = "starbridge-privacy-voting"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace privacy-voting app — FactoryDescriptors and turn helpers for poll creation, ballot minting, one-vote-per-cell voting, and monotone tallying."

# Greenfield rebuild of the legacy `apps/privacy-voting/` HTTP app as a
# dregg-native starbridge-app. Composes dregg primitives only
# (FactoryDescriptor + Effect::SetField + Effect::EmitEvent +
# StateConstraint slot caveats) — no domain-specific `Effect::CastVote`.
#
# The voting rules are enforced by slot caveats on factory-born cells:
#   - Ballot cell `VOTE` slot is `WriteOnce`   ⇒ one vote per ballot cell.
#   - Poll cell tally slots are `Monotonic`    ⇒ tallies only ever increase.
#   - Poll cell `CLOSED` slot is `WriteOnce`   ⇒ a poll closes exactly once.
# See `src/lib.rs` for the per-cell field-slot schema.

[dependencies]
# `default-features = false`: this crate uses only the wasm-clean CORE of the
# framework (`AgentCipherclerk`/`EmbeddedExecutor`/`Effect`/`AuthRequired`/`invoke`),
# and it sits in `spween-dregg`'s (browser) dep tree via `collective-choice`, so it
# must not drag the `server` feature (axum/tokio-full/reqwest) onto the shared
# instance. Native builds are unaffected (the core API is identical).
dregg-app-framework = { path = "../../app-framework", default-features = false }
dregg-cell = { path = "../../cell", default-features = false }
dregg-turn = { path = "../../turn" }
dregg-types = { path = "../../types" }

blake3 = "1"
# The ballot-set exhibit (the CountGe tally-binding witness) rides as a
# postcard `Vec<[u8; 32]>` Cleartext blob — the same encoding the executor's
# CountGe evaluator decodes (and collective-choice's quorum witness uses).
postcard = { version = "1", features = ["alloc"] }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# The deos-app re-expression proof (`tests/reexpress_deos_app.rs`) + the
# fire→full-CellProgram seam proof (`tests/deos_seam.rs`) — the census promotion of the
# privacy-voting POLL + BALLOT into a composed two-cell DeosApp shipped from `src/`. Both
# drive the mounted axum surface (per-viewer projection + cap-gated fires) end-to-end.
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
# ELIGIBILITY-PROVEN VOTING (`tests/eligibility_proven_voting.rs`): the
# privacy-voting × identity interlock — an eligibility credential (issued by an
# identity issuer) is presented ANONYMOUSLY to prove a voter is in the electorate
# without revealing who, and the ballot's `SenderAuthorized{CredentialSet}` gate
# commits to the same `(issuer, schema)` the identity app computes. Needs the
# sibling identity app + its credential + token primitives co-resident.
starbridge-identity = { path = "../identity" }
dregg-credentials = { path = "../../credentials" }
dregg-token = { path = "../../token" }

[lints]
workspace = true
