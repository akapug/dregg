[package]
name = "starbridge-compartment-workflow-mandate"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace compartment workflow mandate — DAG step cursor, commitment anchor, clearance labels, and Stingray spend policy composed from dregg-native FactoryDescriptor + SetField/EmitEvent turn builders."

# Scaffold for `metatheory/Dregg2/Apps/CompartmentWorkflowMandate*.lean`.
# Mirrors `starbridge-apps/nameservice/` shape: FactoryDescriptor, cell-program
# skeleton, AppCipherclerk turn-builders, StarbridgeAppContext::register.
# See `src/lib.rs` and README.md for Lean-theorem → Rust admission-check mapping.

[lib]
name = "starbridge_compartment_workflow_mandate"

[dependencies]
dregg-app-framework = { path = "../../app-framework" }
dregg-cell = { path = "../../cell", default-features = false }
dregg-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
# The forge (dregg-doc, EXCLUDED own-workspace crate) with its executor-drive
# substrate — for the `tests/forge_ci_weld.rs` binding: a CWM CI charter's signed
# terminal `advance_step` receipt satisfies a forge `PullRequest`'s
# `RequiredCheck::CommittedReceipt`. Consumed from WITHIN the parent workspace, so
# the parent's `[patch]` (ark-serialize fork) governs its `substrate` graph;
# dregg-turn/dregg-cell are already in CWM's tree, so this adds only dregg-doc.
dregg-doc = { path = "../../dregg-doc", features = ["substrate"] }
# For the explicit `verify_receipt_signature_with_keys` / `Finality` assertions in
# the weld test (already in CWM's tree via app-framework -> dregg-sdk -> dregg-turn).
dregg-turn = { path = "../../turn" }

[lints]
workspace = true