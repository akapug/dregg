[package]
name = "starbridge-tool-access-delegation"
version = "0.1.0"
edition = "2024"
description = "Verifiable tool / MCP-access delegation — the object-capability model serving AI delegation. A grantor agent mints a narrowly-attenuated, rate-limited, time-bounded, revocable mandate cell whose rate (Monotonic counter + ceiling), expiry (WriteOnce deadline), and scope (Immutable tool_id) caveats are checked by the verified executor on every tool invocation. Rust mirror of metatheory/Dregg2/Apps/ToolAccessDelegation.lean (proven against VerificationToolkit.app_commit_iff_admit)."

# Mirrors `metatheory/Dregg2/Apps/ToolAccessDelegation.lean`: the per-invocation
# rate/expiry/scope consumption-budget enforcement (the slot-caveat surface),
# composed with the agent-mandate capability attenuation in
# `intent/src/agent_mandate.rs` (`materialize_grant`/`materialize_revoke`) and the
# biscuit credential gate in `Dregg2/Exec/GatedForestCfg.lean §A2`.
#
# See `src/lib.rs` for the Lean-theorem → Rust admission-check mapping and
# `tests/lean_differential.rs` for the corpus pinned identically on both sides.

[lib]
name = "starbridge_tool_access_delegation"

[dependencies]
dregg-app-framework = { path = "../../app-framework" }
dregg-cell = { path = "../../cell", default-features = false }
dregg-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
