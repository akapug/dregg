[package]
name = "starbridge-storage-gateway-mandate"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace storage gateway mandate — StorageOp GET/PUT/LIST, prefix authorization, clearance labels, and Stingray volume budget composed from dregg-native FactoryDescriptor + SetField/EmitEvent turn builders."

# Scaffold for `metatheory/Dregg2/Apps/StorageGatewayMandate*.lean`.
# Mirrors `starbridge-apps/subscription/` operation-scoped Cases pattern.
# See `src/lib.rs` and README.md for Lean-theorem → Rust admission-check mapping.

[lib]
name = "starbridge_storage_gateway_mandate"

[dependencies]
dregg-app-framework = { path = "../../app-framework" }
dregg-cell = { path = "../../cell", default-features = false }
dregg-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# The deos-app re-expression proof (`tests/reexpress_deos_app.rs`) + the fire→full-CellProgram
# seam proof (`tests/deos_seam.rs`, the volume budget as a LIVE gate). Both drive the mounted
# axum surface (per-viewer projection + cap-gated fires) end-to-end.
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"

[lints]
workspace = true