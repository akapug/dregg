[package]
name = "starbridge-polis"
version = "0.1.0"
edition = "2024"
description = "Starbridge polis layer ‚Äî governance cells (council M-of-N, constitution-as-program, forward-certified amendments) and budgeted agent-orchestration worker mandates, as factory-born cells whose StateConstraint programs ARE the enforced state machines."

# The polis layer follows the settlement-blueprint pattern
# (`cell/src/blueprint.rs`, frozen reference): per-charter content-addressed
# `FactoryDescriptor`s whose `state_constraints` are installed for life on the
# born cell and re-evaluated by the executor on EVERY turn that touches it.
# Turn builders live in `dregg_sdk::polis`; end-to-end teeth on the real
# `TurnExecutor` live in `sdk/tests/polis_*_e2e.rs`.

[dependencies]
dregg-cell = { path = "../../cell", default-features = false }

blake3 = "1"
postcard = { version = "1", features = ["alloc"] }
# The AX4 deos-view CARD (`src/card.rs`) is a renderer-independent `deos.ui.*`
# view-tree built as PURE `serde_json` ‚Äî no `deos-view`, no `app-framework`, so it
# carries no package-cycle edge and ships in the default build (the only normal
# library module of the four runtime axes; the service/reactor/deos faces are
# test-compiled, see below).
serde_json = { workspace = true }

[features]
# Default is EMPTY: the pure library compiles with no app-framework, no turn,
# no sdk, no axum/tokio/tower ‚Äî it ships factory descriptors + cell programs.
default = []
# The deos-native surface (`src/deos.rs`): the five governance families
# re-expressed as composed `DeosApp`s on the app-framework bones. A FEATURE
# (not a normal optional dep) because of a hard package-graph CYCLE: `dregg-sdk`
# depends on `starbridge-polis` (it re-exports the pure cell programs from
# `sdk/src/polis.rs`), and `dregg-app-framework` depends on `dregg-sdk` ‚Äî so a
# NORMAL `polis -> dregg-app-framework` edge (even `optional`) closes the cycle
# `app-framework -> sdk -> polis -> app-framework`, which Cargo rejects. Cargo
# permits a cycle only across a DEV-dependency, so the framework/turn/sdk crates
# are dev-dependencies and the deos surface is compiled INTO THE TEST BINARIES
# (via `#[path = "../src/deos.rs"]` in `tests/`), where dev-deps are in scope.
# The pure `cargo test`/`cargo build` never touches any of them. Enabling the
# `deos` feature only flips the `#[cfg]` the test files gate on ‚Äî it adds no
# dependency edge to the library graph (so the cycle never forms).
#
# The `deos` feature ALSO gates the AX3 SERVICE (`src/service.rs`, the council
# governance lifecycle on the `invoke()` front door) and the AX5 REACTOR
# (`src/reactor.rs`, the quorum auto-certifier) ‚Äî they pull `dregg-app-framework`
# too, so they ride the SAME `#[path]`-into-test-binaries dance as the deos
# surface (`tests/service.rs`, `tests/reactor.rs`). The AX4 card (`src/card.rs`)
# is the exception: pure `serde_json`, a normal library module, no feature.
deos = []

[dev-dependencies]
# The deos surface (`src/deos.rs`, compiled into the test binaries) + the
# feature-gated deos tests run against the REAL composed framework. These are
# DEV-dependencies (Cargo permits the otherwise-illegal `app-framework -> sdk ->
# polis` cycle to close ONLY across a dev edge), so the pure library graph never
# pulls them. `dregg-turn` supplies `WitnessBlob` (the identity rotate's
# `Preimage32` exhibit); `dregg-sdk` supplies `AgentRuntime` (the
# height-controlled embedded executor the time-gated families ‚Äî amendment
# cooling, identity rotation cooling ‚Äî fire against).
dregg-app-framework = { path = "../../app-framework" }
dregg-turn = { path = "../../turn" }
dregg-sdk = { path = "../../sdk" }
# Drive the mounted axum surface end-to-end (per-viewer projection over HTTP,
# /surface.js, /manifest).
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
# (`serde_json` is a normal dependency ‚Äî the AX4 card needs it in the default
# build ‚Äî so the manifest / projection assertions get it for free here.)

[lints]
workspace = true
