[package]
name = "starbridge-nameservice"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace nameservice — FactoryDescriptors and turn helpers for federation name registration, resolution, and delegation."

# Greenfield rebuild of `apps/nameservice/` following STARBRIDGE-APPS-PLAN.md
# §3.1. Composes dregg primitives (FactoryDescriptor + Effect::SetField +
# Effect::EmitEvent + Caveat::ResourcePrefix) instead of inventing a
# domain-specific `Effect::RegisterName`. See `src/lib.rs` for the
# in-source design notes and the WriteOnce / slot-caveat TODO.

[dependencies]
dregg-app-framework = { path = "../../app-framework" }
dregg-cell = { path = "../../cell", default-features = false }
dregg-turn = { path = "../../turn" }
dregg-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# The deos-app re-expression proof (`tests/reexpress_deos_app.rs`) + the
# fire→full-CellProgram seam proof (`tests/deos_seam.rs`). nameservice is THE
# web-of-cells keystone: the re-expression proves each name cell publishes as a real
# `dregg://` sturdyref (publish_all). Both drive the mounted axum surface (per-viewer
# projection + cap-gated fires) end-to-end.
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tower = "0.5"

[lints]
workspace = true
