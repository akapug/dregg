[package]
name = "starbridge-governed-namespace"
version = "0.1.0"
edition = "2024"
description = "Starbridge userspace governed-namespace — DFA-routed governance app. Composes pyana-dfa (GovernedRouter, RouteTableBuilder, AIR-attestable accept/reject) with pyana-directory (named-cell registry) and per-slot caveats to land governance-bound atomic table swaps as a starbridge-app."

# Greenfield rebuild of `apps/governed-namespace/` following
# STARBRIDGE-APPS-PLAN.md §3.3. The legacy crate ran a `RoutingTable`
# behind an axum HTTP service and a `GovernanceEngine` that mutated
# its own in-process state. This crate inverts that: a
# governed-namespace cell is a sovereign cell whose state slots commit
# to the live route-table root, version, governance committee, and
# threshold. Updates require a constitutional threshold-signature
# carrier via `WitnessedPredicate { kind: Custom { vk_hash: GOVERNANCE_VK } }`
# under `Authorization::Custom`, and the table swap is atomic
# (route_table_root := new_root, version += 1) in a single executor
# turn — exactly the shape `pyana_dfa::GovernedRouter::update_routes`
# already enforces in memory.
#
# Companion docs:
#   - STARBRIDGE-APPS-PLAN.md §3.3 (per-app design sketch).
#   - DFA-RATIONALIZATION-DESIGN.md §2.2 (governance atomic table swap).
#   - STORAGE-AS-CELL-PROGRAMS.md (the cell-program pattern this app
#     mirrors for the storage-as-cell-program proof).
#   - AUTHORIZATION-CUSTOM-DESIGN.md (the `Authorization::Custom` shape
#     the `commit_table_update` builder constructs).
#   - SLOT-CAVEATS-DESIGN.md (the `StateConstraint` vocabulary the
#     factory descriptor + cell-program draw from).

[lib]
name = "starbridge_governed_namespace"

[dependencies]
pyana-app-framework = { path = "../../app-framework" }
pyana-cell = { path = "../../cell", default-features = false }
pyana-dfa = { path = "../../dfa" }
pyana-turn = { path = "../../turn" }
pyana-types = { path = "../../types" }

blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
