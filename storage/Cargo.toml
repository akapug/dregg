[package]
name = "dregg-storage"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"

[features]
default = []
kzg = ["poly-commitment", "ark-ec", "ark-ff", "ark-poly", "ark-bn254", "ark-std", "ark-serialize"]

[dependencies]
blake3 = "1"
# ed25519 signatures for PoR-challenge operator authentication: a durability
# deal's challenge response must be SIGNED by the assigned operator's key so a
# valid response proves *that operator* holds *that shard* (not merely that some
# holder of a shard copy produced an opening). Same crate + major the node signs
# blocks with (`node/Cargo.toml`'s ed25519-dalek 2).
ed25519-dalek = { version = "2", features = ["std"] }
serde = { version = "1", features = ["derive"] }
# postcard (de)serialization of the IR-v2 batch proof (`Ir2BatchProof`) that the
# private-consumption path verifies via the p3 descriptor prover. This replaced
# the hand `dregg_circuit::stark::proof_from_bytes` decode in the STARK-kill
# wire migration (`descriptor_by_name` + `verify_vm_descriptor2`).
postcard = { version = "1", features = ["use-std"] }
# JSON (de)serialization of the `ErasureChunk` / `AvailabilityManifest` DA bodies
# the node's `/storage/{manifest,chunk}` routes return — used by the
# `retrieval::HttpChunkSource` light-client adapter.
serde_json = "1"

# Vetted pure-Rust k-of-n Reed–Solomon erasure code over GF(2^8)
# (Vandermonde, the same crate Substrate/parity use). Replaces the former
# XOR single-loss prototype: any `n_data` of `n_total` shards reconstruct.
# `simd-accel` is intentionally OFF (avoids the C `cc` build dep; the pure
# Rust path is correct and portable for storage's blob sizes).
reed-solomon-erasure = { version = "6", default-features = false, features = ["std"] }

# Path dependency on dregg-circuit for Poseidon2 + BabyBear primitives.
# storage is in the root Cargo.toml `exclude` list, so it builds as a
# standalone crate — but we can still take a path dependency on a workspace
# crate. We use only the public Poseidon2/BabyBear surface; no upstream
# visibility changes were required (see STORAGE-POSEIDON2-AUDIT.md, "Notes
# on the Poseidon2 source").
dregg-circuit = { path = "../circuit" }
# Re-export of the lifted slot-caveat enum lives in `cell::program`. Per
# `SLOT-CAVEATS-DESIGN.md` §5 Option A the storage crate's
# `QueueConstraint` continues to exist for back-compat, but the canonical
# vocabulary now lives in dregg-cell.
dregg-cell = { path = "../cell" }

# KZG polynomial commitment from o1-labs/proof-systems (same rev as circuit crate).
# We use PairingSRS for SRS generation + commit_non_hiding for polynomial commitments.
# The "std" feature is required for the KZG module and SRS creation methods.
poly-commitment = { git = "https://github.com/o1-labs/proof-systems", rev = "36a8b510", optional = true, default-features = false, features = ["std", "parallel"] }

# Arkworks crypto (versions match proof-systems / ark 0.5)
ark-ec = { version = "0.5", optional = true }
ark-ff = { version = "0.5", features = ["asm"], optional = true }
ark-poly = { version = "0.5", optional = true }
ark-bn254 = { version = "0.5", optional = true }
ark-std = { version = "0.5", optional = true }
ark-serialize = { version = "0.5", optional = true }

[lints.clippy]
all = { level = "warn", priority = -1 }

[lints.rust]
unexpected_cfgs = "deny"
