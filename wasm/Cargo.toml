[package]
name = "dregg-wasm"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["Dregg Contributors"]
license = "AGPL-3.0-or-later"
description = "WebAssembly playground for dregg token primitives"

[lib]
# `cdylib` for the browser playground bundle; `rlib` so the integration tests
# (`tests/*.rs`, e.g. the card-in-the-tab loop) can link the crate as a library
# and drive its `#[wasm_bindgen]` surface under `wasm-pack test`.
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
getrandom = { version = "0.3", features = ["wasm_js"] }
getrandom02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }

# Local crates (only WASM-safe ones). `no-lean-link` is THE platform gate
# (docs/FEATURE-HYGIENE.md §Lean): wasm32 cannot link libdregg_lean.a, so these
# crates compile their Rust fallback paths here — a statement about this target's
# linker, never about which guarantees native dregg has (there Lean is unconditional).
dregg-macaroon = { path = "../macaroon" }
dregg-trace = { path = "../trace" }
dregg-commit = { path = "../commit" }
dregg-circuit = { path = "../circuit", default-features = false }
# The whole-history light-client-in-the-tab (`bindings_lightclient`) verifies the
# recursive IVC aggregate, so wasm pulls the recursion tower (already on this graph
# transitively via dregg-sdk/prover + dregg-lightclient).
dregg-circuit-prove = { path = "../circuit-prove" }
dregg-cell = { path = "../cell", default-features = false }
dregg-cell-crypto = { path = "../cell-crypto" }
dregg-turn = { path = "../turn", default-features = false }
# coord / intent are FFI-FREE by construction (they route their verified gates through their
# `verified_gate` seams, which only a Lean-boundary crate — never depended on here — registers).
# No feature needed: wasm32 simply doesn't pull a Lean impl, so the native-Rust differential decides.
dregg-coord = { path = "../coord", default-features = false }
dregg-intent = { path = "../intent", default-features = false }
# THE REFLECTIVE SUBSTRATE — the cap-bounded, attested read of a cell's four substances
# (the SAME `ReflectedCell::raw_fields` + `AffordanceSurface` the native cockpit inspector
# reads). gpui-FREE; its only deps are `dregg-cell`/`dregg-turn`/`dregg-types` — already in
# this graph — so it is wasm32-safe. `bindings_card`'s `InspectorWorld` reads its own in-tab
# cell's faces through it and generates the inspector view-tree the web renderer paints.
deos-reflect = { path = "../deos-reflect", default-features = false }
dregg-sdk = { path = "../sdk", default-features = false, features = ["no-lean-link", "prover"] }
# sdk pulls bulletproofs (via cell crypto) — already covered by the
# clear_on_drop override below, but listing here for grep-ability.
#
# `prover` is in the sdk's DEFAULT set; we re-add it here (default-features
# is off for the no-lean-link split) so the SDK's cfg MATCHES the single
# `dregg-circuit` instance in this graph, which feature-unification already
# pins to `prover` (lightclient/etc. pull it on). Without this the SDK
# compiles its `#[cfg(not(feature = "prover"))]` v1 effect-VM leg and dangles
# on the now-deleted `dregg_circuit::EffectVmAir` / `effect_vm_p3_full_air`
# (the C7 v1-deletion cutover). Aligned, both prove/verify the rotated IR-v2.
dregg-types = { path = "../types" }
# DreggDL: the REAL parse → lower → userspace-verify pipeline, so the TS SDK's
# `deploy.check()` calls the SAME checker the `dregg-deploy` CLI runs (not a
# TS re-implementation). Both are pure logic over the dregg-turn types already
# linked here (no Lean link of their own — they ride dregg-turn's no-lean-link
# via feature unification in this standalone workspace), so they are wasm32-safe.
dregg-userspace-verify = { path = "../dregg-userspace-verify" }
dregg-deploy = { path = "../dregg-deploy" }
# CapTP — needed to decode `HandoffCertificate` (carried by
# `Authorization::CapTpDelivered`) for `create_captp_delivered_auth`. Pure
# types + bs58 + postcard; wasm32-safe (already a transitive dep via dregg-turn).
dregg-captp = { path = "../captp" }
# Federation (pure types + consensus orchestration). The `runtime` feature
# (tokio + crossbeam transport) is non-wasm32, hence default-features = false.
# FFI-free by construction (the `verified_gate` seam, unregistered here).
dregg-federation = { path = "../federation", default-features = false }
# DFA — canonical route-table commitment for the governed-namespace app flow
# (RouteTableBuilder + route_table_commitment). Pure blake3 + serde + postcard;
# the heavy `dregg-federation` dep is optional and stays off here, so wasm32-safe.
# We do NOT depend on starbridge-governed-namespace / starbridge-subscription
# directly because they pull `dregg-app-framework`, which depends on axum +
# tokio(full) + reqwest (non-wasm32). The cell-programs those crates author are
# re-materialized from canonical `dregg_cell` types in `runtime.rs::app_programs`
# (the program *value* is canonical; only the assembly is local).
dregg-dfa = { path = "../dfa", default-features = false }
# Observability (EventLog + Emitter for live <dregg-activity> feed). All
# heavy deps (circuit/federation) already gated in its own Cargo.toml;
# wasm consumes with default-features=false for wasm32 safety.
dregg-observability = { path = "../observability", default-features = false }

# Token crate without biscuit (biscuit-auth has complex deps)
dregg-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }

# THE LIGHT CLIENT IN THE TAB (N12). `dregg-lightclient::verify_history` folds a
# whole finalized history into ONE succinct recursive aggregate and verifies it
# re-witnessing nothing — the anti-pale-ghost tooth, carried to the browser. It
# pulls `dregg-circuit` (recursion — already unified ON in this graph via
# observability/bridge; the STEP-0 `[patch]` above supplies the fork's
# `NativeBatchStark` variant) + `dregg-blocklace` (wasm-safe: blake3 + ed25519 +
# postcard + types, no tokio). `prover` is in its default set, so a plain dep
# carries the light client.
dregg-lightclient = { path = "../lightclient" }

# TRANSCLUSION IN THE TAB — Xanadu made honest, carried to the browser. The REAL
# `dregg://` finalized read NAMED as Ted Nelson's transcluded quote
# (`starbridge_web_surface::transclusion::TranscludedField::include` + the
# `WebOfCells` resolve/render path + the SNAPSHOT/LIVE dial). `bindings_transclusion`
# exposes the `#[wasm_bindgen]` entry the playground's `transclusion.js` drives:
# transclude a span → amend the source → the quote updates live → attempt a forge →
# it REFUSES with `FetchError::ContentHashMismatch`.
#
# This is the resolve/render path ONLY — it pulls `dregg-firmament` (whose deps are
# JUST `dregg-cell`/`dregg-turn`/`dregg-types`, all already in this graph; the
# `process-pd` libc backing is off), NOT the circuit prover or the recursion path
# (those ride `dregg-lightclient` above, untouched). `default-features = false` drops
# the cockpit `stream`/`futures-core` edge, which the pure resolve path never needs.
# The single `dregg-turn` instance unifies `no-lean-link` (this graph's pin) across
# firmament's plain dep — the same already-proven wasm executor `web-surface.js` runs.
starbridge-web-surface = { path = "../starbridge-web-surface", default-features = false }

blake3 = "1"
bs58 = "0.5"
base64 = "0.22"
postcard = { version = "1", features = ["alloc"] }
js-sys = "0.3"
x25519-dalek = { version = "2", features = ["static_secrets"] }
zeroize = { version = "1", features = ["std", "derive"] }
ed25519-dalek = { version = "2", default-features = false, features = ["zeroize"] }

# Indirect dep via bulletproofs (pulled in by dregg-cell when turn/coord/intent
# enable their default crypto feature). clear_on_drop's default build invokes
# a C compiler (build.rs -> cc -> clang --target=wasm32) which has no working
# wasm32 toolchain on most systems. The `no_cc` feature switches it to a pure
# Rust implementation. Declaring it directly here unifies the feature across
# the workspace so wasm-pack succeeds.
clear_on_drop = { version = "0.2", features = ["no_cc"] }
# Indirect dep via `hints` (pulled in by dregg-federation -> hints). Lockstitch
# uses inline x86_64 / aarch64 AES intrinsics unless the `portable` feature is
# enabled. The wasm32 target has neither, so we force `portable` here.
lockstitch = { version = "0.29", features = ["portable"] }
# Indirect dep via `dregg-token`'s `biscuit` feature (enabled by `dregg-turn`
# and `dregg-sdk` for the on-critical-path `Authorization::Token` verification).
# biscuit-auth's wasm32 `Instant` shim uses `performance_now()` + `TryInto`,
# both of which are only declared behind its own `wasm` feature — without it the
# crate fails to compile for wasm32. We force the feature here so unification
# applies it to the transitively-pulled copy. wasm-only: native already builds.
[target.'cfg(target_arch = "wasm32")'.dependencies]
biscuit-auth = { version = "6.0.0", features = ["wasm"] }

[dependencies.web-sys]
version = "0.3"
features = ["Performance", "Window"]

[dev-dependencies]
# Drives the `#[wasm_bindgen]` surface as a REAL wasm module under node /
# headless-Chrome (`wasm-pack test --node` / `--headless --chrome`). The
# card-in-the-tab loop (`tests/card_fires_a_verified_turn.rs`) runs the EXACT
# bytes the browser runs — a button-click → a cap-gated verified turn → the
# bound slot re-paints.
wasm-bindgen-test = "0.3"

# standalone (excluded from the root workspace — see root Cargo.toml)
[workspace]

# Mirrors the root workspace's patch (patch sections don't cross workspace
# boundaries; federation needs ark-serialize's serde_with feature from the fork).
[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

# THE FORK SEAM. This standalone workspace pulls `dregg-circuit` with its
# DEFAULT features via `dregg-observability`/`dregg-bridge` (both depend on it
# without `default-features = false`), so feature-unification turns on
# `prover` on the single circuit instance in this graph — which compiles
# `circuit/src/plonky3_recursion_impl.rs` + `ivc_turn_chain.rs`, both of which
# reference `RecursionInput::NativeBatchStark`. That variant now lives in the
# pushed fork at rev `72ffc56`, which the root `[workspace.dependencies]` pins
# directly (no path, no sibling checkout). `dregg-circuit`'s `p3-*` deps are
# `{ workspace = true }` and resolve against the ROOT workspace (circuit is a
# root member), so a fresh clone and CI both pick up the git rev with no local
# `[patch]` needed here — the "push the fork + drop the local patch" step is
# done.
#
# EXCEPT while the circuit lane iterates the W24 segment-digest Poseidon on the
# fork's local tree: the root workspace carries a TEMP
# `[patch."https://github.com/emberian/plonky3-recursion"]` → `../plonky3-recursion`
# (the in-flight `enable_poseidon2_perm_width_24` API). Patches do NOT cross workspace
# boundaries, so this standalone workspace must mirror it or it resolves the stale
# pinned git rev (which predates the method) and `circuit-prove` fails to compile here.
# Removed in lockstep when the root drops its TEMP patch for a pushed rev bump.
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../../plonky3-recursion/recursion" }
p3-circuit = { path = "../../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../../plonky3-recursion/poseidon2-circuit-air" }
