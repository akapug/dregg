[package]
name = "dregg-zkoracle-prove"
version.workspace = true
edition.workspace = true
description = "The zkOracle PROVER: PRODUCES a zkOracle attestation (authentic ∧ well-formed ∧ injection-free) over an Anthropic POST /v1/messages TLS session — generalizing the DECO/tlsn machinery from Stripe to the Anthropic API. Makes the landed `zkOracle_sound` Lean theorem (metatheory/Dregg2/Crypto/ZkOracle.lean) live: authentic (tlsn/DECO MPC-TLS session, x-api-key redacted) + well-formed (a producesChain JSON CFG parse certificate, matching Cfg.lean) + injection-free (the neg-complement handlebars matcher, dregg-dfa's verified derivative Re). The live-Anthropic MPC-TLS session is the named operational remainder (docs/deos/ZKORACLE-PROVER-STATUS.md)."

[dependencies]
# The verified derivative matcher — the Rust realization of dregg's boolean-closed
# `PredRE`/`neg` (Crypto/Deriv). Its native complement `Re::not()` is what lets the
# injection-free leg state "the field contains no `{{` handlebars delimiter" directly,
# exactly as `InjectionFree field := derives field (.neg injectionTemplate)` in
# metatheory/Dregg2/Crypto/ZkOracle.lean.
dregg-dfa = { path = "../dfa" }
# The Poseidon2 sponge (`poseidon2::hash_bytes`, the felt-domain content commitment the
# content-root uses) — the ONE shared commitment threaded across the 3 legs so the
# attestation proves authentic ∧ well-formed ∧ injection-free about the SAME response.
dregg-circuit = { path = "../circuit" }
# The (modeled) notary signature over the tlsn presentation — real ed25519 (the SAME
# curve/lib deco-prove's notary carrier uses).
ed25519-dalek = { version = "2", features = ["std"] }
sha2 = { workspace = true }
# SigV4 (the Bedrock auth leg) — hand-rolled HMAC-SHA256 over the workspace hmac (0.12), NOT
# the aws-sigv4 crate whose transitive hmac ^0.13 conflicts with lockstitch (see
# narrator/Cargo.toml). Phase-E model-provenance spike.
hmac = { workspace = true }
serde = { version = "1", features = ["derive"] }
# Typed extraction of the disclosed response fields (the per-endpoint response SCHEMA) —
# the authenticated body is already proven well-formed JSON by the CFG leg; serde_json
# reads the specific fact fields (commit author/date/message, price amount) out of it.
serde_json = { workspace = true }

# ─────────────────────────────────────────────────────────────────────────────
# `tlsn-live` — the REAL MPC-TLS integration against an Anthropic-shaped endpoint
# (git-pinned TLSNotary @ v0.1.0-alpha.15, the SAME rev deco-prove pins). A heavy
# optional CRYPTO BACKEND (the `mpz` 2PC/garbling stack + tokio + rustls) gated behind
# a BUILD feature so the default build stays light — the sanctioned use of a feature
# (an optional heavy backend, NOT a runtime toggle). With the feature OFF nothing here
# is compiled: the default zkoracle-prove build = the modeled authentic adapter + the
# CFG parse-cert core + the injection matcher, fully green and tested.
tlsn = { git = "https://github.com/tlsnotary/tlsn", rev = "47aee45b53e06648c1b2ad3689b367b8c923fdec", optional = true, features = ["mozilla-certs"] }
tlsn-formats = { git = "https://github.com/tlsnotary/tlsn", rev = "47aee45b53e06648c1b2ad3689b367b8c923fdec", optional = true }
tlsn-server-fixture-certs = { git = "https://github.com/tlsnotary/tlsn", rev = "47aee45b53e06648c1b2ad3689b367b8c923fdec", optional = true }
tokio = { version = "1.38", features = ["rt", "rt-multi-thread", "macros", "sync", "io-util", "net", "time"], optional = true }
futures = { version = "0.3", optional = true }
futures-rustls = { version = "0.25", optional = true }
hyper = { version = "1.1", features = ["client", "server", "http1"], optional = true }
hyper-util = { version = "0.1", features = ["full"], optional = true }
http-body-util = { version = "0.1", optional = true }
tokio-util = { version = "0.7", features = ["compat", "io"], optional = true }
k256 = { version = "0.13", features = ["ecdsa"], optional = true }
bincode = { version = "1.3", optional = true }
anyhow = { version = "1", optional = true }

[features]
tlsn-live = [
    "dep:tlsn",
    "dep:tlsn-formats",
    "dep:tlsn-server-fixture-certs",
    "dep:tokio",
    "dep:futures",
    "dep:futures-rustls",
    "dep:hyper",
    "dep:hyper-util",
    "dep:http-body-util",
    "dep:tokio-util",
    "dep:k256",
    "dep:bincode",
    "dep:anyhow",
]

[dev-dependencies]
# Proof-size measurement in the demo example only (StarkProof is serde).
bincode = "1.3"
