# `dregg-multiway-tug` — Phase 0 of the multiway-tug subproject: the rules of a
# 2-player tug-of-influence card game on the REAL dregg executor. A play is a
# cap-gated executor turn admitted IFF the game teeth pass; an illegal play is a
# refusal; every move is a receipt.
#
# The underlying mechanic is derived (mechanics aren't copyrightable) from
# Hanamikoji (designer Kota Nakayama); this crate ships an ORIGINAL re-theming
# ("multiway-tug": guilds/influence/favors) with its own name and framing.
#
# Additive workspace member. Consumes dregg-schema (the verified allocator / Legal
# layout) + spween-dregg::WorldCell (the deployed EmbeddedExecutor). Does NOT modify
# cell / circuit / dregg-schema.
[package]
name = "dregg-multiway-tug"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Phase 0 of multiway-tug: a 2-player tug-of-influence card game (an original re-theming of the Hanamikoji mechanic) modeled on the real dregg executor — the state as a dregg-schema-allocated layout, the play teeth as a hand-rolled CellProgram::Cases (conservation via SumEquals, one-action-per-round via WriteOnce, monotone scores, win thresholds). A play is a verified turn; an illegal play is a WorldError::Refused."

[dependencies]
# The tooth vocabulary (CellProgram / StateConstraint / TransitionCase / TransitionGuard /
# Effect / symbol / field_from_u64 / CellId / TurnReceipt).
dregg-app-framework = { path = "../app-framework", default-features = false }
# SimpleStateConstraint + HeapAtom (the heap-keyed / disjunction atoms not re-exported
# by the app framework).
dregg-cell = { path = "../cell" }
# The verified allocator (Schema -> allocate -> CheckedLayout, the RotatedLayout Legal
# discipline) whose Legal slot/heap layout we consume for the register + collection state.
dregg-schema = { path = "../dregg-schema" }
# --- Phase 2: the zk HIDDEN-HAND. ---
# The Poseidon2 4-ary Merkle primitives (`field::BabyBear`, `poseidon2::hash_4_to_1`,
# `merkle_types::compute_parent_poseidon2` + `MerkleAir`) — the SAME 4-ary Poseidon2
# recurrence the real `MerkleMembership` STARK (`turn::executor::membership_verifier`)
# commits to, so the executor-checked hidden-hand membership tooth lines up with the
# Phase-3 fold's `MerkleAir`. Already a transitive workspace dep (app-framework); no new
# heavy compile. Consumed, never modified.
dregg-circuit = { path = "../circuit" }
# THE REAL WorldCell — the deployed executor + ledger the game deploys onto.
spween-dregg = { path = "../spween-dregg" }

# --- Phase 5: the OFFERING + the per-player HIDDEN-HAND surface. ---
# The frontend-agnostic Offering/Session core (the `Offering` trait + `Surface`/`Action`/
# `Outcome`/`DreggIdentity`): `TugOffering` (`src/surface.rs`) hosts a round as an Offering
# with a per-viewer hidden-hand render. Consumed, never modified.
dreggnet-offerings = { path = "../dreggnet-offerings" }
# The deos affordance view-tree (`ViewNode` + the coordinate-grid `CoordGrid`/`CoordCell`,
# the `Menu`/`Pill`/`Icon` nodes). `default-features = false` = NO gpui / SpiderMonkey (the
# same light dep dreggnet-offerings takes); the surface is pure serializable DATA.
deos-view = { path = "../deos-view", default-features = false }

# --- Phase 3: the STARK FOLD (the hidden-hand tooth lowered into the recursive fold). ---
# The `Witnessed{MerkleMembership}` → foldable-leaf lowering (`compiler::lower_witnessed_
# merkle_membership`) — the IMT terminal owns the lowering; multiway-tug consumes it to fold
# a private match. Also brings the range-gadget compiler (the simple win/score teeth leaf).
game-turn-slice = { path = "../game-turn-slice" }
# The custom-leaf adapter (`prove_custom_leaf_with_commitment`), the per-turn recursion fold
# (`prove_turn_chain_recursive` / `FinalizedTurn` / `CustomWitnessBundle`), and the deployed
# PI-commitment binding (`custom_proof_pi_commitment`).
dregg-circuit-prove = { path = "../circuit-prove" }
# The rotation witness the wide effect-vm leg is generated over.
dregg-turn = { path = "../turn" }
# The pure light client — `verify_history` ACCEPTS the folded whole-match proof.
dregg-lightclient = { path = "../lightclient" }

# --- Phase 1: the COLLECTIBLE layer (cards-as-assets + provably-fair packs). ---
# THE ASSET LAYER — the owned, transfer-gated, provenance-chained, content-addressed
# note. Opening a pack MINTS each drawn card as a `dreggnet_asset` note owned by the
# opener, content-addressed by the draw; a card TRANSFERS under the asset layer's own
# signature owner-gate. Consumed, never modified.
dreggnet-asset = { path = "../dreggnet-asset" }
# THE FAIRNESS ANCHOR — procgen's committed-seed -> VERIFIED dregg-dice DrawStream
# (`verified_stream` + `CommittedSeed`). A pack's cards are indexed draws off the
# committed pack seed, so a rarity/foil is re-derivable by anyone and a claimed pull is
# un-fakeable. Consumed as the fair roll; never modified.
procgen-dregg = { path = "../procgen-dregg" }
# Domain-separated hashing for the pack-seed derivation + the card content/traits/mint
# commitments (the same blake3 1.x resolved workspace-wide).
blake3 = "1"
# Lean-emitted symbolic program artifact loader (`src/program_loader.rs`).
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
