# discord-bot is a STANDALONE workspace (EXCLUDED from the root workspace): it
# pulls sqlx → libsqlite3-sys 0.30, whose `links = "sqlite3"` conflicts with
# deos-matrix's rusqlite-0.35 inside the root workspace (one `links="sqlite3"`
# per workspace). So it declares its own `[workspace]` here and replicates the
# bits of the root workspace its members consume.
#
# `[workspace.dependencies]` below carries ONLY the keys THIS manifest references
# via `workspace = true` (base64/serde/serde_json/zeroize). Its path-deps
# (dregg-sdk/turn/circuit/…) are members of the ROOT workspace, so THEIR
# `workspace = true` deps (p3-*, dregg-* locals, etc.) resolve against the root
# manifest they live under — not this one.
#
# `[patch]` replicates only the root patch THIS graph consumes: the `ark-serialize`
# `serde_with` fork (pulled by the proof tree via dregg-circuit/dregg-sdk). The
# root's gpui/servo/stylo/pathfinder path-patches are intentionally NOT copied —
# none of those crates are in discord-bot's dependency graph (it has no gpui/servo
# surface), so the patches would be inert. The plonky3-recursion deps are direct
# git deps in the root `[workspace.dependencies]` (no patch), and resolve via the
# path-dep'd circuit crate's root-workspace membership.
[workspace]
members = ["."]
resolver = "2"

[workspace.dependencies]
base64 = { version = "0.22" }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1" }
zeroize = { version = "1", features = ["std", "derive"] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }

[workspace.lints.rust]
unexpected_cfgs = "allow"

[patch.crates-io]
# ark-serialize fork — the `serde_with` feature the proof tree (dregg-hints via
# dregg-circuit/dregg-sdk) needs. Matches the root workspace patch so the locked
# proof deps resolve identically.
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

[package]
name = "dregg-discord-bot"
version = "0.1.0"
edition = "2024"
description = "Discord bot for the dregg devnet — custodial AppCipherclerk handles, gallery, identity, presence attestation, CapTP, queues, governance, names"

[dependencies]
blake3 = "1"
# THE ONE Discord custodial-seed derivation (`seed_for` / `op_token`), extracted into a light
# root-workspace crate so `dreggnet-web`'s Discord Activity surface derives the SAME identity
# without depending on this excluded workspace and without mirroring the derivation. This bot
# RE-EXPORTS it from `src/cipherclerk.rs` (behaviour unchanged). A root workspace member; its
# only deps (blake3/hex) resolve identically in this standalone workspace.
dreggnet-discord-identity = { path = "../dreggnet-discord-identity" }
# Verified author identity for `/gallery publish`: the publisher's custodial cclerk
# (an ed25519 key) signs the universe's content commitment, and `ugc-dregg` binds that
# key into the content address. Same `ed25519-dalek` the SDK cclerk derives from, so the
# cclerk's raw seed IS the signing key here.
ed25519-dalek = { version = "2", features = ["std"] }
base64 = { workspace = true }
hex = "0.4"
postcard = { version = "1", features = ["use-std"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { workspace = true }
serde_json = { workspace = true }
serenity = { version = "0.12", default-features = false, features = [
    "client",
    "gateway",
    "model",
    "rustls_backend",
    "cache",
] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP read surface for Starbridge RemoteRuntime + /observability/stream SSE.
# axum 0.8 to match node/api.rs patterns (sse via axum::response::sse submodule;
# no "sse" feature flag to avoid the pre-existing workspace resolution conflict in
# dregg-node's Cargo.toml). Production middlewares via tower-http.
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.5", features = ["trace", "cors", "limit"] }
futures-util = { version = "0.3" }

# Canonical dregg surface — the bot is a peer of node/sdk, not a
# parallel implementation. AppCipherclerk (from app-framework) wraps the
# SDK's AgentCipherclerk and gives us federation-bound action signing.
dregg-app-framework = { path = "../app-framework" }
dregg-sdk = { path = "../sdk" }
# The attested fiction engine — the provably-honest, un-jailbreakable AI dungeon-master
# (`GameSession`, the `.dungeon` DSL loader, the receipt hash-chain). A root workspace member,
# consumed (not modified) to power `/dungeon`: a channel plays a shared on-chain crawl, buttons
# are write-once ballots, the plurality winner resolves through the engine, `/verify` re-checks.
attested-dm = { path = "../attested-dm" }
# The $DREGG payment backend (the "B" custodial HD-deposit model): per-user SLIP-0010 deposit
# addresses, a Watcher (Mock/Solana), a per-user run-credits ledger over a pluggable CreditStore,
# a sweeper. Consumed (not modified) so a paid /dungeon run debits one earned credit. Root member;
# its workspace-inherited deps resolve against the root manifest it lives under.
dregg-pay = { path = "../dregg-pay" }
# The hosted narrator behind a HARD, self-enforced USD ceiling (AWS Bedrock → Nova). Consumed for
# the PAID real-AI narration: `metered_converse` (reserve → call → true-up) under a PER-RUN budget
# (the debited credit = the budget), NOT the single global cap. Free tier stays ollama/scripted.
dregg-narrator = { path = "../narrator" }
dregg-turn = { path = "../turn" }
# The predicate-proof primitives for REAL selective disclosure: `PredicateType`
# (the comparator) + `BabyBear` (the threshold field element), the inputs to the
# SDK's `AgentCipherclerk::prove_predicate_unlinkable` (`sdk/src/privacy.rs`).
# Already in the build graph via dregg-sdk / dregg-app-framework; named directly
# so `/credential verify` emits a genuine STARK proof, not a null placeholder.
dregg-circuit = { path = "../circuit" }
starbridge-governed-namespace = { path = "../starbridge-apps/governed-namespace" }
starbridge-nameservice = { path = "../starbridge-apps/nameservice" }
starbridge-identity = { path = "../starbridge-apps/identity" }
starbridge-bounty-board = { path = "../starbridge-apps/bounty-board" }
dregg-dfa = { path = "../dfa" }
# CapTP integration — the bot is a dregg capability peer.
dregg-captp = { path = "../captp" }
dregg-storage = { path = "../storage" }
# Canonical types/cell surface — needed to build *real* signed CapTP
# HandoffCertificates (SigningKey, CellId, AuthRequired/EffectMask) rather
# than bot-local placeholder BLAKE3-MAC records.
dregg-types = { path = "../types" }
dregg-cell = { path = "../cell" }
# The deos web-forward primitives — the `dregg://` web-of-cells verified-attested
# fetch, transclusion (the REAL `TranscludedField`), the per-viewer `Membrane`,
# the cap-gated `AffordanceSurface`, and `Backlinks` (what-links-here). Already
# resolved in the root lock via `dregg-app-framework` (which path-depends on it),
# so this names the genuine primitives directly without adding anything new to the
# build graph. The bot surfaces them as Discord buttons/embeds/links
# (`src/deos_surface.rs`).
starbridge-web-surface = { path = "../starbridge-web-surface" }
# The deos-view view-tree IR + its DISCORD backend — the FOURTH `ViewNode` renderer
# (alongside native gpui / web HTML / seL4 framebuffer). `default-features = false` with
# only `discord` keeps deos-view gpui-FREE + deos-js-FREE here (serde + serenity's
# builder/model), so the bot pulls NONE of the gpui/mozjs elephants — just the embed/
# component mapping. The bot authors its surfaces as `ViewNode` cards and renders them
# through `deos_view::discord::render_card` (`src/cards.rs`): the SAME card the desktop
# renders, posted as a Discord embed (the card-authored-once-renders-everywhere thesis).
deos-view = { path = "../deos-view", default-features = false, features = ["discord"] }
bs58 = "0.5"
zeroize = { workspace = true }
# AEAD for the BYO-LLM-key vault: XChaCha20-Poly1305 seals each user's provider
# key at rest under a per-user derived key (`src/key_vault.rs`). Already in the
# build graph transitively, so this adds nothing to the closure.
chacha20poly1305 = "0.10"
# THE REAL dungeon substrate — `/dungeon` plays a real dregg-executor universe, not
# the attested-dm toy hash-chain. `dungeon-on-dregg` hosts the committed "Warden's
# Keep" on `spween-dregg`'s real `WorldCell` (a move is one cap-bounded `TurnReceipt`,
# an illegal move a real `WorldError::Refused`, the gate an executor-enforced
# `StateConstraint`); `spween-dregg` gives the `WorldCell`/`Driver`/`verify_by_replay`
# receipt-chain verifier; `spween` names the scene AST (passages/choices/conditions the
# ballot is built from). Root workspace members (their workspace-inherited deps resolve
# against the root manifest) + the spween git rev `dungeon-on-dregg` already pins.
dungeon-on-dregg = { path = "../dungeon-on-dregg", default-features = false }
spween-dregg = { path = "../spween-dregg" }
spween = { git = "https://github.com/emberian/spween", rev = "95980f7d1e109138496849a444f28c4b9076a4e2" }
# THE OFFERING CORE behind `/dungeon` — the frontend-agnostic `Offering` trait
# (open/actions/advance/verify/render/price) + its `DungeonOffering` (offering #0)
# over the SAME `spween-dregg` WorldCell this bot used to drive inline. `/dungeon`
# CONSUMES this crate: it opens a `DungeonSession`, lists cap-gated actions for the
# ballot, advances the plurality winner as ONE real turn (`Outcome::Landed`/`Refused`),
# and re-verifies by replay through the offering — the duplicated inline `RealSession`
# is gone. Frontend-agnostic (NO serenity dep); the bot is its Discord `Frontend`. A
# root workspace member; its deps (spween-dregg, dungeon-on-dregg, deos-view) are
# already in this graph, so it adds nothing new to the closure.
dreggnet-offerings = { path = "../dreggnet-offerings" }
# THE INTERACTION-ENVELOPE AUDIT FACILITY (docs/BOT-AUDIT-LOGGING-DESIGN.md) — the shared
# event shape + non-blocking JSONL writer all three frontends emit through; `src/audit.rs`
# is this bot's log resolution + Discord-side redaction helpers over it.
dreggnet-audit = { path = "../dreggnet-audit" }
webauth-core = { path = "../webauth-core" }
# THE OFFERINGS THE GENERIC ADAPTER SERVES (`src/commands/offering.rs`): any
# `dreggnet_offerings::Offering` becomes a Discord surface — its deos `ViewNode` render is the
# embed, its cap-gated `Action`s are the buttons/modals, a press is ONE real `advance` attributed
# to the presser's derived dregg identity, and `verify` is surfaced honestly.
#   `/council` — propose → vote → enact over the REAL `collective-choice` quorum engine; a passed
#     proposal enacts a real `WriteOnce` policy effect on a council cell, a below-quorum one does
#     not (the AffineLe gate is the referee, not the bot).
#   `/market` — list → sealed bid → settle on the REAL sealed-auction substrate; a double-bid is a
#     `WriteOnce` executor refusal, and the clear moves value through the verified per-asset ring
#     settlement (Σδ=0). Both are root workspace members, consumed (never modified); their deps
#     (collective-choice, starbridge-sealed-auction, dregg-intent) resolve against the root
#     manifest they live under.
dreggnet-council = { path = "../dreggnet-council" }
dreggnet-market = { path = "../dreggnet-market" }
# THREE FURTHER OFFERINGS served by the SAME generic adapter (`src/commands/offering.rs`), so all
# six DreggNet Cloud offerings are reachable in the bot:
#   `/hermes` (offering #1) — a hosted, confined agent: a prompt drives ONE cap-bounded, metered,
#     receipted turn on the PROVEN `dregg_sdk::ToolGateway` (rate cap + value budget); the executor
#     referees the agent's proposed tool-call against its cell mandate — it CANNOT exceed it. The
#     bot wires the REAL resident brain (on-box / BYO-key); the logic tests wire the scripted mock.
#   `/grain` (offering #2) — a confined grain turn-cell: each action is ONE real `ToolGateway::invoke`
#     kernel turn under a rate-`budget` grant; an over-cap action is the executor's OWN refusal.
#   `/doc` — a shared collaborative document over the real `dregg-doc` substrate: each edit is one
#     cap-gated finalized executor turn; an unauthorized/conflicting edit is a real refusal.
# Root workspace members, consumed (never modified); their workspace-inherited deps resolve against
# the root manifest they live under.
dreggnet-hermes = { path = "../dreggnet-hermes" }
dreggnet-grain = { path = "../dreggnet-grain" }
dreggnet-doc = { path = "../dreggnet-doc" }
# THE FULL-PORTFOLIO CLOSURE (`src/commands/portfolio.rs`) — the SAME offering crates the web catalog
# (`dreggnet_web::demo_host`) and the Telegram/WeChat hosts dep, so Discord reaches offering parity
# via the SAME generic `DiscordOffering` adapter: the two portfolio games (automatafl + multiway-tug),
# the two remaining non-game offerings (names + compute), and the eight do-once RPG feature surfaces
# (`dreggnet-surfaces`). Root workspace members, consumed (never modified); the seat-claiming tug
# adapter is `portfolio::SeatedTug`, the byte-peer of the web `seated` module.
dregg-automatafl = { path = "../dregg-automatafl" }
dregg-multiway-tug = { path = "../dregg-multiway-tug" }
dreggnet-names = { path = "../dreggnet-names" }
dreggnet-compute = { path = "../dreggnet-compute" }
dreggnet-surfaces = { path = "../dreggnet-surfaces" }
# THE ONE catalog registrar (docs/BOT-SHARED-BACKEND-DESIGN.md): the shared statement of what
# the 18-offering DreggNet portfolio IS. Discord sources its offering SET from
# `dreggnet_catalog::CATALOG_KEYS` (the `/play` keys are derived from it, and the routers'
# mounted set is parity-tested against the LIVE `full_catalog_host`), and the seat-claiming
# tug adapter is the shared `dreggnet_catalog::seated::SeatedTug` — the fourth byte-peer copy
# (formerly in `commands/portfolio.rs`) is gone. A root workspace member, consumed never
# modified; adds nothing new to the closure (its deps are the offering crates already here).
dreggnet-catalog = { path = "../dreggnet-catalog" }
# THE UGC REGISTRY behind `/gallery` — the real `Registry` (publish a content-addressed
# `Universe`, submit a `Completion`) and its NO-CHEAT leaderboard: a completion is ranked
# ONLY if its recorded receipt chain re-verifies to the declared WIN on a stranger's
# re-execution. `/gallery` browses/publishes/plays against THIS, replacing four dead
# `DevnetError::Unsupported` node stubs. A root workspace member (its workspace-inherited
# deps resolve against the root manifest); consumed, never modified. Adds nothing new to
# the closure — its deps (spween-dregg, dungeon-on-dregg, blake3) are already here, plus
# procgen-dregg (the committed verifiable-seed pipeline).
ugc-dregg = { path = "../ugc-dregg" }
# 👑 THE CROWN (`src/commands/crown.rs`) — fold a played `/play tug|automatafl` match into ONE
# succinct `WholeChainProof` and rank it on the proof-carrying board. `dreggnet-game-board` is
# the play→fold→board bridge (`GameBoard`, `match_anchor`, the O(1) accept path over
# `verify_history_bytes`, `has_moves() == false`); `dreggnet-prove-service` is the bounded
# background worker pool the minutes-long recursive fold runs on, OFF the interaction path
# (`DREGG_MATCH_PROVE_WORKERS` / `_QUEUE_DEPTH`). Root workspace members, consumed (never
# modified); their heavy deps (circuit-prove, dregg-lightclient) are already in this graph via
# the game crates' fold modules.
dreggnet-game-board = { path = "../dreggnet-game-board" }
dreggnet-prove-service = { path = "../dreggnet-prove-service" }
# THE DAILY BEACON behind `/descent` — the committed verifiable-seed pipeline. `procgen-dregg`
# supplies today's `DailyBeacon` (a BLS-pairing-verified drand `quicknet` reveal) and `daily_seed`
# (the fold from beacon output → `CommittedSeed`), so `/descent` plays a real beacon-seeded day.
# Already in the closure via ugc-dregg; named directly for `beacon::DailyBeacon` / `daily_seed`.
procgen-dregg = { path = "../procgen-dregg" }
# THE IPFS TRANSPORT behind `/gallery publish pin:true` + the shown CID (`src/commands/
# gallery_ipfs.rs`): `KuboClient`/`StdHttpPost` push the canonical payload to the operator's
# node, and `MockIpfs` derives the (content-pure) CID offline. Already in the closure via
# ugc-dregg's `ipfs` module; named directly for the client types. A root workspace member.
dregg-ipfs = { path = "../dregg-ipfs" }
# GEAR + TALENTS on `/play` (`src/commands/gear.rs`): `LoadoutOffering` (equip = a KERNEL
# cross-cell ownership predicate) and `TalentTreeOffering` (class-gated, prereq-chained,
# respec-capable) — both already `impl Offering`; the bot adds only the two `DiscordOffering`
# blocks. A root workspace member, consumed (never modified).
dreggnet-gear = { path = "../dreggnet-gear" }
# The soulbound cheevo ledger — `commands::rpg_world` earns the player's REAL achievements
# (CheevoLedger::earn over their persisted /descent completions) for the /play cheevos surface.
dreggnet-cheevo = { path = "../dreggnet-cheevo" }
# The composed-proof wire type (`composition::ComposedProof`) the bot deserializes a fetched
# full-turn STARK into before running the audited `dregg_sdk::verify_full_turn` (backlog #11).
# Already resolved in the lock via dregg-sdk; named directly for the type.
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }

[dev-dependencies]
# `ServiceExt::oneshot` drives the admin webportal router in tests without
# binding a socket (already in the lockfile transitively via tower-http).
tower = { version = "0.5", features = ["util"] }
# The verifiable-randomness / beacon engine — the daily-reveal cron test builds a SECOND verified
# beacon (an offline `HashChainBeacon` that passes `verify_beacon_round`) to drive the "a new day
# rolls a new dungeon" case deterministically without a network. Already in the closure via
# procgen-dregg; named directly for the test's `dregg_dice::HashChainBeacon`.
dregg-dice = { path = "../dice" }
# A self-cleaning temp dir for the sqlite-CreditStore persistence-across-restart test
# and the per-run narrator budget-ledger files (no /tmp litter). Already in the root lock
# (narrator dev-deps it); named here for the standalone bot workspace.
tempfile = "3"

[lints]
workspace = true
