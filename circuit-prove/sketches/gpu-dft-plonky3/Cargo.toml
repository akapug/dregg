[package]
name = "gpu-dft-plonky3"
version = "0.1.0"
edition = "2021"

# Standalone sketch crate — deliberately NOT a workspace member (empty
# [workspace] opts out of the breadstuffs root workspace). Run with
# `cargo run --release` from this directory.
#
# THE FIRST GPU-PROVER WIRING INCREMENT (docs/deos/GPU-PROVER-WIRING-PLAN.md):
# a wgpu-backed `GpuDft` implementing the pinned Plonky3 `TwoAdicSubgroupDft`
# trait (dft_batch + coset_lde_batch), parity-gated bit-exact against
# `Radix2DitParallel` and measured head-to-head at the shrink prover's real
# LDE shapes (blowup 8, degree_bits [9,9,15,14,15]). Kernels descend from the
# measured probes in ../wgpu-babybear-ntt (see GPU-PROVER-PROTOTYPE.md §9/§10).
[workspace]

[dependencies]
wgpu = "24"
pollster = "0.4"
bytemuck = "1"
rand = "0.8"
rayon = "1"
p3-baby-bear = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-field = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-dft = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec", features = ["parallel"] }
p3-matrix = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
# The BN254 hash stack — used ONLY by the CPU Amdahl-component bench (measures
# the outer MMCS commit rate the wiring plan's breakdown cites).
p3-bn254 = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-poseidon2 = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-symmetric = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-merkle-tree = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-commit = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
