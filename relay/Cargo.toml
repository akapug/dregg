[package]
name = "pyana-relay"
version = "0.1.0"
edition = "2024"
rust-version = "1.89.0"
authors = ["Pyana Contributors"]
license = "AGPL-3.0-or-later"
homepage = "https://pyana.dev"
repository = "https://github.com/pyana-dev/breadstuffs"
description = "Lightweight QUIC relay node for the pyana federation — holds attested roots, relays peer connections, and mints root tokens"

[[bin]]
name = "pyana-relay"
path = "src/main.rs"

[dependencies]
pyana-types = { path = "../types" }

# Networking: quinn for QUIC transport (no iroh due to ed25519-dalek v3 pre-release dep conflicts)
quinn = { version = "0.11", features = ["runtime-tokio", "rustls-ring"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rcgen = "0.13"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", features = ["use-std"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Crypto (for root key handling — same ed25519 as pyana-types)
ed25519-dalek = { version = "2", features = ["std"] }
blake3 = "1"

# Utilities
anyhow = "1"

[lints]
workspace = true
