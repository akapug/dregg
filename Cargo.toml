# rbg/ (the `dregg-rbg` package) hosts the Robigalia-inspired userspace
# primitives — `DirectoryCell`, `ScopedIntentPool`, `MetaDirectory`,
# `DirectoryFactory`, and the userspace `Volume`/`Blob`/`Directory`
# VFS triple — composed atop `dregg-types::CellId` /
# `dregg-types::FederationId` and (for the directory factory
# descriptor) `dregg-cell::factory::FactoryDescriptor`. The DFA routing
# module that used to live in rbg has been promoted into `dregg-dfa`
# per `DFA-RATIONALIZATION-DESIGN.md`; rbg/ no longer ships its own
# routing engine.
# `discord-bot` + `deos-zed-full` are EXCLUDED (separate workspaces): both pull
# sqlx/sqlez → libsqlite3-sys 0.30, whose `links = "sqlite3"` conflicts with
# deos-matrix's rusqlite-0.35 (one `links="sqlite3"` per workspace). discord-bot
# carries its own `[workspace]`/`[workspace.dependencies]`/`[patch]` + a
# `rust-toolchain.toml` so it still builds standalone.
# `dregg-tui` is EXCLUDED (its own workspace) for a VERSION-PIN reason: it is the
# only `ratatui` user, and ratatui 0.29 pins `unicode-width =0.2.0` EXACTLY, which
# is incompatible with `merman` (pulled by the full-Zed editor surface via
# `starbridge-v2` → `deos-zed-full` → editor → markdown), which needs
# `unicode-width ^0.2.2`. Keeping `dregg-tui` in the root workspace forces both
# constraints into one resolution graph and breaks it. Excluded, it carries its
# own `[workspace]` + `[patch]` (ark-serialize fork) + `rust-toolchain.toml` so it
# still builds standalone (`cd dregg-tui && cargo build`); its path-deps
# (dregg-sdk/turn/circuit/verifier) are root-workspace members so THEIR
# `workspace = true` deps resolve against the root.
# `crypto-hermine` is EXCLUDED (its own workspace): it is a standalone pre-audit
# reference crate carrying its own `[workspace]` opt-out. `dregg-federation`
# path-depends on it (the compact-PQ `HermineHybridQC`), and a path dep into a
# nested-workspace dir inside this tree needs the explicit exclude so Cargo does
# not see "multiple workspace roots" — same reason as deos-zed-full / dregg-tui.
exclude = ["chain", "solana-lock", "wasm", "sdk-py", "pg-dregg", "sel4/dregg-firmament", "deos-zed-full", "dregg-doc", "discord-bot", "dregg-tui", "deos-homeserver", "forge-ci-runner", "crypto-hermine", "constraint-lowering"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["Dregg Contributors"]
license = "AGPL-3.0-or-later"
homepage = "https://dregg.fg-goose.online"
repository = "https://github.com/emberian/dregg"

# ─────────────────────────────────────────────────────────────────────────────
# RELEASE MANAGEMENT — `dist` (formerly cargo-dist), config pinned to 0.31.0.
#
# This block governs the SHIPPABLE BINARIES of the dregg workspace. dist ships a
# package's binaries only when that package opts in; we set the workspace DEFAULT
# to `dist = false` and opt the two shippable crates IN at the package level
# (`cli/Cargo.toml` → bin `dregg`, `node/Cargo.toml` → bin `dregg-node`). Every
# other workspace member (demos, test harnesses, the discord bot, …) stays
# un-shipped. There is NO workspace-level package allowlist in dist 0.31 — the
# per-package `[package.metadata.dist] dist = true` is the only selector, and
# `repository` must resolve on each shipped package (cli adds
# `repository.workspace = true` for this; node already inherits it).
#
# `starbridge-v2` (the gpui native master interface) is now a workspace MEMBER
# (absorbed into the root workspace for the shared target dir), but dist still
# does NOT ship it: the workspace default is `dist = false` and starbridge-v2
# does NOT opt in (`[package.metadata.dist] dist = true` is the only selector, and
# it carries none), so dist reaches it via metadata yet emits no installer for it.
# It is gpui/Metal host-sensitive; its installers are packed by the bespoke
# `.github/workflows/starbridge-v2-installers.yml` (a separate lane), not by dist.
#
# TARGETS: the workspace target list is the CLI's broad set (macOS + Linux,
# x86_64 + aarch64, plus Windows-msvc). `dregg-node` LINKS THE VERIFIED LEAN
# ARCHIVE (libdregg_lean.a, a host-native static lib produced by the Lean
# compiler) and so CANNOT cross-compile; it overrides `targets` at the package
# level down to the two x86_64 host-native targets where a native CI runner +
# the Lean toolchain are available (aarch64 / Windows node builds are blocked on
# the Lean link — see node/Cargo.toml's per-package note).
#
# TOOLCHAIN: no `rust-toolchain-version` here (it is deprecated in 0.31). The
# generated `release.yml` carries no explicit `rustup default`, so CI honours the
# repo's root `rust-toolchain.toml` (nightly-2026-01-01) automatically. NOTE: the
# generated workflow installs Rust only; the `dregg-node` job additionally needs
# the Lean toolchain (elan/lake + warm mathlib) provisioned on the runner for its
# build.rs to splice libdregg_lean.a — a follow-up the bespoke starbridge
# workflow already models. The CLI job needs nothing beyond Rust.
#
# VERSION SCHEME: a dev pre-release tag is `v0.0.0-dev` (or `v0.0.0-dev.1`);
# `~` (as in the informal "v0.0.0~dev") is ILLEGAL SemVer and cargo/dist reject
# it. A `-dev`-suffixed tag is auto-marked a GitHub *prerelease* by dist. No crate
# version is bumped here — this only establishes the scheme; the crates remain
# at 0.1.0 until ember cuts a tag.
[workspace.metadata.dist]
# The preferred dist version to use in CI (`dist init` will fail to mismatch).
cargo-dist-version = "0.31.0"
# CI backend.
ci = "github"
# Installers to generate. shell + homebrew cover macOS/Linux cleanly. Windows is
# NOT given a native installer: `msi` requires per-package WiX GUIDs
# (upgrade-guid/path-guid) + bundle config that isn't clean yet, and `powershell`
# only activates with a Windows-installer story — so both are omitted honestly.
# The Windows CLI TARGET still builds (it produces a `.zip` artifact users can
# fetch directly); only the native Windows *installer* is deferred. Add `msi`
# back (with `dist init` to mint the GUIDs) when a clean Windows installer is
# wanted.
installers = ["shell", "homebrew"]
# Workspace target list = the CLI's broad set. Per-package `targets` narrows node.
targets = [
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
# Default: do NOT ship a package's binaries unless it opts in per-package.
dist = false
# Publish prereleases (e.g. a `v0.0.0-dev` tag) as GitHub prereleases.
pr-run-mode = "plan"

# ─────────────────────────────────────────────────────────────────────────────
# [patch] — UNIONED across the workspace (the 12 absorbed deos/starbridge crates
# each carried their own standalone-workspace [patch] tables before absorption;
# every relative `path` here is rewritten relative to THIS repo root).
#
# There are NO patch conflicts: every crate patched a given crate to the SAME
# source — the only differences were relative-depth artifacts pointing at one
# canonical location.
#
# The plonky3-recursion path-patch the 12 crates carried is DROPPED on purpose:
# the workspace.dependencies below pin `p3-recursion`/`p3-circuit`/
# `p3-circuit-prover`/`p3-poseidon2-circuit-air` at git rev be52a51 (the pushed
# fork tip == the local `../plonky3-recursion` tree), so all crates resolve the
# git rev — no path override needed.
#
# …EXCEPT (TEMP, 2026-07-02): the DETERMINISM-FIX path patch below. The pinned
# rev be52a51 builds the recursive-verifier op-list in hashbrown-HashMap
# iteration order (`verify_p3_batch_proof_circuit`'s global-lookup grouping), so
# the recursion-VK fingerprint — the light client's distributed trust anchor —
# was RANDOM per circuit build: two folds of the IDENTICAL chain in one process
# minted different fingerprints. Fixed in fork commit 993efec ("deterministic
# verifier op-list", branch update-plonky3-rev). 993efec IS PUSHED (2026-07-10,
# the `update-plonky3-rev` tip; every older pinned rev is its ancestor). Remove
# this [patch] block once the four rev pins below are bumped to 993efec and the
# locks (root + sdk-py + discord-bot + dregg-tui + dregg-doc) are regenerated —
# a whole-tree rebuild, so it waits for a quiet tree (HORIZONLOG: fresh-clone
# runbook). The tooth: circuit-prove/tests/recursion_vk_determinism.rs.
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../plonky3-recursion/recursion" }
p3-circuit = { path = "../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../plonky3-recursion/poseidon2-circuit-air" }
# ─────────────────────────────────────────────────────────────────────────────
[patch.crates-io]
# ark-serialize fork — the `serde_with` feature `dregg-hints` needs (emberian/algebra).
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
# The two zed-forked async-* crates the gpui dep tree's `[patch.crates-io]` pins
# (gpui's vendored `util` calls `smol::process::Child::adopt_raw_pid`, present only
# on these forks). Inert when the gpui-bearing crates are not in the build graph.
async-process = { git = "https://github.com/zed-industries/async-process.git", rev = "0b6d6713570af61806e1e5cb40e0f757cb93fd9d" }
async-task = { git = "https://github.com/smol-rs/async-task.git", rev = "b4486cd71e4e94fbda54ce6302444de14f4d190e" }
# Vendored pathfinder_simd 0.5.6 (gpui → font-kit → pathfinder): scalar-path build
# (the nightly portable-SIMD intrinsics were removed from current toolchains). The
# one canonical vendored copy lives under starbridge-v2.
pathfinder_simd = { path = "starbridge-v2/vendor/pathfinder_simd" }
# stylo `ToCss`-derive fork (emberian/stylo@ember-nightly-fix) — pins the `?`
# residual error type to `core::fmt::Error`, defeating the serde_fmt ambiguity in
# the full cockpit graph (web-shell → servo → stylo). Inert outside that graph.
stylo_derive = { git = "https://github.com/emberian/stylo", rev = "abc53ac61" }
# servo-paint SWGL fork (servo-render's libservo path): WebRenderOptions
# `clear_caches_with_quads: false` so SWGL's DepthFunc assert does not SIGABRT.
servo-paint = { path = "servo-render/vendor/servo-paint" }
# servo-net forbidden-schemes fork (servo-render's libservo path): allow an
# embedder ProtocolHandler for http/https (the cap-gated byte socket).
servo-net = { path = "servo-render/vendor/servo-net" }

# The gpui fork (emberian/zed) resolves directly from git at the rev pinned in
# starbridge-v2/Cargo.toml (the offscreen/headless wgpu renderer the render-capture
# bakes need is on that pushed rev) — no local-path [patch] override.


