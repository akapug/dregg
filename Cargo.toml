doc_nested_refdefs = "allow"
large_enum_variant = "allow"
clone_on_copy = "allow"
extend_with_drain = "allow"
redundant_pattern_matching = "allow"
while_let_loop = "allow"
io_other_error = "allow"
manual_unwrap_or_default = "allow"
manual_unwrap_or = "allow"
manual_flatten = "allow"
print_literal = "allow"
manual_saturating_arithmetic = "allow"
large_const_arrays = "allow"
unused_enumerate_index = "allow"

[workspace.lints.rust]
unexpected_cfgs = "allow"

[profile.bench]
opt-level = 3
lto = "thin"
codegen-units = 1

# Incremental compilation is OFF for dev/test. The default-on incremental
# partitioner interacts badly with the opt-level asymmetry below: the
# `dregg-circuit` lib is opt-level 3 (rustc disables `share-generics` export at
# opt>=2, so the rlib does NOT emit shared generic monomorphizations), while the
# integration-test binaries are opt-level 0 (`share-generics` import ON, so they
# emit only *references* to those upstream instantiations). Under incremental,
# rustc's stale-CGU reuse drops the object that would define a referenced p3
# generic (e.g. `BinomialExtensionField::from_ext_basis_coefficients`,
# `p3_uni_stark::verifier::recompose_quotient_from_chunks`,
# `p3_batch_stark::symbolic::get_max_constraint_degree`) while keeping the
# reference in a sibling `.rcgu.o` — yielding undefined-symbol link failures on
# the prover-feature test umbrella (`anon.*`/`.llvm.<hash>` dangling locals).
# Disabling incremental forces a clean per-build partition so every monomorph is
# emitted. Cheap here: all packages + deps already compile at opt-level 3 below,
# so incremental's reuse buys little, and a green link is the floor everything
# rides on. (Witness: `CARGO_INCREMENTAL=0 cargo build … --tests` links clean.)
[profile.dev]
incremental = false

# Fast dev/test builds with FAST crypto: keep our own crates cheap to compile
# (opt-level 0, quick iteration) but build all DEPENDENCIES optimized so the
# crypto primitives (plonky3 p3-*, poseidon2, BLS12-381, FRI) don't run
# unoptimized in debug — a debug-build STARK verify/prove pins a core for ages
# otherwise (e.g. dregg-lightclient tests). opt-level 3 deps + opt-level 0 ours
# = the best of both. Applies to the `test` profile too (it inherits `dev`).
[profile.dev.package."*"]
opt-level = 3

# The crypto-heavy WORKSPACE crates also get optimized in dev/test (they hold
# hot proving/verifying loops that the `*` glob above does not cover for
# workspace members). Compile cost is amortized by caching; runtime is night/day.
[profile.dev.package.dregg-circuit]
opt-level = 3
[profile.dev.package.dregg-lightclient]
opt-level = 3
# `dregg-circuit-prove` holds the recursion proving + AGGREGATION hot path —
# `aggregate_tree`/`merge_two_segment_proofs`, the in-circuit `seg_poseidon_commit`
# sponge + `segment_combine_expose`, the descriptor-leaf AIR construction. At
# opt-level 0 a single whole-chain fold pins a core for tens of minutes (the debug
# `-p dregg-lightclient` / `ivc_turn_chain` recursion tests never finish); at
# opt-level 3 it is the usual minutes. ALWAYS optimize it.
[profile.dev.package.dregg-circuit-prove]
opt-level = 3

