[workspace]
resolver = "3"
# wasm is EXCLUDED from the workspace: its `no-lean-link` platform-gate
# enables would otherwise feature-unify onto dregg-turn/sdk/etc in any
# whole-workspace build (cargo test --workspace), deleting the Lean paths
# on native. It builds standalone via wasm-pack (scripts/build-web-artifacts.sh,
# pages.yml), which uses its manifest path directly.
members = ["macaroon", "secrets", "token", "tokenizer", "hints", "commit", "trace", "demo", "demo-agent", "demo/sdk-consensus", "federation", "circuit", "audit", "bridge", "wire", "persist", "cell", "turn", "coord", "tests", "types", "sdk", "node", "intent", "net", "discharge-gateway", "teasting", "discord-bot", "app-framework", "dregg-dsl", "dregg-dsl-runtime", "dregg-dsl-tests", "dregg-dsl-differential", "blocklace", "captp", "cli", "verifier", "protocol-tests", "observability", "storage", "starbridge-apps/nameservice", "dfa", "rbg", "credentials", "directory", "starbridge-apps/identity", "starbridge-apps/subscription", "starbridge-apps/governed-namespace", "starbridge-apps/compartment-workflow-mandate", "starbridge-apps/storage-gateway-mandate", "starbridge-apps/privacy-voting", "starbridge-apps/bounty-board", "starbridge-apps/agent-provenance", "starbridge-apps/tool-access-delegation", "starbridge-apps/sealed-auction", "starbridge-apps/polis", "starbridge-apps/escrow-market", "dregg-storage-templates", "preflight", "dregg-lean-ffi", "lightclient", "redteam", "perf", "dregg-auth", "dregg-query", "dregg-userspace-verify", "dregg-deploy", "dregg-analyzer"]
# chain/ and chain/program/ are standalone workspaces with their own root Cargo.toml.
# chain has a known dep conflict (sp1-core-machine pins generic-array =1.1.0,
# nova-snark needs >=1.2.0). chain/program is the SP1 guest, edition 2021,
# riscv32im-succinct-zkvm-elf target, built by sp1-build.
# rbg/ (the `dregg-rbg` package) hosts the Robigalia-inspired userspace
# primitives — `DirectoryCell`, `ScopedIntentPool`, `MetaDirectory`,
# `DirectoryFactory`, and the userspace `Volume`/`Blob`/`Directory`
# VFS triple — composed atop `dregg-types::CellId` /
# `dregg-types::FederationId` and (for the directory factory
# descriptor) `dregg-cell::factory::FactoryDescriptor`. The DFA routing
# module that used to live in rbg has been promoted into `dregg-dfa`
# per `DFA-RATIONALIZATION-DESIGN.md`; rbg/ no longer ships its own
# routing engine.
exclude = ["chain", "chain/program", "wasm", "sdk-py", "pg-dregg", "sel4/dregg-firmament"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["Dregg Contributors"]
license = "AGPL-3.0-or-later"
homepage = "https://dregg.dev"
repository = "https://github.com/emberian/dregg"

[patch.crates-io]
ark-serialize = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }
ark-serialize-derive = { git = "https://github.com/emberian/algebra", branch = "serde-integration" }

# C3 native-batch leaf-wrap WIP: build the LOCAL plonky3-recursion fork checkout instead of
# the pinned git rev, so the new `verify_p3_native_batch_proof_circuit` /
# `RecursionInput::NativeBatchStark` entry compiles. Revert to the git rev (bump the rev in
# [workspace.dependencies]) once the fork change is committed + pushed.
[patch."https://github.com/emberian/plonky3-recursion"]
p3-recursion = { path = "../plonky3-recursion/recursion" }
p3-circuit = { path = "../plonky3-recursion/circuit" }
p3-circuit-prover = { path = "../plonky3-recursion/circuit-prover" }
p3-poseidon2-circuit-air = { path = "../plonky3-recursion/poseidon2-circuit-air" }

[workspace.dependencies]
## Local
dregg-macaroon = { path = "macaroon", default-features = false }
dregg-net = { path = "net" }
dregg-types = { path = "types" }
dregg-secrets = { path = "secrets" }
dregg-token = { path = "token" }
dregg-tokenizer = { path = "tokenizer" }

## Plonky3 core (rev 82cfad73 — the version dregg proofs were validated against)
p3-air = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-baby-bear = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-batch-stark = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-challenger = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-commit = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-dft = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-field = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-fri = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-lookup = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-matrix = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-mds = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-merkle-tree = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-monty-31 = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-poseidon2 = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-symmetric = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-uni-stark = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }
p3-util = { git = "https://github.com/Plonky3/Plonky3", rev = "82cfad73cd734d37a0d51953094f970c531817ec" }

## Plonky3-recursion fork updated to match p3 rev 82cfad73.
## Keep these as git dependencies so CI does not require a sibling checkout.
p3-recursion = { git = "https://github.com/emberian/plonky3-recursion", rev = "c14b5fc079af18d7f3ba3f3586f173bd166c7cd4" }
p3-circuit = { git = "https://github.com/emberian/plonky3-recursion", rev = "c14b5fc079af18d7f3ba3f3586f173bd166c7cd4" }
p3-circuit-prover = { git = "https://github.com/emberian/plonky3-recursion", rev = "c14b5fc079af18d7f3ba3f3586f173bd166c7cd4" }
p3-poseidon2-circuit-air = { git = "https://github.com/emberian/plonky3-recursion", rev = "c14b5fc079af18d7f3ba3f3586f173bd166c7cd4" }

## Crates.io
ark-serialize = { version = "0.5", features = ["derive"] }
# NOTE: RC needed for aead 0.6 trait unification with chacha20poly1305 0.10;
# stable aes-gcm 0.10 uses aead 0.5 which conflicts. Revisit when 0.11 stable ships.
aes-gcm = { version = "0.11.0-rc.3" }
base64 = { version = "0.22" }
chacha20poly1305 = { version = "0.10" }
criterion = { version = "0.5", features = ["html_reports"] }
proptest = { version = "1" }
directories = { version = "6" }
getrandom = { version = "0.3" }
globset = { version = "0.4" }
hmac = { version = "0.12" }
keyring = { version = "3", features = ["sync-secret-service", "crypto-rust"] }
rmp-serde = { version = "1.3.1" }
scalable_cuckoo_filter = { version = "0.5", features = ["serde_support"] }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1" }
sha2 = { version = "0.10" }
subtle = { version = "2" }
tempfile = { version = "3" }
thiserror = { version = "2" }
tracing = { version = "0.1" }
x25519-dalek = { version = "2", features = ["static_secrets"] }
zeroize = { version = "1", features = ["std", "derive"] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
assign_op_pattern = "allow"
collapsible_if = "allow"
collapsible_match = "allow"
derivable_impls = "allow"
explicit_auto_deref = "allow"
for_kv_map = "allow"
get_first = "allow"
if_same_then_else = "allow"
int_plus_one = "allow"
iter_overeager_cloned = "allow"
manual_is_multiple_of = "allow"
mem_replace_with_default = "allow"
needless_borrow = "allow"
needless_borrows_for_generic_args = "allow"
needless_range_loop = "allow"
new_without_default = "allow"
ptr_arg = "allow"
question_mark = "allow"
redundant_closure = "allow"
should_implement_trait = "allow"
single_match = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_cast = "allow"
unnecessary_map_or = "allow"
unwrap_or_default = "allow"
useless_conversion = "allow"
useless_format = "allow"
vec_init_then_push = "allow"
wrong_self_convention = "allow"
identity_op = "allow"
manual_strip = "allow"
result_large_err = "allow"
doc_nested_refdefs = "allow"
large_enum_variant = "allow"
clone_on_copy = "allow"
extend_with_drain = "allow"
redundant_pattern_matching = "allow"
while_let_loop = "allow"
io_other_error = "allow"
manual_unwrap_or_default = "allow"
manual_unwrap_or = "allow"
manual_flatten = "allow"
print_literal = "allow"
manual_saturating_arithmetic = "allow"
large_const_arrays = "allow"
unused_enumerate_index = "allow"

[workspace.lints.rust]
unexpected_cfgs = "allow"

[profile.bench]
opt-level = 3
lto = "thin"
codegen-units = 1

# Fast dev/test builds with FAST crypto: keep our own crates cheap to compile
# (opt-level 0, quick iteration) but build all DEPENDENCIES optimized so the
# crypto primitives (plonky3 p3-*, poseidon2, BLS12-381, FRI) don't run
# unoptimized in debug — a debug-build STARK verify/prove pins a core for ages
# otherwise (e.g. dregg-lightclient tests). opt-level 3 deps + opt-level 0 ours
# = the best of both. Applies to the `test` profile too (it inherits `dev`).
[profile.dev.package."*"]
opt-level = 3

# The crypto-heavy WORKSPACE crates also get optimized in dev/test (they hold
# hot proving/verifying loops that the `*` glob above does not cover for
# workspace members). Compile cost is amortized by caching; runtime is night/day.
[profile.dev.package.dregg-circuit]
opt-level = 3
[profile.dev.package.dregg-lightclient]
opt-level = 3
