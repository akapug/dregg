# sandstorm-bridge — the dregg-native Sandstorm integration.
#
# A signed `.spk` grain is a dregg cell + a cap-bounded workload: read the real
# `.spk` (xz + Ed25519, App ID = the signing key), decode its manifest into a
# grain spec, run the grain lifecycle (create / wake / sleep / delete) over a
# dregg cell's umem heap, and gate every grain capability on the real dregg-auth
# `dga1_` powerbox rail (mint / attenuate-only / derive-perms). The maintainer
# wants `.spk` hosting; this is its confinement + capability model, native.
#
# The two operated-layer welds present upstream (the compute-tier `exec_workload`
# weld onto the sandbox executor, and the `serving` weld onto the hosting
# substrate's site-serving surface) are NOT imported here: they bind to
# operated-execution / site-serving crates that are not breadstuffs siblings. The
# signed-`.spk` + grain confinement model (spk / manifest / cell / grain / bridge
# / net / tenant / limits / capnp wire / the powerbox rail) is complete and green
# on its own; the two welds are a named follow-up.

[package]
name = "sandstorm-bridge"
version = { workspace = true }
edition = "2021"
publish = false
description = "Sandstorm grain=cell + signed .spk runner + powerbox=dregg-cap bridge over the dregg-auth credential rail"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
# `.spk` container crypto + compression: App ID = the Ed25519 signing key,
# payload integrity = the signature over the archive, container = xz.
lzma-rs = "0.3"          # pure-Rust xz (de)compression
ed25519-dalek = { version = "2.1", features = ["std"] }   # Ed25519 sign/verify (App ID = pubkey)
sha2 = { workspace = true }            # content-addressed umem `data_root`
data-encoding = "2"      # Sandstorm's base32 alphabet for App IDs / dga1_ tokens

# The cap rail: a powerbox grant is a `dga1_` ed25519 caveat-chain credential,
# host-rooted, attenuating-only, verified offline on present — the proven
# breadstuffs credential core (`dregg_auth::credential`), the same `dga1_` wire
# the source rail used.
dregg-auth = { path = "../dregg-auth" }

# The REAL commitment scheme: a grain's `/var` commits through the same openable
# sorted-Poseidon2 heap-root the kernel commits a cell's heap with
# (`dregg_circuit::heap_root` — the primitive `dregg_cell::compute_heap_root`
# wraps), so `grain_cell_commitment` is a genuine cell heap-root the federation
# ledger carries, and inclusion proofs fold to THAT (a Poseidon2/felt Merkle path),
# not a bespoke sha256 tree the ledger never stores.
dregg-circuit = { path = "../circuit" }
dregg-cell = { path = "../cell" }

# The deos-view WEB renderer only (gpui-free + deos-js-free: just serde) — a hosted
# grain serves its own deos-view card as HTML over the WebSession surface. `web`
# gives `render_card_document`; `grain_run_view`/`GrainRun` are always-compiled. We
# take NONE of the native/cap/discord elephants (`default-features = false`).
deos-view = { path = "../deos-view", default-features = false, features = ["web"] }

[lints.rust]
unsafe_code = "forbid"
unexpected_cfgs = "deny"
