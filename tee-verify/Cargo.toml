[package]
name = "dregg-tee-verify"
version = "0.1.0"
edition = "2021"

# A root-workspace MEMBER (it used to carry a detached `[workspace]` opt-out with
# zero dependents): the TEE fact rail now has real consumers â€” `deos-hermes`
# installs `NitroVerifier`/`SnpVerifier` into dregg-cell's fail-closed seam
# (`deos-hermes/src/tee_fact.rs`), `agent-platform` drives the landed-slot rail
# join (`verify_landed_tee_attested`), and `dregg-tee-produce`'s tests close the
# produceâ†’verify loop â€” so it resolves under the ONE root lock those members use.
# (The stale local Cargo.lock from the detached era is ignored by cargo.)

[dependencies]
dregg-cell = { path = "../cell" }
ciborium = "0.2"
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
x509-parser = { version = "0.16", features = ["verify"] }
p384 = { version = "0.13", features = ["ecdsa"] }
sha2 = "0.10"
# The AMD ARK/ASK roots sign RSA-4096 **PSS** (MGF1-SHA-384). x509-parser's `verify`
# feature covers only PKCS#1 v1.5 / ECDSA / Ed25519 (see snp::verify_cert_link), so the
# SNP chain routes id-RSASSA-PSS links to this maintained RSA impl for the real AMD path.
rsa = "0.9"

[dev-dependencies]
hex = "0.4"
# Self-signed test PKI (ARK->ASK->VCEK) for the SNP cert-chain test. Default features
# (crypto/pem/ring) supply ECDSA P-384 keygen + PEM export; the p384 `pem` default feature
# (already enabled) supplies PKCS#8 decode so the VCEK signer can be reconstructed from the
# rcgen keypair to body-sign the synthetic report.
rcgen = "0.14"
# RSA-4096 keygen for the RSA-PSS-SHA384 link primitive test (AMD's ARK/ASK algorithm).
rand = "0.8"

[lints]
workspace = true
