    <ellipse cx="944" cy="350" rx="93" ry="120" fill="url(#life)"/>
    <path d="M821 292c62-31 187-34 247 0M807 356c75-30 199-30 274 0M829 421c60-24 170-24 230 0M878 135c-24 95-31 253 5 368M944 112c-7 114-7 292 0 408M1010 135c24 95 31 253-5 368" fill="none" stroke="#d6e5d9" stroke-opacity=".13"/>
  </g>
