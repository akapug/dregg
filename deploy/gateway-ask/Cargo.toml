# dregg-gateway-ask — the public gateway's on-demand-TLS `ask` + capability
# forward-auth sidecar, plus the launchpad microsite composer.
#
# ── WORKSPACE MEMBERSHIP ──────────────────────────────────────────────────────
# Folded into the root workspace (members + default-members): all four path-deps
# (http-serve, starbridge-domains, dregg-auth, dregg-ipfs) are already root
# members, so folding introduces no new or conflicting dep. The ark-serialize
# fork `[patch.crates-io]` this crate mirrored is now INHERITED from the root.
[package]
name = "dregg-gateway-ask"
version = "0.1.0"
edition.workspace = true
description = "The public gateway's on-demand-TLS `ask` endpoint (backed by the verified custom-domain registry's is_verified read) + the capability forward-auth gate (offline dregg-auth credential verification) + the launchpad microsite composer (a launch gets a content-addressed landing page, IPFS-backed token metadata). Replaces per-surface hardcoded Caddy site blocks with one wildcard-plus-ask block."

[[bin]]
name = "gateway-ask"
path = "src/main.rs"

[lib]
name = "dregg_gateway_ask"
path = "src/lib.rs"

[dependencies]
# The portable std-net HTTP/1.1 serve core (ServeRequest / WebResponse / serve_http).
http-serve = { path = "../../http-serve" }
# The verified custom-domain registry — `is_verified(host)` is the on-demand-TLS
# `ask` oracle; `site_for_host` is the routing read; `adopt` seeds a verified
# microsite binding for a launch.
starbridge-domains = { path = "../../starbridge-apps/domains" }
# Offline capability verification for the forward-auth gate: `verify_offline`
# checks an operator's printable token against the issuer public key with no
# network, returning the confined subject.
dregg-auth = { path = "../../dregg-auth" }
# Content-addressing for launch token metadata + images: pin bytes, commit the CID.
dregg-ipfs = { path = "../../dregg-ipfs" }

serde = { version = "1", features = ["derive"] }

[dev-dependencies]
# A local TCP round-trip in the integration test uses only std.

[lints]
workspace = true
