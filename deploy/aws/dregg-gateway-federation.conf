# Systemd drop-in: convert the public gateway from solo mode into federation
# member node-0 of the 3-node devnet federation, WITHOUT editing the base
# dregg-gateway.service (ExecStartPost unlock, hardening, proxy trust all
# inherit unchanged).
#
# Install:
#   sudo mkdir -p /etc/systemd/system/dregg-gateway.service.d
#   sudo cp /opt/dregg/deploy/aws/dregg-gateway-federation.conf \
#       /etc/systemd/system/dregg-gateway.service.d/federation.conf
#   sudo systemctl daemon-reload
#
# Remove the file + daemon-reload to roll back to the solo gateway.
# See deploy/aws/N3-RUNBOOK.md.

[Service]
# Override ExecStart (the empty assignment clears the base unit's line).
# Changes vs. the base unit: --federation-mode full, --federation-size 3,
# explicit --gossip-port 9420, and the two internal peers. Peer addresses
# MUST be IP:PORT literals (the parser skips hostnames).
#
# FINALITY-CRITICAL cadence at n=3 (matches scripts/devnet-n3-ordering.sh, the
# proven S5-1 harness): --block-cadence-ms 1000 + --idle-heartbeat-ms 2000. The
# round-disciplined producer only advances a round when a supermajority of
# distinct creators occupy the current round; at n=3 supermajority==3 (all
# three). The DEFAULTS (block-cadence 2000ms, idle-heartbeat 120000ms = 2 min)
# pace round-filling heartbeats too slowly/irregularly for `is_super_ratified`
# to assemble the 3-at-a-wave-end-round cohort, so waves never close and
# `latest_height` stays 0 forever even with a fully-converged DAG (observed
# live, 2026-06-15). Tight, regular pacing makes waves close → tau finalizes.
ExecStart=
ExecStart=/opt/dregg/target/release/dregg-node run \
    --data-dir /opt/dregg-data \
    --port 8420 \
    --bind 127.0.0.1 \
    --gossip-port 9420 \
    --node-index 0 \
    --federation-size 3 \
    --federation-peers 127.0.0.1:9421,127.0.0.1:9422 \
    --enable-pruning \
    --enable-faucet \
    --federation-mode full \
    --consensus blocklace \
    --block-cadence-ms 1000 \
    --idle-heartbeat-ms 2000

# Memory retune: the base unit's 5G/6G assumed ONE node on the 8 GB box.
# With three nodes (internal nodes capped at 1.5G/2G each by
# dregg-node@.service) the gateway drops to 3G/3.5G so the worst-case sum
# (3.5 + 2 + 2) leaves headroom for Caddy + the Discord bot.
MemoryHigh=3G
MemoryMax=3584M
