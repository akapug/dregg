# deos-view pins the ROLLING `nightly` channel, exactly as starbridge-v2 does
# (../starbridge-v2/rust-toolchain.toml). It pulls the SAME gpui fork the cockpit
# uses, and gpui at the pinned zed rev needs `std::hint::cold_path` (stabilized in
# nightly after the repo root's `nightly-2026-01-01`). The transitive `deos-js` +
# `mozjs` (SpiderMonkey) compile fine on the rolling nightly too. This is purely a
# "newer compiler for a newer dep" bump; it changes no protocol-crate toolchain
# (deos-view is a standalone workspace, in the repo-root `exclude` list).
[toolchain]
channel = "nightly"
profile = "default"
components = ["cargo", "clippy", "rustc", "rustfmt"]
