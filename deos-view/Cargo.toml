# deos-view — render a deos-js applet's view-tree into REAL gpui-component widgets.
#
# THE EXTRACTION (mirroring the deos-reflect extraction ember asked for): the
# RENDERER lives in its own crate. `deos-js` stays GPUI-FREE (it produces the
# serializable view-tree + drives the verified turns); `deos-view` holds ALL the
# gpui and turns that data into pixels.
#
# What it does:
#   1. Reads a deos-js applet's view-tree (the `deos.ui.*` serializable element-tree,
#      produced by the REAL SpiderMonkey engine via `JSON.stringify` and read back out
#      through the applet's public ephemeral view-state) and renders each node into a
#      real gpui-component widget (vstack→v_flex, button→Button, text→Label, …).
#   2. Wires handlers: a rendered button's onClick fires the applet's affordance = a
#      REAL cap-gated verified turn (a `TurnReceipt`); a `bind(()=>s.x)` re-reads the
#      model off the live ledger after the turn (the signal binding). Invalidation is
#      immediate-mode for this slice (re-render the view-tree per turn).
#   3. Renders the moldable `present()` faces through the SAME widget vocabulary
#      (the §7 unification — the inspector and the custom view share widgets).
#
# STANDALONE WORKSPACE (own `[workspace]`, listed in the repo-root `exclude` like
# `deos-js`/`starbridge-v2`/`servo-render`): it pulls BOTH the mozjs SpiderMonkey
# elephant (via deos-js) AND the gpui native stack (windowing/GPU/font), so it must
# never feature-unify onto the main workspace.
#
# Build FROM INSIDE this directory (never the repo root) — `rust-toolchain.toml`
# pins the rolling `nightly` (gpui needs `std::hint::cold_path`):
#   cd deos-view && cargo test --release
[package]
name = "deos-view"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "Render a deos-js applet's view-tree into real gpui-component widgets (the renderer extraction)."

[dependencies]
# THE VIEW-TREE MODEL + THE VERIFIED-TURN FIRING — the gpui-free substance crate.
# Its `Applet` mints a sovereign cell; `fire` is a real cap-gated verified turn
# (a `TurnReceipt`); `get_u64` is a witnessed read; the `deos.ui.*` JS prelude
# builds the serializable element-tree this crate renders. We do NOT touch its src.
deos-js = { path = "../deos-js" }
# `dregg-cell` — the SAME crate deos-js path-deps (its `AuthRequired` is the authority
# in `Applet::mint`'s signature). Naming it directly lets the render proof construct an
# applet's affordances; cargo resolves the IDENTICAL instance deos-js already pulls.
dregg-cell = { path = "../cell" }

# THE GPUI STACK — the SAME fork rev the cockpit uses (emberian/zed@407a6ff), so
# cargo resolves ONE gpui instance across this crate + gpui-component. `test-support`
# lights up the HeadlessAppContext + offscreen wgpu renderer the render-capture proof
# uses (the exact path starbridge-v2's `render_cockpit_headless` bakes through).
gpui = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", features = ["test-support"] }
# `runtime_shaders` is LOAD-BEARING on macOS (mirrors starbridge-v2): it makes gpui
# compile its Metal shaders AT RUNTIME (via `MTLDevice::newLibraryWithSource`) instead
# of at BUILD time (`xcrun metal`, which needs the offline Metal Toolchain component).
# Without it the `gpui_macos` build script fails "cannot execute tool 'metal'". `x11`/
# `wayland` light up the Linux windowing backends (inert on macOS — gpui_linux is not
# in the macOS graph).
gpui_platform = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", features = ["font-kit", "runtime_shaders", "test-support", "x11", "wayland"] }
# The wgpu renderer leaf — the CosmicTextSystem text system + the offscreen renderer.
gpui_wgpu = { git = "https://github.com/emberian/zed", rev = "407a6ffd977d82b828e392f92db5cb34edea9549", features = ["test-support"] }

# THE REAL WIDGET LIBRARY — the vendored longbridge fork the cockpit uses
# (emberian/gpui-component@dregg-repoint, the `crates/ui` member). Button, Label,
# v_flex/h_flex, Input, List, Table — the vocabulary the view-tree maps onto.
gpui-component = { path = "../../gpui-component/crates/ui", default-features = false }

# JSON parse of the view-tree the JS engine stringifies (and the present() faces).
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# The headless capture path returns `anyhow::Result<image::RgbaImage>` (gpui's
# `capture_screenshot` signature); the `headless` module re-encodes + saves the PNG.
# 0.25 matches gpui_wgpu's `image` (one resolved version across the graph).
anyhow = "1"
image = { version = "0.25", default-features = false, features = ["png"] }

# ─── THE FORK SEAMS — replicated from deos-js + starbridge-v2 (the two standalone
#     workspaces this crate path-deps). Because deos-view is its OWN workspace root,
#     neither the repo-root `[patch]` nor deos-js's/starbridge-v2's reaches it, so the
#     transitive dregg + gpui deps cannot re-resolve without these. They revert with
#     the others once the forks land.

