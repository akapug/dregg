[package]
name = "dregg-oracle"
version = "0.1.0"
edition = "2021"
description = "Trustless web facts you can reuse. A CLI + library that produces a PORTABLE, independently-verifiable proof that a real HTTPS endpoint genuinely returned a value (a Coinbase spot price, a GitHub commit) — authentic (MPC-TLS / tlsn), well-formed (JSON CFG parse certificate), injection-free, STARK-bound. Anyone can re-verify a proof.json trusting no one but the pinned transport anchors."

# Detached from the parent workspace (its own empty `[workspace]` table, like
# ../tee-verify) so this reusable crate builds standalone and never touches the
# shared root manifest. The path-dep below still inherits its own settings from
# the breadstuffs workspace it lives in.
[workspace]

[dependencies]
# THE PROVER/VERIFIER this tool wraps. `default-features = false` keeps the light
# modeled core available; the `live` feature (default) turns on the real MPC-TLS
# backend (`tlsn-live`) so `prove` can run a genuine session and `verify` can run
# the real `presentation.verify()`.
dregg-zkoracle-prove = { path = "../zkoracle-prove", default-features = false }

clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
hex = "0.4"

[features]
# Default ON: the reusable tool's whole point is proving a REAL HTTPS endpoint, so
# it links the heavy `tlsn-live` MPC-TLS backend by default. `--no-default-features`
# gives a light, unit-testable crate that can still VERIFY modeled-carrier proofs
# (the ed25519 fixture path) but not run live proofs or verify live-carrier proofs.
default = ["live"]
live = ["dregg-zkoracle-prove/tlsn-live"]
