[package]
name = "dregg-epoch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true

# The epoch-manifest + handshake core. A PURE, transport-agnostic library:
# it derives an `EpochManifest` from the real baked circuit constants
# (`V3_STAGED_REGISTRY_FP`, the `SLOT_CAVEAT_TAG_*` set, the effect-VM geometry)
# and answers `check_compatibility(local, remote)` with a typed verdict. The
# actual HTTP serve / fetch of the manifest is a NAMED SEAM (like the
# receipt_stream / indexer pure cores) — not built here.
[dependencies]
dregg-circuit = { path = "../circuit" }
serde = { workspace = true, features = ["derive", "alloc"] }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true
