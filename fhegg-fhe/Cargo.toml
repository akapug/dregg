[package]
name = "fhegg-fhe"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "fhEgg Stage-2 NO-VIEWER FHE clearing PoC: uniform-price batch auction cleared entirely on TFHE ciphertexts (nobody decrypts the orders), plus one PDHG flow-LP iteration under FHE. Real tfhe-rs, measured envelope."

[features]
default = []
# Tier-1/operator-visible BFV↔HidingFri same-opening authority for the private
# Dark AMM.  Keep the proof-production tower out of fhegg-fhe's default fast
# surface; hosts opt into this producer/reference-verifier seam explicitly.
amm-input-binding = ["dep:dregg-circuit-prove"]

# The NO-VIEWER stage: orders are submitted as TFHE ciphertexts (unary
# price-bucket increments, Cryptobazaar-style) and the clearing is computed
# HOMOMORPHICALLY. Nobody — not this binary, not any committee — ever holds a
# plaintext order; only the public clearing price p* (and the aggregate volume
# V*) is decrypted at the end.
#
# FOLDED into the root workspace (members, NOT default-members — its heavy
# tfhe-rs FHE dep stays out of the bare dev loop, exactly like the Stage-1
# fhegg-solver sibling). The fold was previously blocked because its `tfhe 1.6`
# needs `rayon ^1.11` while the root locked `rayon 1.10.0` — that lock came from
# poly-commitment's over-strict `rayon = "=1.10.0"` exact-pin, now relaxed via
# the emberian/proof-systems fork ([patch] in the root Cargo.toml). With the
# root on rayon 1.12, poly-commitment (storage kzg) and tfhe (here) co-resolve.
# See docs/deos/DREX-NO-VIEWER-SURPASS.md, docs/deos/FHEGG-KERNEL.md (§2 the fold
# + crossing), docs/deos/PRIVATE-CONVEX-ENGINE.md (§2.x PDHG, §1.4 FHE cost).

[dependencies]
tfhe = { version = "1.6", features = ["integer"] }
rand = "0.8"
# The CARRY-FREE ADDITIVE lane (codex Round-3 Q1): a REAL pure-Rust BFV/BGV
# scheme (fhe.rs, Tancrède Lepoint) — exact-quantized R_q ring, SIMD-batched,
# additions are native modular poly-adds (NO carry propagation, NO PBS). This is
# the "exact quantized BFV/BGV for the carry-free fold" codex named in
# docs/deos/FHEGG-CODEX-ROUND3.md §B/Q1. CKKS is not in tfhe-rs; BFV is the
# cleanest real additive-homomorphic path in pure Rust and it is what codex
# specified for the auction fold. `rand_09` is BFV's rng (fhe.rs is on rand 0.9;
# the existing tfhe bins stay on rand 0.8, so it is a renamed second dep).
fhe = "0.1.1"
fhe-math = "0.1.1"
fhe-traits = "0.1.1"
rand_09 = { package = "rand", version = "0.9" }
# GPU BFV fold (bfv_gpu.rs): portable wgpu compute — the aggregation hot path at scale is bandwidth-bound.
wgpu = "24"
pollster = "0.4"
bytemuck = "1"
sha2 = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Authenticated computation-integrity quorum: strict Ed25519 signatures from the
# declared ordered party roster over the exact canonical clearing-claim digest.
ed25519-dalek = { version = "2", features = ["std"] }
dregg-circuit-prove = { path = "../circuit-prove", optional = true }
# The malicious-share threshold lane uses Pedersen commitments plus aggregated
# Bulletproof range proofs.  The VSS transcript commits every party's exact BFV
# share, and the opening proof links that commitment to h=c1*s+smudge while
# proving the (81-bit, signed) smudge bound without revealing the smudge.
bulletproofs = "5"
curve25519-dalek = { version = "4", features = ["alloc", "rand_core"] }
merlin = "3"
ethnum = "1.5"

[[bin]]
name = "smoke"
path = "src/bin/smoke.rs"

[[bin]]
name = "fhe-clearing-bench"
path = "src/bin/bench.rs"

[[bin]]
name = "fhe-pdhg-bench"
path = "src/bin/pdhg.rs"

# The additive-fold vs exact-integer-TFHE head-to-head (codex R3 Q1 Tier-0 lever).
[[bin]]
name = "fhe-additive-bench"
path = "src/bin/additive_bench.rs"

# The OUTPUT-BOUNDARY MPC crossing (codex R4 gold): real BFV fold -> additive
# shares -> secret-shared Beaver-triple comparison -> reveal only (p*,V*).
[[bin]]
name = "fhe-mpc-bench"
path = "src/bin/mpc_bench.rs"

# The MASKED DECRYPT-TO-SHARES pipeline (closes OUTPUT-BOUNDARY-MPC.md §8's
# partial-decrypt-into-shares item): fold -> homomorphic Z_t masking -> decrypt
# only the padded value -> mod-t shares -> a2b_mod_t -> unchanged crossing.
[[bin]]
name = "fhe-boundary-bench"
path = "src/bin/boundary_bench.rs"

[lints]
workspace = true
