# verifier-stark — the firmament's verified-compute heart organ: a no_std seL4
# protection domain that runs a REAL cryptographic STARK (BabyBear + BLAKE3
# Merkle + FRI + Fiat-Shamir), not a structural check.
#
# The STARK core (src/stark_core/) is the verbatim `dregg-circuit` custom STARK
# (circuit/src/{field,stark}.rs) carried `std -> core`/`alloc` with the test
# modules dropped — byte-identical prove/verify logic. `prove()` is fully
# deterministic (Fiat-Shamir, no RNG/clock), so this PD needs no entropy source:
# it both proves and verifies a real STARK on-device. No Lean, no libuv, no GMP.
#
# This is the high-value fallback heart organ while the full Lean executor-PD is
# blocked on the ELF-recompile + libuv-excision + musl-host port
# (.docs-history-noclaude/SEL4-EMBEDDING.md §2, .docs-history-noclaude/FIRMAMENT.md §6).

[package]
name = "dregg-verifier-stark-pd"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "dregg-verifier-stark-pd"
path = "src/main.rs"

[dependencies]
sel4-microkit = { workspace = true, features = ["alloc"] }

# no_std cryptographic deps for the STARK core.
# blake3: the Merkle leaf/node hash. no_std with default-features off; `pure`
#   forces the portable Rust backend (no C/NEON SIMD path, which needs libc
#   headers like <assert.h> absent on bare-metal aarch64-sel4-microkit).
blake3 = { version = "1", default-features = false, features = ["pure"] }
# serde: the StarkProof structs derive Serialize/Deserialize (the proof BYTES
#   use hand-rolled little-endian framing, but the derives must still compile).
#   no_std via default-features off + derive + alloc.
serde = { version = "1", default-features = false, features = ["derive", "alloc"] }
