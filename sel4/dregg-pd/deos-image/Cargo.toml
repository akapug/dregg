# deos-image — THE LIVE IMAGE VIEWER. A real seL4 PD that boots a Smalltalk/
# Pharo-style object browser of REAL deos cells in a QEMU window. The thing you
# boot INTO is not a slideshow — it is a live image of actual sovereign
# `CellState`s with real ids, balances, c-lists, fields, and proofs. The
# newcomer walks the image (↑/↓ between cells), drills INTO a cell (ENTER) to
# inspect its four substances — VALUE / STATE / AUTHORITY / EVIDENCE — and backs
# out (ESC). "cell 3/6" means cell 3 of 6 LIVE in the image, not slide 3.
#
# It GROWS the deos-tutorial PD (the bytes->glass + virtio-keyboard machinery,
# docs/desktop-os-research/GRAPHICAL-SEL4-BOOT.md) from a fixed six-screen arc
# into a navigable cell inspector. The cell DATA is a frozen snapshot of REAL
# cells: `src/image_data.rs` is @generated by the host example
# `cargo run -p dregg-cell --example gen_image_snapshot` — every CellId
# (BLAKE3 derive_raw), every state_commitment, every cap is the real crate's
# genuine output, NOT lorem. The PD is `#![no_std]` and cannot link the std
# `dregg-cell` crate, so the real cells are computed at build time and baked in.
#
# Dependency discipline (the firmament's minimal graph): the font, the renderer,
# the fw_cfg/ramfb protocol, and the keyboard driver are all in this crate (the
# same hand-rolled set the deos-tutorial PD uses); the ONLY non-runtime deps are
# the virtio-mmio keyboard driver (virtio-drivers + the rust-sel4 virtio HAL),
# pinned to the workspace commit.

[package]
name = "dregg-deos-image-pd"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "dregg-deos-image-pd"
path = "src/main.rs"

[dependencies]
# `alloc` for the virtio driver's queues (the keyboard event ring); the viewer
# draws into a statically-mapped framebuffer region — no alloc on the draw path.
sel4-microkit = { workspace = true, features = ["alloc"] }

# The virtio-mmio keyboard. Same crate + HAL the deos-tutorial / net-driver PDs
# drive virtio devices with — the device-cap discipline reused for human input.
virtio-drivers = { version = "0.13.0", default-features = false, features = ["alloc"] }
sel4-virtio-hal-impl = { git = "https://github.com/seL4/rust-sel4", rev = "efef73cc0bbebc8dd477dde5073d10b1fcfbc608" }
