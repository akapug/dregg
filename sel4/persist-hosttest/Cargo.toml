# persist-hosttest — the EXECUTABLE host witness for the persist-PD's durable
# verified commit-log + the Tier-C chain gate (`commit_store.rs`), the REAL redb
# durable backend (`redb_store.rs`), and the app-hosting economy (`hosting.rs`).
#
# WHY A SEPARATE CRATE (same rationale as ../crypto-floor-hosttest). The persist PD
# is a `no_std` Microkit ELF; its load-bearing artifact runs on aarch64 under
# `qemu-system-aarch64` in the 5-PD assembly (sel4/dregg.system). On a macOS host
# there is no user-mode `qemu-aarch64` to run a PD's logic in isolation, and the
# `no_std`+`alloc` store module cannot host a std `cargo test` harness in the PD
# crate itself. So this sibling std crate INCLUDES the SAME `commit_store` module
# the persist PD carries (via `#[path]` in src/main.rs) and exercises the identical
# commit -> read -> chain-gate spine as a normal host binary + `#[test]` — a real,
# runnable witness on this box: a verified turn commits durably, a read returns it,
# and a non-chaining / out-of-order / replayed / colliding turn is gated.
#
# THREE ORGANS, ONE SPINE:
#   * commit_store.rs — the `no_std`+`alloc` chain-gate discipline (BTreeMap stand-in
#     for the durable tables; rides INSIDE the persist PD via `#[path]` include).
#   * redb_store.rs   — the REAL durable backend: the SAME CommitRecord + chain gate
#     in real `redb` ACID tables over a `StorageBackend` (redb's `len/read/set_len/
#     sync_data/write` device trait). On the host the backend is a file-backed byte
#     region; on-device the SAME trait impl rides the seL4 block cap (the named rung).
#     This is what makes "durable" REAL — survives process death, fsync at commit.
#   * hosting.rs      — the app-hosting economy: pay-to-host as a VERIFIED VALUE TURN
#     (a conserving Transfer through the spine), fee-lapse → eviction (a verified
#     turn that drops the durable hosting), fail-closed, conserving.
#
# Standalone workspace (empty [workspace]) so it builds with its own target dir,
# swarm-safely, NOT a member of the sel4/dregg-pd workspace.
[workspace]

[package]
name = "dregg-persist-hosttest"
version = "0.1.0"
edition = "2021"
publish = false

# The pure chain-gate spine witness (the original; no external deps).
[[bin]]
name = "host_persist_spine"
path = "src/main.rs"

# The REAL durable-store + hosting-economy witness (redb-backed).
[[bin]]
name = "host_durable_hosting"
path = "src/durable_main.rs"

[lib]
name = "dregg_persist_hosttest"
path = "src/lib.rs"

# redb is the SAME ACID store `persist/src/commit_log.rs` uses on a node — the
# persist PD carries it on-device over the block cap (via redb's `StorageBackend`
# trait, which is exactly a block device's `read`/`write`/`set_len`/`sync_data`).
# tempfile gives the host witness a real on-disk region to prove cross-process
# durability (a commit survives the store being dropped + reopened from the bytes).
[dependencies]
redb = "2"

[dev-dependencies]
tempfile = "3"
