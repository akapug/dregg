#
# This is a STANDALONE Cargo workspace, deliberately NOT a member of the
# repo-root workspace and NOT a member of the sel4/dregg-pd Microkit workspace:
#
#   * It path-depends on the REAL dregg crates (`dregg-cell`, `dregg-turn`,
#     `dregg-types`) so the cap-gradation bridge uses the GENUINE attenuation
#     semantics (`is_attenuation`, `AuthRequired::is_narrower_or_equal`), the
#     GENUINE `CapabilityRef`/`CapabilitySet`/`CellId`, and a GENUINE
#     `TurnExecutor::execute` turn for the distributed leg. It never reinvents
#     `granted âŠ† held`.
#
#   * It builds into its OWN target dir (`CARGO_TARGET_DIR` set by the runner,
#     see ./run-test.sh), so it never touches the repo-root `./target` that a
#     node lane owns. Path-depending on a member of another workspace from
#     outside that workspace is fine: cargo resolves the depended crate within
#     ITS own workspace and links it into THIS crate's local target.
#
# `docs/FIRMAMENT.md Â§3` ("The transparent localâ†”distributed capability
# gradation" + "The fluid reach-out") DESIGNS this bridge; this crate is the
# design turned into code: ONE `(target, rights)` handle an app invokes /
# attenuates / delegates uniformly, with a router that dispatches a LOCAL
# target to the seL4 kernel path and a DISTRIBUTED target to the
# executorâ†’net path. The `n = 1` collapse is the firmament's headline.

# Empty [workspace] table â†’ this crate is its OWN workspace root, NOT a member
# of the repo-root workspace (whose ./target a node lane owns). It still
# path-depends on the real dregg crates; cargo resolves those within the root
# workspace and links them into THIS crate's local target.
[workspace]

[package]
name = "dregg-firmament"
version = "0.1.0"
edition = "2021"
publish = false
description = "The localâ†”distributed cap-gradation bridge â€” one (target, rights) handle, two backings (seL4 syscall / real dregg turn), the fluid reach-out in code."

[features]
# `process-pd` selects the v1 PROCESS-backed PD substrate (the MMU-enforced
# isolation upgrade, `docs/DREGG-DESKTOP-OS.md Â§3`): PDs become forked host
# PROCESSES (so the host MMU enforces address-space separation â€” a PD cannot
# read another PD's memory), shared regions become `shm_open`/`mmap` segments,
# and a kernel-side epoch-tagged cap-handle validity table refuses raw-bytes cap
# forgery. It is OFF by default so the fast `cargo test` keeps the v0 thread
# backing (one address space, in-process, no fork) for quick iteration; the
# real-isolation path is opt-in (`--features process-pd`) and Unix-only. This
# EXTENDS the EmulatedKernel with a cfg-selected backing â€” it does NOT fork a
# parallel mock; the v0 thread kernel stays the default.
process-pd = ["dep:libc"]

[dependencies]
# The REAL dregg capability + attenuation semantics. Not reinvented.
dregg-cell  = { path = "../../cell" }
dregg-turn  = { path = "../../turn" }
dregg-types = { path = "../../types" }

# `libc` (fork / shm_open / mmap / socketpair / waitpid) backs the v1
# process-backed PD substrate. Optional + pulled in ONLY under `process-pd`, so
# the default thread-backed build gains no new dependency. It is ALREADY a
# transitive dependency of the real dregg crates (no new lockfile surface).
libc = { version = "0.2", optional = true }

[dev-dependencies]
# (tests live inline + in tests/)

[profile.release]
opt-level = "s"
