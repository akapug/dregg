[package]
name = "dregg-intent"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Distributed intent engine for privacy-preserving capability discovery and matching"

[dependencies]
blake3 = "1"
chacha20poly1305 = { workspace = true }
curve25519-dalek = { version = "4", features = ["alloc"] }
getrandom = { workspace = true }
postcard = { version = "1", features = ["alloc"] }
dregg-cell = { path = "../cell" }
dregg-cell-crypto = { path = "../cell-crypto" }
dregg-circuit = { path = "../circuit" }
dregg-commit = { path = "../commit" }
dregg-dfa = { path = "../dfa" }
dregg-federation = { path = "../federation", default-features = false }  # pure threshold_decrypt; no tokio
dregg-trace = { path = "../trace" }
dregg-turn = { path = "../turn" }
dregg-token = { path = "../token", default-features = false, features = ["macaroon", "rand-deps"] }
serde = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
globset = { workspace = true }
x25519-dalek = { workspace = true }
# UNCONDITIONAL (polarity-inverted, docs/FEATURE-HYGIENE.md §Lean): LIVE ring settlement
# routes through the VERIFIED Lean executor FFI (`dregg_record_kernel_step` over the PROVED
# `Exec.recKExec`) on every native build — `verified_settle` folds each lowered ring leg
# through the real verified executor (NOT a Rust mirror), so a fulfilled intent IS a
# verified, conserving, authorized executor turn. The ONE opt-out is the `no-lean-link`
# platform feature (wasm32/zkvm — targets that cannot link libdregg_lean.a).
dregg-lean-ffi = { path = "../dregg-lean-ffi" }

[features]
default = []
# PLATFORM gate, OFF by default: only wasm32/zkvm builds set it. It compiles the Rust-mirror
# settlement IN PLACE OF the per-leg verified-executor cross-check — a statement about the
# target's linker, never about which guarantees this dregg has.
no-lean-link = ["dregg-lean-ffi/no-lean-link", "dregg-federation/no-lean-link", "dregg-turn/no-lean-link"]

[dev-dependencies]
# Arm the `StubVerifier` accept path for plumbing tests only. The feature is
# fail-closed in production builds; enabling it here scopes the permissive stub
# behavior to `cargo test`/dev builds of this crate.
dregg-cell = { path = "../cell", features = ["test-stubs"] }

[lints]
workspace = true
