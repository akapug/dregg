[package]
name = "mud-dregg"
version = "0.1.0"
edition = "2021"
description = "A multiplayer MUD (multi-user dungeon) on dregg where the divergent player-timelines ARE the proven distributed-time-travel config lattice. Rooms are cells, a player command (go/take/say) is a cap-bounded verifiable turn (nobody can forge another player's move — an ungranted action is a real `CapabilityNotHeld` executor refusal), and players FORK the world into divergent timelines, explore, and STITCH back through the settlement-sound branch-and-stitch gate: disjoint edits merge clean, and a genuine conflict (two players mutate the same entity) is a `#`-conflict REFUSED fail-closed — never a silent last-writer-wins. The config-lattice / Settlement Soundness, made playable. Composes `starbridge_v2::branch_stitch_session::BranchStitchSession` + the room/entity/turn substrate over `embedded-executor` only (gpui-free, no GPU)."

# Standalone crate: its own `[workspace]` (below) detaches it from the breadstuffs
# root workspace (whose `members` list is explicit and does not include it), so
# `cargo build --manifest-path mud-dregg/Cargo.toml` verifies it in isolation while
# still resolving the `path` dependencies into the sibling protocol crates.
[dependencies]
starbridge-v2 = { path = "../starbridge-v2", default-features = false, features = ["embedded-executor"] }
dregg-cell = { path = "../cell", default-features = false }
dregg-turn = { path = "../turn" }

[[bin]]
name = "mud-dregg"
path = "src/main.rs"

# A workspace MEMBER of the breadstuffs root (registered in `members`, not
# `default-members`). The root `[workspace]` + `[patch]` tables apply; no standalone
# `[workspace]`/`[patch]` here.
