[package]
name = "dregg-dsl-differential"
version = "0.1.0"
edition = "2024"
description = "Cross-backend differential testing for dregg-dsl: emit a caveat predicate via all backends, run every verifier we can run in-process, assert they agree on accept/reject."

[dependencies]
dregg-dsl = { path = "../dregg-dsl" }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime", features = ["plonky3"] }
dregg-circuit = { path = "../circuit", features = ["plonky3"] }
serde_json = { workspace = true }
blake3 = "1"

[lints]
workspace = true
