# deos-hermes — Hermes (Nous Research's self-improving agent) as a CONFINED
# deos agent: every Hermes tool-call becomes a cap-gated, metered, receipted
# dregg turn. The ADOS realization with a REAL agent.
#
# STANDALONE WORKSPACE (declares its own `[workspace]`). It is deliberately
# EXCLUDED from the repo-root `Cargo.toml` members — like `starbridge-v2/` and
# `dregg-tui/` — because it depends on `dregg-sdk` with its DEFAULT features,
# which EMBED THE REAL VERIFIED LEAN EXECUTOR (`libdregg_lean.a` via
# `dregg-turn`/`dregg-cell`). That is exactly what we want here: a Hermes
# tool-call must terminate in a GENUINE receipted turn on the verified
# executor, not a mock. Unifying that Lean link onto the main workspace would
# be the `no-lean-link` feature-unification footgun the verifier/wasm crates
# exist to avoid.
#
# Build FROM INSIDE this directory:
#   cd deos-hermes && cargo build
#   cd deos-hermes && cargo test
#
# The `rust-toolchain.toml` here pins the ROLLING `nightly` channel (same as
# starbridge-v2 / deos-zed): the optional `cockpit-surface` feature links gpui at
# the pinned zed rev, which needs `cold_path` (stabilized after the repo root's
# `nightly-2026-01-01`). The verified Lean executor `dregg-sdk` drags compiles
# fine under rolling nightly too (starbridge-v2 embeds the SAME executor there).

[package]
name = "deos-hermes"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
authors = ["Dregg Contributors"]
license = "AGPL-3.0-or-later"
description = "Hermes-as-a-confined-deos-agent: every ACP tool-call becomes a cap-gated, metered, receipted dregg turn through the proven ToolGateway."

[[bin]]
name = "deos-hermes"
path = "src/main.rs"

# The crown-over-a-REAL-local-MPC-TLS-2PC runner drives `attest::attest_turn_live` +
# `dregg_zkoracle_prove::tlsn_live::*` + `verify_zkoracle_live` UNCONDITIONALLY (not behind
# a `#[cfg]`, unlike `verified_resident.rs` which guards its `attest_turn_live` uses). Those
# items only exist under `zk-live`, so the example must declare it as a required feature —
# else `cargo check --all-targets` (default features, zk-live OFF) fails to resolve
# `attest_turn_live`. Mirrors zkoracle-prove's `coinbase_live` / `coinbase_inproc`.
[[example]]
name = "zk_live_carrier"
required-features = ["zk-live"]

[dependencies]
# THE GROUNDING DEP — the real SDK with its DEFAULT features (the verified Lean
# executor + the proven `ToolGateway`). We reuse `ToolGateway::{admit,invoke}`,
# the `delegAdmit`-mirrored `ToolGrant`, and the `GatewayRefusal`/`ToolReceipt`
# vocabulary VERBATIM — this crate builds NO new enforcement, only the ACP↔gate
# seam on top of the proven crown.
dregg-sdk = { path = "../sdk" }
dregg-turn = { path = "../turn" }
dregg-cell = { path = "../cell" }

# THE CONFINED-BODY SEAM — grain-jail's `BodyChannel` (`Proposal`/`Verdict` line
# protocol) + `ConfinedBrain`, the CANONICAL confined-body primitive a rented
# grain's OS-jailed body rides. `crate::confined_body` welds Hermes's ACP tool-call
# stream onto this seam: the confined Hermes body IS a grain-jail confined body,
# while every proposal stays a cap-gated receipted turn through the proven
# `ToolGateway`. Deps are deliberately light (dregg-agent + serde), so this adds no
# heavy surface; grain-jail is a repo-root workspace member resolved by path the
# same way `dregg-agent` (a dev-dep) already is.
grain-jail = { path = "../grain-jail" }

# THE SANDBOXED-FIRMAMENT HOST-PD (the ambient-authority confinement face). A
# confined Hermes runs INSIDE a forked, OS-sandboxed host-PD whose ONLY channel
# is its firmament Endpoint: `spawn_pd_confined` (macOS Seatbelt / Linux
# ns+seccomp+landlock) drops every ambient OS authority (no `open`, no `socket`,
# no `execve`, no inherited fd) before the agent body runs. We pull the sandbox
# wire features so `crate::confined` can launch the agent into a PD. dregg-firmament
# is its OWN workspace; cargo resolves it (and its proof dep-tree) under THIS
# workspace's `[patch]` tables, so the ark-serialize + plonky3-recursion forks
# above apply to it identically to the rest of the graph. The sandbox path is
# Unix-only; on a non-Unix host it cfg-compiles to a stub.
dregg-firmament = { path = "../sel4/dregg-firmament", features = [
    "process-pd",
    "process-pd-sandbox",
] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

# THE CROWN — the zkOracle PROVER. A confined brain's `/v1/messages` turn now
# yields a `ZkOracleAttestation` (authentic ∧ well-formed ∧ injection-free) over
# the turn's session, PRODUCED by `prove_zkoracle` and ACCEPTED by
# `verify_zkoracle`. The DEFAULT build pulls only this crate's LIGHT surface (the
# modeled ed25519 authentic adapter + the JSON CFG parse-cert prover + the verified
# injection matcher — no HTTP/TLS): so the crown's default (modeled) path stays light
# and green. The REAL local MPC-TLS 2PC roundtrip is behind `zk-live` (→ the crate's
# heavy `tlsn-live` feature); the live `api.anthropic.com` session is the named
# operational remainder (docs/deos/ZKORACLE-PROVER-STATUS.md).
dregg-zkoracle-prove = { path = "../zkoracle-prove" }

# THE GAME NARRATOR — the hosted, budget-metered DM narrator (`dregg-narrator`:
# Bedrock Claude/Nova → Ollama → scripted, behind the hard USD `BudgetLedger`). The
# `crate::narrator_crown` seam wraps a `Narrator`'s DM narration in the attestation
# crown above (`crate::attest::AttestationCarrier`): a narration call yields the text
# AND a `ZkOracleAttestation` (real JSON-CFG well-formedness + the real injection-free
# matcher; the authentic leg the fixture carrier by default, the real MPC-TLS 2PC under
# `zk-live`), plus the 32-byte `attestation_commitment` a game turn's receipt witnesses.
# LIGHT: dregg-narrator pulls only the AWS Converse SDK + serde + fs2 (no Lean, no
# MPC-TLS); the crown's crypto stays `dregg-zkoracle-prove`'s default surface.
dregg-narrator = { path = "../narrator" }

# THE REAL TEE-FACT VERIFIER SEAM (`crate::tee_fact`, default build — unlike the
# oracle seam it needs no heavy MPC-TLS backend, only X.509/P-384/CBOR). The genuine
# vendor-crypto verifiers (`NitroVerifier` chain-to-pinned-AWS-root, `SnpVerifier`
# fail-closed until AMD roots are pinned) that `dregg-cell`'s fail-closed
# `TeeWitnessedPredicateVerifier` installs under `tee_predicate_vk()`.
dregg-tee-verify = { path = "../tee-verify" }

# THE REAL ORACLE-FACT VERIFIER SEAM (`crate::oracle_fact`, behind `zk-live`). The genuine
# `ZkOracleFactVerifier` that `dregg-cell`'s fail-closed `OracleWitnessedPredicateVerifier`
# installs: it decodes a portable oracle-fact proof and authenticates it with
# `verify_zkoracle_live_host` — which takes a real `tlsn::attestation::signing::VerifyingKey`.
# We name the SAME git rev + `mozilla-certs` feature `zkoracle-prove` pins (already resolved
# at that rev in the workspace lock via `zkoracle-prove/tlsn-live`), so the `VerifyingKey`
# type UNIFIES and no new git source is introduced. `bincode` (1.3, the SAME codec the notary
# key + presentation ride elsewhere) decodes the pinned notary key and the portable proof.
# Both OPTIONAL, pulled ONLY under `zk-live`.
tlsn = { git = "https://github.com/tlsnotary/tlsn", rev = "47aee45b53e06648c1b2ad3689b367b8c923fdec", optional = true, features = ["mozilla-certs"] }
bincode = { version = "1.3", optional = true }

# The canonical 32-byte commitment to a `ZkOracleAttestation` (`attestation_commitment`)
# a minted R2 turn witnesses — a length-prefixed BLAKE3 over the attestation's
# verifier-visible fields, the SAME hash `grain-turn::action_commit` uses. Already in the
# lockfile transitively (the dregg crates depend on it); no new lockfile surface.
blake3 = "1"

# THE LIVE LLM TRANSPORT (gated by `live-brain`, OFF by default). A real
# `reqwest::blocking` POST to an OpenAI-compatible `/v1/chat/completions` endpoint
# OR the Anthropic Messages API (`/v1/messages`), with the operator's BYO key in
# the auth header. OFF by default so the std-only green build (the recorded/mock
# provider tests, `brain::kimi_adapter_tests`) needs no HTTP/TLS stack; the live
# `post` closure the brain's `OpenAICompatCaller`/`LlmHttpCaller` seam takes is
# only supplied under this feature, its live call an `#[ignore]`d test. reqwest
# 0.12 is already resolved in the workspace lockfile, so this adds no new external
# crate — it just enables it for this crate. `blocking` keeps the brain a sync
# call; `json` does the body (de)serialization; `rustls-tls` is the self-contained
# TLS provider.
reqwest = { version = "0.12", optional = true, default-features = false, features = [
  "blocking",
  "json",
  "rustls-tls",
] }

# ── THE HANDS (deos-js), gated behind `js-agent` ──
# The confined agent's `run_js` tool runs deos-js (real SpiderMonkey via mozjs)
# bound to the agent's `held` authority. deos-js pulls the multi-GB mozjs
# SpiderMonkey C++ build, so it is OPTIONAL and OFF by default: the workspace
# default `cargo build`/`cargo test` stays mozjs-free (deos-hermes is a normal
# workspace member). The `run_js` path + its test run ONLY under
# `--features js-agent`. deos-js is its OWN workspace (in the repo-root
# `exclude`); cargo resolves it under THIS workspace's `[patch]` tables.
deos-js = { path = "../deos-js", optional = true }
# ── THE DISTRIBUTED HANDS (node-backed WorldSink), gated behind `node-brain` ──
# The client-side `NodeWorldSink` (Pillar 0) so a CONFINED brain's `run_js`
# commits verified turns to a REMOTE node over HTTP — reached ONLY through the
# jail's granted provider-egress door. Optional (pulls dregg-sdk-net's
# `world-sink`, which pulls deos-js); OFF by default.
dregg-sdk-net = { path = "../dregg-sdk-net", optional = true, default-features = false }
# The card-authoring tool (`create_card`/`edit_card`) attributes each authored
# view-line to the agent's `dregg_doc::Author` (the blame identity). Direct dep so
# the tool names the author type without reaching through deos-js's re-exports.
# Same `js-agent` gate (it only compiles with the card-authoring path).
dregg-doc = { path = "../dregg-doc", optional = true }

# ── the agent dock cockpit surface (gpui), gated behind `cockpit-surface` ──
# Same gpui fork rev as starbridge-v2 / deos-zed / gpui-component so the WHOLE
# graph resolves to ONE gpui — the `Entity`/`Window` types are byte-identical to
# the cockpit's, so the delivered `impl CockpitSurface` drops into starbridge-v2's
# dock with no second gpui linkage. OFF by default (the SDK-only build stays
# gpui-free; the heavy tree is only pulled with `--features cockpit-surface`).
gpui = { git = "https://github.com/emberian/zed", rev = "adb9026524", optional = true }
gpui_platform = { git = "https://github.com/emberian/zed", rev = "adb9026524", features = ["font-kit", "x11", "wayland", "runtime_shaders"], optional = true }
gpui-component = { git = "https://github.com/emberian/gpui-component", rev = "498321a4", default-features = false, optional = true }
gpui-component-assets = { git = "https://github.com/emberian/gpui-component", rev = "498321a4", optional = true }
# Offscreen-capture deps (the `screenshot` feature). `image 0.25` matches
# gpui_wgpu's `image` (one resolved version, same as starbridge-v2 / deos-zed).
image = { version = "0.25", default-features = false, features = ["png"], optional = true }
gpui_wgpu = { git = "https://github.com/emberian/zed", rev = "adb9026524", optional = true }
# `anyhow` unifies the offscreen-capture error path (font load / window open /
# screenshot / PNG write). Only pulled with the `screenshot` feature.
anyhow = { version = "1", optional = true }

[features]
default = []
# THE LIVE BYO-KEY BRAIN TRANSPORT. Supplies the real HTTP `post`/`complete`
# closure the brain's provider seam takes but the crate otherwise never fills
# live: `brain::live_openai_caller()` (an OpenAI-compatible `/v1/chat/completions`
# POST) and `brain::AnthropicMessagesCaller` (the Anthropic Messages API), plus
# `brain::live_brain_from_env()` which resolves a BYO key from the env chain
# (DREGG_LLM_API_KEY → ANTHROPIC_API_KEY → OPENAI_API_KEY → NVIDIA_API_KEY →
# ~/.nvidiakey) and wires the matching transport. OFF by default so the SDK-only
# build stays HTTP/TLS-free; the live call is an `#[ignore]`d test.
live-brain = ["dep:reqwest"]
# THE CROWN, run REAL-LOCALLY. The confined brain's turn attestation over a GENUINE
# local MPC-TLS 2PC roundtrip against an Anthropic-shaped test endpoint — reuses
# zkoracle-prove's `tlsn-live` (vendored TLSNotary + a real Notary + Prover +
# `presentation.verify()`). The heavy `mpz`/tokio/rustls 2PC backend rides ONLY this
# feature, so the crown's default modeled path stays HTTP/TLS-free. The live-Anthropic
# session (real key + deployed notary) is the operational remainder, NAMED not faked.
zk-live = ["dregg-zkoracle-prove/tlsn-live", "dep:tlsn", "dep:bincode"]
# THE HANDS — the confined agent's `run_js` tool. Pulls deos-js (real
# SpiderMonkey) so a Hermes agent can crawl + drive the cockpit as the
# operator's co-pilot, every fire a cap-gated verified turn under the agent's
# `held`. OFF by default (the mozjs elephant stays out of the default build).
js-agent = ["dep:deos-js", "dep:dregg-doc"]
# THE DISTRIBUTED HANDS — a confined brain drives a REMOTE node's World over a
# NodeWorldSink reached only through its granted egress door (Pillar 4,
# node-backed transport). Implies the run_js hands + the client sink.
node-brain = ["js-agent", "dep:dregg-sdk-net", "dregg-sdk-net/world-sink"]
# THE AGENT DOCK COCKPIT SURFACE — the gpui `CockpitSurface` that mounts the
# confined Hermes agent into starbridge-v2's moldable-inspector dock: a chat
# pane (streamed agent text), the tool-call ledger (each receipt / refusal), and
# the embedded mandate inspector. OFF by default so the SDK-only `cargo build` /
# `cargo test` stays gpui-free (mirrors deos-zed / deos-terminal).
cockpit-surface = ["dep:gpui", "dep:gpui_platform", "dep:gpui-component", "dep:gpui-component-assets"]
# OFFSCREEN SCREENSHOT capture for the dock surface — drive it to a painted frame
# in a headless gpui app over the offscreen wgpu renderer + a no-system-fonts
# text system, then write the RGBA out as a PNG (mirrors deos-zed's `screenshot`).
# Implies `cockpit-surface`.
screenshot = [
    "cockpit-surface",
    "dep:image",
    "dep:gpui_wgpu",
    "dep:anyhow",
    "gpui_wgpu/test-support",
    "gpui_platform/test-support",
]

# `libc` backs the confined-launch fd plumbing (the fcntl/open/socket/connect
# sandbox probes the stand-in agent runs INSIDE the PD, and the Endpoint-fd
# recovery). Already a transitive dep of the dregg + firmament crates (no new
# lockfile surface). Unix-only; on a non-Unix host `crate::confined` is cfg'd out.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Test-only: the multi-cell compose acceptance test (`hermes_composes_multi_cell`)
# derives the deterministic cell ids its `mintCard` legs stand up (`blake3` — the
# SAME derivation `deos_js::mint_id_of` / the node's `mint_open_cell` use) and renders
# cell ids as the hex strings `deos.compose` consumes. Both are already in the lockfile
# transitively (the dregg crates depend on them); dev-only, no shipped-crate surface.
[dev-dependencies]
blake3 = "1"
hex = "0.4"

# THE FUSION round-trip (`crown_attested_ledger`): the confined brain's zkOracle
# attestation is committed into a REAL R2 kernel turn that LANDS on a `LocalNode` and is
# light-client-verifiable. Drives the genuine `grain-turn` / agent-platform node minter
# (no cycle: agent-platform does not depend on deos-hermes). Test-only surface.
agent-platform = { path = "../agent-platform" }
grain-turn = { path = "../grain-turn" }
dregg-agent = { path = "../dregg-agent" }

# Pillar-4 full round-trip: the real-executor test node (dregg-sdk-net's
# `test-support`) + postcard/tokio to drive a NodeWorldSink-backed brain fire
# THROUGH node execution and read the receipt back. test-support ONLY here (it is
# mozjs-free — the TestNode is executor+HTTP, no deos-js); NodeWorldSink's
# `world-sink` rides the `node-brain` feature the round-trip test requires. So the
# default `cargo test` stays mozjs-free; the test module is `cfg(node-brain)`.
dregg-sdk-net = { path = "../dregg-sdk-net", features = ["test-support"] }
postcard = { version = "1", features = ["use-std"] }
tokio = { version = "1", features = ["full"] }
