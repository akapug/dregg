# deos-hermes is a STANDALONE workspace (excluded from the repo root), so it
# does NOT inherit the root `../rust-toolchain.toml`. It pins the ROLLING
# `nightly` channel — the SAME pin starbridge-v2 / deos-zed use, for the SAME
# reason: with the `cockpit-surface` feature this crate links gpui at the pinned
# zed rev, which uses `std::hint::cold_path` (an unstable library feature that
# stabilized in nightly between 2026-01-22 and 2026-02-14). The repo root's
# `nightly-2026-01-01` is just-too-old and fails to compile gpui's `profiler.rs`.
#
# The verified Lean executor `dregg-sdk` drags (libdregg_lean.a via
# `dregg-turn`/`dregg-cell`) compiles fine under rolling `nightly` — starbridge-v2
# embeds the SAME executor under exactly this toolchain. So one pin satisfies BOTH
# the always-on Lean-linked SDK build AND the optional gpui cockpit surface.
#
# This is a standalone workspace, so this pin affects only deos-hermes.
[toolchain]
channel = "nightly"
profile = "default"
components = ["cargo", "clippy", "rustc", "rustfmt"]
