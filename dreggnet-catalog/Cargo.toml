# `dreggnet-catalog` — THE one statement of what the DreggNet offering catalog IS.
#
# The registrar every frontend builds its `OfferingHost` from, replacing the four
# hand-maintained copies of the 19-offering registration list (web `catalog_default_host`
# + `register_non_game_offerings`, `telegram_default_host`, `wechat_default_host`, and
# Discord's bespoke per-type stores). See docs/BOT-SHARED-BACKEND-DESIGN.md.
#
# Sits at the TOP of the offering layer and BELOW every frontend: it depends on the
# offering crates (which all dep `dreggnet-offerings` for the trait), and nothing in it
# depends on a frontend — so `dreggnet-web`/`dreggnet-telegram`/`dreggnet-wechat`
# (root workspace) and `discord-bot` (standalone workspace, path-dep) can all consume it
# with no cycle.
#
# A root-workspace MEMBER (in `members`, not `default-members` — same placement as the
# frontends that consume it). Build/test:
#   cargo test -p dreggnet-catalog

[package]
name = "dreggnet-catalog"
version = "0.1.0"
edition = "2024"
description = "The shared DreggNet offering-catalog registrar: build_full_catalog(host, cfg) registers the ONE 19-offering portfolio (6 games, 8 RPG feature surfaces, 5 service offerings) every frontend (web, Telegram, WeChat, Discord) exposes, plus the single SeatedTug seat-claiming adapter — replacing four drifting per-frontend copies."

[dependencies]
# The Offering trait + OfferingHost — the frontend-agnostic core this crate populates.
dreggnet-offerings = { path = "../dreggnet-offerings" }

# The six portfolio games.
dreggnet-council = { path = "../dreggnet-council" }
dreggnet-market = { path = "../dreggnet-market" }
dregg-automatafl = { path = "../dregg-automatafl" }
# `dregg-multiway-tug` names its seats by fixed canonical strings; the ONE `seated::SeatedTug`
# adapter here (collapsing the web/telegram/wechat/discord byte-peers) claims seats for
# derived identities. The dungeon offering ships inside `dreggnet-offerings` itself.
dregg-multiway-tug = { path = "../dregg-multiway-tug" }

# The eight do-once RPG feature surfaces (trade · inventory · cheevos · guild · craft ·
# companion · tavern · party) — registered via the already-shared
# `dreggnet_surfaces::register_surfaces`, which mounts ONE SharedWorld across
# trade/inventory/craft (the composition Discord's per-type stores currently sever).
dreggnet-surfaces = { path = "../dreggnet-surfaces" }

# The five non-game service offerings.
dreggnet-doc = { path = "../dreggnet-doc" }
dreggnet-names = { path = "../dreggnet-names" }
dreggnet-compute = { path = "../dreggnet-compute" }
dreggnet-grain = { path = "../dreggnet-grain" }
dreggnet-hermes = { path = "../dreggnet-hermes" }

[lints]
workspace = true
