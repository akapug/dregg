# `dungeon-on-dregg` — a dungeon crawl hosted on the REAL dregg substrate.
#
# The Phase-A de-risk vertical slice of the collective-fiction rebuild
# (plan: ok-yeah-wanna-binary-tide.md). It proves — by DRIVING, not naming —
# that a dungeon move is a real cap-bounded turn on the real `EmbeddedExecutor`
# (a real `TurnReceipt`, not a blake3 LARP ledger), that an illegal move (walking
# a gated exit without the required item) is a REAL executor refusal
# (`WorldError::Refused`) that commits nothing, and that the dungeon's rules are
# executor-enforced `CellProgram` / `StateConstraint` teeth — NOT app bookkeeping.
#
# It CONSUMES the real foundation (`spween-dregg`'s `WorldCell`/`Driver`/`verify`
# + the scene->`CellProgram` compiler) and extends it by composition only. It does
# NOT touch `attested-dm/` (the LARP being replaced).
#
# A breadstuffs workspace member; builds via the warm default `target/`:
#   cargo test    -p dungeon-on-dregg
#   cargo run     -p dungeon-on-dregg --example descend
[package]
name = "dungeon-on-dregg"
version = "0.1.0"
edition = "2024"
description = "A 3-room dungeon (rooms/item/gated-exit) hosted on spween-dregg's real WorldCell: a move is a real cap-bounded TurnReceipt, an illegal move is a real executor refusal, the gate is an executor-enforced CellProgram StateConstraint. Phase-A de-risk slice."

[dependencies]
# THE FOUNDATION — the real cell/turn substrate for interactive fiction: the
# `WorldCell` binding (a move is ONE cap-bounded turn the real `EmbeddedExecutor`
# admits IFF the installed gate passes), the stock-runtime `Driver` (a playthrough
# is a real `TurnReceipt` chain), the scene->`CellProgram` compiler, and the
# replay verifier. We EXTEND this by composition; we never fork its src.
spween-dregg = { path = "../spween-dregg" }
# The narrative DSL spween-dregg is built on — needed to name a `Choice`/
# `PassageContent` when driving a move directly at the executor (`apply_choice`).
# Same git rev spween-dregg pins.
spween = { git = "https://github.com/emberian/spween", rev = "95980f7d1e109138496849a444f28c4b9076a4e2" }
# The real framework types — `CellProgram`, `StateConstraint`, `TransitionCase`,
# `TransitionGuard` (re-exports of the `dregg-cell`/`dregg-turn` types) — so the
# demo can INTROSPECT the installed program and print the actual `FieldGte` gate
# tooth: proof the rule is an executor-enforced kernel predicate, not app code.
dregg-app-framework = { path = "../app-framework", default-features = false }
# The cell crate, for the heap-atom vocabulary (`HeapAtom`) the richer KEEP world
# uses to constrain a heap-keyed inventory (a `StateConstraint::HeapField` tooth) —
# the piece of the constraint language app-framework does not re-export. Same
# `dregg-cell` spween-dregg already builds on; the `StateConstraint` type is the very
# same re-exported type, so an augmented case is byte-identical to a compiled one.
dregg-cell = { path = "../cell" }
# The zkOracle capstone (Phase B: the un-jailbreakable narrator). We CONSUME its
# real 3-leg attestation + verifier (`prove_zkoracle`/`verify_zkoracle`): the
# injection-free leg refuses a `{{`-bearing narration BEFORE it can bind into a
# turn, and its content commitment rides the real `TurnReceipt` via `EmitEvent`.
# The default authentic leg is a fixture notary — that provenance level is Phase E
# (Bedrock MPC-TLS), NOT this phase; our job is BINDING whatever attestation exists.
dregg-zkoracle-prove = { path = "../zkoracle-prove", default-features = false }
# THE COLLECTIVE (Phase C). The REAL quorum-certified voting engine: `WriteOnce`
# ballots + `Monotonic` tally + the polis `AffineLe` quorum gate, every ballot /
# tally / resolve a real cap-bounded turn on its own `EmbeddedExecutor`. We CONSUME
# it (open_poll/issue_ballot/cast/resolve) to let a crowd quorum-certify the winning
# `Command`, which then fires a REAL WorldCell turn on the game executor.
collective-choice = { path = "../collective-choice" }
# Seat CUSTODY identity: each seated voter is bound to a REAL ed25519 signing
# keypair (`dregg_types::SigningKey`/`PublicKey`/`Signature` — the SAME classical
# signature the executor authorizes turns with via `Authorization::Signature`).
# The seat's public key IS its electorate identity; it SIGNS its ballot, and the
# round verifies that signature before the ballot is admitted as a real turn.
dregg-types = { path = "../types" }
# The demo custody keyring derives each seat's real ed25519 SECRET seed
# deterministically from its name (`blake3::derive_key`) so the example/tests are
# reproducible; the public key is the genuine verifying key, and only the secret
# holder can produce an admissible ballot signature.
blake3 = "1"
# VERIFIABLE RANDOMNESS — the real `dregg-dice` draw stream. A combat blow's damage
# is a real `DrawStream::draw_die` over a `RandomnessRequest`/`EventId` that binds the
# turn context (pre-state, action, purpose, draw-count), and the draw's evidence rides
# the real `TurnReceipt` via an `EmitEvent` (mirroring the narration binding). Replay
# re-derives the SAME draw from the recorded request + evidence (the crate's pure
# `RandomnessSource::seed` verifier), so a forged roll is caught. Same `dregg-dice` the
# design's Phase-2 randomness slice ships. (Package name `dregg-dice`, path `../dice`.)
dregg-dice = { path = "../dice" }
# LOOT-AS-ASSETS (the `loot` module). The canonical VERIFIABLE ASSET layer: a Descent
# reward MINTS a real owned, transfer-gated, provenance-chained `dreggnet_asset` note
# (the player's key IS the owner; a non-owner transfer is a cryptographic refusal), so a
# chest/boss drop is a THING the player owns + can move, not a flat gold bump. Consumed,
# never modified.
dreggnet-asset = { path = "../dreggnet-asset" }
# The provably-fair DROP: procgen's committed-seed -> VERIFIED dregg-dice stream is the
# fairness anchor a loot rarity is drawn from (`verified_stream` + `CommittedSeed`), so a
# legendary is a re-derivable ~3% flex and a forged claim is caught. Consumed as the fair
# loot roll; never modified.
procgen-dregg = { path = "../procgen-dregg" }
# The real turn crate — for the `WitnessBlob`/`WitnessKind` carrier the MULTI-CELL
# module attaches to a gated turn (the Merkle-open witness of item-A's finalized
# state, referenced by the peer-cell `ObservedFieldEquals` at `proof_witness_index`).
# `dregg-app-framework` re-exports `Action`/`Turn` but NOT the witness-blob carrier,
# so the cross-cell driver reaches for it here. Same `dregg-turn` the framework and
# executor are built on.
dregg-turn = { path = "../turn" }
# THE MULTI-PLAYER SHARED-WORLD substrate (the `mud` module). `starbridge_v2::world::World`
# is the real MULTI-ACTOR ledger: each player is its OWN cell/identity, `World::turn(agent,
# effects)` builds a turn attributed to that player, and `commit_turn` admits it IFF the
# player holds a cap to every touched cell (an ungranted target is a real `CapabilityNotHeld`
# executor refusal) — one ledger, many actors. Its `branch_stitch_session::BranchStitchSession`
# forks the shared world into concurrent divergent player-timelines and STITCHES them under
# the settlement-sound gate: disjoint edits merge clean, and two players grabbing the ONE item
# is a real `#`-conflict withheld fail-closed. This is the exact substrate the `mud-dregg`
# multiplayer precedent rides; the single-driver `EmbeddedExecutor` (this crate's `multicell`
# sibling) is one serial writer and cannot host distinct concurrent player identities. Same
# `embedded-executor` core, gpui-free.
starbridge-v2 = { path = "../starbridge-v2", default-features = false, features = ["embedded-executor"] }
# THE VALIDATED ALLOCATOR (the `descent` module): the reimagined descent's 13-register +
# 8-relic-collection state is declared as a `dregg_schema::Schema` and lowered by
# `allocate_checked` (the RotatedLayout Legal discipline) — the name→slot binding the
# Lean-sourced program loader resolves against is a CHECKED object, not hand-authored.
dregg-schema = { path = "../dregg-schema" }
# Deserialize the Lean-EMITTED descent program artifact (`program/dungeon_program.json`,
# the checked-in cache of `metatheory/Dregg2/Games/DungeonProgram.lean::dungeonProgram`).
# The loader is the ONLY Rust-side work in the descent's rule path: symbolic names →
# allocator indices. Also used by the confined Bedrock brain on the live path.
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }

[features]
# The REAL attested brain path (Phase E→B): links `dregg-zkoracle-prove`'s heavy MPC-TLS
# backend so `BedrockBrain` can make a genuine live Bedrock call and
# `narrate_turn_bedrock_attested` can authenticate the narration's provenance with a REAL
# `presentation.verify()` under the hosted pinned notary. OFF by default — the offline
# scripted-brain tests + the confined-channel parser stay green and light without it. The
# live test (`tests/bedrock_brain_live.rs`) is `#[ignore]`d (real network + paid call).
tlsn-live = ["dregg-zkoracle-prove/tlsn-live"]

# A workspace MEMBER of the breadstuffs root (registered in `members`). The root
# `[workspace]` + `[patch]` tables apply; no standalone `[workspace]`/`[patch]`.

[lints]
workspace = true
