# `dreggnet-offerings` — the frontend-agnostic Offering/Session core of DreggNet Cloud.
#
# The dungeon we built is OFFERING #0 — the first instance of a general pattern
# (a confined, verifiable, paid, per-session thing on the real dregg substrate).
# This crate extracts that pattern out of `discord-bot/fiction.rs` into a reusable
# `Offering` trait + a `Frontend` abstraction, so Telegram/WeChat/web frontends and
# hosted-Hermes/grain offerings plug into ONE core. See
# `docs/DREGGNET-CLOUD-OFFERINGS.md` (the design).
#
# It is FRONTEND-AGNOSTIC: NO serenity/Discord dependency. The discord-bot becomes
# a thin `Frontend` impl (a follow-up); this crate is the core the bot consumes.
#
# A breadstuffs workspace member (registered in the root `members`, not
# `default-members` — a heavy narrative-adjacent crate). Build/test:
#   cargo test -p dreggnet-offerings
[package]
name = "dreggnet-offerings"
version = "0.1.0"
edition = "2024"
description = "The frontend-agnostic Offering/Session core of DreggNet Cloud: an Offering trait (open/actions/advance/verify/render/price) over the real dregg substrate, a DungeonOffering (offering #0) over spween-dregg's WorldCell, and a Frontend affordance-renderer abstraction (no Discord dep)."

[features]
default = []
# Opt-in proof-bearing raid assignment operation.  Ordinary clients keep the
# prover stack out of their build; hosts enabling this feature expose the same
# canonical receipt through the frontend-neutral binary-operation seam.
private-raid-operation = ["dungeon-on-dregg/private-raid-assignment"]
# Hiding four-ballot/four-option party preference, exposed through the same
# authenticated binary-operation seam as raids, shuffles, and private quests.
private-preference-operation = ["dungeon-on-dregg/private-preference"]
# Commit-before-reveal eight-seat fair deal with a real HidingFri proof and
# selective card openings, transported through the same generic operation seam.
private-fair-shuffle-operation = ["dungeon-on-dregg/private-fair-shuffle"]
# Opaque two-step semantic-graph quest receipts. The host verifies the
# Lean-authored Warden specialization and retains only roots + HidingFri proof.
private-quest-operation = ["dungeon-on-dregg/private-quest"]

[dependencies]
# THE SUBSTRATE — the real verifiable world-cell binding: `WorldCell` (a move is ONE
# cap-bounded turn the real `EmbeddedExecutor` admits IFF the installed gate passes),
# `Driver`, `Playthrough`/`StepReceipt`, and `verify_by_replay` (the replay verifier).
spween-dregg = { path = "../spween-dregg" }
# OFFERING #0's committed universe — "The Warden's Keep": `deploy_keep` / `keep_scene`
# (+ the `KP_*` choice constants the tests drive winning/illegal lines with).
dungeon-on-dregg = { path = "../dungeon-on-dregg" }
# The narrative DSL the substrate is built on — `Choice`/`PassageContent`/
# `ConditionExpr` (naming a choice + evaluating its scene condition to decorate a
# locked affordance). Same git rev spween-dregg / dungeon-on-dregg pin.
spween = { git = "https://github.com/emberian/spween", rev = "95980f7d1e109138496849a444f28c4b9076a4e2" }
# `TurnReceipt` — the real committed-turn receipt an `Outcome::Landed` carries.
# `default-features = false` drops the non-wasm `server` feature (we need only the
# executor/turn core), matching spween-dregg / dungeon-on-dregg.
dregg-app-framework = { path = "../app-framework", default-features = false }
# THE DEOS SURFACE — `tree::ViewNode`, the gpui-free serializable deos affordance
# view-tree an offering's `render` produces (a `Section`/`Menu`/`Button` of cap-gated
# affordances). `default-features = false` takes ONLY the always-compiled gpui-free
# view-tree model (no `native` → no gpui, no mozjs). This is the doc's mandate: an
# offering's Surface IS a deos ViewNode — do not reinvent `Surface`/`Action`.
deos-view = { path = "../deos-view", default-features = false }
# Deterministic frontend-agnostic identity derivation (the mock frontend maps a
# platform user id → a stable `DreggIdentity`); same crate the substrate hashes with.
blake3 = "1"
# THE PAYMASTER — the existing run-credit ledger (`CreditLedger` / `CreditStore` /
# `InMemoryStore` / `debit`). The session-key play path draws each move's `RunCost`
# from it via `session::CreditPaymaster`, so play is gasless from the player's view
# (a real ledger debit against pre-funded credits). This is the same ledger the bot
# mints run-credits into from observed `$DREGG`/USDC payments — consumed, not rebuilt.
dregg-pay = { path = "../dregg-pay" }
# THE DAILY BEACON WIRE + the daily seed: `beacon::DailyBeacon` (a verified drand round →
# today's committed seed, unpredictable-until-revealed) and `CommittedSeed`/`daily_seed`
# the daily-descent generator draws the day's world from. Re-exports `dregg_dice` for the
# hash-chain test beacon.
procgen-dregg = { path = "../procgen-dregg" }
# THE FEDERATION SETTLE SEAM — `NodeTarget::{Local, Federation}` + `SubmittedTurn`/`Landed`: the
# opt-in anchor of a WON run's 32-byte commitment onto the deployed node chain (the EmitEvent-of-
# commitment submit), via the SAME seam spween-dregg / mud-dregg route turns through. PLAY stays
# `Local` (private/fast, no node submit); the daily-descent SETTLE is the opt-in Federation anchor.
dregg-node-target = { path = "../node-target" }
# THE NO-CHEAT LEADERBOARD substrate: `Universe`/`Registry`/`Completion`/`verify_completion`
# — a ranked completion provably reaches the win (re-executed against a fresh identically-
# seeded world), a forged/incomplete run refused. The daily descent publishes its day's world
# here and ranks verified runs. (ugc-dregg does NOT depend on this crate — acyclic.)
ugc-dregg = { path = "../ugc-dregg" }
# THE WEEKLY DESCENT TOURNAMENT (the `descent_tournament` hook). The no-cheat verifiable
# bracket: each round runs on a fresh beacon-seeded universe and a competitor advances only
# on a verified win (ugc-dregg's `verify_completion`). The hook wires The Descent's daily
# world in as each round's universe + a Descent win as a competitor's submission. Consumed,
# never modified.
dreggnet-tournament = { path = "../dreggnet-tournament" }
# THE SIGNING PRIMITIVE — `SigningKey`/`PublicKey`/`Signature` + `sign`/`verify` (Ed25519,
# `verify_strict`). The SAME primitive the SDK's `AgentCipherclerk` and the adapters'
# custodial cipherclerks are built on (`SigningKey::from_bytes` = the cipherclerk's
# `from_key_bytes` derivation), so a `signed::SignedAction` verifies against exactly the
# public-key-hex identity the discord/telegram/wechat frontends already attribute moves to.
# Already in this crate's build graph via dungeon-on-dregg's seat-custody keyring.
dregg-types = { path = "../types" }

[dev-dependencies]
# Dev-only: decode the real published drand `quicknet` round vector the daily-descent
# driven test seeds "today's dungeon" from (genuine drand interop for the beacon leg).
hex = "0.4"

# A workspace MEMBER of the breadstuffs root (registered in `members`, not
# `default-members`). The root `[workspace]` + `[patch]` tables apply; no standalone
# `[workspace]`/`[patch]` here.

[lints]
workspace = true
