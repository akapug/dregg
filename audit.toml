# cargo-audit / rustsec advisory policy for the dregg workspace.
#
# Read by `cargo audit` (and therefore by the `rustsec/audit-check@v2` CI job).
# Each ignored advisory below is an ASSESSED, currently-unactionable transitive
# advisory: the vulnerable crate is pulled in by a third-party dependency whose
# upstream has not yet released a graph-compatible patched version, and the
# advisory is not reachable in the way our usage exercises the crate. None is a
# blanket suppression — every entry carries the chain + the reason, and the
# entry is removed the moment the upstream bump lands (bump the dep, drop the
# line). First-party code introduces no advisories; the seam is entirely the
# Arkworks ZK stack, the Serenity Discord client, and the (excluded) pg-dregg
# Postgres path captured in the shared lockfile.

[advisories]
ignore = [
    # ── Arkworks ZK stack (ark-relations → ark-crypto-primitives / ark-poly-
    #    commit → dregg-hints) pins the pre-0.3 tracing-subscriber. ────────────
    # RUSTSEC-2025-0055 — tracing-subscriber 0.2.25: ANSI-escape sequences in a
    # logged value can be injected into terminal output. Reachable only if
    # UNTRUSTED data is formatted through ark-relations' `tracing` spans; the
    # dregg crates feed ark-relations only their own constraint-system metadata,
    # never attacker-controlled strings. Patched in >=0.3.20, which Arkworks
    # 0.5.x does not yet depend on. Remove when ark-relations bumps.
    "RUSTSEC-2025-0055",

    # ── Serenity 0.12.5 (Discord bot) → tokio-tungstenite 0.21 → rustls 0.22 →
    #    rustls-webpki 0.102.8. The discord-bot connects only to Discord's own
    #    TLS endpoint (a trusted, pinned-CA server), so the webpki cert-path
    #    advisories below — all DoS / path-building on ATTACKER-supplied cert
    #    chains — are not reachable: there is no untrusted-server leg. Patched in
    #    rustls-webpki >=0.103.x, which Serenity 0.12.x does not yet pull. Remove
    #    when serenity bumps its rustls. ────────────────────────────────────────
    "RUSTSEC-2026-0104",  # rustls-webpki: DoS via crafted certificate chain
    "RUSTSEC-2026-0099",  # rustls-webpki: cert path-building advisory
    "RUSTSEC-2026-0098",  # rustls-webpki: cert path-building advisory
    "RUSTSEC-2026-0049",  # rustls-webpki: name-constraint check (priv-esc class)

    # ── pg-dregg's Postgres client path, captured in the shared lockfile. ──────
    # pg-dregg is EXCLUDED from the workspace (root Cargo.toml `exclude`), so
    # these crates are LOCKED but NOT built by the audited workspace graph
    # (`cargo tree -i` finds no active reverse path). All three advisories below
    # require a connection to an UNTRUSTED or MITM Postgres server; pg-dregg
    # connects only to its own managed, trusted local Postgres. Patched in
    # postgres-protocol >=0.6.12 / tokio-postgres >=0.7.18, which the locked
    # transitive graph does not yet permit. Remove on the next lock refresh that
    # pulls the patched line.
    "RUSTSEC-2026-0179",  # postgres-protocol: unbounded SCRAM iteration DoS
    "RUSTSEC-2026-0180",  # postgres-protocol: SCRAM/auth DoS (companion)
    "RUSTSEC-2026-0178",  # tokio-postgres: DoS (companion to the above)

    # ── rsa 0.9.10 — RUSTSEC-2023-0071 (Marvin timing side-channel in PKCS#1
    #    decryption). NO patched release exists upstream (`patched: []`), so it
    #    cannot be bumped away. rsa is lockfile-only here (no active reverse
    #    path) and the dregg crypto floor uses ed25519 / Pedersen / AEAD, not
    #    RSA decryption, so the timing oracle is not exercised. Tracked upstream;
    #    remove when rsa ships a constant-time fix.
    "RUSTSEC-2023-0071",

    # ── ml-dsa — RUSTSEC-2025-0144 (timing side-channel in ML-DSA decomposition).
    #    ml-dsa is the post-quantum (Dilithium) signature crate. It is LOCKFILE-
    #    ONLY here — `cargo tree -i ml-dsa` finds NO active reverse path in the
    #    audited workspace graph, and no first-party dregg code references it
    #    (grep-clean). The deployed crypto floor signs with ed25519 / Pedersen and
    #    commits with Poseidon2 — never ml-dsa's decomposition — so the timing
    #    oracle is not exercised. A patched >=0.1.0-rc.3 exists but the locked
    #    transitive graph does not yet pull it; remove on the next lock refresh
    #    that does.
    "RUSTSEC-2025-0144",

    # ── quick-xml — RUSTSEC-2026-0194 / -0195 (quadratic start-tag duplicate-
    #    attribute check / unbounded namespace-declaration allocation; both are
    #    memory/CPU DoS on MALFORMED XML). quick-xml is transitive via the
    #    desktop/GUI stack ONLY — wayland-scanner, xcb, zbus_xml (X11/Wayland
    #    protocol descriptions + dbus introspection). Those parse TRUSTED, fixed
    #    system-protocol XML, never attacker-controlled documents, so the DoS is
    #    not reachable. No first-party dregg code parses XML (grep-clean).
    #    BUMP PATH EXHAUSTED (verified 2026-07-16, not assumed): the fix is >=0.41.0;
    #    `cargo update -p wayland-scanner|xcb` move 0 packages (their ranges pin <0.41),
    #    and bumping zbus_xml made it WORSE — it pulled a THIRD vulnerable quick-xml
    #    (0.36.2) alongside 0.30.0/0.39.4. Unlike hickory (our own direct dep, so we
    #    bumped it and dropped its entries), these parents are third-party and pin the
    #    old range. Remove when wayland/xcb/zbus ship a >=0.41 dep.
    "RUSTSEC-2026-0194",  # quick-xml: quadratic start-tag dup-attribute check
    "RUSTSEC-2026-0195",  # quick-xml: unbounded namespace-declaration allocation

    # ── the alloy EVM stack (chain/ Ethereum settlement) — both lockfile-
    #    transitive and NOT exercised by first-party code (grep-clean: no
    #    `reciprocal_mg10` / `TypedData`-hash call site anywhere in dregg).
    #    BUMP PATH EXHAUSTED (verified 2026-07-16): chain/Cargo.toml pins `alloy = "1"`,
    #    but `cargo update -p alloy` / `-p alloy-contract` fail version selection on
    #    `reqwest`, and `-p alloy-core|alloy-primitives|nybbles` move 0 packages — the
    #    alloy 1.x line we can resolve pins alloy-dyn-abi 1.3.0 / ruint 1.16.0 below the
    #    fixed versions. Remove when the alloy stack ships them (or when the reqwest
    #    conflict clears and `alloy` can move to a line carrying >=1.4.1 / >=1.17.1).
    # RUSTSEC-2025-0137 — ruint (via alloy-primitives / nybbles): unsoundness of
    #    safe `reciprocal_mg10`. dregg never calls it; the alloy uint path we use
    #    encodes our OWN settlement values, not that op. Patched >=1.17.1, which
    #    alloy-primitives does not yet pin.
    "RUSTSEC-2025-0137",
    # RUSTSEC-2025-0073 — alloy-dyn-abi (via alloy-core / alloy-contract): DoS on
    #    `TypedData` (EIP-712) hashing of adversarial input. dregg hashes no
    #    untrusted TypedData; the settlement path encodes its own fixed statement.
    #    Patched >=1.4.1, which the locked alloy line does not yet pull.
    "RUSTSEC-2025-0073",

    # NOTE (2026-07-16): the two hickory-proto DNS advisories (2026-0118 NSEC3 unbounded loop,
    # 2026-0119 name-compression DoS) are deliberately NOT listed here. They are FIXED, not
    # suppressed: starbridge-domains was bumped to hickory-resolver 0.26, resolving
    # hickory-{proto,net} 0.26.1. cargo-audit reported "no fixed upgrade is available" for the
    # NSEC3 one — a TOOLING ARTIFACT: the 0.26 release SPLIT the crate, moving the dnssec code
    # out of hickory-proto into the new hickory-net, so proto has no patch while the fix ships
    # in a crate that did not exist at 0.25. Check upstream before ever suppressing.
    #
    # ⚠ Their ids are written WITHOUT the `RUSTSEC-` prefix above on purpose: ci.yml builds the
    # --ignore list with `grep -oE 'RUSTSEC-[0-9]{4}-[0-9]{4}' audit.toml`, which scans the WHOLE
    # file — so an id merely MENTIONED in a comment silently becomes a suppression. Documenting a
    # FIXED advisory here in full form would re-suppress it. (Root cause: cargo-audit only auto-
    # reads `.cargo/audit.toml`, not this root file, hence the grep. Moving this file to
    # `.cargo/audit.toml` would let `cargo audit` read the [advisories].ignore array natively and
    # retire the footgun.)
]

# Informational advisories (unmaintained / yanked / unsound) are surfaced as
# warnings, not hard failures, and are all transitive (atomic-polyfill, bincode,
# derivative, instant, number_prefix, paste, proc-macro-error2, rustls-pemfile,
# aes — each from a third-party dep). They do not fail the lane; we leave them
# visible as a standing nudge to upgrade as upstreams move, rather than
# suppressing the signal.
