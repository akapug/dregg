[package]
name = "dregg-turn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Call-forest transaction model for atomic agent execution turns"

[dependencies]
dregg-captp = { path = "../captp" }
dregg-cell = { path = "../cell" }
dregg-circuit = { path = "../circuit" }
dregg-commit = { path = "../commit" }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }
dregg-token = { path = "../token" }
dregg-types = { path = "../types" }
blake3 = "1"
chacha20poly1305 = { workspace = true }
curve25519-dalek = { version = "4", features = ["alloc"] }
tracing = { workspace = true }
ed25519-dalek = { version = "2", features = ["hazmat"] }
getrandom = { workspace = true }
hex = "0.4"
postcard = { version = "1", features = ["alloc"] }
serde = { workspace = true }
serde_json = { workspace = true }
x25519-dalek = { workspace = true }
# Threshold-signature verifier backend (the governed-namespace `GOVERNANCE_VK`
# `Authorization::Custom` discharge). `hints` is the BLS12-381 + KZG weighted
# threshold-signature crate `dregg-federation`'s `FederationCommittee` /
# `ThresholdQC` already wrap — we link it DIRECTLY here (federation depends on
# turn, so turn must not depend on federation; this is the same "weld from the
# leaf primitive, not the wrapper" move `BridgePredicateStarkVerifier` makes
# vs. `dregg-bridge`). Gated behind the default `threshold-sig` feature so the
# wasm/zkvm `no-lean-link` path does not pull arkworks.
hints = { path = "../hints", package = "dregg-hints", optional = true }
ark-serialize = { version = "0.5.0", optional = true }
ark-ff = { version = "0.5.0", optional = true }
# UNCONDITIONAL (polarity-inverted, docs/FEATURE-HYGIENE.md §Lean): the Lean shadow/gate
# executor path (`lean_shadow.rs` + `lean_apply`) is compiled into every native build. The
# ONE opt-out is the `no-lean-link` platform feature (wasm32/zkvm — targets that cannot
# link libdregg_lean.a).
dregg-lean-ffi = { path = "../dregg-lean-ffi" }

[features]
# `prover` is in the DEFAULT set: native builds compile the ROTATED sovereign
# verify leg (`executor::verify_and_commit_proof_rotated` →
# `dregg-circuit::descriptor_ir2::verify_vm_descriptor2`, the cutover's target
# path). The `not(prover)` build keeps the legacy hand-AIR sovereign verify
# (`verify_and_commit_proof_v1`) — that is the wasm / no-lean-link VERIFIER path
# (it passes `default-features = false`) until the prover-free rotated verify
# surface lands (cutover C2, ROTATION-CUTOVER §EXEC). The feature forwards to
# `dregg-circuit/prover` so `descriptor_ir2` is present when the branch is.
default = ["prover", "threshold-sig"]
prover = ["dregg-circuit/prover", "dregg-cell/prover"]
# Real BLS12-381 + KZG weighted-threshold-signature verifier for
# `Authorization::Custom { vk_hash }` discharges (the governed-namespace
# `commit_table_update` `GOVERNANCE_VK` fire). ON in the default set; the
# `no-lean-link` wasm/zkvm path leaves it off so arkworks is not pulled.
threshold-sig = ["dep:hints", "dep:ark-serialize", "dep:ark-ff"]
# PLATFORM gate, OFF by default: only wasm32/zkvm builds set it. It compiles the Rust-only
# execution path IN PLACE OF the Lean shadow/gate executor — a statement about the target's
# linker, never about which guarantees this dregg has.
no-lean-link = ["dregg-lean-ffi/no-lean-link", "dregg-captp/no-lean-link"]
# Compile-gate for the GENUINE denotational state-producer differentials (the
# `lean_state_producer_*` integration tests). They drive a real turn through BOTH the verified
# Lean FFI executor (reconstituting its FULL produced post-state) and the legacy Rust executor,
# and assert the two ledgers AGREE on balances / nonces / the 8 state fields AND `.root()` — the
# canonical Lean↔Rust EVAL-agreement check (not a commit-bit or serialization round-trip). The
# tests need the linked Lean archive (the default, non-`no-lean-link` build); they self-skip at
# runtime when `lean_available()` is false. This marker feature only flips their `#![cfg(...)]` on
# so they compile and run under `cargo test --features lean-shadow`.
lean-shadow = []

[dev-dependencies]
proptest = { workspace = true }
sha2 = "0.10"
# Deterministic test RNG for the threshold-sig verifier's `hints` committee
# fixtures (`build_committee`). Test-scoped; the verifier itself needs no RNG.
ark-std = "0.5.0"
# Arm the `StubVerifier` accept path for plumbing tests only. The feature is
# fail-closed in production builds; enabling it here scopes the permissive stub
# behavior to `cargo test`/dev builds of this crate.
dregg-cell = { path = "../cell", features = ["test-stubs"] }

[lints]
workspace = true
