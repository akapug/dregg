[package]
name = "dregg-teasting"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.0"
description = "Integration test simulation suite for dregg — end-to-end flows across federation boundaries"

[dependencies]
dregg-types = { path = "../types" }
dregg-cell = { path = "../cell" }
dregg-turn = { path = "../turn" }
dregg-circuit = { path = "../circuit" }
dregg-dsl-runtime = { path = "../dregg-dsl-runtime" }
dregg-federation = { path = "../federation" }
dregg-sdk = { path = "../sdk" }
dregg-bridge = { path = "../bridge", features = ["test-utils"] }
dregg-verifier = { path = "../verifier" }
dregg-wire = { path = "../wire" }
dregg-blocklace = { path = "../blocklace" }
# dregg-node is a binary crate (no lib target); use its deps directly instead.
# dregg-node = { path = "../node" }
dregg-commit = { path = "../commit" }
dregg-net = { path = "../net" }
dregg-intent = { path = "../intent" }
dregg-coord = { path = "../coord" }
dregg-captp = { path = "../captp" }
dregg-token = { path = "../token" }
dregg-persist = { path = "../persist" }
dregg-storage = { path = "../storage" }
# Starbridge userspace apps — for cross-app composition integration tests.
dregg-app-framework = { path = "../app-framework" }
starbridge-identity = { path = "../starbridge-apps/identity" }
starbridge-subscription = { path = "../starbridge-apps/subscription" }
starbridge-nameservice = { path = "../starbridge-apps/nameservice" }
starbridge-governed-namespace = { path = "../starbridge-apps/governed-namespace" }
starbridge-compartment-workflow-mandate = { path = "../starbridge-apps/compartment-workflow-mandate" }
starbridge-storage-gateway-mandate = { path = "../starbridge-apps/storage-gateway-mandate" }
dregg-dfa = { path = "../dfa" }
dregg-macaroon = { workspace = true, features = ["crypto"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
blake3 = "1"
ed25519-dalek = { version = "2", features = ["std", "hazmat"] }
sha2 = { workspace = true }
hex = "0.4"
getrandom = { workspace = true }
postcard = { version = "1", features = ["use-std"] }
serde = { workspace = true }
curve25519-dalek = { version = "4", features = ["alloc"] }

[features]
# `recursion` is in the DEFAULT set (matching `dregg-circuit`/`dregg-sdk`/`dregg-turn`/`dregg-verifier`,
# all of which default to it) and forwards to `dregg-circuit/recursion`, so this crate's own
# `#[cfg(feature = "recursion")]` gates ALIGN with the circuit's recursion state. Without this
# forward, a bare `cfg(feature = "recursion")` here is ALWAYS false (the crate has no such feature)
# while `dregg-circuit/recursion` is unified ON by the sdk/turn deps — so the v1-hand-AIR test
# modules (gated `not(recursion)` — silver_vision_graph_e2e + silver_vision_multi_fed_graph_e2e)
# would never compile out yet `EffectVmAir` would be absent. Under `recursion` (default) they
# compile out and the rotated stack is the live one. Mirrors the `tests/` crate's feature forward.
default = ["recursion"]
recursion = ["dregg-circuit/recursion"]

[lints]
workspace = true
