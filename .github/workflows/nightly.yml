name: Nightly Features

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  plonky3:
    name: Test (plonky3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p dregg-circuit --features plonky3

  # NOTE: The `mina` feature now uses git deps and can be built in CI.
  # Uncomment if a mina CI job is needed in the future.
