name: Run demos and publish results

# Produces site/demos/results.json as an artifact for pages.yml to consume.
# This workflow no longer deploys to GitHub Pages directly — pages.yml owns
# the single deploy path, triggered on completion of this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demos
  cancel-in-progress: false

jobs:
  run-demos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-01-01

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build demo crates
        run: cargo build --release -p dregg-demo -p dregg-demo-agent

      - name: Run main demo binary
        id: main_demo
        run: |
          START=$(date +%s%3N)
          set +e
          cargo run --release -p dregg-demo 2>&1 | tee /tmp/demo_main.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          END=$(date +%s%3N)
          DURATION=$((END - START))
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Run all demo-agent examples
        id: examples
        run: |
          EXAMPLES=(
            multi_org_delegation
            sub_agent_spawn
            private_orderbook
            payment_channel
            rbac_datalog
            token_revocation
            federation_bootstrap
            offline_verification
            progressive_disclosure
            note_privacy
            programmable_cell
            wallet_lifecycle
            web_auth_flow
            multi_silo_budget
            causal_ordering
            nft_demo
            escrow_demo
            auction_demo
            atomic_swap_demo
          )

          mkdir -p /tmp/demo_results

          # Track whether ANY example returned non-zero. The `set +e` below keeps the loop going so
          # every demo's result lands in the report (that is the report's whole value), but a demo
          # that panics is a FAILURE, not a data point — this flag is what makes the lane able to go
          # red at all. It is checked in the final step, after the report is written and uploaded.
          FAILED_EXAMPLES=""

          for example in "${EXAMPLES[@]}"; do
            echo "::group::Running $example"
            START=$(date +%s%3N)
            set +e
            cargo run --release -p dregg-demo-agent --example "$example" 2>&1 | tee "/tmp/demo_${example}.txt"
            EXIT_CODE=${PIPESTATUS[0]}
            set -e
            END=$(date +%s%3N)
            DURATION=$((END - START))

            # Write individual result JSON
            OUTPUT=$(cat "/tmp/demo_${example}.txt" | jq -Rs .)
            cat > "/tmp/demo_results/${example}.json" <<ENDJSON
          {
            "name": "${example}",
            "output": ${OUTPUT},
            "exit_code": ${EXIT_CODE},
            "duration_ms": ${DURATION}
          }
          ENDJSON
            echo "::endgroup::"

            if [ $EXIT_CODE -ne 0 ]; then
              echo "::warning::Example $example exited with code $EXIT_CODE"
              FAILED_EXAMPLES="${FAILED_EXAMPLES} ${example}(${EXIT_CODE})"
            fi
          done

          # Surface the tally for the final gate step. Trimmed of the leading space.
          echo "failed_examples=${FAILED_EXAMPLES# }" >> "$GITHUB_OUTPUT"

          # Also add main demo result
          MAIN_OUTPUT=$(cat /tmp/demo_main.txt | jq -Rs .)
          cat > "/tmp/demo_results/_main.json" <<ENDJSON
          {
            "name": "dregg-demo (main binary)",
            "output": ${MAIN_OUTPUT},
            "exit_code": ${{ steps.main_demo.outputs.exit_code }},
            "duration_ms": ${{ steps.main_demo.outputs.duration }}
          }
          ENDJSON

      - name: Assemble results.json
        run: |
          COMMIT_SHA="${{ github.sha }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # The output dir is not tracked in the repo (results.json is a built
          # artifact, never committed), so create it before writing into it.
          mkdir -p site/demos

          # Combine all individual results into one array (use find to avoid ARG_MAX)
          find /tmp/demo_results -name '*.json' -print0 | xargs -0 cat | jq -s '.' > /tmp/all_results.json

          # Build final document
          jq -n \
            --arg sha "$COMMIT_SHA" \
            --arg ts "$TIMESTAMP" \
            --slurpfile results /tmp/all_results.json \
            '{
              "commit": $sha,
              "timestamp": $ts,
              "results": $results[0]
            }' > site/demos/results.json

      - name: Upload demo results artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-results
          path: site/demos/results.json
          retention-days: 30

      # THE GATE THIS LANE NEVER HAD. Everything above uses `set +e` and captures each demo's exit
      # code into the report as DATA — nothing ever compared it to zero, so every demo could panic
      # on every push and this lane stayed green, reporting the panics as content. The report is the
      # valuable part and is fully written and uploaded above; this step only decides pass/fail from
      # the exit codes already captured. It runs LAST and with `always()` so the report ships even
      # when a demo failed — the failure is surfaced, not swallowed.
      - name: Fail if any demo exited non-zero
        if: always()
        env:
          MAIN_EXIT: ${{ steps.main_demo.outputs.exit_code }}
          FAILED_EXAMPLES: ${{ steps.examples.outputs.failed_examples }}
        run: |
          rc=0
          if [ "${MAIN_EXIT:-0}" != "0" ]; then
            echo "::error::dregg-demo (main binary) exited with code ${MAIN_EXIT}"
            rc=1
          fi
          if [ -n "${FAILED_EXAMPLES}" ]; then
            echo "::error::demo-agent examples failed (name(exit_code)):${FAILED_EXAMPLES:+ }${FAILED_EXAMPLES}"
            rc=1
          fi
          if [ "$rc" -eq 0 ]; then
            echo "All demos exited 0."
          fi
          exit "$rc"
