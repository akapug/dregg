name: "Federation Node 2"

on:
  schedule:
    # Staggered: 1:40, 6:40, 11:40, 16:40, 21:40
    - cron: '40 1,6,11,16,21 * * *'
  workflow_dispatch:

concurrency:
  group: federation-node-2
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  NODE_ID: "2"
  STATE_DIR: /tmp/dregg-state
  GATEWAY_PEER: "dregg.commonquant.com:9420"

permissions:
  contents: write
  actions: read

jobs:
  run-node:
    name: "Node 2 — Federation"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load state from federation-state branch
        run: |
          git fetch origin federation-state || true
          mkdir -p "$STATE_DIR"
          if git show origin/federation-state:nodes/node-2.json > "$STATE_DIR/state.json" 2>/dev/null; then
            echo "Loaded previous state from federation-state branch"
          else
            echo "{}" > "$STATE_DIR/state.json"
            echo "No previous state, starting fresh"
          fi

      - name: Load discovery from federation-state branch
        run: |
          mkdir -p /tmp/discovery
          if git show origin/federation-state:discovery.json > /tmp/discovery/discovery.json 2>/dev/null; then
            echo "Loaded discovery file"
          else
            echo '{"federation":[],"intent_service":null}' > /tmp/discovery/discovery.json
            echo "No discovery file found, using empty"
          fi

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build dregg-node
        run: cargo build --release -p dregg-node

      - name: Load node identity
        # The key rides an env var, NOT a `run:` interpolation. `${{ secrets.X }}` is
        # substituted into the script TEXT at render time, so the raw node identity key would
        # sit in the shell source — visible to `set -x`, to `ps`, and to a crash dump. Log
        # masking is a backstop, not a boundary. (The `Run federation node` step below already
        # does it this way; this step was the odd one out.)
        env:
          NODE_KEY: ${{ secrets.DREGG_NODE_2_KEY }}
        run: |
          mkdir -p "$STATE_DIR"
          printf '%s' "$NODE_KEY" | xxd -r -p > "$STATE_DIR/node.key"
          echo "Node 2 identity loaded"

      - name: Resolve peers
        id: peers
        run: |
          PEERS=""
          if [ -f /tmp/discovery/discovery.json ]; then
            PEERS=$(jq -r '.federation[] | select(.role != "node-2") | .addr' /tmp/discovery/discovery.json 2>/dev/null | paste -sd, -)
          fi
          echo "peer_list=$PEERS" >> "$GITHUB_OUTPUT"
          echo "Resolved peers: $PEERS"

      - name: Run federation node
        env:
          DREGG_ROOT_KEY: ${{ secrets.DREGG_ROOT_KEY }}
          DREGG_NODE_KEY: ${{ secrets.DREGG_NODE_2_KEY }}
          RUST_LOG: info
        run: |
          # Start the node in background
          ./target/release/dregg-node run \
            --data-dir "$STATE_DIR" \
            --port 8420 \
            --federation-peers "$GATEWAY_PEER,${{ steps.peers.outputs.peer_list }}" &
          NODE_PID=$!

          echo "Node started with PID $NODE_PID"

          # Periodic state snapshots every 5 minutes
          ELAPSED=0
          INTERVAL=300
          MAX_RUNTIME=20700  # 5h45m in seconds

          while [ $ELAPSED -lt $MAX_RUNTIME ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # Check if node is still running
            if ! kill -0 $NODE_PID 2>/dev/null; then
              echo "Node process exited unexpectedly at ${ELAPSED}s"
              break
            fi

            # Signal the node to snapshot (USR1)
            kill -USR1 $NODE_PID 2>/dev/null || true
            echo "Snapshot triggered at ${ELAPSED}s ($(date -u +%H:%M:%S))"
          done

          # Graceful shutdown
          echo "Sending SIGTERM for graceful shutdown..."
          kill -TERM $NODE_PID 2>/dev/null || true
          wait $NODE_PID 2>/dev/null || true
          echo "Node shutdown complete"

      - name: Publish state to federation-state branch
        if: always()
        run: |
          git fetch origin federation-state || true
          git worktree add /tmp/fed-state federation-state 2>/dev/null || {
            git worktree add --detach /tmp/fed-state
            cd /tmp/fed-state
            git checkout --orphan federation-state
            git rm -rf . 2>/dev/null || true
            mkdir -p nodes
            echo '{}' > nodes/.gitkeep
            git add .
            git commit -m "Initialize federation-state branch"
          }
          cd /tmp/fed-state
          mkdir -p nodes
          cp "$STATE_DIR/state.json" nodes/node-2.json 2>/dev/null || echo '{}' > nodes/node-2.json
          git add nodes/node-2.json
          git diff --cached --quiet || {
            git config user.name "dregg-federation[bot]"
            git config user.email "federation@dregg.fg-goose.online"
            git commit -m "node-2 state update [skip ci]"
            git push origin federation-state
          }

      # NOT AN ALARM, and kept anyway: fires identically on success and failure, notifies the
      # discovery bot not a human, and `continue-on-error` means it cannot fail. Discovery may
      # depend on it — leave it. The alarm is the `page-on-red` job below.
      - name: Notify discovery service
        if: always()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: node-state-updated
          client-payload: '{"node": "2", "role": "node-2"}'
        continue-on-error: true

  # See federation-node-1.yml's page-on-red for the full rationale. ONE shared issue for nodes
  # 1/2/3 (same TITLE); the node number is in the comment body. This lane is schedule-only, so a
  # red here is on no checkmark anyone reads.
  page-on-red:
    name: Page a human when node 2 is red
    needs: [run-node]
    if: ${{ always() && needs.run-node.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or refresh the standing federation-red issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='federation: a scheduled node lane is RED'
          {
            printf '%s\n\n' "**Federation Node 2** failed on its schedule: ${RUN_URL}"
            printf '%s\n' 'One issue covers nodes 1/2/3 — check the comment thread for whether the siblings are'
            printf '%s\n\n' 'red too, which distinguishes a shared cause from a single-node fault.'
            printf '%s\n' 'Likely shapes, cheapest first: a `cargo build --release -p dregg-node` break (shared);'
            printf '%s\n' 'the node process exiting early (`Node process exited unexpectedly at <n>s`); an'
            printf '%s\n\n' 'unreachable gateway peer; or the `federation-state` branch push failing.'
            printf '%s\n' 'The `Notify discovery service` step is not an alarm (`always()` + `continue-on-error`,'
            printf '%s\n' 'notifies a bot). This issue is the human-facing signal, newly wired.'
          } > /tmp/body.md
          EXISTING="$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --body-file /tmp/body.md
            echo "refreshed existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body-file /tmp/body.md
          fi
