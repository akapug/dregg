# armed-teeth.yml — RUN the adversarial tests that were written, correct, and never executed.
#
# THE HOLE THIS CLOSES. `#[ignore]` in this tree does not mean "broken" — it means "a real
# recursion fold that takes minutes". But nothing ran the ignored set: `ci.yml` runs
# `cargo test --workspace` (which by definition never runs ignored tests) and no script passed
# `--ignored`. So all 8 `circuit-prove/tests/*_binding_deployed_tooth.rs` files — the DEPLOYED
# light-client binding teeth, each of which builds a SPECIFIC forged witness (a claim no leg's
# published teeth back) and requires the deployed recursion fold to refuse it — provided ZERO
# assurance. They were documentation that compiled.
#
# "Expensive" must mean "runs nightly", never "runs never". That is all this workflow is.
#
# WHY A SEPARATE WORKFLOW rather than a step in ci.yml: these are minute-scale folds. Putting them
# on the per-push gate would make every push wait on them, and the first slow week would end with
# someone deleting the step. A schedule is the honest home for a lane whose cost is real.
#
# WHAT IS NOT HERE (named, not hidden):
#
#   * THE GPU TEETH. They now fail CLOSED on a missing adapter (they assert `adapter_available()`)
#     and are `#[ignore]`d, so a GPU-less runner skips them EXPLICITLY — that is the one GPU law.
#     A GitHub-hosted runner has no usable adapter, so running them here would be a guaranteed red
#     that says nothing about the code. They run via `scripts/test-gauntlet.sh gpu` on a GPU box.
#     There is no hosted GPU lane to add them to; wiring one needs a self-hosted GPU runner.
#
#   * THE LEAN HARD-MODE SOAK LANE (`DREGG_TEST_REQUIRE_LEAN=1`). This used to be self-hosted-only
#     and `workflow_dispatch`-gated, i.e. it had never run: the hard mode panics unless
#     `libdregg_lean.a` is linked, that archive is gitignored, and `lean-seed.pin` had `TAG=` EMPTY
#     so `scripts/fetch-lean-seed.sh` died. The premise has changed. `lean-seed.yml` now BUILDS the
#     seed on a self-hosted host and PUBLISHES it as a content-keyed release asset on every push to
#     `metatheory/**`. BUILDING the seed is what a hosted runner is too weak for; FETCHING one is a
#     download and a link. ubuntu-latest is Linux-x86_64 — the platform that lane publishes — so
#     `lean-hard-mode` below now runs HOSTED, on the nightly schedule, fetching the seed. It arms
#     itself off the pin: while `TAG=` is empty it says so loudly instead of failing nightly for
#     infrastructure that does not exist yet; the first publish flips it on with no edit here.
name: Armed teeth

on:
  schedule:
    # Daily, 05:00 UTC — two hours ahead of the proof-integrity canary (07:00) so the two
    # long-running scheduled gates do not contend for runners.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: "Override the lean-hard-mode runner label (e.g. a self-hosted host that already has a seeded libdregg_lean.a). Leave EMPTY to run hosted and fetch the CI-published seed."
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  binding-teeth:
    name: Deployed light-client binding teeth (--ignored)
    runs-on: ubuntu-latest
    # Eight binaries of real recursion folds. Generous but bounded: a lane that hangs to the
    # 6h ceiling is a lane nobody reads.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)

      # Same disk reclaim as ci.yml's Linux test job: the hosted runner ships ~14 GB free on /,
      # which this workspace's target/ overruns (ci.yml documents the SIGBUS root cause at length).
      - name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2

      # --release is not a nicety: these are FRI folds, and debug is the dominant cost (the
      # nextest heavy profile documents the same reasoning). A debug run would not finish.
      #
      # The 8 tooth binaries are named EXPLICITLY rather than using a bare
      # `-p dregg-circuit-prove -- --ignored`. That bare form is what the plan prescribed, but it
      # also sweeps in the GPU binaries (guaranteed red here — no adapter, and they now fail
      # closed) and the apex-shrink/gnark-fixture/mpt-pilot probes, whose external prerequisites
      # are a separate question from these teeth. Naming the binaries makes the lane's claim exact:
      # THESE teeth ran, and they either bit or they did not. Widening it is a follow-up, not a
      # thing to do silently by leaving a wildcard in.
      # `--no-fail-fast` is load-bearing, not a nicety. `cargo test` aborts the whole run at the
      # first failing test BINARY, so without it this lane reports 1 of 8 and hides the other 7 —
      # measured: the first run stopped at `bridge` and said nothing about the rest. A nightly
      # diagnostic exists to tell you the SHAPE of the damage; a lane that stops at the first red
      # is a lane you have to run eight times.
      #
      # ⚠ THIS LANE IS RED AT LANDING, AND THAT IS THE POINT. Arming is what revealed the break.
      # MEASURED 2026-07-15, all 8 binaries, --release --no-fail-fast -- --ignored:
      #
      #     4 passed / 11 FAILED  of the 17 armed teeth  (8/8 binaries RED)
      #
      # ONE root cause dominates (9 of the failures). Every tooth that mints a wide transfer leg
      # dies in its SETUP — before any fold — with
      #   "row 0: range wire 188 value 1230416006 >= 2^15"
      # raised by `descriptor_ir2.rs:4129`, the prover's witness builder, which refuses a value
      # overflowing a range block the DEPLOYED descriptor declares (wire 188 — a 15-bit
      # availability-weld borrow limb, see `descriptor_ir2.rs:273-277`). It reproduces byte-identically
      # across the plain, membership-edge, and Dfa-carrying transfer legs, so it is one break in the
      # shared `generate_rotated_transfer_shape_wide` ↔ `transferVmDescriptor2R24` pair — NOT the
      # teeth's own witness surgery (wire 188 sits far below the teeth columns at ~1771). Every file
      # on that path is clean at HEAD.
      #
      # Tell-tale: these advertise themselves as minute-scale folds and finish in 0.06s–8.67s. They
      # never reach the recursion at all. The remaining failures are downstream noise: 3 PoisonError
      # cascades (a sibling test's panic poisoning a shared mutex) and 1 `wgpu error: Validation
      # Error` in `factory` — worth noting on its own, since `64dbf9ed9` made the fold auto-select a
      # GPU, so a CPU-shaped tooth can now be dragged onto a GPU path by the host it happens to run on.
      #
      # This is the producer-equals-descriptor drift class the crate's own coverage gate already
      # names (43 Uncovered rows), and the class that bit before at `be732a9dd` — honest turns
      # failing to prove, which the drift gate cannot see. It was invisible for exactly one reason:
      # nothing ran these tests. Do NOT silence this lane to make it green, and do NOT `#[ignore]`
      # them again. Fix the producer/descriptor pair.
      - name: Arm the deployed binding teeth
        run: |
          cargo test -p dregg-circuit-prove --release --no-fail-fast \
            --test bridge_binding_deployed_tooth \
            --test custom_binding_deployed_tooth \
            --test deco_binding_deployed_tooth \
            --test dsl_binding_deployed_tooth \
            --test factory_binding_deployed_tooth \
            --test hatchery_binding_deployed_tooth \
            --test membership_binding_deployed_tooth \
            --test sovereign_binding_deployed_tooth \
            -- --ignored --nocapture

  # THE HARD-MODE LANE. Every load-bearing verified-gate test in `dregg-node` opens with
  # `if !<export>_available() { eprintln!("SKIP"); return; }` — reporting `ok` having asserted
  # NOTHING on an archive-less build. `DREGG_TEST_REQUIRE_LEAN=1` (dregg_lean_ffi::demand_lean)
  # turns every one of those skips into a PANIC, mirroring the DREGG_REQUIRE_LEAN *build* gate.
  # This job is the only thing that makes that hard mode more than an available flag.
  #
  # It requires a seeded `dregg-lean-ffi/libdregg_lean.a`. A hosted runner cannot BUILD one, but it
  # can FETCH the seed lean-seed.yml publishes for Linux-x86_64 — which is what ubuntu-latest is.
  lean-hard-mode:
    name: Verified-gate hard mode (DREGG_TEST_REQUIRE_LEAN=1)
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)

      - name: Is a seed release published? (reads dregg-lean-ffi/lean-seed.pin)
        id: pin
        run: |
          set -euo pipefail
          tag="$(sed -n 's/^TAG=//p' dregg-lean-ffi/lean-seed.pin | head -1)"
          if [ -n "$tag" ]; then
            echo "armed=1" >> "$GITHUB_OUTPUT"
            echo "::notice::seed release '$tag' is pinned — arming the verified-gate hard mode."
          else
            echo "armed=0" >> "$GITHUB_OUTPUT"
            echo "::warning::lean-seed.pin TAG is EMPTY — no seed release exists, so the ~43 verified-gate tests behind `if !<x>_available() { SKIP }` CANNOT be armed and this lane is asserting NOTHING about them. Run the 'Publish Lean seed' workflow (needs a self-hosted runner registered with the lean-seed + linux-x86_64 labels); it writes TAG and this lane arms itself."
          fi

      - name: Install elan + zstd, fetch the CI-published seed
        if: steps.pin.outputs.armed == '1' && !inputs.runner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y zstd
          curl -sSf https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          bash scripts/fetch-lean-seed.sh

      # FAIL LOUD, EARLY. Without this the job's first symptom would be a wall of demand_lean
      # panics that read like the gates are broken, when the real cause is a runner with no seed.
      - name: Require a seeded Lean archive (the whole point of this lane)
        if: steps.pin.outputs.armed == '1'
        run: |
          set -euo pipefail
          if [ ! -f dregg-lean-ffi/libdregg_lean.a ]; then
            echo "::error::no dregg-lean-ffi/libdregg_lean.a after fetch. DREGG_TEST_REQUIRE_LEAN=1 asserts the VERIFIED gates actually ran; without the archive every gate would panic for the wrong reason. Check the 'Publish Lean seed' lane cut a Linux-x86_64 asset for THIS commit's Dregg2 tree hash (scripts/lean-seed-key.sh)."
            exit 1
          fi
          echo "seed present: $(du -h dregg-lean-ffi/libdregg_lean.a | cut -f1)"

      # The verified-gate unit tests: finality_gate (4), coord_gate, finalization_votes, plus the
      # lean_producer_mode integration tests. Under the hard mode these can no longer self-skip.
      - name: node verified-gate tests, hard mode
        if: steps.pin.outputs.armed == '1'
        env:
          DREGG_TEST_REQUIRE_LEAN: "1"
          DREGG_REQUIRE_LEAN: "1"
        run: cargo test -p dregg-node --release --lib --test lean_producer_mode

      # The real-process soak: 4- and 5-node federations over real QUIC gossip with a validator
      # KILLED mid-run. It no longer pins DREGG_LEAN_PRODUCER=0, so the VERIFIED producer — the
      # production default — is what gets fault-injected; under DREGG_TEST_REQUIRE_LEAN=1 the
      # harness also asserts every launched node reports `state_producer = lean`, so this lane
      # cannot quietly degrade to the Rust producer and still pass.
      #
      # DREGG_TEST_REQUIRE_FINALITY is deliberately NOT set: post-kill cross-node finality is a
      # NAMED OPEN leg (A1), measured non-converging at n=4/n=5 on 2026-07-06 and documented as
      # such in the test's own header. Arming it here would red this lane every run for a reason
      # its authors already wrote down. That is the frontier's job, not the arming lane's.
      - name: consensus-under-failure soak (production producer default)
        if: steps.pin.outputs.armed == '1'
        env:
          DREGG_TEST_REQUIRE_LEAN: "1"
          DREGG_REQUIRE_LEAN: "1"
        run: cargo test -p dregg-node --release --test consensus_under_failure -- --ignored --nocapture

  # ─────────────────────────────────────────────────────────────────────────────
  # The missing half of this lane. Everything above ALREADY runs, faithfully, every
  # night — and tells nobody. This workflow is `schedule` + `workflow_dispatch` only,
  # and scheduled workflows are NOT PR checks, so a red tooth here does not block a
  # merge and never appears on the checkmark anyone actually reads. Measured 2026-07-15:
  # 4 passed / 11 FAILED of the 17 armed teeth (8/8 binaries red, root-caused to the
  # `generate_rotated_transfer_shape_wide` ↔ `transferVmDescriptor2R24` producer/descriptor
  # drift) — while ci.yml stayed green through all of it. The honesty was in the header
  # and the logs; the signal people read is a checkmark. This job closes that gap.
  #
  # It does NOT gate anything (arming stays diagnostic, per the header above) — it just
  # makes a red tooth reach a human. A standing issue is refreshed rather than spammed:
  # one issue per outage, a comment per subsequent red run.
  page-on-red:
    name: Page a human when a tooth is red
    needs: [binding-teeth, lean-hard-mode]
    # `always()` so this still runs after the teeth job fails; fire only on a real
    # failure (never on cancelled/skipped — lean-hard-mode is dispatch-gated and is
    # `skipped` on every scheduled run).
    if: >-
      ${{ always() && (needs.binding-teeth.result == 'failure'
          || needs.lean-hard-mode.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or refresh the standing red-teeth issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEETH: ${{ needs.binding-teeth.result }}
          LEAN: ${{ needs.lean-hard-mode.result }}
        run: |
          set -euo pipefail
          TITLE='armed-teeth: a deployed binding tooth is RED'
          {
            printf '%s\n\n' "The nightly **Armed teeth** lane failed: ${RUN_URL}"
            printf '%s\n' "- \`binding-teeth\`: **${TEETH}**"
            printf '%s\n\n' "- \`lean-hard-mode\`: **${LEAN}** (dispatch-gated; \`skipped\` on scheduled runs)"
            printf '%s\n' 'These are the DEPLOYED light-client binding teeth. This lane is `schedule` +'
            printf '%s\n' '`workflow_dispatch` only, so it is **not** a PR check — a red tooth here blocks'
            printf '%s\n' 'nothing and is invisible on the checkmark. That is exactly why this issue exists:'
            printf '%s\n\n' 'the tests already ran and already knew; the signal just never reached anyone.'
            printf '%s\n' 'Triage the run, then either fix the tooth or record in the workflow header why it'
            printf '%s\n' 'is expected-red (the header is already scrupulous about this — keep it that way).'
          } > /tmp/body.md
          EXISTING="$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --body-file /tmp/body.md
            echo "refreshed existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body-file /tmp/body.md
          fi
