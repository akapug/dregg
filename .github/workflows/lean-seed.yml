# lean-seed.yml — build + publish the HEAD-matching Lean seed archive as a release asset.
#
# WHY: dregg-lean-ffi/libdregg_lean.a (the ~180 MB native archive of the compiled verified Lean
# executor + its whole mathlib closure) is gitignored and per-host. A fresh clone that lacks it
# silently builds MARSHAL-ONLY (the un-verified Rust executor); regenerating it from source is an
# hours-long cold `lake`/mathlib bootstrap. Publishing a prebuilt seed as a release asset turns a
# fresh verified-node build from HOURS into MINUTES: scripts/fetch-lean-seed.sh downloads it,
# verifies the checksum + exports, and drops it in place. See docs/LEAN-SEED-ARTIFACT.md.
#
# WHERE IT RUNS: seeding compiles thousands of leanc objects. metatheory/lakefile.toml pins mathlib
# as a PORTABLE git+rev dependency, so lake fetches it on any host — but a stock GitHub-hosted runner
# still lacks the HOURS (and a warm `.lake` / prebuilt mathlib cache). So this runs on a SELF-HOSTED
# beefy build host (David's lassie), where bootstrap.sh pulls the prebuilt mathlib oleans
# (`lake exe cache get`, minutes) and seeds the archive. The `runner` input lets you point at a
# different self-hosted label. The manual `gh release`-from-lassie path is documented in
# docs/LEAN-SEED-ARTIFACT.md for when the workflow host is unavailable.
name: Publish Lean seed

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish the seed under (e.g. lean-seed-2026-07-01). Created if absent."
        required: true
        type: string
      runner:
        description: "Self-hosted runner label with elan + the mathlib pin (the beefy build host)."
        required: false
        default: "lassie"
        type: string
      bump_pin:
        description: "Commit the updated dregg-lean-ffi/lean-seed.pin back to the branch."
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  seed:
    # A self-hosted, mathlib-provisioned host. GitHub-hosted runners cannot build this (see header).
    runs-on: ["self-hosted", "${{ inputs.runner }}"]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain sanity (elan/lake + zstd on PATH)
        run: |
          set -euo pipefail
          command -v lake >/dev/null || { echo "::error::lake not on PATH — install elan on this runner"; exit 1; }
          command -v zstd >/dev/null || { echo "::error::zstd not on PATH"; exit 1; }
          echo "lake: $(command -v lake)"; echo "cargo: $(command -v cargo)"

      # Refresh the warm .lake and (re)seed a HEAD-matching archive. bootstrap.sh is idempotent:
      # it checks the mathlib pin, lake-builds the FFI closure, seeds libdregg_lean.a, and verifies
      # the link fails loud if it came out marshal-only.
      - name: Bootstrap + seed the Lean archive (HEAD-matching)
        run: ./scripts/bootstrap.sh

      - name: Compute provenance + asset name
        id: key
        run: |
          set -euo pipefail
          eval "$(scripts/lean-seed-key.sh | sed 's/^/K_/')"   # K_KEY, K_PLATFORM, K_ASSET, K_LEAN_TOOLCHAIN, K_MATHLIB_REV, K_DREGG_TREE_HASH
          echo "asset=$K_ASSET"                >> "$GITHUB_OUTPUT"
          echo "key=$K_KEY"                    >> "$GITHUB_OUTPUT"
          echo "platform=$K_PLATFORM"          >> "$GITHUB_OUTPUT"
          echo "lean_toolchain=$K_LEAN_TOOLCHAIN" >> "$GITHUB_OUTPUT"
          echo "mathlib_rev=$K_MATHLIB_REV"    >> "$GITHUB_OUTPUT"
          echo "dregg_tree=$K_DREGG_TREE_HASH" >> "$GITHUB_OUTPUT"

      - name: Compress + checksum the seed
        id: pack
        run: |
          set -euo pipefail
          asset='${{ steps.key.outputs.asset }}'
          zstd -q -19 --long=27 -T0 dregg-lean-ffi/libdregg_lean.a -o "$asset"
          sha256sum "$asset" > "$asset.sha256"
          ls -la "$asset" "$asset.sha256"

      - name: Publish to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          ASSET: ${{ steps.key.outputs.asset }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Lean seed $TAG" \
              --notes "Prebuilt verified-executor Lean seed archives (libdregg_lean.a). Fetch with scripts/fetch-lean-seed.sh. Provenance: toolchain ${{ steps.key.outputs.lean_toolchain }}, mathlib ${{ steps.key.outputs.mathlib_rev }}, Dregg2 tree ${{ steps.key.outputs.dregg_tree }}."
          fi
          # --clobber so re-publishing the same platform asset replaces it.
          gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber

      - name: Bump the committed pin
        if: ${{ inputs.bump_pin }}
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          pin=dregg-lean-ffi/lean-seed.pin
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            sed -n '1,/^$/p' "$pin" | sed '/^$/d'   # keep the leading comment block
            echo
            echo "TAG=$TAG"
            echo "LEAN_TOOLCHAIN=${{ steps.key.outputs.lean_toolchain }}"
            echo "MATHLIB_REV=${{ steps.key.outputs.mathlib_rev }}"
            echo "DREGG_TREE_HASH=${{ steps.key.outputs.dregg_tree }}"
            echo "GENERATED_UTC=$now"
            echo "NOTE=published by the lean-seed workflow"
          } > "$pin.new"
          mv "$pin.new" "$pin"
          git config user.name  "dregg-seed-bot"
          git config user.email "noreply@dregg"
          git add "$pin"
          git -c commit.gpgsign=false commit -m "chore(seed): publish Lean seed $TAG + bump pin" || echo "pin unchanged"
          git push || echo "::warning::could not push the pin bump — commit it manually"
