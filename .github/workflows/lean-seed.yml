# lean-seed.yml — CI BUILDS and CI PUBLISHES the Lean seed archive. No human ever uploads a file.
#
# WHY: dregg-lean-ffi/libdregg_lean.a (the ~100-195 MB native archive of the compiled verified Lean
# executor + its whole mathlib closure) is gitignored and per-host. A clone that lacks it silently
# builds MARSHAL-ONLY (the un-verified Rust executor), and every `if !<x>_available() { SKIP }` gate
# reports `ok` having asserted NOTHING. Publishing the seed as a release asset is what lets a hosted
# ubuntu runner link a VERIFIED build in minutes — which is what turns those skips into real checks.
#
# CONTENT-KEYED ASSETS, STABLE TAG. scripts/lean-seed-key.sh hashes (platform, lean-toolchain,
# mathlib rev, Dregg2 tree) into a KEY, and the asset name embeds it:
#     libdregg_lean-<platform>-<leantag>-<key>.a.zst
# Because the name IS the identity, one long-lived release tag (`lean-seed`) can accumulate every
# platform × every source revision, and fetch-lean-seed.sh always asks for the asset matching ITS
# checkout. Consequence: the pin's TAG is set ONCE and then never needs bumping again — there is no
# per-commit bot-push treadmill, and no window where the pin points at an asset that does not exist.
# (The pin's provenance triple is still refreshed opportunistically; it only drives a drift WARNING.)
#
# WHERE IT RUNS: seeding compiles thousands of leanc objects (1300+ Dregg2 files). metatheory/
# lakefile.toml pins mathlib as a PORTABLE git+rev dependency so lake fetches it on any host, and
# mathlib itself arrives as prebuilt oleans in minutes (`lake exe cache get`) — mathlib is NOT the
# cost. The Dregg2 corpus compile is. A stock GitHub-hosted runner (4 cores, 14 GB disk) is too weak
# and too small for it, so the BUILD side is SELF-HOSTED. The CONSUME side is not: linking a
# prebuilt archive is cheap, which is the whole point (see ci.yml's lean-marshal-gate).
#
# PREREQUISITE (one-time, human): a self-hosted runner must be REGISTERED on the repo with the
# labels below. As of writing, `gh api repos/emberian/dregg/actions/runners` returns total_count=0 —
# no runner exists, so this workflow cannot run yet. Register one (Settings → Actions → Runners):
#     Linux x86_64 host (e.g. hbox) → labels: self-hosted, lean-seed, linux-x86_64
#     Darwin arm64 host (e.g. nextop) → labels: self-hosted, lean-seed, darwin-arm64
# The host needs elan (lake on PATH), cargo, zstd, ar/ranlib/nm. Nothing else is gated: GITHUB_TOKEN
# with `contents: write` (granted below) is sufficient to cut the release — no PAT, no extra secret.
name: Publish Lean seed

on:
  # AUTOMATIC: any change to the Lean source changes the Dregg2 tree hash, which changes the KEY,
  # which means every existing published asset is stale for the new HEAD. That is exactly when a
  # fresh seed must be cut — otherwise the marshal gate downstream has nothing to fetch.
  push:
    branches: [main]
    paths:
      - 'metatheory/**'
      - 'dregg-lean-ffi/build.rs'
      - 'dregg-lean-ffi/scripts/**'
      - 'scripts/bootstrap.sh'
      - 'scripts/lean-seed-key.sh'
      - '.github/workflows/lean-seed.yml'
  # A safety net: catches a seed that was missed because its runner was offline when main moved.
  # The key-idempotency check below makes a no-op run cheap (no rebuild when the asset exists).
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under. Leave as `lean-seed` — assets are content-keyed, so one tag serves every platform and revision."
        required: false
        default: "lean-seed"
        type: string
      platforms:
        description: "Which platform seeds to cut."
        required: false
        default: "linux-x86_64"
        type: choice
        options:
          - linux-x86_64
          - darwin-arm64
          - "linux-x86_64,darwin-arm64"
      force:
        description: "Rebuild + republish even if an asset for this content key already exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  # Never cut two seeds for the same ref at once — they would race the same release + pin commit.
  group: lean-seed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve the trigger into a platform list + tag WITHOUT burning the self-hosted host. `inputs.*`
  # is null on push/schedule, so every value needs an explicit default here rather than in `on:`.
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      tag: ${{ steps.p.outputs.tag }}
    steps:
      - id: p
        run: |
          set -euo pipefail
          tag='${{ inputs.tag }}'; [ -n "$tag" ] || tag='lean-seed'
          # push/schedule cut the platform CI itself consumes (ubuntu-latest is Linux x86_64).
          # Darwin-arm64 is a developer-fetch convenience and is dispatch-selectable.
          plats='${{ inputs.platforms }}'; [ -n "$plats" ] || plats='linux-x86_64'
          json="$(printf '%s' "$plats" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
                  | grep -v '^$' | jq -R . | jq -sc .)"
          echo "tag=$tag"       >> "$GITHUB_OUTPUT"
          echo "matrix=$json"   >> "$GITHUB_OUTPUT"
          echo "planned: tag=$tag platforms=$json"

  seed:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.plan.outputs.matrix) }}
    # A self-hosted, elan-provisioned host. GitHub-hosted runners cannot BUILD this (see header).
    runs-on: ["self-hosted", "lean-seed", "${{ matrix.platform }}"]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain sanity (elan/lake + zstd + ar on PATH)
        run: |
          set -euo pipefail
          command -v lake  >/dev/null || { echo "::error::lake not on PATH — install elan on this runner"; exit 1; }
          command -v zstd  >/dev/null || { echo "::error::zstd not on PATH"; exit 1; }
          command -v cargo >/dev/null || { echo "::error::cargo not on PATH"; exit 1; }
          command -v ar    >/dev/null || { echo "::error::ar not on PATH"; exit 1; }
          echo "lake: $(command -v lake) · cargo: $(command -v cargo) · $(uname -sm)"

      # The KEY is computed from the CHECKOUT, before any build, so the idempotency check below can
      # skip the expensive compile entirely when this exact source has already been published.
      - name: Compute provenance + asset name
        id: key
        run: |
          set -euo pipefail
          eval "$(bash scripts/lean-seed-key.sh | sed 's/^/K_/')"
          # The runner's real platform must match the label it was scheduled onto, or we would
          # publish a Mach-O archive under a linux-x86_64 label and poison every Linux consumer.
          want='${{ matrix.platform }}'
          got="$(echo "$K_PLATFORM" | tr '[:upper:]' '[:lower:]')"
          if [ "$got" != "$want" ]; then
            echo "::error::runner platform mismatch — labelled '$want' but uname says '$K_PLATFORM'. Fix the runner's labels; publishing here would poison the '$want' fetch path."
            exit 1
          fi
          for v in asset:K_ASSET key:K_KEY platform:K_PLATFORM lean_toolchain:K_LEAN_TOOLCHAIN \
                   mathlib_rev:K_MATHLIB_REV dregg_tree:K_DREGG_TREE_HASH; do
            echo "${v%%:*}=$(eval "echo \"\$${v##*:}\"")" >> "$GITHUB_OUTPUT"
          done
          bash scripts/lean-seed-key.sh

      # Same key ⇒ interchangeable seed (lean-seed-key.sh's own contract). If the asset is already
      # up there, the corpus compile is pure waste — this is what makes the nightly net nearly free.
      - name: Already published for this content key?
        id: have
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          asset='${{ steps.key.outputs.asset }}'
          hit=no
          if [ '${{ inputs.force }}' = 'true' ]; then
            echo "force=true — rebuilding regardless."
          elif gh release view '${{ needs.plan.outputs.tag }}' --json assets \
                 --jq '.assets[].name' 2>/dev/null | grep -Fxq "$asset"; then
            hit=yes
            echo "::notice::$asset is already published — this source is already seeded. Skipping the build."
          fi
          echo "hit=$hit" >> "$GITHUB_OUTPUT"

      # bootstrap.sh SKIPS the seed step when libdregg_lean.a already exists (step 4 of that
      # script). On a warm self-hosted runner the archive PERSISTS across runs, so bootstrap alone
      # would happily republish a STALE Dregg2 slice under a FRESH key — a silently wrong seed, the
      # worst possible failure for a content-addressed artifact. rebuild-dregg2-closure.sh exists
      # for exactly this ("Use this only to refresh the seed"): it recompiles the Dregg2 :c closure
      # at HEAD and splices it into the archive, keeping the expensive mathlib/batteries/aesop
      # objects. That is the ~20-minute warm path, and it is also the CORRECT one.
      - name: Bootstrap the Lean closure (mathlib oleans from cache; seeds if absent)
        if: steps.have.outputs.hit != 'yes'
        run: ./scripts/bootstrap.sh

      - name: Re-splice the Dregg2 slice at HEAD (a warm runner's archive is stale by construction)
        if: steps.have.outputs.hit != 'yes'
        run: ./dregg-lean-ffi/scripts/rebuild-dregg2-closure.sh

      # Do not publish an archive we have not proven links + answers. bootstrap.sh already runs the
      # smoke binary, but the re-splice above happened AFTER it, so the exports get re-checked here
      # against the artifact we are actually about to upload.
      - name: Verify the archive is a VERIFIED seed (exports + live kernel round-trip)
        if: steps.have.outputs.hit != 'yes'
        run: |
          set -euo pipefail
          arch=dregg-lean-ffi/libdregg_lean.a
          [ -f "$arch" ] || { echo "::error::no $arch after bootstrap+re-splice"; exit 1; }
          NM=nm; command -v nm >/dev/null 2>&1 || NM=llvm-nm
          # Read the symbol table ONCE into a variable and match with `case`, rather than
          # `"$NM" "$arch" | grep -q "$sym"` per symbol. That idiom is SIGPIPE-FRAGILE under the
          # `set -o pipefail` above: `grep -q` exits at the FIRST match (~line 82k of ~394k), which
          # SIGPIPEs `$NM` (exit 141), and pipefail then reports the whole pipeline as FAILED even
          # though the symbol was FOUND. That is a timing race — it happened to pass on the hosted
          # runs and reproduces reliably on the self-hosted runner — and it fails CLOSED: a perfectly
          # good seed gets "refused to publish" with a message claiming the export is missing.
          # `case` does no piping, and runs $NM once instead of once per symbol.
          syms="$("$NM" "$arch" 2>/dev/null)"
          for sym in dregg_exec_full_forest_auth dregg_tau_order; do
            case "$syms" in
              *"$sym"*) ;;
              *) echo "::error::archive lacks the verified-executor export '$sym' — refusing to publish a seed that fetch-lean-seed.sh would reject."; exit 1 ;;
            esac
          done
          # DREGG_REQUIRE_LEAN=1: fail loud rather than let a marshal-only degrade be published.
          DREGG_REQUIRE_LEAN=1 cargo run -q -p dregg-lean-ffi --features lean-lib --bin dregg-lean-ffi
          echo "seed verified: $(du -h "$arch" | cut -f1 | tr -d ' '), exports present, kernel round-trips."

      - name: Compress + checksum the seed
        id: pack
        if: steps.have.outputs.hit != 'yes'
        run: |
          set -euo pipefail
          asset='${{ steps.key.outputs.asset }}'
          zstd -q -19 --long=27 -T0 dregg-lean-ffi/libdregg_lean.a -o "$asset"
          # fetch-lean-seed.sh reads `awk '{print $1}'` off this sidecar — sha256sum's format.
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$asset" > "$asset.sha256";
          else shasum -a 256 "$asset" > "$asset.sha256"; fi
          ls -la "$asset" "$asset.sha256"

      - name: Publish to the release
        if: steps.have.outputs.hit != 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.plan.outputs.tag }}
          ASSET: ${{ steps.key.outputs.asset }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Lean seed archives" --notes \
              "Prebuilt verified-executor Lean seed archives (libdregg_lean.a), built and published by .github/workflows/lean-seed.yml.

          Assets are CONTENT-KEYED: \`libdregg_lean-<platform>-<leantoolchain>-<key>.a.zst\`, where key = sha256(platform, lean-toolchain, mathlib rev, Dregg2 tree)[:16]. This tag accumulates them, so it never needs to change — \`scripts/fetch-lean-seed.sh\` computes the key for YOUR checkout and asks for the matching asset.

          Fetch: \`scripts/fetch-lean-seed.sh\` · then \`DREGG_REQUIRE_LEAN=1 cargo build -p dregg-node --release\`."
          fi
          gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber
          echo "::notice::published $ASSET to release $TAG"

      - name: Clean the packed asset off the runner
        if: always()
        run: rm -f '${{ steps.key.outputs.asset }}' '${{ steps.key.outputs.asset }}.sha256' || true

  # ── NO `pin` JOB. CI DOES NOT COMMIT TO YOUR BRANCH. ────────────────────────────────────────────
  # There used to be one here. It rewrote `dregg-lean-ffi/lean-seed.pin` and then
  # `git pull --rebase --autostash origin main && git push` to land it — i.e. it REBASED THE HUMAN'S
  # BRANCH UNDER THEM, on every seed build, to push provenance fields that the pin file itself
  # documents as decorative ("a reference snapshot for the drift warning only — fetch-lean-seed.sh
  # always resolves the asset from YOUR checkout's key, not from these values"). The only
  # load-bearing line, `TAG=lean-seed`, is a STABLE constant: assets are content-keyed, so the tag
  # never needs bumping, and it is already committed. So the job re-rebased main forever to churn
  # cosmetics. A bot that rewrites the branch you are working on is a hard no — the seed lane's job
  # is to BUILD and PUBLISH an asset, and it does exactly that above; the release is the artifact,
  # the git history is not its scratchpad.
  #
  # If the pin ever needs a value again (a new platform, a deliberate tag change), a human writes
  # one line, once. `scripts/lean-seed-key.sh` prints the current key on demand for drift checks.
