name: Deploy deos to GitHub Pages

# The site is a thin static launcher that drops a visitor straight into the live,
# in-browser, node-LESS deos: the verified executor runs CLIENT-SIDE in the
# visitor's own WebAssembly tab (no backend server — GitHub Pages is static).
#   /              the deos cockpit (WebImage model skin) — land IN deos, fire a real turn
#   /cockpit-gpui/ the FULL gpui renderer on a WebGPU canvas (same in-tab executor)
#   /cards/        the deos-js card gallery (counter + reflective inspector + tally board)
#   /atlas/        the interactive atlas
# scripts/build-pages-dist.sh assembles site/dist; this workflow just builds + uploads it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Materialize the atlas's LFS-tracked images into the working tree so the
          # real files (not LFS pointer stubs) land in the Pages artifact.
          lfs: true

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: pages-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Fetch the plonky3-recursion fork (starbridge-v2 [patch]es it at a pinned rev)
        # starbridge-v2 patches the plonky3-recursion fork to a local sibling for dev;
        # fetch it at the pinned Cargo rev. The fork is public; the sequence is verified.
        run: |
          set -euo pipefail
          if [ ! -d ../plonky3-recursion/.git ]; then
            git clone --no-checkout https://github.com/emberian/plonky3-recursion ../plonky3-recursion
            git -C ../plonky3-recursion fetch --depth 1 origin 72ffc5646e90af9324ab17248b4beed31c036db3
            git -C ../plonky3-recursion checkout 72ffc5646e90af9324ab17248b4beed31c036db3
          fi

      - name: Build the in-browser deos dist (all wasm client-side, node-less)
        # GREEN-OR-BUST: a broken wasm crate fails the workflow — we fix the crate, never
        # ship stale or placeholder artifacts. The script builds the WebImage cockpit
        # (root), the gpui-web cockpit (/cockpit-gpui/), the card gallery (/cards/), and
        # bundles the atlas (/atlas/), all into site/dist.
        run: scripts/build-pages-dist.sh

      - name: Sanity-check the dist
        run: |
          set -euo pipefail
          test -f site/dist/index.html
          test -s site/dist/pkg/starbridge_web_bg.wasm
          test -s site/dist/cards/pkg/dregg_wasm_bg.wasm
          test -f site/dist/cards/index.html
          test -f site/dist/cards/counter.html
          test -f site/dist/cards/inspector.html
          test -f site/dist/cards/tally.html
          test -f site/dist/atlas/index.html
          # the atlas images must be materialized, not LFS pointer stubs
          if head -c 20 site/dist/atlas/ui-states/HOME_.jpg 2>/dev/null | grep -q '^version https://gi'; then
            echo "ERROR: atlas image is an unmaterialized LFS pointer — checkout needs lfs:true" && exit 1
          fi
          echo "dist OK: $(find site/dist -type f | wc -l) files"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
