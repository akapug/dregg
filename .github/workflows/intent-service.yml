name: "Intent Pool Service"

on:
  schedule:
    # Every 5 hours, offset by 50 min from Node 1
    - cron: '50 2,7,12,17,22 * * *'
  workflow_dispatch:

concurrency:
  group: intent-service
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  STATE_DIR: /tmp/dregg-intent-state

permissions:
  contents: write
  actions: read

jobs:
  run-intent-service:
    name: "Intent Pool Service"
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load state from federation-state branch
        run: |
          git fetch origin federation-state || true
          mkdir -p "$STATE_DIR"
          if git show origin/federation-state:nodes/intent-service.json > "$STATE_DIR/state.json" 2>/dev/null; then
            echo "Loaded previous intent pool state from federation-state branch"
          else
            echo "{}" > "$STATE_DIR/state.json"
            echo "No previous state, starting fresh"
          fi

      - name: Load discovery from federation-state branch
        run: |
          mkdir -p /tmp/discovery
          if git show origin/federation-state:discovery.json > /tmp/discovery/discovery.json 2>/dev/null; then
            echo "Loaded discovery file"
          else
            echo '{"federation":[],"intent_service":null}' > /tmp/discovery/discovery.json
            echo "No discovery file found, using empty"
          fi

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build dregg-node
        run: cargo build --release -p dregg-node

      - name: Load node identity
        # The key rides an env var, NOT a `run:` interpolation. `${{ secrets.X }}` is
        # substituted into the script TEXT at render time, so the raw node identity key would
        # sit in the shell source — visible to `set -x`, to `ps`, and to a crash dump. Log
        # masking is a backstop, not a boundary. (The `Run federation node` step below already
        # does it this way; this step was the odd one out.)
        env:
          NODE_KEY: ${{ secrets.DREGG_NODE_1_KEY }}
        run: |
          mkdir -p "$STATE_DIR"
          printf '%s' "$NODE_KEY" | xxd -r -p > "$STATE_DIR/node.key"
          echo "Intent service identity loaded"

      - name: Resolve federation peers
        id: peers
        run: |
          PEERS=""
          if [ -f /tmp/discovery/discovery.json ]; then
            PEERS=$(jq -r '.federation[].addr' /tmp/discovery/discovery.json 2>/dev/null | paste -sd, -)
          fi
          echo "peer_list=$PEERS" >> "$GITHUB_OUTPUT"
          echo "Resolved federation peers: $PEERS"

      - name: Run intent pool service
        env:
          DREGG_ROOT_KEY: ${{ secrets.DREGG_ROOT_KEY }}
          DREGG_NODE_KEY: ${{ secrets.DREGG_NODE_1_KEY }}
          RUST_LOG: info
        run: |
          # Start the node in background (intent service uses the same binary)
          ./target/release/dregg-node run \
            --data-dir "$STATE_DIR" \
            --port 8421 \
            --federation-peers "${{ steps.peers.outputs.peer_list }}" &
          NODE_PID=$!

          echo "Intent service started with PID $NODE_PID"

          # Periodic state snapshots every 5 minutes
          ELAPSED=0
          INTERVAL=300
          MAX_RUNTIME=20700  # 5h45m in seconds

          while [ $ELAPSED -lt $MAX_RUNTIME ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            if ! kill -0 $NODE_PID 2>/dev/null; then
              echo "Intent service exited unexpectedly at ${ELAPSED}s"
              break
            fi

            kill -USR1 $NODE_PID 2>/dev/null || true
            echo "Snapshot triggered at ${ELAPSED}s ($(date -u +%H:%M:%S))"
          done

          # Graceful shutdown
          echo "Sending SIGTERM for graceful shutdown..."
          kill -TERM $NODE_PID 2>/dev/null || true
          wait $NODE_PID 2>/dev/null || true
          echo "Intent service shutdown complete"

      - name: Publish state to federation-state branch
        if: always()
        run: |
          git fetch origin federation-state || true
          git worktree add /tmp/fed-state federation-state 2>/dev/null || {
            git worktree add --detach /tmp/fed-state
            cd /tmp/fed-state
            git checkout --orphan federation-state
            git rm -rf . 2>/dev/null || true
            mkdir -p nodes
            echo '{}' > nodes/.gitkeep
            git add .
            git commit -m "Initialize federation-state branch"
          }
          cd /tmp/fed-state
          mkdir -p nodes
          cp "$STATE_DIR/state.json" nodes/intent-service.json 2>/dev/null || echo '{}' > nodes/intent-service.json
          git add nodes/intent-service.json
          git diff --cached --quiet || {
            git config user.name "dregg-federation[bot]"
            git config user.email "federation@dregg.fg-goose.online"
            git commit -m "intent-service state update [skip ci]"
            git push origin federation-state
          }

      # NOT AN ALARM, and kept anyway: fires identically on success and failure, notifies the
      # discovery bot not a human, and `continue-on-error` means it cannot fail. Discovery may
      # depend on it — leave it. The alarm is the `page-on-red` job below.
      - name: Notify discovery service
        if: always()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: node-state-updated
          client-payload: '{"node": "intent", "role": "intent-service"}'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # This lane is `schedule` + `workflow_dispatch`, so its red is on no checkmark. It gets its OWN
  # issue (not the shared federation-nodes one): the intent pool is a distinct service, and folding
  # it into the nodes' issue would blur "the pool is down" with "a consensus node is down". One
  # issue per outage, a comment per subsequent red run.
  page-on-red:
    name: Page a human when the intent service is red
    needs: [run-intent-service]
    if: ${{ always() && needs.run-intent-service.result == 'failure' }}
    runs-on: ubuntu-latest
    # Job-level, so this job gets ONLY `issues: write` — not the `contents: write` the service job
    # needs to push the federation-state branch.
    permissions:
      issues: write
    steps:
      - name: Open or refresh the standing intent-service-red issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE='intent-service: the scheduled intent-pool lane is RED'
          {
            printf '%s\n\n' "**Intent Pool Service** failed on its schedule: ${RUN_URL}"
            printf '%s\n' 'Likely shapes, cheapest first: a `cargo build --release -p dregg-node` break (would also'
            printf '%s\n' 'red the federation nodes — check for their issue); the service process exiting early'
            printf '%s\n' '(`Intent service exited unexpectedly at <n>s` in the run log); no reachable federation'
            printf '%s\n\n' 'peers; or the `federation-state` branch push failing.'
            printf '%s\n' 'NOTE: the `Notify discovery service` step is not an alarm — `if: always()` +'
            printf '%s\n' '`continue-on-error`, so it fires the same on green and red and notifies a bot. This'
            printf '%s\n' 'issue is the human-facing signal, and it did not exist before now: the lane has been'
            printf '%s\n' 'failing on a schedule with nothing reporting it.'
          } > /tmp/body.md
          EXISTING="$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --body-file /tmp/body.md
            echo "refreshed existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body-file /tmp/body.md
          fi
