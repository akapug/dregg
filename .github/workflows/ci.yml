name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      # Reclaim the ~25 GB of preinstalled toolchains we never use. The hosted
      # ubuntu runner ships with only ~14 GB free on /, which the full debug-build
      # `target/` of this workspace overruns — see the root-cause note on the test
      # step below. Freed BEFORE the cache restore + build so they have headroom.
      - if: runner.os == 'Linux'
        name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      # macOS links the full workspace (incl. deos-zed's windowed gpui editor) via
      # ld64 — green, so keep it whole.
      - if: runner.os == 'macOS'
        run: cargo test --workspace
      # Linux SIGBUS root cause: it is NOT one heavy crate. The full debug-build
      # `target/` of the WHOLE workspace overruns the hosted runner's small disk,
      # and whichever link steps are running when / hits zero ALL die at once as
      # `collect2: ld terminated with signal 7 [Bus error]` — a write into GNU ld's
      # mmap'd output faults when the file can't be extended (disk full). The proof:
      # the crash hits SIMULTANEOUSLY across unrelated, LIGHT protocol crates
      # (starbridge-agent-orchestration / starbridge-tool-access-delegation — no
      # gpui/servo in their graph), and a sibling run surfaces the identical root
      # cause as a plain `No space left on device (os error 28)`. Fixed at the root
      # WITHOUT dropping any crate: (1) the disk-reclaim step above, and (2) build
      # the tests with debuginfo OFF (CARGO_PROFILE_*_DEBUG=0), which slashes both
      # the on-disk object footprint AND GNU ld's link-time memory so the link fits.
      # Every crate — incl. all starbridge-apps — still LINKS and TESTS here.
      #
      # deos-zed alone stays off this gate (the vendored full Zed/IDE fork: its
      # windowed gpui screenshot targets link the entire desktop/accessibility
      # static graph and want a display at runtime); its protocol-relevant gpui-free
      # core is covered by the firmament lane just below.
      - if: runner.os == 'Linux'
        name: Test workspace (debuginfo off; deos-zed split out)
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --workspace --exclude deos-zed
      # ...still test deos-zed's gpui-FREE core on Linux: the FirmamentFs seam
      # (a file is a cell, a save is a receipted turn) links only the light executor
      # spine, so it links cleanly. This keeps the protocol-relevant half covered.
      - if: runner.os == 'Linux'
        name: Test deos-zed gpui-free firmament core
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p deos-zed --no-default-features --features firmament

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # ADVISORY, not a gate. CI's clippy (even pinned) carries lints the local
    # same-dated clippy lacks (chunks_exact_to_as_chunks, doc_lazy_continuation,
    # manual_is_multiple_of, …) AND the deos-* elephant crates don't inherit the
    # workspace lint-allows — so a hard clippy gate is non-deterministic + fragile
    # (you can't reproduce/fix it locally before pushing). It still RUNS + reports
    # as annotations; it just doesn't fail the build. Run `cargo clippy` locally.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          # Pinned: a floating @master nightly can introduce new clippy lints that
          # red the gate on a day with zero code changes. Bump deliberately.
          toolchain: nightly-2026-06-21
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      # If this fails, format-drift landed. The local pre-commit hook formats every staged .rs at
      # its crate's edition so this stays green automatically — install it once with
      # `bash scripts/install-hooks.sh`, and commit WITHOUT `--no-verify` (that skips the hook).
      - run: |
          cargo fmt --all -- --check || { echo '::error::format drift — run `cargo fmt --all` (and install the pre-commit hook: bash scripts/install-hooks.sh)'; exit 1; }

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      # Run `cargo audit` directly rather than via `rustsec/audit-check@v2`
      # (the action's `ignore` input is silently dropped — it reported an empty
      # ignore set in its own JSON, red-failing the lane on the assessed
      # transitive advisories). `cargo audit` only auto-reads config from
      # `.cargo/audit.toml`, NOT the repo-root `/audit.toml`, so we pass the
      # ignore list explicitly via `--ignore`, sourced FROM `/audit.toml`
      # (the single source of truth — each id carries its chain + reachability
      # reason + the upstream bump that retires it). cargo-audit surfaces
      # informational advisories (unmaintained / yanked) as non-fatal warnings
      # by default, exactly the policy audit.toml documents. Drop a line from
      # audit.toml the moment its upstream ships a graph-compatible patched
      # release — this step picks the change up automatically.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (ignores sourced from /audit.toml)
        run: |
          set -euo pipefail
          # Extract the RUSTSEC ids from the [advisories].ignore array in
          # audit.toml and turn each into a `--ignore <id>` flag.
          mapfile -t IDS < <(grep -oE 'RUSTSEC-[0-9]{4}-[0-9]{4}' audit.toml | sort -u)
          IGNORE_ARGS=()
          for id in "${IDS[@]}"; do IGNORE_ARGS+=(--ignore "$id"); done
          echo "Ignoring ${#IDS[@]} assessed advisories: ${IDS[*]}"
          cargo audit "${IGNORE_ARGS[@]}"

  lean-marshal-gate:
    name: Lean marshal gate
    runs-on: ubuntu-latest
    # Skips gracefully when libdregg_lean.a is absent (see scripts/check-lean-marshal.sh).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/check-lean-marshal.sh

  no-unchecked-auth:
    name: No-Unchecked-Auth grep guard (P2.F)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/no-unchecked-auth.sh

  no-degraded-felt:
    name: Faithful-commitment gate (no degraded felt)
    runs-on: ubuntu-latest
    # ast-grep tripwire: a lossy 256->31-bit `fold_bytes32_to_bb` fold must not
    # reach a state-commitment position. See docs/FAITHFUL-COMMITMENT-LAW.md.
    steps:
      - uses: actions/checkout@v4
      - name: Install ast-grep (sg)
        run: npm install -g @ast-grep/cli@0.44.0
      - name: Faithful-commitment gate
        run: bash scripts/check-no-degraded-felt.sh

  metatheory-no-sorry:
    name: Metatheory zero-sorry guard
    runs-on: ubuntu-latest
    # Pin the Lean toolchain via metatheory/lean-toolchain (leanprover/lean4:v4.30.0).
    # mathlib is a *local-path* require (../../../src/mathlib4); CI reconstructs
    # that checkout at the pinned rev, then pulls the prebuilt mathlib cache so
    # the job builds the dregg2 corpus only (not all of mathlib).
    env:
      MATHLIB_REV: 1c2b90b13009c65b090d95a83c98e248deafb6f1
    steps:
      - uses: actions/checkout@v4

      # Install elan + the toolchain named in metatheory/lean-toolchain.
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o elan-init.sh
          bash elan-init.sh -y --default-toolchain "$(cat metatheory/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # The lakefile's mathlib require is `path = ../../../src/mathlib4`,
      # resolved relative to the `metatheory/` package dir — i.e. two levels
      # ABOVE the repo root. Reconstruct it at the pinned rev.
      - name: Fetch pinned mathlib4
        run: |
          MATHLIB_DIR="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/src/mathlib4"
          mkdir -p "$MATHLIB_DIR"
          git clone https://github.com/leanprover-community/mathlib4 "$MATHLIB_DIR"
          git -C "$MATHLIB_DIR" checkout "$MATHLIB_REV"
          # Pull the prebuilt .olean cache so we don't recompile mathlib.
          ( cd "$MATHLIB_DIR" && ~/.elan/bin/lake exe cache get )

      # The guard itself: build the corpus and FAIL on ANY `declaration uses
      # \`sorry\`` warning (covers sorry/admit/sorryAx, since admit & sorryAx
      # emit the same warning). See scripts/axiom-hygiene-guard.sh for the
      # two-layer design (this textual net + the Claims.lean #assert_axioms
      # ledger). The corpus must remain at ZERO sorry forever.
      - name: Zero-sorry guard
        run: bash scripts/axiom-hygiene-guard.sh

  descriptor-drift:
    name: Descriptor Lean↔JSON drift gate
    runs-on: ubuntu-latest
    # The circuit descriptor JSONs (circuit/descriptors/*.json) and their *_FP
    # sha256 constants are MACHINE-GENERATED from the verified Lean emit (the
    # source of truth). This gate regenerates them via scripts/emit-descriptors.sh
    # and fails if the result differs from what is checked in — catching the
    # Lean→JSON drift the in-Rust sha256 round-trip test cannot (a stale JSON whose
    # self-consistent FP passes the round-trip while the Lean emission has moved).
    # Same elan + pinned-mathlib setup as the zero-sorry job (it needs `lake`).
    env:
      MATHLIB_REV: 1c2b90b13009c65b090d95a83c98e248deafb6f1
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o elan-init.sh
          bash elan-init.sh -y --default-toolchain "$(cat metatheory/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch pinned mathlib4
        run: |
          MATHLIB_DIR="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/src/mathlib4"
          mkdir -p "$MATHLIB_DIR"
          git clone https://github.com/leanprover-community/mathlib4 "$MATHLIB_DIR"
          git -C "$MATHLIB_DIR" checkout "$MATHLIB_REV"
          ( cd "$MATHLIB_DIR" && ~/.elan/bin/lake exe cache get )

      # Regenerates from Lean and `git diff --exit-code`s the descriptors + the
      # *_FP constants. On drift: prints the offending diff + the fix command and
      # exits nonzero. See docs/DESCRIPTOR-EMIT.md.
      - name: Descriptor drift gate
        run: bash scripts/check-descriptor-drift.sh
