name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manually re-runnable. Also the escape hatch for a real gap: a workflow that pushes with
  # the default GITHUB_TOKEN (e.g. lean-seed.yml's `pin` job writing lean-seed.pin) does NOT
  # re-trigger workflows — GitHub suppresses it to prevent loops. So the CI-authored pin commit
  # that ARMS the Lean marshal gate cannot, by itself, trigger the CI run that would arm it.
  # `workflow_dispatch` lets that arming run be kicked without waiting for the next human push.
  workflow_dispatch:

# Explicit least-privilege. The repo default is ALREADY `read`
# (`gh api repos/emberian/dregg/actions/permissions/workflow`), so this is
# defense-in-depth, not a hole being closed: every job here runs `cargo build`/
# `cargo test`, i.e. executes the PR-under-test's `build.rs`, so if the repo
# default is ever flipped to read/write this lane must not inherit it.
permissions:
  contents: read

# Cancel superseded PR runs: once a new push lands on a PR, the older run's verdict
# is about code nobody will merge. Each run here is a FULL workspace compile on two
# OSes, so this is the single biggest CI-minute saving available.
# main is deliberately NOT cancelled: a per-commit verdict is what tells you WHICH
# commit broke it, and this repo's main takes rapid pushes from several terminals.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      # FEATURE-MATRIX GATES (2026-07-16, Lane 2 config-space audit): `dregg-chain`
      # has NO default features, so the workspace check above compiles NEITHER of
      # its real configurations. Before this gate, the `mock` config's tests had
      # never been compiled by any automated step, and the `on-chain` config (the
      # REAL alloy contract-call verifier) had never been compiled ANYWHERE — a
      # type error in `real_verify_on_chain` was invisible. Both are cheap:
      # mock adds no deps; alloy is already in the lockfile.
      - run: cargo test -p dregg-chain --features mock
      - run: cargo check -p dregg-chain --features on-chain
      # starbridge-polis default features are EMPTY (the pure cell-program library),
      # so `cargo test --workspace` compiles NEITHER the deos surface (src/deos.rs)
      # NOR the AX3 service (src/service.rs) / AX5 reactor (src/reactor.rs) — all three
      # ride a `#[path]`-into-test-binaries dance gated on the `deos` feature to dodge a
      # package-graph cycle (see the crate's [features] note). Their tests
      # (tests/{deos_seam,service,reactor,reexpress_deos_app}.rs) were built by nothing.
      # The feature adds NO new dep to the graph (it only flips the test #[cfg]s; the
      # app-framework/turn/sdk it pulls are dev-deps already built by --workspace), so
      # this reuses the warm target dir above. Mirrors the dregg-chain matrix directly.
      - run: cargo test -p starbridge-polis --features deos
      # dregg-doc has NO `default` key in [features], so — exactly like dregg-chain
      # above — `cargo test --workspace` compiles it FEATURELESS: its 3 ungated test
      # files run, and the 35 tests behind `substrate` compile NOWHERE. That population
      # is the economic-safety surface: tests/staked_bond_slash.rs (a conviction slashes
      # exactly the bond, conservingly; a second slash is refused one-shot; the slash
      # conserves the total across all parties), tests/conviction_unforgeable.rs (the
      # unforgeability gate — Conviction's fields are private and ConvictionEvidence is
      # #[non_exhaustive], so a SlashOutcome can only come from a genuine
      # CiAssurance::evaluate detection), tests/nullifier_root_federation.rs,
      # tests/literate_executor_weld.rs, plus 22 in-src unit tests (pull_request.rs
      # mod landing/required_checks/ci_run_checks, review.rs mod thread).
      # CHEAP: every dep the feature turns on (dregg-turn, dregg-commit, dregg-circuit,
      # dregg-blocklace, ed25519-dalek, serde) is an in-workspace path dep the
      # --workspace lane already builds. No prover, no network, no service.
      # ⚠ NOT compile-verified locally when landed (the local cargo target lock was held
      # by a co-tenant build); the evidence is manifest+source read, same basis as the
      # dregg-chain matrix. If this reds on a compile error, that IS the finding — a test
      # population that had never been built. Fix the drift; do not delete the step.
      - run: cargo test -p dregg-doc --features substrate

  # solana-lock is a DELIBERATE standalone workspace (keeps the Solana/SBF dep
  # tree out of the main one — see solana-lock/Cargo.toml). That isolation also
  # kept its lock/unlock/escrow BanksClient integration tests out of every CI
  # job: they only ran when someone invoked them locally. This job closes that
  # hole; the program tests run natively (solana-program-test, no validator).
  solana-lock:
    name: solana-lock (standalone workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana-lock
      - run: cargo test
        working-directory: solana-lock

  # solana-settlement is the SAME standalone-workspace class as solana-lock, and
  # it had the SAME hole: its settle_flow.rs integration test — the both-polarity
  # gate that VERIFIES the real dregg Groth16 apex proof on-chain via alt_bn128
  # (the identical ark-bn254 arithmetic the sol_alt_bn128_* syscalls use) and
  # REJECTS a forged proof — ran in no CI job. The prior exclude-list note claimed
  # this workspace "needs the SBF toolchain"; that conflated DEPLOYMENT (cargo
  # build-sbf) with TESTING. The tests use solana-program-test's native BanksClient
  # (no validator, no SBF, no build-sbf), exactly like solana-lock — verified green
  # locally: 11 unit + 2 settle_flow integration tests, ~2s. This closes the hole
  # the note itself flagged as "a candidate for a solana-lock-style job later".
  solana-settlement:
    name: solana-settlement (standalone workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana-settlement
      - run: cargo test --locked
        working-directory: solana-settlement

  # wasm/ is a DELIBERATE standalone workspace, for reasons that are still good:
  # its `[patch]` path-points plonky3-recursion at a sibling checkout, and it
  # force-enables wasm32-only features (getrandom's `wasm_js`, the `no-lean-link`
  # platform gate) that feature-unification would push onto every native crate if
  # it were folded into the root workspace. So it stays standalone — and the
  # SAME isolation that protects the root workspace kept wasm out of every CI
  # job: nothing built it, so nothing could tell you it had rotted.
  #
  # It had. `wasm-bindgen-test` was a stray key inside `[dependencies.web-sys]`'s
  # spec with no `[dev-dependencies]` section at all, so the crate's ~78 tests
  # were UNBUILDABLE — invisible, because no CI job ever compiled them. That
  # manifest bug is fixed; THIS JOB is what keeps it fixed. Mirrors the
  # `solana-lock` job above, which exists for the identical reason.
  #
  # ⚠ THE SIBLING CHECKOUT IS NOT OPTIONAL. `wasm/Cargo.toml`'s `[patch]`
  # path-points `../../plonky3-recursion` (cargo forbids re-pointing a git source
  # to a different rev of the same URL, so the override must be a path patch).
  # Without the clone, cargo cannot even RESOLVE this workspace — the job fails
  # before it compiles a line. REV is the pushed `update-plonky3-rev` tip and is
  # kept in lockstep with wasm/Cargo.toml's comment, pages.yml, extension.yml,
  # and publish-sdk-ts.yml — they must be the SAME circuit or the VK forks.
  wasm:
    name: wasm (standalone workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm
      - name: Fetch the plonky3-recursion fork as a sibling (wasm/ patch target)
        run: |
          set -euo pipefail
          REV=0a4a554e144f4e60107555ea7a11cd9969d6208b
          if [ ! -d ../plonky3-recursion/.git ]; then
            git clone --no-checkout https://github.com/emberian/plonky3-recursion ../plonky3-recursion
            git -C ../plonky3-recursion fetch --depth 1 origin "$REV"
            git -C ../plonky3-recursion checkout "$REV"
          fi

      # THE GATE. The ~78 `#[test]`s (68 in src/, 10 in tests/) are ordinary
      # native tests — they are the ones the manifest bug hid, and they run here.
      - name: cargo test (the ~78 native tests the manifest bug hid)
        working-directory: wasm
        run: cargo test

      # The 8 `#[wasm_bindgen_test]`s are a different population: two files carry
      # `wasm_bindgen_test_configure!(run_in_browser)`, so they need a real
      # browser, not node. ubuntu-latest ships Chrome; wasm-pack drives it
      # headless. This is the only place the in-browser surface (the card-in-the-
      # tab loop, the light-client-in-the-tab) is exercised at all.
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack test (the in-browser wasm_bindgen_test surface)
        working-directory: wasm
        run: wasm-pack test --headless --chrome

      # The browser bundle itself must still BUILD for wasm32 — this is the
      # artifact pages.yml serves and the one `sdk-ts`'s differential oracle is
      # built from. A crate whose native tests pass but whose wasm32 build is
      # broken is still rotted.
      - name: Build the wasm32 bundle (the oracle + the pages artifact)
        run: |
          set -euo pipefail
          RUSTFLAGS="-C link-arg=-zstack-size=33554432" \
            wasm-pack build wasm --target web --out-dir pkg --release
          test -s wasm/pkg/dregg_wasm.d.ts

  # EXCLUDED-WORKSPACES GATE (2026-07-17, CI-meaningfulness audit Track A2).
  # The repo-root `Cargo.toml` `exclude` list carries eleven DELIBERATE standalone
  # workspaces (each its own `[workspace]` + Cargo.lock), kept out of the root
  # resolution for `links =` / version-pin conflicts. The isolation is correct —
  # and it is the SAME failure mode every time: `cargo check --workspace` never
  # touches them, so nothing can say they have rotted. discord-bot sat silently
  # uncompilable at HEAD until 2026-07-16; wasm's ~78 tests were unbuildable for
  # the identical reason (see the wasm job above). solana-lock and wasm have their
  # dedicated jobs above; sdk-py is compile+test-gated by publish-sdk-py.yml;
  # solana-settlement has its own solana-lock-style job above (its native
  # BanksClient tests need no SBF). This matrix closes the hole for the remaining
  # buildable five. Still ungated: pg-dregg (cargo-pgrx cdylib — wants a
  # pgrx-managed postgres, not a bare runner) and deos-zed-full (the vendored
  # full-Zed recon spike: gpui/display-bound, same reason the root test job
  # excludes deos-zed).
  #
  # `--locked` is deliberate: these workspaces path-dep into the main tree, so a
  # manifest edit anywhere upstream silently invalidates their committed locks —
  # exactly the drift class that goes unnoticed when nothing builds them. A red
  # here that says "stale Cargo.lock" is fixed by regenerating the lock in that
  # directory (cd <dir> && cargo update -w — or any cargo build there without
  # --locked) and committing it.
  #
  # Toolchains: dtolnay/rust-toolchain exports RUSTUP_TOOLCHAIN, which overrides
  # each directory's rust-toolchain.toml — that is what keeps this lane on the
  # repo's date-pinned nightly instead of the crates' local ROLLING `nightly`
  # pins (deliberately non-reproducible in CI). deos-homeserver is the exception:
  # it pins stable 1.96.1 to match its embedded continuwuity upstream, so its
  # matrix leg carries that toolchain instead.
  excluded-workspaces:
    name: Excluded workspace (${{ matrix.dir }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # check-only: its lock resolves dregg-lean-ffi WITHOUT no-lean-link, so
          # test binaries would need the Lean seed archive at link time; `cargo
          # check --all-targets` compiles every target (tests included) without
          # linking, which is the honest hosted-runner gate.
          - dir: discord-bot
            toolchain: nightly-2026-06-21
            timeout: 60
          # no-lean-link end to end — test binaries link clean, so run them.
          - dir: dregg-tui
            toolchain: nightly-2026-06-21
            timeout: 45
            test: true
          # self-contained (vendored sqlite via duroxide; no path deps on the
          # default features) — the full suite runs in seconds. `--features deploy`
          # ALSO compiles tests/deploy.rs (`#![cfg(feature = "deploy")]`), the
          # launchpad seam: it pins a content-addressed microsite + token metadata
          # and re-witnesses each asset against its CID. That test is fully hermetic
          # (dregg_ipfs::MockIpfs + tempdir — no daemon, no network) and was compiled
          # by NOTHING before (default features are `sqlite` only, so plain `cargo
          # test` skipped the whole file). The `pg` feature's tests/pg_weld.rs stays
          # out: it needs a live Postgres, same reason pg-dregg is ungated. Verified
          # green locally: 21+ tests incl. the deploy re-witness, ~2s.
          - dir: durable-workflow
            toolchain: nightly-2026-06-21
            timeout: 30
            test: true
            testflags: '--features deploy'
          # stable 1.96.1 = continuwuity's pin (rust-toolchain.toml there);
          # check-only: the embed is a full Matrix homeserver over a from-source
          # rocksdb — the long pole is the compile, and compiling it is the gate.
          # Its conduwuit dep is a git dep on forgejo.ellis.link (an external
          # forge) — if that host is down this leg fails at fetch, not at build.
          - dir: deos-homeserver
            toolchain: '1.96.1'
            timeout: 90
          # ⚠ EXPECTED RED at introduction (2026-07-17): src/materialize.rs still
          # calls the OLD dregg-doc API (`AtomContent::as_bytes()`, `d.string()?:
          # AtomContent`) — the pre-existing source drift its isolation hid, the
          # same one that reverted the root-workspace fold (see the exclude-list
          # note in the repo-root Cargo.toml). This leg is the tooth that keeps
          # that wound visible until materialize.rs is fixed; do NOT green it by
          # deleting the leg.
          - dir: forge-ci-runner
            toolchain: nightly-2026-06-21
            timeout: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)
      # Same system-dep set as the Check job: these workspaces path-dep deep into
      # the main tree (discord-bot alone pulls deos-view + starbridge surfaces),
      # so give every leg the same floor rather than bisecting -sys probes per leg.
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.dir }}
      # forge-ci-runner's `[patch]` path-points ../../plonky3-recursion (same
      # sibling-checkout requirement as the wasm job above, same REV — they must
      # stay in lockstep or the VK forks; see the wasm job's warning block).
      - name: Fetch the plonky3-recursion fork as a sibling (forge-ci-runner patch target)
        if: matrix.dir == 'forge-ci-runner'
        run: |
          set -euo pipefail
          REV=0a4a554e144f4e60107555ea7a11cd9969d6208b
          if [ ! -d ../plonky3-recursion/.git ]; then
            git clone --no-checkout https://github.com/emberian/plonky3-recursion ../plonky3-recursion
            git -C ../plonky3-recursion fetch --depth 1 origin "$REV"
            git -C ../plonky3-recursion checkout "$REV"
          fi
      - name: cargo check --all-targets --locked (the gate)
        working-directory: ${{ matrix.dir }}
        run: cargo check --all-targets --locked
      - name: cargo test --locked (legs whose test binaries link honestly on a hosted runner)
        if: matrix.test
        working-directory: ${{ matrix.dir }}
        # matrix.testflags is the per-leg feature selection (e.g. durable-workflow's
        # `--features deploy`, which turns on the otherwise-never-compiled deploy.rs
        # launchpad test). Empty for legs that only need default features.
        run: cargo test --locked ${{ matrix.testflags }}

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      # Reclaim the ~25 GB of preinstalled toolchains we never use. The hosted
      # ubuntu runner ships with only ~14 GB free on /, which the full debug-build
      # `target/` of this workspace overruns — see the root-cause note on the test
      # step below. Freed BEFORE the cache restore + build so they have headroom.
      - if: runner.os == 'Linux'
        name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2
      # macOS links the full workspace (incl. deos-zed's windowed gpui editor) via
      # ld64 — green, so keep it whole.
      - if: runner.os == 'macOS'
        run: cargo test --workspace
      # Linux SIGBUS root cause: it is NOT one heavy crate. The full debug-build
      # `target/` of the WHOLE workspace overruns the hosted runner's small disk,
      # and whichever link steps are running when / hits zero ALL die at once as
      # `collect2: ld terminated with signal 7 [Bus error]` — a write into GNU ld's
      # mmap'd output faults when the file can't be extended (disk full). The proof:
      # the crash hits SIMULTANEOUSLY across unrelated, LIGHT protocol crates
      # (starbridge-agent-orchestration / starbridge-tool-access-delegation — no
      # gpui/servo in their graph), and a sibling run surfaces the identical root
      # cause as a plain `No space left on device (os error 28)`. Fixed at the root
      # WITHOUT dropping any crate: (1) the disk-reclaim step above, and (2) build
      # the tests with debuginfo OFF (CARGO_PROFILE_*_DEBUG=0), which slashes both
      # the on-disk object footprint AND GNU ld's link-time memory so the link fits.
      # Every crate — incl. all starbridge-apps — still LINKS and TESTS here.
      #
      # deos-zed alone stays off this gate (the vendored full Zed/IDE fork: its
      # windowed gpui screenshot targets link the entire desktop/accessibility
      # static graph and want a display at runtime); its protocol-relevant gpui-free
      # core is covered by the firmament lane just below.
      - if: runner.os == 'Linux'
        name: Test workspace (debuginfo off; deos-zed split out)
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --workspace --exclude deos-zed
      # ...still test deos-zed's gpui-FREE core on Linux: the FirmamentFs seam
      # (a file is a cell, a save is a receipted turn) links only the light executor
      # spine, so it links cleanly. This keeps the protocol-relevant half covered.
      - if: runner.os == 'Linux'
        name: Test deos-zed gpui-free firmament core
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p deos-zed --no-default-features --features firmament

  # The LIVE agent-brain transport lane. The default build is 100% the recorded
  # `RecordedOpenAICaller`; the REAL `reqwest`-over-TCP transport
  # (`LiveOpenAICompatCaller`) is exercised only under `--features live-brain`, so it
  # never ran in the `cargo test --workspace` gate above (the audit's F4/G3). This
  # lane runs the hermetic mock-server tests (`dregg-agent/src/brain.rs`
  # `mock_server_tests`) — a real localhost OpenAI-compatible server over real TCP:
  # the configured base URL is honored, the API key rides ONLY the Authorization
  # header (never the body), and a dead endpoint fail-closes. Hermetic (no external
  # network), so it runs on every push. dregg-agent is std+reqwest — no gpui/system
  # deps needed.
  live-brain:
    name: Live brain (hermetic HTTP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (dregg-agent, live-brain)
        run: cargo test -p dregg-agent --features live-brain

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # ADVISORY, not a gate — but for an HONEST reason, corrected 2026-07-17.
    # The OLD justification here (a pinned CI clippy still carries lints a local
    # same-dated clippy lacks, e.g. chunks_exact_to_as_chunks / manual_is_multiple_of)
    # was STALE TWICE OVER: (1) the toolchain is date-pinned (`nightly-2026-06-21`,
    # committed 80cd71310), so CI's clippy IS the local same-dated clippy — the
    # nondeterminism it feared is gone; (2) those exact lints are already
    # `allow`ed in `[workspace.lints.clippy]`, so they never fire on the ~196
    # crates that inherit them anyway.
    #
    # The REAL reason it stays advisory: `cargo clippy --workspace -- -D warnings`
    # is genuinely RED right now, and not on a clippy style lint — on plain rustc
    # `unused import` warnings promoted by `-D warnings` (last 4 completed main
    # runs: ~50 of them, concentrated in the actively-refactored `circuit` crate,
    # e.g. `crate::dsl::descriptors::merkle_poseidon2_circuit`), plus the handful
    # of crates that do NOT carry `[lints] workspace = true` (e.g. deos-hermes).
    # Flipping this to a hard gate TODAY reds main on churn that isn't the PR's.
    #
    # THE PATH TO A REAL GATE (do not delete this note until done): drive
    # `cargo clippy --workspace -- -D warnings` to zero (start with the circuit
    # unused-imports), give the non-inheriting crates `[lints] workspace = true`
    # or an explicit exclude, VERIFY green, THEN drop `continue-on-error`. Until
    # then it RUNS + reports as annotations. Run `cargo clippy` locally before pushing.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libxcb1-dev libgl1-mesa-dev libegl-dev libgles-dev libharfbuzz-dev libfreetype-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxext-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gperf libunwind-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          # Pinned: a floating @master nightly can introduce new clippy lints that
          # red the gate on a day with zero code changes. Bump deliberately.
          toolchain: nightly-2026-06-21
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
          components: rustfmt
      # If this fails, format-drift landed. The local pre-commit hook formats every staged .rs at
      # its crate's edition so this stays green automatically — install it once with
      # `bash scripts/install-hooks.sh`, and commit WITHOUT `--no-verify` (that skips the hook).
      - run: |
          cargo fmt --all -- --check || { echo '::error::format drift — run `cargo fmt --all` (and install the pre-commit hook: bash scripts/install-hooks.sh)'; exit 1; }

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      # Run `cargo audit` directly rather than via `rustsec/audit-check@v2`
      # (the action's `ignore` input is silently dropped — it reported an empty
      # ignore set in its own JSON, red-failing the lane on the assessed
      # transitive advisories). `cargo audit` only auto-reads config from
      # `.cargo/audit.toml`, NOT the repo-root `/audit.toml`, so we pass the
      # ignore list explicitly via `--ignore`, sourced FROM `/audit.toml`
      # (the single source of truth — each id carries its chain + reachability
      # reason + the upstream bump that retires it). cargo-audit surfaces
      # informational advisories (unmaintained / yanked) as non-fatal warnings
      # by default, exactly the policy audit.toml documents. Drop a line from
      # audit.toml the moment its upstream ships a graph-compatible patched
      # release — this step picks the change up automatically.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (ignores sourced from /audit.toml)
        run: |
          set -euo pipefail
          # Extract the RUSTSEC ids from the [advisories].ignore array in
          # audit.toml and turn each into a `--ignore <id>` flag. Match ONLY the
          # QUOTED array elements ("RUSTSEC-…"), never a bare mention in a comment
          # — otherwise a RUSTSEC id typed into a comment silently suppresses a
          # live advisory (the grep-scanned-the-whole-file footgun; audit.toml's
          # own per-entry comments name the ids, and fixed advisories are written
          # prefix-stripped to dodge the old grep — both now moot).
          mapfile -t IDS < <(grep -oE '"RUSTSEC-[0-9]{4}-[0-9]{4}"' audit.toml | tr -d '"' | sort -u)
          IGNORE_ARGS=()
          for id in "${IDS[@]}"; do IGNORE_ARGS+=(--ignore "$id"); done
          echo "Ignoring ${#IDS[@]} assessed advisories: ${IDS[*]}"
          cargo audit "${IGNORE_ARGS[@]}"

  lean-marshal-gate:
    name: Lean marshal gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # THE FAITHFULNESS GATE, ARMED. This job used to be a checkmark that could not be red: with no
    # libdregg_lean.a on a hosted runner, check-lean-marshal.sh exited 0 having compared the Rust
    # executor against nothing at all. It is now armed by FETCHING a seed.
    #
    # A hosted runner cannot BUILD the seed (the Dregg2 corpus compile — see lean-seed.yml), but it
    # does not need to: ubuntu-latest IS Linux-x86_64, the platform lean-seed.yml publishes on every
    # push to metatheory/**. Consuming a prebuilt archive is a download + a link, which is minutes.
    # That asymmetry — build heavy on self-hosted, consume cheap on hosted — is what un-fakes this.
    #
    # SELF-ARMING: until the first seed release exists, the pin's TAG is empty and fetch cannot
    # resolve anything, so the gate reports its unarmed state loudly instead of failing every PR for
    # infrastructure that has not been stood up yet. lean-seed.yml's `pin` job writes TAG on the
    # first successful publish — at which point this gate arms itself with no further edit here.
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-21
      - uses: Swatinem/rust-cache@v2

      - name: Is a seed release published? (reads dregg-lean-ffi/lean-seed.pin)
        id: pin
        run: |
          set -euo pipefail
          tag="$(sed -n 's/^TAG=//p' dregg-lean-ffi/lean-seed.pin | head -1)"
          if [ -n "$tag" ]; then
            echo "armed=1" >> "$GITHUB_OUTPUT"
            echo "::notice::seed release '$tag' is pinned — arming the faithfulness gate."
          else
            echo "armed=0" >> "$GITHUB_OUTPUT"
            # SILENT-DISARM GUARD (gate-vacuity #3). An empty TAG makes
            # check-lean-marshal.sh SKIP — "NOTHING WAS CHECKED" — and exit 0, so a
            # disarmed run is byte-for-byte indistinguishable from a passing one. A
            # published seed EXISTS (lean-seed.pin ships TAG=lean-seed, content-keyed and
            # stable), so on the protected branch `main` there is NO legitimate unarmed
            # state: an empty TAG there is a lost/tampered pin and MUST be a red job, not
            # a green-with-warning. The ONLY sanctioned unarmed state is a deliberate
            # pre-seed bootstrap, and it must be declared IN THE COMMITTED PIN with a
            # `LEAN_GATE_INTENTIONALLY_UNARMED=1` line — visible in review, never silent.
            intentional="$(sed -n 's/^LEAN_GATE_INTENTIONALLY_UNARMED=//p' dregg-lean-ffi/lean-seed.pin | head -1)"
            # Fire on a PUSH to main AND on a PR TARGETING main. The push-only form was a
            # POST-MERGE tripwire: a PR that empties/tampers the pin passed its PR CI green
            # (the marshal gate silently SKIPs), so a reviewer relying on green checks would
            # MERGE the disarm before the red ever showed. For a pull_request event the
            # protected target is GITHUB_BASE_REF (= main), not GITHUB_REF. Blocking both
            # makes the disarm visible in the PR, pre-merge.
            targets_main=0
            if [ "${GITHUB_EVENT_NAME:-}" = "push" ] && [ "${GITHUB_REF:-}" = "refs/heads/main" ]; then
              targets_main=1
            elif [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ] && [ "${GITHUB_BASE_REF:-}" = "main" ]; then
              targets_main=1
            fi
            if [ "$targets_main" = "1" ] && [ "$intentional" != "1" ]; then
              echo "::error::lean-seed.pin has an EMPTY TAG on a change to main (push or PR), with no committed LEAN_GATE_INTENTIONALLY_UNARMED=1 escape. The Lean↔Rust faithfulness gate would SKIP and go green having checked NOTHING. Restore the pin's TAG (run 'Publish Lean seed'), or — for a deliberate pre-seed bootstrap — commit LEAN_GATE_INTENTIONALLY_UNARMED=1 to dregg-lean-ffi/lean-seed.pin so the disarm is visible in review."
              exit 1
            fi
            echo "::warning::lean-seed.pin TAG is EMPTY — no seed release exists yet, so this gate can only SKIP and is asserting NOTHING. Run the 'Publish Lean seed' workflow (needs a registered self-hosted runner with the lean-seed + linux-x86_64 labels); it writes TAG and this gate arms itself automatically."
          fi

      # The seed links against the pinned toolchain's Lean runtime/stdlib, so elan is required even
      # on the fetch path. It installs in ~a minute and does NOT compile mathlib.
      - name: Install elan + the pinned Lean toolchain
        if: steps.pin.outputs.armed == '1'
        run: |
          set -euo pipefail
          curl -sSf https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch the CI-published Lean seed for this checkout
        if: steps.pin.outputs.armed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y zstd
          bash scripts/fetch-lean-seed.sh

      - name: Faithfulness gate (Lean↔Rust; armed — an absent seed is now a FAILURE)
        env:
          # Armed only when a seed was actually fetchable. When it was not, this stays 0 and the
          # script prints "NOTHING WAS CHECKED" rather than a green that means nothing.
          DREGG_REQUIRE_LEAN_GATE: ${{ steps.pin.outputs.armed }}
        run: bash scripts/check-lean-marshal.sh

  no-unchecked-auth:
    name: No-Unchecked-Auth grep guard (P2.F)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: bash scripts/no-unchecked-auth.sh

  no-degraded-felt:
    name: Faithful-commitment gate (no degraded felt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # ast-grep tripwire: a lossy 256->31-bit `fold_bytes32_to_bb` fold must not
    # reach a state-commitment position. See docs/FAITHFUL-COMMITMENT-LAW.md.
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install ast-grep (sg)
        run: npm install -g @ast-grep/cli@0.44.0
      - name: Faithful-commitment gate
        run: bash scripts/check-no-degraded-felt.sh

  metatheory-no-sorry:
    name: Metatheory zero-sorry guard
    runs-on: ubuntu-latest
    timeout-minutes: 330
    # Pin the Lean toolchain via metatheory/lean-toolchain (leanprover/lean4:v4.30.0).
    # mathlib is a *local-path* require (../../../src/mathlib4); CI reconstructs
    # that checkout at the pinned rev, then pulls the prebuilt mathlib cache so
    # the job builds the dregg2 corpus only (not all of mathlib).
    env:
      MATHLIB_REV: 1c2b90b13009c65b090d95a83c98e248deafb6f1
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Install elan + the toolchain named in metatheory/lean-toolchain.
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            -o elan-init.sh
          bash elan-init.sh -y --default-toolchain "$(cat metatheory/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # The lakefile's mathlib require is `path = ../../../src/mathlib4`,
      # resolved relative to the `metatheory/` package dir — i.e. two levels
      # ABOVE the repo root. Reconstruct it at the pinned rev.
      - name: Fetch pinned mathlib4
        run: |
          MATHLIB_DIR="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/src/mathlib4"
          mkdir -p "$MATHLIB_DIR"
          git clone https://github.com/leanprover-community/mathlib4 "$MATHLIB_DIR"
          git -C "$MATHLIB_DIR" checkout "$MATHLIB_REV"
          # Pull the prebuilt .olean cache so we don't recompile mathlib.
          ( cd "$MATHLIB_DIR" && ~/.elan/bin/lake exe cache get )

      # The guard itself: build the corpus and FAIL on ANY `declaration uses
      # \`sorry\`` warning (covers sorry/admit/sorryAx, since admit & sorryAx
      # emit the same warning). See scripts/axiom-hygiene-guard.sh for the
      # two-layer design (this textual net + the Claims.lean #assert_axioms
      # ledger). The corpus must remain at ZERO sorry forever.
      - name: Zero-sorry guard
        run: bash scripts/axiom-hygiene-guard.sh

      # CRYPTO LINKING-SEAM GAUNTLET (2026-07-17, CI-meaningfulness audit).
      # `Dregg2.Crypto.CryptoVerifyAll` is the aggregator for the from-scratch PQ
      # linking chain. The ML-DSA `SignCoreSpec` (sign =spec), ML-KEM `EncapsCoreSpec`
      # (encaps =spec), and the `AcvpKats` NIST-ACVP-style native_decide KAT batch are
      # imported by NOTHING ELSE in the corpus (verified: `grep -rl import` finds only
      # CryptoVerifyAll) and the module is DELIBERATELY outside the default `Dregg2.lean`
      # aggregator — its heavy KAT `native_decide` chain would bloat every default build.
      # Net effect before this step: NO CI job compiled these PQ floor proofs at all —
      # the sign/encaps `=spec` results and the empirical KAT floor were verified only
      # on a dev laptop, exactly the "green on ember's laptop" class. This runs LAST in
      # this job so it reuses the already-built+warm corpus above: only the incremental
      # crypto-gauntlet closure compiles here (the default corpus is cached from the
      # zero-sorry build). A red here is a rotted PQ floor proof, not infra flake.
      # Routed through axiom-hygiene-guard.sh (NOT a bare `lake build`) so the
      # SAME `declaration uses \`sorry\`` / sorryAx grep the zero-sorry step runs
      # is applied to this out-of-default module too. `sorry`/`admit` are Lean
      # WARNINGS (exit 0, no warningAsError in metatheory/lakefile.toml), so an
      # exit-code-only `lake build <module>` here would GREEN even with a sorry
      # in the module — this closes that hole and keeps the textual net uniform.
      - name: Crypto linking-seam gauntlet (SignCoreSpec/EncapsCoreSpec/AcvpKats — outside the default aggregator)
        env:
          AXIOM_GUARD_TARGETS: Dregg2.Crypto.CryptoVerifyAll
        run: bash scripts/axiom-hygiene-guard.sh

      # THE CORPUS-WIDE AXIOM-HYGIENE LEDGER, ARMED (2026-07-17, wiring hunt round 2).
      # `Dregg2/Claims.lean` is THE `#assert_axioms` net: 202 per-decl pins +
      # 51 `#assert_namespace_axioms` (~1500 theorems) that each FAIL THE BUILD unless
      # the pinned decl's full axiom set is {propext, Classical.choice, Quot.sound}.
      # Its own header calls it "the comprehensive, corpus-wide #assert_axioms net" and
      # names ~190 pins as "the UNIQUE location of those per-keystone kernel-clean
      # certifications" — and NOTHING BUILT IT. It is imported by zero modules (verified:
      # `grep -rl '^import Dregg2.Claims'` = 0 hits) and is not reachable from the
      # `Dregg2.lean` root, and the `Dregg2` lean_lib has NO globs (lakefile.toml) — so
      # `lake build` never touched it. scripts/axiom-hygiene-guard.sh's header describes a
      # "two-layer" guard whose layer (b) IS this ledger; layer (b) was running NOWHERE.
      # The textual layer (a) above catches a literal `sorry`; ONLY this layer catches a
      # TRANSITIVELY-INHERITED sorryAx or a keystone that silently grew a new axiom.
      #
      # COST: it imports ONLY the root `Dregg2` — already built by the zero-sorry step above
      # — so this elaborates the pins against a warm corpus and nothing else. Measured on a
      # warm tree: ~2m53s wall / ~90s CPU. A red here is a REAL axiom leak in a keystone the
      # corpus advertises as proved: read the named decl, do not delete the pin.
      - name: Corpus-wide axiom-hygiene ledger (Dregg2.Claims — 253 pins, imported by nothing)
        working-directory: metatheory
        run: lake build Dregg2.Claims

      # THE ORPHAN GATE (2026-07-17, wiring hunt round 2). The `Dregg2` lean_lib has NO
      # `globs` (metatheory/lakefile.toml), so `lake build` compiles `Dregg2.lean` + its
      # transitive imports ONLY. 103 modules under metatheory/Dregg2/** are NOT reachable
      # from that root, NOT named by any CI step, and NOT pulled in by the descriptor-drift
      # gate's emitters — they were compiled by NOTHING. Same hole class as CryptoVerifyAll
      # above; this is its siblings. The 76 listed here are the ones VERIFIED GREEN at HEAD
      # (built locally on a warm corpus, 2026-07-17) and they assert real things:
      #   * Bridge/*        — the Eth/MPT/Tendermint light clients + proof-of-holdings
      #                       (~210 theorems, 173 #assert_axioms) — the chain-participation floor.
      #   * Games/*         — Automatafl + MultiwayTug and their AIRs (the DEPLOYED games'
      #                       move-legality proofs; 63 theorems, 36 #guard).
      #   * Verify/LoadBearing* — the @[load_bearing] linter. NOTE: proof-integrity-canary.yml's
      #                       header claims this linter "runs every push in ci.yml's
      #                       metatheory-no-sorry job". That was FALSE — it ran only inside the
      #                       DAILY canary (LoadBearingAuditBroad is a mutation target), and
      #                       LoadBearingAuditKey ran nowhere at all. This step makes the
      #                       canary's claim TRUE.
      #   * Circuit/AlgoStarkSound*, Fri*, Ood/Fin/Kernel* — the STARK/FRI soundness tower.
      #   * Circuit/Emit/*Refine, *Rung2 — the emit refinement ladder (the green half).
      #
      # ⚠ 28 dark modules are DELIBERATELY NOT LISTED because they are RED AT HEAD — the rot
      # this hole hid. Do NOT add them here to "complete the list"; fix them, then add:
      #   * Circuit.DeltaProto + Circuit.EffectsAsDataProto — de-risk PROTOTYPES (their verdict
      #     is recorded in their own header); rotted against Circuit/FinKernelStep.lean drift.
      #   * 26 Circuit.Emit.{Predicates*,NonRevocation*,QuantifiedAbsence*,NoteSpendingLeaf*,
      #     TemporalPredicate*,BridgeAction,MerkleMembership,MultiStepChain,Derivation,
      #     EffectActionBinding}{Refine,Rung2*} — each fails with a Type mismatch that
      #     induces sorryAx, and each one's *Emit upstream is CI-covered and GREEN. i.e. the
      #     refinement proofs drifted away from the emitters they refine, invisibly, because
      #     nothing built them. Un-gate: repair the module, move its name into the list above.
      #
      # COST: every module here is a LEAF on the corpus the zero-sorry step already built
      # (measured: the 18 non-Circuit ones take 32s warm; the whole 76 ~7 min wall). This runs
      # last so it reuses that warm build. A red here is a rotted proof, not infra flake.
      # Routed through axiom-hygiene-guard.sh (NOT a bare `lake build`) so the
      # SAME `declaration uses \`sorry\`` / sorryAx grep runs on all 76 orphan
      # modules. `sorry`/`admit` are WARNINGS (exit 0, no warningAsError in
      # metatheory/lakefile.toml), so the previous exit-code-only `lake build
      # <list>` would GREEN even with a sorry in any of these — apex-soundness
      # ones included (AlgoStarkSoundFanoutMemFree, AcceptanceDischarge,
      # Bridge.LightClientEth, ProofOfHoldings, HoldingWeightedTally). The folded
      # AXIOM_GUARD_TARGETS becomes the space-separated build list; the guard
      # applies the identical textual net, closing the coverage hole.
      - name: Orphan gate (76 modules reachable from no CI target — the CryptoVerifyAll siblings)
        env:
          AXIOM_GUARD_TARGETS: >-
            Dregg2.Apps.ColonistJob
            Dregg2.Bridge.HoldingFoldRecursive
            Dregg2.Bridge.HoldingWeightedTally
            Dregg2.Bridge.InterchainAdapterDecision
            Dregg2.Bridge.LightClientEth
            Dregg2.Bridge.LightClientMpt
            Dregg2.Bridge.LightClientTendermint
            Dregg2.Bridge.ProofOfHoldings
            Dregg2.Bridge.ProofOfHoldingsGeneric
            Dregg2.Bridge.VerifiedLightClient
            Dregg2.Circuit.AcceptanceDischarge
            Dregg2.Circuit.AlgoStarkSoundFanoutMemFree
            Dregg2.Circuit.AlgoStarkSoundFanoutMemory
            Dregg2.Circuit.AlgoStarkSoundFanoutSetField
            Dregg2.Circuit.AlgoStarkSoundGeneral
            Dregg2.Circuit.AlgoStarkSoundKernel
            Dregg2.Circuit.AlgoStarkSoundKernelAvail
            Dregg2.Circuit.BlindedMembershipBindingFromFold
            Dregg2.Circuit.CustomLeafEncoding
            Dregg2.Circuit.Emit.AccumulatorNonRevocationRefine
            Dregg2.Circuit.Emit.AdjacencyMembershipRefine
            Dregg2.Circuit.Emit.AdjacencyMembershipRefineAudit
            Dregg2.Circuit.Emit.AdjacencyMembershipRung2
            Dregg2.Circuit.Emit.AvailWideMembersNarrow
            Dregg2.Circuit.Emit.BilateralAggregationEmit
            Dregg2.Circuit.Emit.BilateralAggregationRefine
            Dregg2.Circuit.Emit.BilateralAggregationRung2
            Dregg2.Circuit.Emit.BlindedMembershipRung2
            Dregg2.Circuit.Emit.BoundPresentationRefine
            Dregg2.Circuit.Emit.BoundPresentationRung2
            Dregg2.Circuit.Emit.CommittedThresholdEmit
            Dregg2.Circuit.Emit.CommittedThresholdRefine
            Dregg2.Circuit.Emit.DerivationRefine
            Dregg2.Circuit.Emit.DfaRoutingGeneralEmit
            Dregg2.Circuit.Emit.DfaRoutingRefine
            Dregg2.Circuit.Emit.DfaRoutingRung2
            Dregg2.Circuit.Emit.EffectActionBindingEmit
            Dregg2.Circuit.Emit.EffectActionBindingRefine
            Dregg2.Circuit.Emit.EffectVmEmitIvcStateTransition
            Dregg2.Circuit.Emit.EffectVmEmitIvcStateTransitionRefine
            Dregg2.Circuit.Emit.EffectVmEmitIvcStateTransitionRung2
            Dregg2.Circuit.Emit.EffectVmEmitIvcStateTransitionRung2Full
            Dregg2.Circuit.Emit.EmitGraduate
            Dregg2.Circuit.Emit.FoldEmit
            Dregg2.Circuit.Emit.FoldRefine
            Dregg2.Circuit.Emit.FoldRung2
            Dregg2.Circuit.Emit.GarbledEvalEmit
            Dregg2.Circuit.Emit.GarbledEvalRefine
            Dregg2.Circuit.Emit.GarbledEvalRung2
            Dregg2.Circuit.Emit.MembershipAuthRootEdge
            Dregg2.Circuit.Emit.MembershipDepthGeneralRung2
            Dregg2.Circuit.Emit.MultiStepChainEmit
            Dregg2.Circuit.Emit.PredicatesRelationalCompoundEmit
            Dregg2.Circuit.Emit.RotatedLayout
            Dregg2.Circuit.Emit.RotatedLayoutBridge
            Dregg2.Circuit.FinBindsKernel
