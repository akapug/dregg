name: Publish @dregg/sdk (npm)

# Publishes the TypeScript SDK (`sdk-ts/`, package `@dregg/sdk`) to the public
# npm registry.
#
# TRIGGER: a `sdk-ts-v*` tag (e.g. `sdk-ts-v0.3.0`) OR a manual workflow_dispatch.
# Tag-on-release keeps the published version tied to a commit; dispatch is the
# escape hatch for a re-publish.
#
# CREDENTIAL: needs the repo/org secret `NPM_TOKEN` — an npm automation token
# with publish rights on the `@dregg` scope. The publish step is gated on that
# secret; without it the job no-ops with a clear message rather than failing.
#
# WHY a wasm build first: `@dregg/sdk` does NOT bundle the wasm — `dregg-wasm`
# is an OPTIONAL peer dependency, published separately. But the SDK's typed
# `@dregg/sdk/wasm` face declares `typeof import("dregg-wasm")`, so the `.d.ts`
# generation needs the `dregg-wasm` types present at `../wasm/pkg` (gitignored).
# We build the wasm pkg the same way pages.yml does (sibling fork checkout at the
# pinned rev + wasm-pack), so the dts step resolves the real types.

on:
  push:
    tags:
      - 'sdk-ts-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build + publish @dregg/sdk
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # include_str!'d staged registries live in LFS (.gitattributes)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-sdk-ts-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Fetch the plonky3-recursion fork as a sibling (wasm/ patch target)
        # The standalone wasm/ workspace patches p3-* to ../../plonky3-recursion.
        # REV is the pushed `update-plonky3-rev` tip (lockstep with
        # wasm/Cargo.toml's [patch] sibling + pages.yml + extension.yml).
        run: |
          set -euo pipefail
          REV=0a4a554e144f4e60107555ea7a11cd9969d6208b
          if [ ! -d ../plonky3-recursion/.git ]; then
            git clone --no-checkout https://github.com/emberian/plonky3-recursion ../plonky3-recursion
            git -C ../plonky3-recursion fetch --depth 1 origin "$REV"
            git -C ../plonky3-recursion checkout "$REV"
          fi

      - name: Build the dregg-wasm pkg (provides @dregg/sdk/wasm types)
        run: |
          set -euo pipefail
          RUSTFLAGS="-C link-arg=-zstack-size=33554432" \
            wasm-pack build wasm --target web --out-dir pkg --release
          test -s wasm/pkg/dregg_wasm.d.ts

      - name: Install + build the SDK
        working-directory: sdk-ts
        run: |
          npm ci || npm install
          npm run build

      # ─── THE RELEASE GATE ───────────────────────────────────────────────
      #
      # A publish gated on a suite that never ran is gated on NOTHING. This
      # workflow used to build, `npm pack --dry-run`, and publish — never once
      # invoking the tests. That is how three revisions of confident prose
      # shipped: sdk-ts dropped `CapabilityRef::provenance` (M30), signed
      # classical-only, and signed `dregg-action-sig-v2` against a `v3`
      # executor — every signed turn rejected by the node — while the package
      # said "byte-faithful: yes".
      #
      # sdk-ts is STRUCTURALLY prone to this in a way sdk-py is not: sdk-py
      # depends on dregg-turn/dregg-cell by PATH and encodes with the same
      # `postcard` the node decodes with, so it cannot mis-encode. sdk-ts must
      # port the codec to TypeScript, so only a test can catch its drift.
      # (`publish-sdk-py.yml` gates on `cargo test` for the same reason; this
      # mirrors it.)
      #
      # `npm test` runs BOTH oracles, and neither can go stale:
      #   * the BYTE differential (`test/wire.test.mjs`) compares TS-encoded
      #     turns against the freshly-built dregg-wasm — the REAL Rust codec.
      #     Its `pretest` hook rebuilds `wasm/pkg` (gitignored, so there is no
      #     frozen artifact to silently bless), and the loader THROWS if the
      #     oracle is absent rather than skipping.
      #   * the VOCABULARY gate (`test/protocol-vocabulary.test.mjs`) parses
      #     `turn/src/action.rs` + `cell/src/capability.rs` at test time and
      #     fails if any Effect/Authorization variant is unaccounted for, if a
      #     postcard discriminant index shifted, or if a modeled variant's
      #     field set changed. That closes what a byte differential cannot see:
      #     Rust has 34 Effect variants, TS models 7, and a 35th is invisible
      #     to a comparison over 7 fixtures.
      #
      # The v2-vs-v3 signing bug would have failed the byte differential here
      # and blocked the tag. Do not add `continue-on-error` to this step. If it
      # is red, the protocol moved and the SDK has not caught up — that is
      # exactly the publish that must not happen.
      #
      # RUSTFLAGS mirrors the wasm build step above: `npm test`'s `pretest` hook
      # REBUILDS wasm/pkg (that rebuild is the freshness guarantee — it is what
      # makes the oracle un-staleable), so it must use the same stack-size flag
      # the release build does, or the oracle under test is not the artifact the
      # SDK's types were generated against.
      - name: Test before publishing (THE RELEASE GATE — drift dies here)
        working-directory: sdk-ts
        env:
          RUSTFLAGS: "-C link-arg=-zstack-size=33554432"
        run: npm test

      - name: Verify the package is well-formed (npm pack --dry-run)
        working-directory: sdk-ts
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: No NPM_TOKEN — skipping publish
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          echo "::warning::NPM_TOKEN is not set; built + verified the package but did not publish."
          echo "Set the repo secret NPM_TOKEN (an npm automation token with @dregg publish rights) and re-run."
